name: 파이썬 수동 및 자동 실행

on:
  # 1️⃣ 매일 한국 시간(KST) 새벽 4시 자동 실행
  schedule:
    - cron: '30 10 * * *' # UTC 19:00 = KST 04:00 (+9시간)

  # 2️⃣ 웹페이지에서 원할 때 언제든 누르는 수동 버튼 생성
  workflow_dispatch:

jobs:
  run-python-scripts:
    runs-on: ubuntu-latest

    steps:
      # 1. 내 레포지토리 코드 가져오기
      - name: 내 코드 가져오기
        uses: actions/checkout@v4

      # 2. 파이썬 환경 세팅
      - name: 파이썬 3.10 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 필요 패키지 설치
      - name: 필요 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 파이썬 스크립트 순차 실행
      - name: 크롤링/데이터 수집 파이썬 실행
        run: python getNotice.py all # 👈 실행할 첫 번째 파이썬 파일명

      # 5. HTML 빌드 파이썬(genHtml) 실행 및 환경 변수 전달
      - name: HTML 빌드 파이썬(genHtml) 실행
          # 🔑 GitHub Secrets에 저장해둔 EU_ACTION_TOKEN을 genHTML.py로 전달!
        run: python genHTML.py # 👈 실행할 두 번째 파이썬 파일명

      # 6. 파이썬이 새로 만들거나 변경한 파일(index.html, json 등)을 Git에 자동 커밋&푸시
      - name: 변경된 파일 Git 레포지토리에 자동 저장
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git status
          # 변경된 파일이 있을 때만 커밋 및 푸시 진행 (없으면 패스)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update generated files" && git push)