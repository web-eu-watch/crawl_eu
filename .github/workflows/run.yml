name: 파이썬 수동 실행

on:
  workflow_dispatch:

jobs:
  run-python-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: 내 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 3.10 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 💡 이 부분을 수정했습니다 (requests 및 필요 패키지 직접 설치)
      - name: 필요 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 첫 번째 파이썬 실행
        run: python getNotice.py recent # 👈 실행할 파이썬 파일명

      - name: 빌드 파이썬(genHtml) 실행
        run: python genHTML.py