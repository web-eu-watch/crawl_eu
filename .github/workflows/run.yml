name: 파이썬 수동 실행

# 1. 실행 조건: 웹에서 버튼을 눌렀을 때 실행 (workflow_dispatch)
on:
  workflow_dispatch:

# 2. 실행할 작업 내용
jobs:
  run-python-scripts:
    runs-on: ubuntu-latest # 가상의 우분투 서버 한 대를 빌림

    steps:
      # 코드 다운로드
      - name: 내 코드 가져오기
        uses: actions/checkout@v4

      # 파이썬 설치
      - name: 파이썬 3.10 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 필요한 라이브러리 설치 (requirements.txt 가 있을 경우)
      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 파이썬 실행
      - name: 첫 번째 파이썬 실행
        run: python getNotice.py recent # 👈 가지고 계신 파이썬 파일명으로 수정하세요

      - name: 빌드 파이썬(genHtml) 실행
        run: python genHTML.py # 👈 두 번째 파이썬 파일명으로 수정하세요