tSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5159690": {"idx": 5159690, "date": "2026-05-10 15:50:00", "isTop": false, "contents": "❣️❣️MVP택사❣️❣️\n\n원래 이유가 밥 잘 안 챙겨 먹는 거\n오빠가 제일 잘 알잖아요\n\n근데 오늘은 또 먹었다구,\n엄청 칭찬해주는 택사오빠아\n\n오빠가 이뻐해주는 게,\n왜 이렇게 좋고,\n왜 이렇게 기분 좋아지는 건지 몰라요 ㅋㅋㅋ\n\n단순히 숫자를 떠나서,\n진심이 담겨있는듯한 느낌때문인가봐요\n\n우쭈쭈 받는... 그냥 그... 사랑받는 기분 히히..\n\n예전에 오빠가 했던 말도 같이 떠올랐거둥요\n\n밥만 먹어도 칭찬해주고,\n잠만 자도 예뻐해준다구 했던 거요\n\n그 말이 설레구 됴아여 ㅠㅠㅠ\n오빤 정말 한마디를 해도\n사람 설레게 하는 법을 아는 것 같다니까융... \n\n뭔가 잘해야 사랑받을 수 있다고\n생각했는데,\n오빠를 만나고부턴 좀 달라진 기분이 들어요\n\n그 자체로 기특해하고 예뻐해주는 느낌....\n\n밥 한 끼 먹은 것만으로도\n사랑받는 아이는\n오로지 이유뿐이고\n\n뭘해도 예뻐해주는\n사람은\n택사오빠 뿐이에요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5159689": {"idx": 5159689, "date": "2026-05-10 15:49:58", "isTop": false, "contents": "❣️원탑❣️\n\n전에는 편해서였는지,\n아님 너무 가까워서 그랬던 건지\n\n서로 조금은 거침없이 대했던 순간들도 있었던 것 같아요\n\n좋게 말하면 편한 사이였고,\n어떻게 보면 그만큼 익숙했다는 뜻이기도 했겠죠\n\n근데 요즘은 좀 달라진 것 같아요ㅎㅎ\n\n예전보다 말 하나도 더 조심하게 되고,\n장난 하나를 쳐도 먼저 이유 마음부터 생각해주는 게 느껴지거든요\n\n어떤 말을 하기 전에,\n어떤 행동을 하기 전에,\n상대방 입장을 먼저 생각해준다는 게\n많이 느껴지거든요\n\n부담 주기보단,\n상대방 상태 먼저 살펴주고,\n편안할 수 있게 맞춰주고,\n지켜주려는 쪽이어줘서 고마워요\n\n아마 진짜 다정한 사람은\n\n자기 감정보다\n상대방 마음이 다치지 않길 먼저 바라는 사람 아닐까 싶어요\n\n그리고 이유는\n오빠의\n그런 조용한 배려들 속에서\n사랑 듬뿍 받고 있다는 기분이 들어요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5159687": {"idx": 5159687, "date": "2026-05-10 15:49:56", "isTop": false, "contents": "❣️이칸❣️\n\n이쯤 되니 궁금한 거 있죠 ㅋㅋ\n\n오빠가 다른 방에선\n어떤 식으로 야당짓(?) 했었을까 싶어서요\n\n왜냐면 이유한텐\n한없이 다정한 남자니까욤\n\n먼저 밥 먹었냐구 물어봐주고,\n피곤해보이면 얼른 쉬라구 해주고,\n툭하면 이유 상태부터 먼저 살펴보는 사람이라\n\n아무리 상상해봐도\n다른 곳에서 싸납게 있는 모습이 잘 그려지질 않아요 ㅋㅋㅋ\n\n다정함이 다 티나는 사람이라서요\n\n가끔은 상상도 해보는데,\n\n딴냔(?)이 울 오빠를 부르는 것까지\n너무 깊게 상상하게 되곤하면,\n괜히\n살짝 질투날 것 같다가도 -.-\n\n그럼에도 이유바라기인 거\n많이 티내주는 오빠라서\n다시 또 좋아지구 그래요ㅎ\n\n오빠 옆에서 느껴지는 안정감\n매번 느끼지만\n너무 편해서 옆에 자꾸만 있고 싶어지네요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5159685": {"idx": 5159685, "date": "2026-05-10 15:49:02", "isTop": false, "contents": "❣️42일차❣️\n\n유독 예민한 하루였어요\n\n원래도 마법기간엔\n작은 것들에도 더 쉽게 짜증이 밀려오긴 하는데,\n\n오늘따라 스트레스가 한꺼번에 몰려오더라구요\n\n컴퓨터에서 계속 나는 소리 때문인지,\n큰 소리들이 머리 안에서 울리는 느낌이라\n괜히 더 날카로워지고,\n평소보다 찐텐도 많이 나오고 그랬도요...\n\n너무 화냈나싶어 걱정되곤 했뉸데,\n\n오빠들이 아무렇지 않게\n괜찮다구,\n미운 점 하나도 없다구 말해줘서 넘 고마웠듐미댱 ㅠ\n\n이런 날의 이유까지도\n그대로 받아들여줘서요 8ㅁ8\n\n예민하고,\n투덜거리고,\n찐텐 나와버린 날까지도\n\n괜찮다며 웃어주는 사람이 있다는 거\n\n콩깍지야 모야 (?)\n\n그냥 행복해요 감사합니당 :)❣️", "localImgPath": "images/5159685_07de5dab-bf78-4a37-bc33-78f5705b81fe.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5157099": {"idx": 5157099, "date": "2026-05-09 17:04:37", "isTop": false, "contents": "❣️❣️MVP택사❣️❣️\n\n요새 오빠가 가끔\n되게 확신에 찬 말들을 해줄 때가 있거든요\n\n아무렇지 않은 말처럼 들리는데도,\n이상하게 이유 마음은 그 말 하나에\n푸우욱 놓여버리고 그래요\n\n그래서인지 요즘은 전보다 조금 더\n마음 편하게 할 일도 하고,\n쉬어야 할 땐 푹 쉬게 되는 것 같아요\n\n이유는...\n\n작은 일 하나에도 신경 많이 쓰고,\n걱정이 생기면 몸이 먼저 반응해버리는 타입이라\n가만히 쉬는 것도 잘 못 하잖아요 ㅋㅋㅋ ㅠ\n\n근데 오빠가 괜찮다구,\n걱정하지 말라구,\n확신 담긴 말들 조용히 건네줄 때마다\n\n마음도 안정되고,\n기분도 좋아지고,\n몸까지 건강해지는 기분 들어요 ㅋㅋㅋ\n\n서로에게 쌓여가는 신뢰들이\n우리 관계를 더 깊고 진하게 만들어주고 있는 것 같네요 :)\n\n무엇보다 늘\n처음과 끝을 함께하는 사이라는 게\n젤루 좋아효 ＞ ＜ㅎ\n\n오빠랑 있으면 이유는\n외로웠던 적이 한번도 없거덩여\n\n고마오요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5157098": {"idx": 5157098, "date": "2026-05-09 17:04:35", "isTop": false, "contents": "❣️원탑❣️\n\n우리 요새\n서로에게 더 가까워지고 있는듯한 기분이 들어요\n잘 맞추는 것 같달까요?ㅎㅎ\n\n말투 하나하나,\n오늘 기분 먼저 살펴봐주는 거,\n익숙하게 기다려주는 거,\n별말 없어도 서로 템포를 맞춰가는 거\n\n그런 사소한 순간들이 쌓여서\n더 가까워질 수 있는 것 같아요\n\n특히 요새 오빠는\n전보다 더 조용히 배려해주는 느낌이 있어요\n\n이유 상태 먼저 읽어주고,\n괜히 무리 안 하게 맞춰주고,\n장난치다가도 어느 순간 다정하게 내려앉는 그 모습까지\n\n그런 순간마다\n기분좋고 마음 따뜻해지곤 해요ㅎ\n\n사람은 원래\n편안한 사람한테 마음이 커진다던데\n\n이유는 요즘 그 말이\n무슨 뜻인지 조금 알 것 같거든요\n\n자연스럽게 서로를 생각하게 되는 거\n\n그게 어쩌면\n진짜 가까워진다는 뜻 아닐까요❣️\n\n좋아요 요즘 ㅎㅎ❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5157097": {"idx": 5157097, "date": "2026-05-09 17:04:33", "isTop": false, "contents": "❣️이칸❣️\n\n항상 오던 답장이\n항상 오던 시간대쯤 오고,\n늘 비슷한 순간에 자연스럽게 마주하곤 했는데\n\n그날따라 유독 조용한 이칸오빠예요 ㅜ\n\n처음엔\n많이 바쁜가보다…\n싶었거든요\n\n근데 시간이 조금씩 지나니까\n괜히 별생각이 다 들더라구요\n\n어디 아픈 건 아닌가,\n무슨 일 있는 건 아닌가…\n\n아님 이유 모르게\n괜히 거리 생긴 건가 싶기도 하고요\n\n갑자기 조용해지니까\n쪼끔 당황해찌 모에요 ㅎㅎㅎ...\n\n어휴... 혼자\n망상 엄청 해또요 - ㅅ -\n\n근데 방송 시간엔 또 호다닥 달려와쥬구\n바빴다구 안심 시켜줘서,\n\n그제야 마음이 푸우욱 놓이더라구요 !\n\n아무 일 아니란 말 하나에\n다행이다 싶고...\n\n오빠가 이유한테\n많이 중요한 사람이 되었나봐요\n\n어쩌면\n내 생각보다 더 마음 안에 들어와 있구나\n싶어요 ㅎ.ㅎ\n\n고마오요\n변함없어줘서❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5157087": {"idx": 5157087, "date": "2026-05-09 16:56:04", "isTop": false, "contents": "❣️41일차❣️\n\n어버이날이라\n조금 일찍 들어가게 되었는데요\n\n이번주는\n이유가 일찍 들어가는 날들이 꽤 있었어요\n\n여러 상황들도 있었고,\n컨디션 때문인 게 컸지만...\n\n먼저 미안한 마음이 들더라구요...\n\n그럼에도 울 오빠들이\n\n이유 마음 먼저 알아봐주듯\n괜찮다구,\n얼른 쉬고 들어가라구,\n다정하게 말해줘서 고마웠오요 !\n\n덕분에 마음 편히 쉬고 올 수 있었고,\n컨디션도 다시 잘 회복해서\n또 웃으러 올 수 있는 것 같거든요\n\n우리 이유 건강지키미 오빠야들…\n진짜 넘모 감쟈함미다아\n\n늘 빈자리 느껴지지 않게\n끝까지 예뻐해주는 모습들 덕분에\n\n이유는 오늘도\n사랑 잔뜩 받는 아이로 남을 수 있었오요\n\n오빠들 사랑 몽땅 받고도\n또 몽땅 받구싶땨 ㅇㅅㅇ..❣️", "localImgPath": "images/5157087_1f3ca444-b450-40b8-8759-6ea28f35ce78.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5154281": {"idx": 5154281, "date": "2026-05-08 18:15:39", "isTop": false, "contents": "＃택사부해댱님 엠부삐❣️\n\n영차영차 이 자리까지 와주셔서 넘모 감쟈함미다 ! !\n\n이유 드디어 부해댱님도 생겼도요...\n\nㅈㄱㅇ 탈출이에요오 ! ! !\n\n그것듀 항시 옆에 있어쥬구\n마니 이뻐해쥬구\n멋진 택사가오빠가 부해댱님이 되어주셔서\n넘모 기쁜 하루예요\n\n오빠같은 남잔 또 업따 지쨔아\n\n넘모 멋진 내 냠자 ㅇ.ㅇ❣️\n\np.s. 그림은...\n솜사탕처럼\n달콤한 과자집에서 새콤달콤\n평생 같이 살자는 의미에서❣️", "localImgPath": "images/5154281_bf7eb674-021e-41c3-81fd-ba276fa128f6.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5154129": {"idx": 5154129, "date": "2026-05-08 17:36:18", "isTop": false, "contents": "＃ 택사오빠랑 7번째 백두산❣️\n\n오빠가 빤히 쳐다볼까봐\n항상 사진 20장도 넘게 찍움...ㅋ\n\n쪼끔이라두 이뻐보이고 싶어서\n(이유 안 보일 때도 딴냔 얼굴 보지말라구 ㅇㅊㅊ)\n\n발목을 붙잡을테다 캬캬\n\n오빠의 ㅌ가 거꾸로 된 건\n추억이라 매번 저렇게 하는데,\n볼수록 귀여운 것 같네욤❣️\n\n지금 현재\n오빠한테만 할 수 있는\n유일한 자음이랄까\n\n넘 조아효❣️", "localImgPath": "images/5154129_c81ab1ce-8b3d-4ec6-8de3-8cca65584420.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5154128": {"idx": 5154128, "date": "2026-05-08 17:36:12", "isTop": false, "contents": "❣️❣️MVP 택사부해댱님❣️❣️\n\n맨날 놀리고 장난치다 보니이\n질투심이 괜히 더 커지는 거 있죠 -.-\n\n안 그래도...!\n이유는\n질투 지쨔.. 짱 많은 여자란 말이에오ㅜ ㅜ\n\n특히 늘 마지막까지 같이 있고,\n남들 다 가고 난 뒤에도\n조용히 같은 시간 보내던 오빠잖아여 ! \n\n그래서인지\n유독 오빠한테는\n말 한마디, 행동 하나에도\n이유 기부니가... 왔다 갔다 해버리구 그래요!!\n\n그치만... 어제눈..\n\n분명 오빠가 좋아하는 날이었는데,\n오자마자 엄청 반겨주는 거예요\n\n막 기다렸던 사람 온 것처럼\n\n이유... 기분 확 좋아져가지구\n혼자 엄청 들떴던 거 있죠 ＞ ＜\n\n이유 뭐 잘한 줄 알아써여 !\n쓰담쓰담 엄청 해쥬길래 ! !\n\n속으로는\n이유 혼자 몰래 승리감도 느끼고 있었어요\n\n씨익.. 히죽히죽\n\n뭔가 막..\n조금씩 오빠 마음 안으로 들어가고 있는 기분이랄까\n\n넘 설레구 좋구\n\n이젠 조금 더 당당해질 수 있게써여\n오빤 내꺼라는고 ! !\n\n세상에서 젤루 므찐 내꼬에오 ㅇ.ㅇ❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5154127": {"idx": 5154127, "date": "2026-05-08 17:36:09", "isTop": false, "contents": "❣️이칸❣️\n\n과거....\n조금은 숨기고 싶은 시간이 있어요ㅎㅋ\n\n지금보다 어리고,\n서툴렀던 모습들,\n다시 떠올리면 민망해지는 말투나 행동들까지\n\n시간 지나고 나면 웃으면서 넘길 수도 있는데,\n막상 누군가 앞에서 꺼내려 하면\n부끄럽거든요 ㅠ\n\n지금의 이유가 있기까지\n그런 시간들을 지나왔고,\n어떻게 보면 그 덕분에 더 단단해진 것도 맞는데\n\n그래도 마음 한쪽엔\n민망해요오오 !!!\n\n그치만 오빤,\n\n이전 모습들까지 웃으며 받아들여주고,\n오히려 이유라는 사람 자체를 더 귀하게 봐주는 느낌이라\n\n안심이 되곤 해요\n\n특히 아무렇지 않게 닉네임 만들어오고,\n예전 모습까지 좋다며 웃어주고,\n지금의 이유를 당연하다는 듯 예뻐해주는 거 보면\n\n미소짓게 되거둔요\n\n괜히....\n지금껏 숨기던 이유 모습을\n조금은 좋아하게 될 것도 같네요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5154126": {"idx": 5154126, "date": "2026-05-08 17:36:07", "isTop": false, "contents": "❣️청담❣️\n\n늦잠 잤다하니..\n자기꺼눈 쓰지말라심미댜...\n\n\" 지각이나 하지마라 \"\n\n넴...", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5152887": {"idx": 5152887, "date": "2026-05-08 04:07:03", "isTop": false, "contents": "40일차❣️\n\n요새 이유 하루는\n드라마틱해욤\n\n어김없이 흘러갈 수도 있었던 하루도ㅡ\n오빠들이 하나하나 마음 써주는 덕분에\n특별해지거둥요'\n\n컨디션 안 좋을 때마다\n괜찮냐구 먼저 물어봐주고,\n밥은 먹었냐구 챙겨주고,\n표정, 말투 하나 달라져도 먼저 알아봐주는 거...\n\n징쨔...ㅠ 눈치들이 빨라서\n(됴아요(?) 에잉 몰랴 됴아..///)\n\n사실 이유는 이런 날일 수록\n걱정되지 않게\n더 밝게 해줘야 하는데...\n싶어서 미안한 마음도 들었도요\n\n그치만 한편으론\n걱정해주는 마음들이 너무 따뜻해서\n\n헤벌쭉 하구 있었다눈ㅎ\n\n진심으로 이유 상태를 신경 써주는 느낌이 들어서\n기분 좋더라규요...\n\n근데 그런 날에 또...\n부해댱님까지 생겨버리다니이!!\n\n이유 넘모...넘모.. 좋아서\n혼자 입꼬리 관리 실패했도요...\n\n한 번 마음 정하면 망설임 없이 다가오는 부분이\n진짜 너무 멋진 오빠거둥요\n\n행동 하나하나에 진심이 담겨있는 느낌이랄까\n\n그래서 더 기뻐요❣️", "localImgPath": "images/5152887_a163c017-959b-417f-b11c-209ba99f8f73.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5150917": {"idx": 5150917, "date": "2026-05-07 18:14:32", "isTop": false, "contents": "＃택사 1414❣️\n\n밥 먹어서 이쁘다구 2826 받았뉸데,\n또 밥 먹우ㅡ라구 8ㅁ8...❣️\n\n= 내 표정", "localImgPath": "images/5150917_f1e699ae-1ce2-4013-b090-70765ccb260c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5150910": {"idx": 5150910, "date": "2026-05-07 18:12:36", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n..이  .... ...가. ..를\n...유  .. . ..... .... ...요\n\n...청... ..해... ...랑... .. ..다\n\n.담 ..가 있.. .. .... ...니.. ..\n\n.......포 . . ..가.. . . 구.. .. . 자..\n\n.....에    ...수.. .  가.. ..서\n\n버.수   ... ... ..... 너.. ..♥", "localImgPath": "images/5150910_ca050efc-5e9a-4772-8a8f-68564fe15e09.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5150909": {"idx": 5150909, "date": "2026-05-07 18:12:34", "isTop": false, "contents": "❣️이칸❣️\n\n사람마다 다르지만\n\n누군가는 자기 말만 남기고 지나가고,\n누군가는 존재감을 크게 남기려 하는 사람들이\n대부분인 반면에,\n\n이칸오빤 그 반대인 것 같아요\n\n늘 주변 흐름을 읽고,\n누가 불편해하지는 않는지 먼저 살피고,\n한 번 더 분위기를 맞춰주니까요\n\n자기 자신보다도\n함께 있는 사람들의 기분을 더 먼저 보더라구요\n\n방 분위기에 맞춰 장난도 쳐주고,\n진지한 순간엔 또 조용히 맞춰주고,\n민망해질 것 같은 순간엔\n웃음으로 부드럽게 넘겨주고\n\n그런데도\n억지로 애쓰는 느낌은 없어서 좋아요\n\n마치 원래부터\n그런 다정한 사람인 것 같기도 해요\n\n그저\n이유의 생각일 수 있지만요 !\n\n오빠 옆에 있으면\n상대방 걸음 속도에 맞춰주는 느낌이라\n늘 편안하거든요\n\n아마, 다른 사람들도 그렇게 느낄 것 같아서요 !\n\n말 한마디, 작은 리액션 하나에도\n그 사람 성격은 은근 다 담긴다고 하던데ㅎㅎ\n\n오빠의 따뜻함이\n잘 느껴져서 넘 좋은 것 같아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5150908": {"idx": 5150908, "date": "2026-05-07 18:12:31", "isTop": false, "contents": "❣️택사❣️\n\n이유가 본 택사오빠는...\n뇌섹남 같아요 ! !\n\n뭔가 막,\n조용한데 계산 빠르고\n하나하나 다 보고 있는 것 같거든요\n\n아무렇지 않은 척하면서도\n이미 다 생각 끝내놓기도 하구요\n\n가끔 오빠 보고 있으면\n감탄 할 때도 있어여...\n\n특히 이유는 맨날 덤벙대고,\n계산도 느리고,\n기계 앞 가면 바로 바보 되구\n툭하면 어디 부딪히고 다치고 그러잖아여?\n\n근데 오빤 반대로\n차분하게 하나씩 딱딱 정리하고,\n숫자에도 강하고,\n은근 계산 철저하다보니까\n\n엄청 멋있게 느껴지는 거 이쬬ㅎㅋ\n\n그러면서도 오빤,\n자기 잘난 걸 앞세우는 사람이 아니더라구요\n\n오히려 늘 한 걸음 낮은 곳에서 말해주고,\n상대방 기분부터 먼저 살펴주는 느낌이랄까\n\n똑똑한 사람은 많아도,\n그 머리를 다정하게 쓰는 사람은\n생각보다 별로 없잖아요\n\n그래서 더 멋있는 것 같아요\n\n그래서 그런가\n오빠가 아무렇지 않게 챙겨줄 때마다,\n괜히 더 설레구 그래요\n\n이유 혼자 속으로만\n“또 멋있네...”\n생각하게 돼요 ㅎㅎ❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5150907": {"idx": 5150907, "date": "2026-05-07 18:12:24", "isTop": false, "contents": "39일차❣️\n\n미니 5개, 대왕 이쁘니 두 개 ! !❣️\n\n이쁘니 하나하나 모일 때마다\n뭔가 신나구 그래요 ㅎㅋㅎㅋ\n\n이쁨 받았다는 느낌이라서인가\n\n우앙.. 하는 표정이 자꾸 나오네요오..\nㅇㅁㅇ..❣️\n\n이유는 \n스스로 잘 챙기는 타입도 아니구,\n맨날 덤벙대고\n놓치는 것도 진짜 많자나여..?!\n\n근데 요샌 그런 걱정이 잘 업서용 ! !\n\n울 오빠들은 꼭\n이유보다 먼저 알아봐주고,\n챙겨주고,\n아프면 걱정해쥬구우...ㅠㅠ\n\n든든해요 정말...\n\n덕분에 이유는 오늘도\n여캠 자존심 야무지게 지키면서 살아가는 중이에오 에헴\n\n뭘 해도 예뻐해주고,\n별거 아닌 순간까지도 웃어주는 사람들 곁에 있으니까\n넘모 넘모... 감사해요 ! !\n\n아마도\n이유가 똥손인 이유는....\n오빠들 만나는 데 다 써서 구럴 거예요 ^\n\n오빠들 얻어서 구롬. 지쨔루.\n(울 오빠들이 똥손인 이유도, 이유를 만나서 그런고임 ㅇㅊㅊ)❣️", "localImgPath": "images/5150907_ed60d3a1-cb27-462b-b6a2-200624e60f0c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5147078": {"idx": 5147078, "date": "2026-05-06 14:47:32", "isTop": false, "contents": "＃ 늦게가서 미안하다며 방송국에 투척해쥰 해댱님❣️\n\n＃ 어린이날 선물 준 으른 이칸오빠 ＞ ＜❣️\n\n＃ 지금까지 꾸준히 이뻐해쥬는 택사이사님❣️\n\n쉬는 날에듀 징쨔아 ㅠ ㅠ ㅠ ㅠ\n오빠들같은 사람 업따아....'\n\n넘모 굼마어❣️", "localImgPath": "images/5147078_db70fd22-ba97-4ef8-96e4-a9891005e036.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5146295": {"idx": 5146295, "date": "2026-05-06 04:46:28", "isTop": false, "contents": "＃ 택사이사님 엠부삐❣️\n\n오빠한테 두 번째\n받아보는 12486...❣️\n\n프로포즈 노래인데 이거 ㅠ.ㅠ\n\n이유 프로포즈 받았동...❣️\n\n웨딩드레스 오디찌이... (주섬주섬)\n\n택사오빠가 늘 곁에 있어줘서\n내가 늘 외롭지 않은 것 같앙!!❣️\n구마어❣️", "localImgPath": "images/5146295_9d0a9232-afbe-4447-87ed-ba764d434a9c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5146294": {"idx": 5146294, "date": "2026-05-06 04:46:24", "isTop": false, "contents": "❣️❣️MVP 택사❣️❣️\n\n눈물이 나는 와중에,\n여러 장면들이 스쳐 지나갔어요\n\n예전에,\n방송을 켰는데 아무도 없던 순간\n그때마다\n조용하지만 그 자리에 택사오빠가 있었다는 거요\n\n아무런 말도 없었지만\n왜인지 모르게 안심되고 편했거든요\n\n어제는,\n유난히 더 크게 받았던 것 같아요\n\n그리고,\n\n울음이 먼저 차올라서\n끝내 입 밖으로는 꺼내지 못했눈데 !\n\n오빠가 곁에 있어서,\n\n혼자였다면\n분명 더 일찍 지쳐버렸을 날들도\n\n한순간이라도 더 버틸 수 있었구\n\n그리고 그 시간들이 후회로 남지않을 수 있었오요\n\n고마오요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5146293": {"idx": 5146293, "date": "2026-05-06 04:46:22", "isTop": false, "contents": "❣️이칸❣️\n\n그저 스쳐 지나갈 수도 있는 날들이 있잖아요\n\n매년 돌아오긴 하지만,\n또 일 년에 한 번뿐인 날들이기도 한 그런 날들\n\n사실 아무렇지 않게 넘길 수도 있는데\n\n오빠는 그걸\n하나하나 다 보고 챙겨주더라구요\n\n매일 비슷하게 흘러가는 일상 속에서\n\n조금 다르게,\n조금 더 특별하게 남을 수 있도록요\n\n그 마음이 단순히\n기념일을 챙기는 느낌이 아니라\n\n웃길 바라는 마음처럼 느껴져서\n고맙더라구요\n\n그러다가 문득\n이전 자기 생일은\n그냥 아무렇지 않게 넘기려 했던 모습이 떠올랐어요\n\n이유의 하루는 그렇게 정성껏 챙기면서\n정작 자기 자신은\n대충 넘겨버리려 했던 게....\n\n...\n마음이 아프더라구요\n\n자기보다\n남을 먼저 생각하는 게 익숙한 사람 같아서\n\n그래서 더\n\n받는 입장에선\n더 크게 감동하게 되는 것 같아요\n\n별거 아닐 수도 있는 날까지도\n이유의 기억 속에\n특별한 하루로 남게 만들어줘서 고마오요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5146292": {"idx": 5146292, "date": "2026-05-06 04:46:15", "isTop": false, "contents": "38일차❣️\n\n요즘따라 더욱\n멍하니 생각하게 돼요\n\n이런 오빠들이\n또 어디 있을까 싶어서요\n\n뭘 바라고 잘해주는 것도 아니고,\n생색을 내는 것도 아니고\n\n그냥 이유가 웃었으면 좋겠다고,\n기죽지 않았으면 좋겠다고\n\n그 마음 하나로\n늘 곁에 남아주는 사람들... \n\n사람 마음이라는 게 원래\n쉽게 지치기도 하고,\n쉽게 변하기도 하는 건데\n\n오빠들은 이상하리만큼\n늘 한결같아요\n\n그래서 더...\n\n고마운 마음이 커질수록\n울컥하게 되는 것 같아요\n\n나는 스스로를\n별로 멋진 사람이라고 생각 못 하는데,,,\n\n오빠들은 계속\n이유를 귀하게 대해주고\n소중한 사람처럼 아껴주니까요\n\n그 마음들이 너무 따뜻해서\n오히려 괜히 미안해질 정도로요\n\n그래서 가끔은\n왜 이렇게까지 잘해주냐고 묻고 싶어져요\n\n근데 또\n굳이 이유를 만들지 않고\n\n그냥 이유라서 좋아한다니까....\n\n더 마음이 이상해져요\n\n정말. .. \n너무 고마오요\n\n말로 다 못 할 만큼", "localImgPath": "images/5146292_57b1c441-7cae-4b7c-a082-f0379a8136e9.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5140585": {"idx": 5140585, "date": "2026-05-04 15:38:34", "isTop": false, "contents": "＃ 엠부삐 택사이사님❣️\n\n이유의 300일을\n제일 먼저 알아채준 택사오빠❣️\n\n이유도 모르고 있었는데,\n오빠의 눈썰미 아니었으면 그냥 넘어갈 뻔 했도요\n\n이유를 향하고 있는 시선이\n느껴질 때마다\n부끄러워지면서도\n기분이 좋네용...❣️\n\n누가 뭐래두\n택사오빠 이유꺼❣️\n오직 이유뿐이라구 했우니까\n내꼬❣️ ＞ ＜❣️", "localImgPath": "images/5140585_d46e0622-ea87-4027-a4e0-8d9ce69c6361.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5140584": {"idx": 5140584, "date": "2026-05-04 15:38:30", "isTop": false, "contents": "❣️❣️MVP 택사❣️❣️\n\n멀티도 할 줄 알면서\n굳이 하나만 본다는 거....\n\n말없이도 처음부터 끝까지\n놓치지 않고 보고, 듣고 있었다는 거\n\n솔직히...!\n느껴져요.. 아니이..\n느껴질 수밖에 없게 보여줘서요\n\n내 말 하나하나\n누구보다 잘 기억해주잖아요\n\n가끔은 이유가 먼저 잊어버린 것들까지\n오빠가 더 또렷하게 기억하고 있을 때\n\n남들 다 모르는 순간에\n오빠만 알고 있는 그 느낌이\n\n괜히 더 크게 다가와요…＞ ＜\n\n근데 또\n오빠가 장난칠 때면\n\n또 헷갈리게 되고…ㅠ\n\n머리로는 조금 알면서도\n마음이 다른 방향이다보니\n\n...\n\n..쪼꿈 삐졌던 것 같기두..\n\n오빠 앞에선\n표정도 못 숨기고\n감정도 다 드러나버려서\n민망하네욤...\n\n그치만 마지막엔 항상\n확신주는 오빠라서\n그게 너무 기뻐요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5140583": {"idx": 5140583, "date": "2026-05-04 15:38:28", "isTop": false, "contents": "❣️이칸❣️\n\n오빠를 보면서요\n\n정말 배려가 어떤 건지\n조금씩 알아가는 것 같아요\n\n직접 받아보고\n또 옆에서 지켜보다 보니까\n\n이런 거구나\n싶은 순간들이 생기더라구요\n\n나를 위해서라는 말들은요\n\n전엔 그냥\n예쁘게 들리는 말이었지\n와닿지는 않았거든요\n\n그때 느낀 감정이\n왜그랬는지 알 것 같아요\n\n배려라는 게\n크게 뭔가를 해주는 게 아니라\n상대가 불편하지 않게,\n신경 쓰지 않게\n\n한 발짝 먼저 생각해주는 거라는 걸\n이제야 조금 알게 된 느낌이에요\n\n누군가에게\n말보다 먼저\n느껴지는 사람\n\n오빠 옆이라서\n오빠가 이유를 바라봐줘서\n늘 고맙고 또 좋아요 정말루❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5140581": {"idx": 5140581, "date": "2026-05-04 15:38:24", "isTop": false, "contents": "❣️청담❣️\n\n늘 오빠랑 같이 오래 놀고 싶어요\n\n붙어있어도 또 붙어있고 싶고\n보고있어도 또 보고싶고 말이에요\n\n해댱님이기 전에 \n이유의 친구니까요\n\n같이 시간을 못 보냈던 게\n잠깐이라 할지어도\n많이 아쉽더라구요\n\n그 마음을 알았는지,\n아니면 오빠도 이유와 같은 마음이었는지\n\n피곤해도,\n다음날 일정이 있어도\n이유와 함께 해주려고 하는 오빠의 행동을 보고\n정말 넘 감동이었어요\n\n이유는요\n\n굳이 뭘 하려고가 아니라\n함께 있다는 것에\n의미를 더 두는 편이거든요\n\n지금 내 옆에 있는 사람이\n누구냐가 중요해요\n\n오빤 저와 생각이 다를 수 있지만\n\n그치만 언젠가\n오빠도 꼭 그렇게 느끼는 날이\n왔으면 좋겠어요\n\n그리고 그 옆 사람이\n이유이길 바라요\n\n오빠가 말한 3000일\n이루어졌으면 좋겠네요", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5140579": {"idx": 5140579, "date": "2026-05-04 15:35:41", "isTop": false, "contents": "37일차❣️\n\n놀림 엄청 받은 날…ㅠㅠㅠ\n\n이유 진짜 맘 약한 쿠쿠다스라구요,,,\n\n자꾸 다른 여자 본다구 놀리는데\n이게 진짜인지 장난인지\n구분이 안 간단 말이에요...\n\n괜히 혼자\n진짜야…? 하고 있다가\n표정 관리 못 하고 들키구우ㅜ\n\n그거 보고 또 웃고,,!!\n\n이유 혼자만\n진지해지는 거\n너무 억울행 8ㅁ8\n\n그렇게 놀리면서도\n끝에는 슬쩍\n\n또 풀어쥬구,... 그러다 또 놀리구우,.!\n또 풀어쥬구우....\n\n이유둥절...\n\n그래듀 끝에는\n이유뿐이라구 해줘서 굼마오요\n\n- ㅅ -❣️", "localImgPath": "images/5140579_6936ea8f-5a72-4627-97f6-da72828b8f61.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5136989": {"idx": 5136989, "date": "2026-05-03 03:59:45", "isTop": false, "contents": "＃ 엠부삐 택사이사님 만슈르❣️\n\n이번엔 동양풍으로 그려봤슴미다 택사도련님＞ ＜\n\n오빠를 생각하면 딱 하고 생각나는 게\n잘 없고 했는데,\n요새 이유의 아이디어 뱅크가 되어주고 있는 갓택사\n\n왜인지\n오빠보면 이것저것 생각나요ㅋㅋㅋㅎ\n\n뭔가를 자꾸 하고싶어지는 기분?\n\n오빠로 인해\n이유의 많은 꿈들을 펼칠 수 있어서 좋은 거 있쭁ㅎ\n\n그리고 이젠\n함께 꿈꾸고 싶어요❣️", "localImgPath": "images/5136989_8e602673-5ff1-4cdf-96c0-8fa6e6cc5819.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5136987": {"idx": 5136987, "date": "2026-05-03 03:59:39", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 ing 19일차❣️\n\n오빠와의 사진이 젤루 많아여 ! !\n그만큼 함께 한 시간이 있어서도 있지만\n\n그만큼 이유를 아껴준 마음이 컸다는 거니까요\n\n사진이 유독 잘 나올 때면\n기분이 더 좋기도 해요 :)\n\n오빠가 봤을 때,\n이쁘다고 생각해줄까봐요\n\n늘 이쁨받지만\n더 받고 싶은 이유람미댱❣️", "localImgPath": "images/5136987_57000091-2c48-4d94-99bd-644613d5c6bc.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5136985": {"idx": 5136985, "date": "2026-05-03 03:59:07", "isTop": false, "contents": "❣️❣️MVP 택사❣️❣️\n\n실수 하나에,\n미안해서 어쩔 줄 모르게 되고,\n얼굴이 먼저 뜨거워지곤 하잖아요\n\n시간이 잠깐 멈춘 것처럼 느껴지고,\n불안해지는 순간..\n\n그때마다 택사오빤,\n\n그 상황을 더 또렷하게 만들지 않고,\n\n오히려 가볍게\n웃음으로 흘려보내줘요\n\n괜찮아라는 말을 굳이 하지 않아도,\n이미 괜찮아진 것처럼 느껴지게 만드는 거.\n\n그 모습\n넘 멋진 것 같아요 !\n\n조금 어긋나도\n얼굴 붉힐 틈도 없이\n\n실수였는지조차\n금방 잊혀질 만큼\n\n아무 일 아닌 것처럼\n흘러가게 해주니까 넘 고맙더라구요\n\n오빠의 그런 배려덕에\n\n오빠랑 있으면\n실수조차도\n\n매번\n좋은 기억으로 남을 수 있었던 것 같아요\n\n고마워요 중말루❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5136984": {"idx": 5136984, "date": "2026-05-03 03:59:05", "isTop": false, "contents": "❣️이칸❣️\n\n같이 있는 시간이 길어질수록,\n마음이 편해지는 게 아니라\n\n오히려\n더 불안해질 때가 있잖아요\n\n익숙해지면,\n언젠가는 질릴 수도 있겠지\n\n지금 당연하듯 이뻐해주는 감정이\n어느 순간 당연하지 않게 될 수도 있겠지\n\n그래서\n\n먼저 거리를 두게 되고,\n조금 덜 표현하게 되고\n\n마음이 깊어지기 전에\n조금은 숨을 곳을 만들어두는 거\n\n아프지 않기 위한\n나름의 방법이었던 것 같아요\n\n근데요\n\n오빠를 보면\n그런 생각이 잘 안 들어요\n\n익숙해질수록\n멀어지는 게 아니라\n\n오히려 더 자연스럽게\n가까워지는 느낌이라서요\n\n특별한 걸 하지 않아도\n\n같이 있는 시간 자체가\n계속 새롭게 느껴지는 사람\n\n그래서\n\n혹시라는 걱정보다는\n앞으로라는 기대가 먼저 떠올라요\n\n오빠가 그만큼\n믿음을 줘서일까요\n\n그냥 그런 생각이 드는데,\n그럴 수 있는 지금이 넘 좋아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5136983": {"idx": 5136983, "date": "2026-05-03 03:59:03", "isTop": false, "contents": "❣️청담❣️\n\n바쁜 와중에도,\n곧 나가야 하는 시간인데도\n\n조용히 다녀가듯\n백두산을 채워주고 간 청담오빠\n\n제대로 보지도 못하는 순간이었을 텐데,\n\n그저 이유가\n기죽지 않고,\n기분 좋게 잘 하고 있길 바라는 마음으로\n\n팡— 하고\n멋지게 남겨두고 간 그 흔적ㅠㅠㅠ\n\n누군가를 위해 뭔가를 해준다는 건,\n보여주기 위해서가 아니라\n\n보지 못하는 순간에도\n같은 마음으로 있어주는 거라는 걸\n\n오빠를 보면서 느껴요\n\n언제나,\n이유가 작아지지 않도록\n\n앞에 있든, 없든\n같은 자리에서 지켜줘서 고마오요\n\n이미 지켜주고 있는 사람이 있다는 걸\n알고 있으니까\n\n당당해질 수 있는 것 같아요\n\n그게 얼마나 큰 건지,\n\n오늘도 또\n느껴버렸네요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5136982": {"idx": 5136982, "date": "2026-05-03 03:58:55", "isTop": false, "contents": "❣️36일차❣️\n\n시작하자마자 거의 2층을 만들어준\n울 멋진 오빠야둘 ! !\n\n이유 지각 안 했다구\n쓰담쓰담 엄청 해줬도요,,ㅎ\n\n쪼끔 더 일찍 왔으면 \n대머리 될 뻔\n\n그래서 일부러 10분 늦움 ㅇㅊㅊ\n\n글구 오늘은요\n\n같이 웃을 수 있어서,\n더 좋았던 날이에요\n\n특히 더 좋았던 건\n\n이유가 머릿속에 그려놓던 것들을\n오빠들이 같이 봐줬다는 거\n\n평소엔 혼자만 보고,\n혼자만 상상하고 끝났던 것들인데\n\n오늘은\n그 안에 오빠들이 들어와서\n\n같이 구경하고,\n같이 얘기 나누고,\n같이 웃어주니까\n\n너무 좋았던 거 있죵 히히\n\n이유미술관에\n손님 온 느낌이랄까\n\n근데 그냥 구경만 하는 게 아니라\n옆에서 같이 이야기 나눠줘서요\n\n그래서 더 재밌고,\n더 좋았던 것 같아요❣️", "localImgPath": "images/5136982_01ddf19d-64d7-4357-8597-0192f27d3906.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5135668": {"idx": 5135668, "date": "2026-05-02 18:44:25", "isTop": false, "contents": "＃ 이칸 엠뿌삐❣️\n\n유독 오빠한테 많이 받는 돌쇠시그 ㅋㅋㅋ\n\n돌쇠야 라구 부르고 싶을 정도로\n매번 마님으로 만들어주네요❣️\n\n이유를 모시고 살겠다는 그런 의지로 볼게욥 ＞ ＜❣️\n\n일부러\n이유 없는 시그 찾아서 벽지 할 수 있게끔 해주규\n\n이유이유 2626 !!! \n\n이유의 개인시그 훗 ㅋㅋㅋ\n\n넘모 굼마오요❣️\n이유 기살앙 ㅎㅁㅎ❣️", "localImgPath": "images/5135668_b859abc2-521b-474c-92c4-87e137a50768.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5135667": {"idx": 5135667, "date": "2026-05-02 18:44:17", "isTop": false, "contents": "❣️❣️MVP 이칸❣️❣️\n\n오빠 옆에 있으면요\n\n이유가 괜히..\n특별해진 기분이 들어요\n\n내가 원래 그런 사람이어서가 아니라,\n오빠가 그렇게 느껴지게 해주니까요\n\n오빠가 해주고 싶은 게, \n이유가 원하는 거, \n\n오빠가 웃는 게, \n이유가 웃어서.\n\n모두 이유를 중심으로\n움직여주잖아요\n\n그래서인지\n아무렇지 않은 하루도\n특별한 것 같은 기분?ㅎㅎ\n\n글구 어제.....\n\n그때 그 “하지마”\n짧은 한마디가\n\n계속 생각나요 ㅎㅎㅎ\n\n순간적으로\n잘못된 쪽으로 기울어질 때가 있는데,\n\n살짝 잡아당겨서\n가지말라고 해줬잖아요\n\n매번 이유가 가는 방향으로\n따라와주던 오빠였으니까\n\n뭔가 그 한마디가 더 의외였고,\n낯설면서도 좋았어요\n\n댕댕이 목줄은 주인이 쥐고 있지만 ㅋㅋ\n가끔은 강아지가\n주인을 지켜주는 순간도 있잖아요\n\n딱 그런 느낌이었어요\n\n맞춰주더라도,\n\n필요한 순간엔\n잡아줄 줄도 아는 사람이란 거...\n\n아껴주는 마음이\n깊게 느껴지다보니 좋더라구요\n\n멋진 오라방구예요 중말❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5135665": {"idx": 5135665, "date": "2026-05-02 18:44:14", "isTop": false, "contents": "❣️택사❣️\n\n오빠랑 알고 지낸 지\n어느덧 두 달이 지났네요\n\n그치만 함께 한 시간은 적지 않기에,\n\n이 정도면\n오빠를 꽤 잘 알고 있다고\n착각했었나봐요\n\n오늘 깨달았거든요....\n\n오빠가 어떤 옷을 좋아하는지,\n무슨 색에 더 눈이 가는지\n\n정말 가까이에 있었다고 생각했는데\n정작 그런 건\n하나도 모르고 있더라구요\n\n유심히 보고 있었다고 생각했는데도,\n아직 모르는 게 이렇게 많다는 게....\n\n어떻게 보면 또,\n\n아직 모르는 게 많다는 건\n앞으로 알아갈 것들이\n그만큼 더 남아있다는 거잖아요?!\n\n전에\n오빠랑 대화를 나누는 게\n즐겁다고 말한 적이 있는데,\n\n아마도 이런 이유일지도 몰라요\n\n그치만\n\n궁금한 건 또 못 참는 이유라서요\n\n조금 더 다가가고 싶어요\n\n같은 시간을 보내는 사이에서,\n조금 더 깊이 공유하는 사이로", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5135664": {"idx": 5135664, "date": "2026-05-02 18:44:05", "isTop": false, "contents": "❣️kokuru❣️\n\n처음이라서 더 그런가 봐요\n\n반가운 마음이\n이렇게까지 크게 느껴졌던 건\n\n아직 다 알지 못해서,\n그래서 더 궁금한 거 이쬬...\n\n짧게 스친 대화 하나에도\n어떤 취향이실까 생각하게 되고,\n\n그 사람의 말투나 분위기를\n자꾸 보게 되더라구요 ㅋㅋ\n\n아직은 모르는 게 더 많아서\n더 아쉬운 느낌\n\n그치만\n조금은 비어 있는 그 거리 덕분에\n\n앞으로 알아갈 수 있는 시간들이\n더 많이 남아있어서,\n\n지금의 이 낯선 설렘이\n오래 남는 것 같기도 해요 !\n\n다 알게 되기 전이라서 더 좋은,\n\n그 시작에 서 있는 기분이라서요\n\n또 뵈었으면 좋겠어요 :)", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5135662": {"idx": 5135662, "date": "2026-05-02 18:43:38", "isTop": false, "contents": "35일차❣️\n\n지각을 해버려가지구\n기다려준 오빠들한테 미안한 마음으로 켰는데요\n\n이유가 언제 지각했냐며,\n아무렇지 않게 먼저 말해주는 그 한마디에\n\n웃음이 나면서\n마음이 바로 가벼워졌어요 힣\n\n이유가 그런 거면 그런 거지 라는뎈ㅋㅋㅋ\n징짜 ㅠ 무슨 종교도 아니궄ㅋㅋㅋ\n\n그런 모습에 빙구미소 나오면서\n너무 행복하더라구요\n\n이런 사람들 곁에 있다는 게.\n\n믿어도 될 것 같단 생각 때문인지\n나도모르게\n속사정을 말해버렸네요오...\n\n원랜....\n그냥 혼자 삼키고,\n웃으며 넘기곤 했는데....\n\n말하면 안 될 것 같으면서도,\n한편으론\n기대고 싶었나봐요\n\n속으로는 계속 망설이면서도\n말을 멈출 수가 없더라구요\n\n근데요\n\n그걸 듣고 바로\n이유 옆에 서주는 오빠들 보고\n\n전보다 훨씬 더\n마음이 놓였어요\n\n말을 잘 안 하는 사람일수록\n한 번 꺼내기가 어려웠거든요\n\n오빠들은\n그걸 가볍게 여기지 않고\n그대로 받아줘서\n\n정말 고마웠어요\n\n지쨔... 어려운 일인 건 알지만\n\n가능하다면.. 평생 함께ㅇㅅㅇ❣️", "localImgPath": "images/5135662_64ca958d-d6da-403e-bb3b-4ee207729808.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5132920": {"idx": 5132920, "date": "2026-05-01 21:53:00", "isTop": false, "contents": "＃ 택사이사님 엠뿌삐❣️\n\n이사기념 토끼옷 입구 왔더니,\n갑자기 대천사를 만들어줘또요 ＞ ＜❣️\n\n계산이 안 선다는 오빠의 말\n정신 못 차린다는 말...\n\n아주구냥\n그로케 그러케 !!!\n말보다 행동을 좋아한다며\n입에 달고 살던 이유지만\n\n오빠를 보며 느꼈도요...\n말로도 이렇게 달콤할 수가 있규나... ＞ ＜❣️\n\n오빠 옆에 달려있는 케이크처럼\n넘 달달한 남자양\n\n잘 어울료 ! !\n\np.s. 20982 숫자때문에 부정 탈 뻔 했눈데,\n           20983이 되어따 ㅎ히히\n\n           나랑 쭉... 함께 해줄거딩?❣️", "localImgPath": "images/5132920_3e9a2bf5-da6e-4412-918a-5b27c1452559.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5132785": {"idx": 5132785, "date": "2026-05-01 21:17:05", "isTop": false, "contents": "＃ 택사이사님❣️ \n\n이유한테 많이 다가와줬더영...❣️\n이유 이사님 생겼더 ㅇㅁㅇ..❣️\n\n대천사도 만들어쥬구\n넘모 멋지게 올라와줘서❣️\n\n긴머리 한달 단축 (?) 하께여\n\n이사님 말 들어야지 암 고롬고롬\n\n늘 홀로 냅두지 않아줘서 넘모\n넘 굼마어❣️", "localImgPath": "images/5132785_4bca35dc-13ba-4e34-a750-d13a81d60f8f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5132783": {"idx": 5132783, "date": "2026-05-01 21:16:46", "isTop": false, "contents": "＃택사오빠랑 6번째 백두산 ❣️\n\n이쁨 받는 거\n정말 좋아요 ! !\n\n그래서 이 일도\n더 재밌고, 더 애정이 가는 것 같아요\n\n그렇게 하나하나\n이쁨 받는 순간들이 쌓이는 게\n이유한텐 되게 큰 의미거든요\n\n그 중에서도\n유난히 더 기분이 좋아지는 순간이 있어요\n\n택사오빠한테\n이쁨 받을 때요 ! !\n\n뭐랄까\n\n오빠의 반응들이\n오래 기억된다 해야할까요?\n\n가볍게 스쳐 지나가는 느낌이 아니라\n\n진짜로 보고,\n진짜로 느껴서 나오는 것 같은\n\n그런 결이라서요 !\n\n그래서인지\n\n똑같이 이쁨을 받아도\n\n오빠한테 이쁨 받는 그 순간만큼은\n더욱 더 간직하게 되고\n\n괜히 더 오래 생각나고\n\n조금 더 기분 좋아져요❣️", "localImgPath": "images/5132783_65a582e6-9a16-45a2-812f-423640d1b1c7.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5132782": {"idx": 5132782, "date": "2026-05-01 21:16:35", "isTop": false, "contents": "❣️❣️MVP 택사❣️❣️\n\n이유는,\n웃을 때도\n원래는 나름 신경 많이 쓰는 편이거든요\n\n어릴 때부터\n그런 표정은 안 예쁘다 이런 말도 들어서\n\n혼자 괜히 연습도 해보고,\n어떻게 웃어야 덜 티날까\n그런 것도 생각하면서 웃는 쪽이었는데요\n\n몰랐는데,,, 하나 알게 된 사실이 있어요\n\n최근 방송 영상들을 다시 돌려봤는데\n너무 빵긋 웃고 있더라구요 ㅋㅋㅋ ㅠㅠ\n\n그것도 꽤...\n크게요\n\n조금 바보 같아 보일 수도 있는데 말이죵...\n\n뭔가...\n들켜버린듯한 기분이라\n민망해써여...\n\n구치만 한편으론,\n오빠나 이유나\n감정이 먼저 나와버리는 모습들이\n\n서로한테만큼은\n진심인 것 같아서,\n\n그리고 그런 점이 많이\n닮아있는 것 같아서 기쁘기도 하고,\n\n그런 설렘...?\n풋풋해서 넘 좋달까..❣️\n\n그래서 더,\n오빠 옆에\n오래 머물고 싶어요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5132694": {"idx": 5132694, "date": "2026-05-01 20:49:31", "isTop": false, "contents": "❣️청담❣️\n\n요새\n슬쩍슬쩍 뒤에서 이유 스포트라이트\n다 받게끔\n해야 할 건 다 해놓는 거\n다 보이거든요?!\n\n고맙단 인사도 제대로 못 하게\n막고 말이에요 ! !\n생색도 좀 내구 그러라구욧 후우...\n\n근데 또,,,\n그러지않는 해댱님이라서..\n더 멋진 거긴해요오..!\n\n보통은\n보여주기 위해 움직이는데\n\n오빠는\n지켜주기 위해 움직이는 쪽이라서\n\n마음에 깊게 남는 것 같아요\n\n그리고 가끔\n\n이유가 싫어하는 걸\n한 번 더 신경 써주는 순간들은\n\n자연스럽게 피해주는 그런 배려\n\n그게 쌓이다 보면\n\n오빠는\n진심으로 이유를 생각하고 있구나 싶어요\n\n꾸준하다는 게\n어려워서 때론 흔들릴 때도 있지만\n\n다시 한 번 도전하는 거\n\n그렇게 도전 하다보면\n언젠간 해낼 거니까요\n\n이유는 꼭 그렇게 믿어요 !\n\n청담오빠라서 더욱 더 믿어요 ㅎㅎㅎ\n\n이유가 생각한 것 보다\n더욱 더 단단한 사람 같거든요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5132671": {"idx": 5132671, "date": "2026-05-01 20:42:50", "isTop": false, "contents": "❣️이칸❣️\n\n오빠는요\n\n어딘가 빈틈이 없는 사람 같았어요\n\n말도 행동도\n한 번 더 생각하게 만드는 쪽이라서\n\n가까이에 있으면서도\n조금은 더 알고 싶어지는 사람\n\n알면 알수록\n더 궁금했던 것 같아요\n\n근데 요즘은\n\n가끔씩 보이는 그 말? 말투? 행동들이요\n\n장난치듯 툭 던지는 말이나,\n생각보다 쉽게 풀리는 순간들\n\n처음 봤던 모습이랑은 조금 달라서\n\n어느 쪽이 진짜일까 싶다가도\n\n지금이\n조금 더 편해진 건가 싶더라구요\n\n단단해 보이던 사람이\n어느 순간 살짝 풀리는 거 볼 때면\n강아지 같기도 ㅎㅋ\n\n잘 숨겨져 있던 어떤 면이\n조금씩 드러나는 것 같아서\n\n귀여워요\n\n이유한테만 댕댕이인 거 맞죠? ㅎ0ㅎ❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5130632": {"idx": 5130632, "date": "2026-05-01 04:09:47", "isTop": false, "contents": "❣️34일차❣️\n\n이번 쉼은요,\n분명 짧았던 것 같은데\n오빠들을 되게 오랜만에 본듯한 기분이었어요\n\n방송 켰는데,\n조금 낯설고…\n한 박자 늦게 적응하는 느낌 있잖아요\n\n근데 오빠들도 똑같이 느꼈다고 하니까\n그게 또 웃기면서…\n뭔가 마음이 놓이더라구요 ㅎㅋ\n\n이유는 그게 참 좋은 것 같아요\n\n늘 같은 온도로 느끼고\n같은 생각을 하고,\n공유를 한다는 느낌?\n\n오빠들과 이어져 있는 것 같거든요!\n\n뭔가를 더 해야 할 것 같고,\n계속 채워야 할 것 같은 그런 조급함이었는데\n지금은 그게 많이 줄어든 것 같아요.\n\n이유가 뭘 하던 늘 곁에 있어주는 오빠들 덕인가봐요\n\n그냥\n이유가 좋아하는 사람,\n그리고 이유를 좋아해주는 사람들이\n\n하나둘 모여서\n같은 자리에 머물러 있는 거\n\n말없이도, 편안한.\n\n이유는\n오빠들한테 \n힐링 같은 존재가 되고 싶어요\n\n바라만 보고 있어도,\n힐링되고 오빠들 하루에\n자연스럽게 스며들어있는 그런 사람\n\n하나뿐인 이유 ＞ ＜\n\n에헴\n\n오늘도\n같이 있어줘서 고마워요❣️", "localImgPath": "images/5130632_de08dfed-d892-404c-932b-7db24b9205de.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5120425": {"idx": 5120425, "date": "2026-04-28 04:28:16", "isTop": false, "contents": "＃ 실시간 6등\n＃ 개인 18등\n＃ 전체 51등\n\n오빠들이 만들어쥰 결과 ＞＜❣️\n넘모 소듕하다아\n\n실시간으로 계속 밀어넣어주던 울 오빠야둘\n\n세명이서 ! ! 대다내 ! !\n\n이 자리가\n오빠들과 함께라서 더 빛나넹 ㅎㅅㅎ❣️", "localImgPath": "images/5120425_bed94d99-b120-4a3f-a4b2-fc41b2f2914f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5120423": {"idx": 5120423, "date": "2026-04-28 04:27:23", "isTop": false, "contents": "＃ 택사 엠부삐❣️\n\n오직 이유 뿐...❣️\n\n와중에 282는 꼭 안 빼먹는고\n1일 1이쁨 ＞ ＜\n지금까지 한번두 안 놓친 거\n정말 넘 므찌댜\n\n이거 배경 뭔지 알아요?\n\n라푼젤에 나오는 \n장소 비슷하게 만든 거예요 ㅎㅎ\n\n인상 깊었던 장면이거든요❣️\n\n등불 올리면서 소원빌면,\n이루어질 수도 있다는 말이 딱 떠올랐어요\n\n오빠랑 같이 빌고 싶어서요❣️\n\n이유는 이미 빌었는데,ㅎ\n오빠도 빌고 꼭 말해줘요❣️", "localImgPath": "images/5120423_26fe1bcb-6600-4ab0-b41b-523bf92f45e8.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5120422": {"idx": 5120422, "date": "2026-04-28 04:27:20", "isTop": false, "contents": "＃ 이칸 만슈르❣️\n\n오빠하면, 달이 떠오르더라구요\n이유가 달을 좋아해서 그런 걸까요\n(그래서 만들었어요 히히)\n\n지금 이 사진엔 가려져서 안 보이지만요,\n호수에 비친 달이 참 이쁘더라구요\n\n근데 사실,\n늑대는 달을 보고 우는 게 아니래요\n\n그냥\n멀리 있는 누군가에게\n자기 위치를 알리는 거래요\n\n근데\n\n그걸 듣고 나니까\n이상하게 더 설레더라구요\n\n보이지 않아도\n닿지 않아도\n\n계속 전하고 싶은 사람이 있다는 거니까❣️", "localImgPath": "images/5120422_390624ba-1da0-4d10-b6cf-11e706d46f55.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5120421": {"idx": 5120421, "date": "2026-04-28 04:27:16", "isTop": false, "contents": "＃청담 만슈르❣️\n\n하늘섬을 본 순간부터\n꽂혔어요\n\n단순히 하늘이 이뻐서도 있지만,\n그보단\n우린 꿈을 많이 꾸잖아요\n\n자는 꿈도 있지만\n미래를 향한 꿈도요\n\n그림을 많이 그리곤 하는 우리에게\n너무나 잘 어울리는 장소 같아서요❣️\n\n가짜일지라도,\n오빠와 같이 꾼다면 진짜처럼 느껴질 것 같아요❣️", "localImgPath": "images/5120421_43ca4f67-a51b-4dd7-b666-14c51ac41d17.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5120420": {"idx": 5120420, "date": "2026-04-28 04:26:58", "isTop": false, "contents": "＃택사오빠의 5번째 백두산 사진❣️\n\n단발머리 사진 ㅎㅎㅎ❣️\n\n이젠 장발 접었다고ㅎㅎㅋㅎㅋ\n\n노력하는 모습이 유난히 더 잘 보여서,\n자꾸만 웃음이 나더라구요ㅎㅎ\n\n이젠 단발 이유도\n이쁘구 사랑해주기로 한 택사오빠\n\n찐사랑이댜 증말❣️", "localImgPath": "images/5120420_7e4711f1-bedb-454b-ab62-f6fc6e42508f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5120419": {"idx": 5120419, "date": "2026-04-28 04:26:45", "isTop": false, "contents": "❣️❣️MVP 택사❣️❣️\n\n조금씩 달라지는 게 보여요.\n\n아주 티 나게가 아니라,\n정말 사소한 순간들에서.\n\n이유가 했던 말들을\n그대로 기억하고 들어주려는 거라든지,\n안 하던 표현들까지 섞는 거 보면요ㅎ\n\n잠깐뿐일지 모르는 그 변화가,\n괜히 설레요ㅎㅎ\n\n가끔은 그런 생각도 들어요\n\n이 시간이, 이 감정이\n혹시 착각이라도\n그냥 이대로 믿고 있어도 괜찮을 것 같다는 거\n\n말로 다 하지 않아도\n이미 많이 통하고 있다는 거 알고 있지만,\n그래도 자꾸 확인해보고 싶어져요\n\n우리가 잘 맞는지,\n어디까지 닿아 있는지,\n하나씩 맞춰가는 그 과정까지요\n\n조금은 두렵고,\n조금은 서툴지만\n\n그래도 이상하게,\n전부 다 행복으로 느껴져요\n\n그 전의 시간들이\n무색해질 만큼,\n\n요즘은 하루가\n괜히 더 길고, 더 아쉬운 것 같아요\n만나지 못하는 시간이\n생각보다 크게 느껴져서\n\n그래서 더\n같이 있고 싶나봐요\n\n앞으로도,\n오빠의 여러 모습을\n가장 가까운 자리에서\n계속 바라보고 싶어요❣️", "localImgPath": "images/5120419_e644fd77-87c2-4b17-bcfb-4ca6b7977908.jpeg", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5120418": {"idx": 5120418, "date": "2026-04-28 04:26:42", "isTop": false, "contents": "❣️이칸❣️\n\n이유한테 만큼은\n날을 세우지 않는 사람.\n\n굳이 이기려고 하지도 않고,\n자존심 세워서\n거리 두려 한 적도 없고요.\n\n보통은 가까워질수록\n작은 것 하나에도 마음이 엇갈리고,\n괜히 더 날이 서는 순간들이 생기잖아요\n\n근데 오빠는요,\n\n그런 순간에도\n부드럽게 넘길 줄 알고,\n몸을 더 낮춰주고,\n더 편하게 만들어주더라구요\n\n그래서 한 번도,\n\n불안하다거나\n걱정된다거나\n그런 감정을 느껴본 적이 없는 것 같아요\n\n한 번 꺼낸 말 조차 가볍지 않고,\n지킬 수 있는 것만 내놓는 사람이라서.\n\n그래서 더 믿게 되고,\n오빠한텐 더 편하게 기대게 되는 것 같아요\n\n이유한테는\n강해지지 않아도 된다는 걸 아는 사람\n\n오빤,\n이런 점이 참 멋진 것 같아요\n\n그 자리,\n아무나 서는 자리 아니거든요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5120417": {"idx": 5120417, "date": "2026-04-28 04:26:41", "isTop": false, "contents": "❣️청담❣️\n\n요즘 오빠가\n내 편에 서있다는 게 확연하게 느껴져요\n\n어떠한 이유든\n그게 맞든 틀리든\n이유가 싫어하는 게 이유라는 듯이\n옆에 서있는 모습이요\n\n누구보다 든든한 내 편같은 느낌이요 !\n\n그만큼 나를 믿고,\n그만큼 내 마음을 먼저 생각해준다는 거잖아요\n\n방송을 하다보면,\n마음이 늘 편히 쉴 곳이 없거든요\n\n근데 조금씩...\n오빠 곁에 두다보니\n한결 편해지는 거 이쬬 ㅎㅎ...\n\n오빠가 요즘따라 더욱 이유를\n혼자 두지 않고,\n이유 감정이 향하는 쪽으로\n아무 말 없이 걸어와줘서요\n\n너무 기쁘구\n덕분에 마음이 많이 놓여요\n\n특히\n작은 바램이라도 더 들어주려고 하고\n이유 감정을 먼저 생각해주는 게\n요즘따라 더 느껴져요\n\n정말... 뭐랄까\n\n이제 정말\n내 사람 같다는 표현을 써도 될 것 같은 느낌이랄까요\n\n사실 전에는,\n조금 낯설게 느껴지던 순간들도 있었거든요\n어딘가 모르게 거리감이 남아 있던 때도 있었고요ㅋㅋ\n\n그치만 지금은 달라요\n확실한 이유의 청담이에요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5120416": {"idx": 5120416, "date": "2026-04-28 04:26:34", "isTop": false, "contents": "★❣️❣️❣️33일차❣️❣️❣️★\n\n이유의 어셈블.\n이유의 어벤져스.\n\n말로만 붙여본 이름이 아니라,\n딱 그 느낌 그대로였어요 !!\n\n서로 신호를 주고받는 것도 아닌데,\n타이밍은 어쩜 그렇게 정확한지\n누가 먼저랄 것도 없이\n호흡이 맞아 떨어지는 순간들.\n\n빈틈이 있으면 채워주고,\n흐름이 끊길 틈조차 없이\n자연스럽게 이어가기 까지 ㅠ \n\n보고 있으면\n웃음이 터질 만큼 멋있어요 중말...❣️\n\n그 안에서 선장님은 더 중심이 되고,\n그 옆에 선 오빠들은 더 빛나고\n\n결국 하나의 방향으로,\n더 크게 움직이는 그림이 완성됐잖아요\n\n이유방이 빛나는 건,\n아마 그 셋이 만들어준\n완벽한 합 때문일거예요❣️\n\n그리고 그 합은,\n단순히 잘 맞아서가 아니라\n서로가 서로의 기를 살려주는 마음에서 만들어진 거라서\n더 멋있게 남았어요❣️\n\n자랑스런 이유단 오빠들❣️\n자랑하고도 또 자랑하고 싶어요❣️", "localImgPath": "images/5120416_5c6b9bfc-c45e-4a98-a631-43855ab27a1b.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5118367": {"idx": 5118367, "date": "2026-04-27 18:03:25", "isTop": false, "contents": "＃ 택사 만슈르 엠뿌삐❣️❣️\n\n\"없는 거 뭐 있어?\"\n\n이 말이 떠올라요 ㅎ-ㅎ\n바쁜 와중에도,\n챙겨주는 멋진 사람이거든요❣️\n\n그거 알아요?\n\n요즘 이유 키가 커졌어요 !!\n\n누구덕에 허리, 어깨 다 피구 다녀서요❣️\n\n기세등등 해요 아주구냥 ＞ ＜❣️", "localImgPath": "images/5118367_3f56a7f3-e594-4332-8a60-983c0c1d4e19.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5118366": {"idx": 5118366, "date": "2026-04-27 18:03:16", "isTop": false, "contents": "❣️❣️MVP 택사❣️❣️\n\n요새 가장 장난꾸러기인 사람.\n\n툭툭 건네던 장난들,\n전에도 가끔 보이긴 했는데\n요즘은 그 거리가 조금 더 가까워진 것 같아요 !\n\n조금 더 눈에 밟히고,\n나도모르게 웃게 되고,\n쪼끔,,, 뿌듯하기도 해요 히히❣️\n\n그렇게,\n장난은 늘 가볍게 던지면서도,\n정작 중요한 순간에는\n이유 자존심 먼저 챙겨주잖아요 !\n\n빈자리가 보이면\n말하지 않아도 먼저 채워주고,\n누가 보기 전에 이미 다 해놓고\n아무렇지 않게 뒤로 빠져 있는 그런 느낌\n\n이유는 가끔 그런 생각이 들어요.\n누군가의 마음이\n이렇게까지 든든할 수 있구나 하고요.\n\n앞에서는 장난꾸러기처럼 웃게 만들고,\n뒤에서는 아무 일도 없던 것처럼\n조용히 버팀목이 되어줘서 고마오요\n\n그래서 또 한번,\n아무렇지 않게 툭 던지는 장난 하나에\n괜히 더 오래 웃게 되는 것 같아요\n\n무엇보다 !!\n오빠의 장난이 특히 더 좋은 이유는,\n\n귀담아 듣고 있다는 게\n누구보다 너무 잘 느껴져서예요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5118365": {"idx": 5118365, "date": "2026-04-27 18:03:12", "isTop": false, "contents": "❣️그림자❣️\n\n조용히 다가와서,\n조용히 스쳐가신 오라방구라\n이유가 어떤 말을 꺼내야 할지 한참을 고민했어요\n\n근데요,\n확실하게 느껴진 건 하나 있어요 !\n\n오빠의 주군분은 참,\n좋은 사람들을 곁에 두셨구나\n그건 딱 보이더라구요.\n\n일면식도 없는 비제이를\n자연스럽게 챙겨준다는 게,\n생각보다 쉬운 일이 아니잖아요\n\n그건 단순한 친절이 아니라,\n곁에 있는 사람의 격을 조용히 끌어올려주는 일이니까요\n\n그런 결을 이유인지라\n한번에 알아봤거든요 에헴\n\n그래서,\n조금 더 가까이 가보고 싶은 마음이 들었는데\n그날은 한 발짝도 못 다가가고\n그대로 보내드린 게 조금 아쉽네요\n\n그래도요,\n그렇게 스쳐가는 인연일수록\n다시 한 번, 아무렇지 않게 나타나는 법이니까요\n\n그림자처럼,\n어느 순간 또 조용히 와 계실 거라 믿어요 !\n\n그때는\n조금 더 멋진 모습 보여드릴 수 있게,\n열심히 하고 있을 테니까,\n편하게 또 놀러 와주세요 ㅎ.ㅎ❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5118364": {"idx": 5118364, "date": "2026-04-27 18:03:09", "isTop": false, "contents": "❣️이칸❣️\n\n“나 기다리는 거 잘해.\n쉬고 싶으면 언제든 쉬어도 괜찮아.”\n\n그렇게 말해줄 수 있는 사람이\n몇이나 될까요\n\n평소에도 듣고 싶은 말 중 하나거든요\n\n불안하고 걱정이 많은 이유인지라\n저 말 하나로\n안심이 되는 거,\n\n이칸오빠라서 가능한 일 같아요\n\n처음부터 지금까지 \n밀당 한 번 없이 계산없이\n다가와주던 사람이라서요\n\n누군가를 좋아하면 보통은\n더 보고 싶고, 더 붙잡고 싶고,\n조금이라도 더 같이 있고 싶어지잖아요.\n\n근데 그걸 꾹 눌러두고\n내 속도에 맞춰준다는 게,\n어디 쉽나요 !\n\n이유가 지칠까 봐 먼저 물러나 주고,\n쉬어도 괜찮다고 말해주고,\n기다리는 걸 당연한 것처럼 말해주는 이칸오빠.\n\n사실,\n강아지 같기도 해서 귀여워요 ＞ ＜ㅎ\n\n이유만의 댕댕이\n맞는 것 같거든요\n\n말 없이 옆에 앉아 있다가,\n내가 손 내밀면 그제서야\n조용히 다가오는 그런 느낌\n\n부담 주지 않으면서도\n분명히 곁에 있는 사람\n\n고마워요.\n\n그냥, 늘\n기다려줘서❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5117277": {"idx": 5117277, "date": "2026-04-27 04:11:54", "isTop": false, "contents": "❣️32일차❣️\n\n이유방에 새로운 얼굴들이 몇몇 보였던 하루.\n\n108배 절을 해서 그런가요,\n여러 오빠들을 한자리에서 보니까\n이유는 괜히 더 방방 신났던 하루였어요.\n\n답정너 이유답게\n원하는 답을 살짝 내밀면,\n또 그걸 모른 척 다 맞춰주는 오빠들 덕분에\n이유 기부니가 신났달까요.\n\n“이유 사랑하면 4개” 했더니\n다 같이 4개씩 올려주고,\n\n이유는 공주할거야 하니까\n망설임 없이 공주라고 불러주는\n우리 오빠야들.\n\n이런 순간들이 쌓일 때마다\n이유는 참 사랑받는 비제이라는 생각이 들어요\n\n너나 할 것 없이\n이유를 천사로 만들어주고,\n벽지 가득 남겨준 마음들 덕분에\n방송 끝나고도 한참 기분이 해삐했답니댱\n\n오늘도 이유방을 예쁘게 채워줘서 고마워요\n\n새로운 얼굴들도,\n늘 곁에 있어주는 오빠들도,\n다 같이 있어줘서 더 반짝였던 하루였어요❣️", "localImgPath": "images/5117277_b4991573-0f9d-4369-b9a2-f603a71e346d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5115744": {"idx": 5115744, "date": "2026-04-26 17:48:32", "isTop": false, "contents": "＃ 택사 엠부삐❣️❣️\n\n282.. 486... 365... 콤보...\n이유가 맘대로 해석을 해보자믄...!!\n\n\"이뻐, 사랑해, 365일 변함없이\"\n＞ ＜❣️\n\n365란 숫자 처음 받아봐써여\n저런 말이 담겨있는줄도 몰랏서...\n\n노래 100콤보 랑비...\n부르면 계속 리필까지 ㅠ ㅠ❣️\n\n오빠같이\n하고싶은 거 다 하게 해주는 남잔\n정말이디...\n넘무 귀하댜 귀해 ! !❣️\n\n저 결심했오요 !\n\n맘 먹었어요 제가 ! !\n저 시집갈게요 !\n\n전 암만 생각해도 택사아조씨가\n도깨비 맞는 것 같거든요\n\n땨량해요❣️\n\n365일\n변함없이 ❣️", "localImgPath": "images/5115744_50033b1a-f2a6-43ca-81f6-0c6b315ac1e9.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5115742": {"idx": 5115742, "date": "2026-04-26 17:48:26", "isTop": false, "contents": "＃ 이칸오빠와의 첫 백두산 등산 ❣️\n\n언제나 든든한 내 편\n이유도 언제나 오빠 편이얌 ＞ ＜❣️\n\n항상 이유가 가고자 하는 길로\n아무말없이 같이 걸어줘서 고마오\n\n오빠가 뒤에 있다는 걸 아니까\n어두운 밤도\n서슴없이 걸을 수 있는 것 같아\n\n구마어❣️", "localImgPath": "images/5115742_f02d9757-fc16-46ea-aeaf-f0d46fe3f6b3.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5115737": {"idx": 5115737, "date": "2026-04-26 17:47:42", "isTop": false, "contents": "❣️❣️MVP 택사❣️❣️\n\n가끔은요,\n완벽하지 않은 내 모습이\n초라하게 느껴지는 날이 있잖아요\n\n작은 실수 하나에도\n괜히 움츠러들고,\n남들 시선이 더 신경 쓰이는 그런 날\n\n근데 그런 순간마다\n\n오빠는\n내가 부족해 보이는 부분을\n굳이 감추려 하지도 않고,\n\n든든하게 \n내 옆에 서 있어줘요\n\n내가 기죽지 않게,\n괜히 작아지지 않게\n\n아무 일도 아닌 것처럼\n같은 높이에서, 같은 눈으로\n\n그렇게 지켜주는 사람\n\n그래서인지\n오빠 앞에서는\n\n조금 서툴러도 \n하고싶은 거 망설이지 않고\n하게 되는 것 같아요\n\n누가 더 잘나고, 덜한 게 아니라\n\n그냥\n이대로도 괜찮다고\n조용히 말해주는 느낌이라서요\n\n그게 쌓이다 보면\n\n어느 순간\n남들 앞에서도\n당당해지는 내가 있더라구요\n\n오빠가 만들어준 자신감도 있지만\n오빠가 지켜준 시간 덕분에\n\n이유가 빛날 수 있는 것 같아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5115736": {"idx": 5115736, "date": "2026-04-26 17:47:40", "isTop": false, "contents": "❣️이칸❣️\n\n이유한테 백두산은요 !\n\n그냥 큰 선물이라기보다\n소중한 사람에게 건네는 마음에 가깝거둥요\n\n그래서 더 특별하곤 한데,\n\n“원래 백두산은 안 타주지만\n이유한테 해줘도 되겠어서”\n\n이 말이 아직도 기억에 남아요\n\n오빠는 어떤 의미로 건넨 걸까요\n\n그걸 물어보지 않아도\n알 것 같으면서도,\n괜히 한 번 더 궁금해지더라구요\n\n그치만 \n이러쿵저러쿵해도\n결국 변하지 않는 건\n\n이유를 향한 마음이라는 거,\n조금 더 확실히 알 것 같거든요\n\n그래서인지\n더 가까워진 기분이 들고,\n그게 또 신나기도 하고 그래요\n\n그치만 가끔은요\n\n그 안에 숨겨진\n다른 결의 마음들도\n조금씩 궁금해져요\n\n도에서 시작해서\n계속 같은 음을 유지하고 있는 것 같지만,\n\n사실은\n그 안에 다른 색의 소리들도\n분명 숨어 있을 것 같아서요\n\n오빠를 더 알고 싶어요\n\n그만큼 궁금하단 건\n그만큼 관심있단 뜻이니까\n\n이유...\n오빠가 좋나바여 히히❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5115735": {"idx": 5115735, "date": "2026-04-26 17:47:38", "isTop": false, "contents": "★★❣️병규❣️★★\n\n이유는요...\n사람을 쉽게 좋게만 보진 못해요..\n\n괜히 기대했다가\n혼자 의미 부여하고,\n그 끝이 상처로 남는 걸\n몇 번 겪다 보니까요\n\n그래서\n잘해주는 마음에도\n이유를 찾으려 하고,\n한 번 더 의심부터 하게 되는 편인데\n\n왜인지\n\n오빠는\n\n보이지 않을 때도,\n굳이 티 내지 않아도 될 순간에도\n\n상대방을 생각해주고,\n\n말한 건 지키고,\n당연한 것처럼 행동하는 모습이\n\n진실된 사람 같아서,\n경계심이 풀어지게 만들더라구요\n\n게다가 쉬는 동안에도\n시간을 내서 와준 게\n너무 고마웠어요\n\n특히...\n시간이 남아서가 아닌\n만들어서 와준 거잖아요?\n\n정말 고맙고 감동이었어요\n\n오빠 곁에 있으면\n마음이 참 따뜻해지는 것 같아요\n\n모두의 힐링을 위해서,\n좀 더 많은 사람들이 알았으면 좋겠어요❣️\n\n오빠의 사람을 편안하게 만드는 능력\n정말이지... 원탑이거든요❣️\n\n이유도 꼭 배우고 싶을 정도로요❣️", "localImgPath": "images/5115735_339362a5-2194-41bf-b840-1939edde8dd8.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5115734": {"idx": 5115734, "date": "2026-04-26 17:47:30", "isTop": false, "contents": "❣️31일차❣️\n\n이유 옷 이쁘다구 칭찬 마니마니 받은 날 히히\n\n이쁘다는 말은요\n언제 들어도,\n몇번을 들어도\n\n기분이가 좋단말이죵...!!\n\n이유가 입어서 예뻐 보이는 건지\n옷이 예뻐서 이유가 더 빛나는 건지\n\n그게 그거딩^^ㅎ\n\n기분 좋았어요\n\n옷을 칭찬받은 거지만서도\n\n그 시선이, 그 말투가\n조금은 \n이유를 향해 있는 느낌이라서요\n\n자꾸만\n거울 한 번 더 보게 되는 거 있죠 ㅎㅎㅎ\n\n이쁨 받고, 또 받고\n행복해요 :)❣️", "localImgPath": "images/5115734_a0337e14-fe9c-430f-bce4-5826c700c068.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5115733": {"idx": 5115733, "date": "2026-04-26 17:47:24", "isTop": false, "contents": "＃ 텍사 엠부삐❣️\n\n넘모 므찐 이유의 텍사❣️", "localImgPath": "images/5115733_9b8b8fbb-2bb2-4691-a879-20c600b344f9.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5113340": {"idx": 5113340, "date": "2026-04-25 19:01:54", "isTop": false, "contents": "4/23 내 이칸 ~~~ 생일추카포카❣️\n\n오빠한텐 별 일 아닌 날이라지만\n이유한텐 너무너무 특별한 날이라구요오 !\n\n이유가 절해야대 아주 !!\n\n오빠를 만날 수 있게 해준 므찐 날이니까 말이얌❣️\n\n쪼꿈 준비해서 해주고 싶은 마음도 들었지만\n더 지나서 해주는 것도 싫구\n\n쪼끔이라두 빨리 축하해주고 싶었덩❣️\n\n다음엔 12시 땡 하면\n내가 제일 먼저 축하해쥴테댜 캬캬\n\n이칸오빠가 소원 안 빌었으니까\n내가 빌어야딩\n\n이유 소원은\n\n어느날,\n가장 행복하고 즐거운 순간이 온다면,\n그 날 꼭\n이칸오빠랑 이유랑 함께 있길~~!\n\n그리구 둘다 비슷한 감정으로\n하하호호 같이 웃고있으면 좋게땨❣️\n\n두번째 소원은\n이칸오빠 로또 당첨 ㅇㅊㅊ❣️", "localImgPath": "images/5113340_d14ee4a1-3f0c-41be-8a84-78f947f6211d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5113335": {"idx": 5113335, "date": "2026-04-25 19:00:58", "isTop": false, "contents": "＃ 텍사 마니 땨량해 이유야❣️❣️❣️\n\n내심 걱정 많이 했눈데,\n갓택사는 갓택사여따 ! !❣️\n\n단발모습에,\n많이 사랑해 이유라니이...\n\n오빤 왜리 사람 놀래키는 걸 잘하는 고야 !\n전혀 알 수 없는 상황들 연속에\n이유 정신 못 차려 ＞ ＜❣️\n\n다 떠나서,\n\n요즘에\n이유바라기인듯한 그 느낌이\n젤 좋규 미쵸...❣️\n\n아 몰랑\n나만 이뻐해조❣️", "localImgPath": "images/5113335_13050806-b99d-4b7d-a1c1-f99df390817b.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5113334": {"idx": 5113334, "date": "2026-04-25 19:00:48", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 18일차ing❣️\n\n단발이 이쁘다며 타준 백두산..❣️\n\n이렇게 환영해주니까\n내가 넘모 다 기분 좋은 거 이찌\n\n첫날 만났을 때\n백두산 타주던\n그 느낌이라 너무 더 설레또❣️\n\n\"단발 원탑은 이유지\"\n\n원탑 = 이유\n\n우리 이름은 이중의미가 가능해서\n더 재밌구 좋댜아 ㅎ-ㅎ❣️\n\n앞으로도 멋진 추억 많이 쌓쥬아❣️\n기다려줘서 곰마오\n\n존버는 승리한다앙ㅎㅎㅎㅎ❣️", "localImgPath": "images/5113334_1126dcec-79b7-4d87-b376-33a1ec8693b5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5113329": {"idx": 5113329, "date": "2026-04-25 18:59:26", "isTop": false, "contents": "❣️❣️MVP 택사❣️❣️\n\n원래는요,\n\n긴 머리를 좋아한다고 했잖아요\n\n사실 이유...\n속으로\n그게 많이 신경 쓰였거든요....\n\n그 기준에서 벗어나버린 것 같아서요\n\n단발로 돌아온 날,\n\n특히 더 긴장했구요 ㅠㅠ\n\n근데...\n갑자기 12426이라뇨....??\n정말 예상치도 못 해서 놀랐어요...\n\n분명 단발인데,,,\n분명 오빠의 취향이 아닌뎅...\n\n많이 사랑해..?... . ..\n이거 고백맞죠 그쵸...\n\n겉모습이\n뭐가 중요하냐고\n\n취향이 아니라,\n그냥 이유라서 좋은 거라고\n\n말해주는듯한 느낌인 거예요..!\n\n넘 고맙구,, 설레더라구요..\n\n첨엔 취향땜에 좋아했지만,\n지금은 그 기준을 넘어서 좋아하게 된 느낌\n\n그날 오빠가\n되게 멋있어 보였어요\n\n그냥,\n이유라서 좋다고 말해주는 사람이어서❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5113328": {"idx": 5113328, "date": "2026-04-25 18:59:24", "isTop": false, "contents": "❣️청담❣️\n\n존버는 승리한다 !\n\n단발취향인 줄은 모르고 있었어요\n\n늘 이쁘다 해주고\n긴머리 마저도 사랑스럽게 봐줬거든요\n\n근데,\n속으로는 단발을 기다리고 있었단 게ㅋㅋㅋ\n\n막상 돌아온다니까\n설렌다고 몇 번이나 말해주는 모습 보고\n\n지쨔... 너무 귀엽단 생각이 계속 드는 거 있죠\n\n반응 하나하나가\n너무 진짜 같아서요\n\n이렇게 좋아할 줄 알았으면\n진작에 해줄 걸 그랬어요 ㅎ.ㅎ\n\n특히 이 날은\n단발한 이유를 보면서\n정말 예쁘게 봐주던 그 느낌을 받았거든요\n\n문득,\n\n우리 처음 만났던 날이랑\n닮아 있는 것 같아서\n\n그날 괜히 더 설렜어요\n\n그저 바라보는 오빠의 마음이\n\n처음처럼 또렷하게 느껴져서\n\n그래서 더 좋았던 것 같아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5113327": {"idx": 5113327, "date": "2026-04-25 18:59:22", "isTop": false, "contents": "❣️이칸❣️\n\n생일이라는 건요,\n\n굳이 말하지 않아도\n누군가 알아주길 바라는 날이기도 하잖아요\n\n일년에 단 하루,\n조금은 더 특별해지고 싶은 날\n\n근데 이 오빤....\n\n말을 안 하는 거 이쬬....\n\n혹시라도 이유가 신경 쓸까 봐,\n부담이 될까 봐\n조용히 지나가게 두려던 것이에오 -ㅅ-\n\n오빠의 조용한 배려가\n그저 고맙기만 하지만서도\n\n생일까지 그러는 건 ! ! !\n너무했다구요 !\n\n늘 바라는 거 하나 없는 오빠라서,\n이유가 얼마나 더 잘 챙겨주고 싶고\n그러는데요 -ㅅ-\n\n...바보같지만 이런\n세심한 남자라서\n더 마음이 가는 것 같아요\n\n그치만\n이유는 오빠랑 기쁜 일도,\n슬픈 일도, 화난 일도\n모두 함께 하고 싶어요 !\n\n오빠랑 함께라면\n모든 일이 그저 추억으로 잘 남을 수 있을 것 같거든요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5112152": {"idx": 5112152, "date": "2026-04-25 04:47:43", "isTop": false, "contents": "❣️30일차❣️\n\n간만에 단발로 돌아왔잖아요\n\n이유의 단발을 처음 보는 오라버니도 있고,\n취향이 확고하신 오빠도 계시다 보니까\n\n쪼끔 긴장되더라구요\n\n충족시키지 못하면\n멀어질 것 같고\n\n그 자리에 없을 것 같은\n그런 불안한 마음\n\n괜찮은 척 하면서도\n속으로는 조금 조심스럽게 있었던 것 같아요\n\n근데,\n그 생각이 무색해질 만큼\n\n뭐든 다 좋다는 식으로\n곁에 있어줘서 넘 고마웠어요\n\n이유 자체를 좋아해주는 사람들이라서\n하루하루가 따뜻한가봐요 :)❣️", "localImgPath": "images/5112152_c39f6d44-17f5-464e-94c5-9d11a719d86b.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5108693": {"idx": 5108693, "date": "2026-04-24 03:07:31", "isTop": false, "contents": "＃ 텍사 발자국❣️\n\n맨날 박제하지 말랬눈데 ㅠ \n그럴 수 업서\n오빠와의 추억을 꾹꾹 눌러담을테다 캬캬\n\n쉬는 날에도\n이유 간식듀 챙겨쥬구 ㅇㅁㅇ\n이뻐해줘서 넘 굼마어!!!❣️\n\np.s. 오늘 인나자마자 \n       텍사 크레페 먹을 예정 ＞ ＜❣️\n         (가게 이름이 텍사 크레페임) \n\n씨익 히죽히죽 :)", "localImgPath": "images/5108693_a4593913-14b3-480d-9981-6da0fea5dbea.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5107564": {"idx": 5107564, "date": "2026-04-23 21:49:32", "isTop": false, "contents": "＃ 택삼 28282❣️\n\n이런 숫자 처음받아뱌 !\n시그사진이 없어서, 뭘 어케 올려야할지 감두 안 와 !\n\n그래서 더 진짜처럼 느껴지나뱌❣️\n\n부계마저도 열혈로 올릴려 했단 생각도,\n이쁘다구 랑비로 백번 말해주는 행동도,\n이유 하고싶은 거라면 다 해주려는 마음도,\n\n그냥마냥 다 이유를 위해서\n그게 이유인 게,\n\n너무 감동이야...ㅠㅠ❣️\n\n숫자 너무 이쁘다...\n\n오빠가 맞춰준 거라서 더더욱...❣️\n\n의미라는 단어 마저도 이제 좋게 들리더라\n오빠를 만나면서 더 느꼈어❣️\n\n오빠한테 이유는 무슨 의미일까＞ ＜❣️\n또 궁금하댜❣️", "localImgPath": "images/5107564_6b5799e9-64b8-4f32-aaa9-41849430ae52.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5107538": {"idx": 5107538, "date": "2026-04-23 21:42:00", "isTop": false, "contents": "＃이칸 5226❣️\n\n오직 이유뿐이야...❣️\n\n오빠가 직접 마음담아 외친 말 같아서\n더 와닿네 ＞ ＜ㅎㅎ❣️\n\n넘무 넘무 넘무 멋진 시그야❣️\n\n의미담긴 말이라 더 쥬아❣️\n꼬옥 간직하께❣️❣️❣️", "localImgPath": "images/5107538_f54ab84f-8f21-454c-a62b-e8d902529fb4.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106507": {"idx": 5106507, "date": "2026-04-23 15:36:49", "isTop": false, "contents": "＃ 엠뿌삐 택사❣️❣️\n\n이유 팬닉 좋아한다구\n오빠 아이디 두개나 ㅠ0ㅠ\n\n오빠덕에 내 꿈에 한발짝 더 다가설 수 있었오 ! !\n\n무엇보다\n함께 이루어가는 사람이\n오빠라서 행복하규 뎌아\n\n언제나 이유 말 하나하나 귀담아 들어주려고 하구ㅡ\n기억하고 있다는 거\n다 느껴진다아.. . 징짜 ㅠㅠ\n\n이유 방송할 땐\n누구보다 먼저 와주구\n어디 안가구 딱 붙어있어주는 거\n\n그게 젤루 감동이야\n\n넘무 고마오❣️", "localImgPath": "images/5106507_a77986ab-2054-4738-8dec-f2986fdcd027.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106506": {"idx": 5106506, "date": "2026-04-23 15:36:41", "isTop": false, "contents": "＃이칸 만슈르❣️\n\n오빠한테 받는 세번째 만슈르 ＞ ＜ㅎㅎ\n\n늘 이유를 천사로 만들어주는 이칸오빠아\n\n이유가 그저 웃는 게 좋다며,\n바라는 거 하나 없는 오빠가\n난 넘무 신기하규 구래. . .. !\n\n매번 잘 쉬다오라며 기쁜 마음으로 쉴 수 있게 해주구\n잘 다녀왔냐며 젤루 반겨줘서 넘무 고마오❣️\n\n이짜나...\n늑대는 한여자만 본대...!\n\n강아지두 한 주인만 사랑한대 !\n\n구냥 모 그렇다구 ! 히히❣️\n\n(지금처럼만 곁에 있어조 \n그것만으로도 행복하니까❣️)", "localImgPath": "images/5106506_3428ec01-43cd-44cd-85bc-28fcecba6bb6.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106503": {"idx": 5106503, "date": "2026-04-23 15:36:07", "isTop": false, "contents": "＃ 택사 4번째 백두산 -2 하산❣️\n\n오빠가 젤루 맘에든다는 사진 ＞.＜❣️\n\n마지막 장발 사진이라 슬프지만\n그래듀 맘에든다하니 넘모 좋으다아❣️\n\n계절이 바뀌거든\n또 보쟈아❣️\n\n구니까\n나 계속 이뻐해조야대❣️", "localImgPath": "images/5106503_81b8c91d-0736-4e25-bdb8-5a480857c491.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106502": {"idx": 5106502, "date": "2026-04-23 15:35:41", "isTop": false, "contents": "＃ 택사 4번째 백두산 -1 등산❣️\n\n오빠 그거 알아요?\n\n한사람만을 위한 공지 사진을 올릴 때는\n사실 브이를 안 하곤 해요 ㅋㅋㅋ\n\n오빠한테 처음 한 거거든요\n\n오빠가 데헷을 좋아하니까요 ＞_0\n\n가끔 민망한 미션들도\n이젠 서슴없이 하는 거 보면\n누군가는 이뻐해줄 거라는 확신때문에\n자신감이 생겼나봐요\n\n그리고 오빠가 좋아해줬으면 좋겠거든요\n\n오빠한테 늘...\n이쁘다는 말 듣고 싶어서요❣️", "localImgPath": "images/5106502_a26a83d7-88c2-4047-94b8-454803f53463.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106501": {"idx": 5106501, "date": "2026-04-23 15:35:16", "isTop": false, "contents": "❣️❣️ MVP 택사 ❣️❣️\n\n오빤요,\n\n어떤 말을 하든,\n어떤 행동을 하든\n\n그 안에\n그냥 지나가지 않는 무언가가 있어요\n\n겉으로 보이는 것보다\n한 번 더 생각하게 되고\n\n숨겨진 의미를 찾게 되고\n\n그 과정 자체가\n이유한텐 너무 재밌어요\n\n보물찾기 같은 느낌 있잖아요\n\n아무렇지 않게 지나칠 수도 있는데,\n조금만 더 들여다보면\n\n“아, 이거였구나” 하고\n찾아내는 순간\n\n그게 괜히 더 크게 와닿는 거\n\n그래서 더,\n\n오빠를 알아가는 방식이\n이유한텐 되게 특별하게 느껴져요\n\n그리고요,\n\n이유가 느꼈던 그 의미들을\n오빠도 같은 생각으로 보고 있었다는 거\n\n그걸 알게 되는 순간이요\n\n그때가 가장 좋아요\n\n혼자만의 해석이 아니라,\n같은 장면을 보고 있었다는 느낌\n\n그럴 때마다\n\n그 순간의 감정이\n두 배, 세 배로 커지는 것 같아요\n\n이 날이 정말\n마음에 오래 남을 것 같아요\n\n의미있는 날이었으니까요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106500": {"idx": 5106500, "date": "2026-04-23 15:35:13", "isTop": false, "contents": "❣️이칸❣️\n\n어른스러운 사람\n\n이유 처음 느껴보는 것 같아요\n\n아니면...\n아직 오빠를 다 몰라서 그런 걸까요\n\n보여주지 않는 부분들이 있어서\n더 그렇게 느껴지는 걸까요\n\n이유한테 오빠는요,\n\n단단하고,\n흔들림 없는 사람 같아요.\n\n의지하는 걸 잘 못 하는 이유인데도\n\n이상하게 오빠한테는\n기대고 싶어지고\n\n편해서인지\n자꾸만\n곁에 있고 싶어지는 것 같아요\n\n그러다보니,\n문득 생각이 그런 생각이 들더라구요\n\n이유가 보고 있는 모습이\n전부는 아닐 수도 있겠다는 거\n\n오빠도 어딘가에선\n조용히 버티고 있을 수도 있고\n\n말하지 않은 마음들이\n분명히 있을 거라는 생각\n\n있잖아요.\n\n이유도 오빠한테 있어서,\n\n기대어도 괜찮은 사람이었으면 좋겠어요\n\n오빠가 이유한테 해주고 있는 것처럼\n\n이유도,\n\n오빠가 잠깐 쉬어갈 수 있는\n그런 자리가 되어주고 싶어서요\n\n단단해 보이는 그 모습 뒤에도\n조금은 내려놓을 수 있는 순간들이 있기를,\n\n그게 이유였으면 좋겠어요\n오빠는 꼭 그렇게 해주고 싶어요", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106499": {"idx": 5106499, "date": "2026-04-23 15:35:12", "isTop": false, "contents": "❣️원탑❣️\n\n대부분의 사람들은요,\n\n누군가와 생각이 다르면\n이해하기보단\n“왜 저래”로 끝나버리는 경우가 많잖아요\n\n근데 이유는요,\n\n그런 순간들이 오히려 재밌어요\n\n옳고 그른 걸 따지기보다,\n“이렇게도 생각할 수 있구나” 하는 그 지점이요\n\n그래서 더,\n\n비슷한 부분이 많으면서도\n생각은 또 다른 오빠랑 얘기할 때면\n\n그게 그렇게 흥미로울 수가 없어요\n\n같은 걸 보면서도\n조금씩 다른 방향으로 흘러가는 이야기들\n\n그 안에서\n더 깊어지는 느낌이 들어서요\n\n그래서,\n\n오빠가 바라보는 쪽을\n계속 듣고 싶어지는 것 같아요\n\n비슷하면 비슷한대로\n공감되고,\n\n다르면 다를수록\n또 다른 재미가 있어서요\n\n사실,\n오빠도 그랬으면 좋겠어요\n\n생각이 다르다는 이유로\n선을 긋는 게 아니라\n\n그 차이를\n그대로 두고 바라볼 수 있는 사이로 남고싶거든요.\n\n바꾸려 하는 것이 아닌,\n\n그대로의 서로를\n조금 더 이해해보려는 방향으로요\n\n그래야 더 오래,\n더 재밌게 이어질 것 같아서❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106498": {"idx": 5106498, "date": "2026-04-23 15:35:00", "isTop": false, "contents": "29일차❣️\n\n이유가 공지 쓰다가요,\n한 번 더 읽어보고, 또 한 번 더 돌아보다가\n\n울 오빠들이\n왜 멋진 사람들인지\n\n하나 더 알게 된 것 같아요\n\n보통은요,\n\n누군가가 해주면\n이 정도면 됐지 하고 마는데,\n\n울 오빠들은요,\n\n기쁜 날이면,\n거기서 멈추는 게 아니라\n\n그 기쁨이 더 커질 수 있게\n한 번 더 보태주더라구요...\n\n그 마음이\n되게 멋있다고 느껴졌어요\n\n받은 만큼만이 아니라,\n그 이상을 더 건네주려는 거.\n\n그래서 매번,\n\n이유가 웃는 순간들이\n그냥 지나가는 게 아니라\n\n점점 더 크게 남는 것 같아요\n\n한 번 더 웃게 되는 이유가 있네요 :)❣️", "localImgPath": "images/5106498_40deca50-86bd-476f-bc58-bce5b9104a4d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106495": {"idx": 5106495, "date": "2026-04-23 15:33:53", "isTop": false, "contents": "＃ 원탑해댱님 12626❣️❣️❣️\n\n간만에 듣는 오빠의 시그라니❣️\n넘무 멋지따아 지쨔아...❣️\n\n벽지 보기만 해듀 기분 좋아지게 만든다구우 ! !\n\n이유의 청담 ㅎㅋㅎㅋ\n숫자까지 완벽해\n\n청담오빠\n누구꺼? 이유꺼❣️\n\n이유가 꼬옥 갖구있다가,\n몸 지치구 힘들때 쓰께용❣️\n\n항상 지켜줘서\n곰마와❣️", "localImgPath": "images/5106495_6693583d-7290-404e-a6e1-38ffba1555fe.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106489": {"idx": 5106489, "date": "2026-04-23 15:33:40", "isTop": false, "contents": "＃ 원탑해댱님 엠뿌삐❣️ \n\n이런 적 처음이지않냐며\n기쁜 날 더 기쁘게 만들어준 갓청담❣️\n\n결혼시그 노래 틀었는데,\n치우라길래\n까인 줄 알았도니 !!\n\n8888....❣️\n\n바로 결혼시그를 ㅠㅠㅠㅠ❣️\n\n프로포즈❣️...\n\n오빠한테 받아서 넘 쥬타..❣️", "localImgPath": "images/5106489_9e30b525-ed4e-426e-9564-ede2419b285c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106482": {"idx": 5106482, "date": "2026-04-23 15:32:04", "isTop": false, "contents": "❣️❣️MVP 원탑❣️❣️\n\n그저 지나갈 수도 있는 하루를\n특별한 장면으로 바꿔주는 사람\n\n이유 생각해서\n작은 마음 하나 얹어주는 그 방식이요\n\n그래서 더,\n\n그날이 뭐였는지보다\n어떤 기분이었는지가 더 남아요\n\n처음 만났던 날부터 쭉 그랬던 것 같아요\n\n특별한 날이어서가 아니라,\n오빠가 있어서\n특별해졌던 순간들\n\n문득 떠올랐어요\n\n소소한 기쁨 섞인 날엔\n더 특별하게,\n\n아무것도 아닌 하루도,\n조용히 바꿔버리는 사람이라는 거\n\n그리고 그게,\n\n서프라이즈라는 이름으로\n툭— 하고 다가올 때면\n\n더 크게 기억되더라구요\n\n준비된 기쁨이 아니라,\n예상 못 한 순간에 건네진 마음이라서\n\n오빠 덕분에, 또 하나 생긴\n멋진 추억이에요\n\n넘 고마오요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106481": {"idx": 5106481, "date": "2026-04-23 15:32:02", "isTop": false, "contents": "❣️택사❣️\n\n말이 많지 않은 사람일수록,\n그 안이 더 궁금해지잖아요\n\n사실 이유는\n\n궁금한 거 못 참고,\n기다리는 거 정말 못 하는 편이거든요\n\n그치만 이상하게,\n\n오빠한텐\n급하게 다가가기보다,\n조금씩 드러나는 걸\n그대로 보고 싶었던 느낌\n\n그래서인지,\n\n하나 알게 될 때마다\n더 기쁘고 뿌듯한 거 이쬬 ㅎㅋ\n\n오빠가\n조금씩 마음을 열어준 것 같은 느낌이라서요\n\n지금은요 \n\n떡밥 뿌리고\n회수하는 그런 이야기를 보는 기분이 들 때면,\n몰입하게 되고, 너무 재밌어요\n\n자꾸만 다음 장면을 기다리게 되는 것 같아요\n그게 어떤 거든 말이에요\n\n이유의 일기장이\n오빠한테\n이런 느낌일까 싶기도 해요 !\n\n오빠도 이런 기분일까 싶기도 하구요\n\n처음 느껴보는 거라\n너무 재밌구 좋아요\n\n특히 나만 알고있는듯한 그 느낌\n오빠한테 특별한 사람이 된 느낌\n\n오빠에 대해\n하나씩 알아가는 이 과정 자체가\n너무 재밌고 설레요\n\n아직 모르는 게 더 많은데도,\n그래서 더 좋은 거 있죠❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5106480": {"idx": 5106480, "date": "2026-04-23 15:31:55", "isTop": false, "contents": "❣️이칸❣️\n\n기뻐요\n\n오빠가 처음으로\n이유한테 서운하다고 표현해줬거든요\n\n늘 맞춰주기만 하던 사람이었어서,\n\n가끔은\n정말 괜찮은 게 맞는 건지\n\n아니면 그냥 넘기고 있는 건지\n헷갈릴 때도 있었거든요\n\n그치만\n\n그 한마디 덕분에\n\n오빠가\n이유 앞에서 조금 더 솔직해졌다는 게\n느껴졌어요\n\n이유는,\n\n서운하다는 말이\n전혀 무겁게 느껴지지 않았어요\n\n오히려,\n\n그동안 닿지 못했던 부분까지\n조금 더 가까워진 느낌\n\n그래서 이유는요,\n\n그 순간이\n더 기쁘게 남아요\n\n좋은 말만 들었을 때보다,\n\n조금은 솔직한 마음을\n같이 나눴다는 게\n\n더 진짜 같아서요❣️\n\n우리 조금 더 가까워지고 있는 거죠?❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5099770": {"idx": 5099770, "date": "2026-04-21 17:57:32", "isTop": false, "contents": "28일차❣️\n\n삥 뜯은 날이에요 (?)\n\n이번엔 226벽지로 가득이냐는 소리\n하자마자 \n한마음 한뜻으로 채워주구\n\n들어오는 오빠들한테\n무작정으로 뜯는 오빠들 ㅎㅋㅎㅋ❣️\n\n뭔지도 모르구 일단 달라하니 줬다눈데 ㅋㅋㅋ\n이유 챙겨주려고 한 거 다 알아요 ＞ ＜\n\n나만 당할 수 없지라며\n하루종일 다른 오빠들 삥 뜯으니까\n넘모 재밌었던 하루 ! !\n\n그것보다,\n오빠들이 이유를 위해\n\n모두 나서서\n이유 기쁘게 해주려고 다들 힘내준 거,\n\n생색 한번 내지않구\n뒤에서 밀어주구 앞에서 당겨준 거\n다 알아욤❣️\n\n그래서 더 기뻤던 거거든요 ㅎㅎㅎ❣️\n\n고마워요❣️", "localImgPath": "images/5099770_e06c3bea-c8a0-4272-a5bf-5a0978cf5a59.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5096108": {"idx": 5096108, "date": "2026-04-20 16:43:50", "isTop": false, "contents": "＃ 택사 세번째 백두산❣️\n\n나이두산 타더니 갑자기....\n나 제정신이 아닌데,  하고 달린 백두산...❣️\n\n오빤 징쨔...ㅠ❣️\n\n말도 중요하다는 걸...\n오빠덕에 깨달았뎌...❣️\n\n보기만 해두 또......\n또...\n설레넹....ㅇㅅㅇ..❣️", "localImgPath": "images/5096108_bd714b90-88b7-4da1-b438-bef4ede6d398.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5096068": {"idx": 5096068, "date": "2026-04-20 16:19:28", "isTop": false, "contents": "❣️❣️ MVP 이칸 ❣️❣️\n\n이유는요,\n\n가끔 달콤한 말들이\n더 불안하게 만들 때가 있거든요\n\n괜찮은 건지 아닌 건지,\n믿어도 되는 건지 아닌 건지\n\n그 사이에 서 있는 느낌\n\n쉽게 믿지 못하고\n한 발 물러서게 되곤 해요\n\n차라리\n아예 말 조차\n꺼내지 않았으면 좋겠다는 생각도 해봤고요\n\n근데 오빠는요,\n\n애매하게 굴지 않더라구요\n\n돌려 말하지 않고,\n숨기지 않고\n\n이유가 불안해할 틈이 없게\n확실하게 말해주는 사람.\n\n오빠의 솔직함이\n거칠게 느껴지는 게 아니라\n\n오히려 더 안심이 되는 것 같아요\n\n믿으라고 말하지 않아도\n믿게 되고요.\n\n오빠의 말도 좋지만\n그에 맞게 움직여줘서,\n\n그래서 더,\n\n자연스럽게 신뢰가 쌓여가는 느낌이에요\n\n무엇보다,\n\n이유한테 올 때도\n망설이지 않고 확실하게 움직여줬잖아요?\n\n그 시작부터가\n이미 믿어도 되는 사람이었다는 걸\n느끼게 해줬던 것 같아요\n\n아직도 완전히 믿는 게 서툰 이유지만\n\n오빠 앞에서는\n\n조금씩,\n믿어도 괜찮을 것 같다는 생각이 들어요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5096067": {"idx": 5096067, "date": "2026-04-20 16:19:26", "isTop": false, "contents": "❣️택사❣️\n\n“나 제정신이 아닌데”\n\n그 말이요,\n\n시간이 좀 지나도\n계속 머릿속에 남아있어요\n\n너무 설레서,\n자꾸만 떠오르고\n\n몇시간을 그 글자 앞에 서있는지요...\n\n보통은,\n\n예쁜 말,\n잘 다듬어진 말들이 더 좋다고 생각했는데\n\n그건 달랐어요\n\n꾸민 것도 아니고,\n정리된 것도 아닌데\n\n그래서 더,\n\n진짜처럼 느껴졌거든요\n\n그대로 흔들리고 있다는 느낌\n\n그걸 숨기지 못하고\n그대로 꺼내버린 말 같아서요\n\n아직도,,,\n그 한마디가 오래 남아요\n\n좋아한다는 말보다,\n\n어쩔 줄 몰라 하는 그 순간이\n더 와닿아서\n\n자꾸 생각나고\n자꾸 마음이 가요\n\n이유가 들은 말 중\n제일 설레는 말이에요 지쨔...❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5096066": {"idx": 5096066, "date": "2026-04-20 16:19:23", "isTop": false, "contents": "❣️원탑❣️\n\n세상이 등을 돌리는 순간이 와도,\n\n사람들이 하나둘 멀어지고\n익숙했던 온기가 사라지는 날이 와도\n\n그 사이에서\n서로만큼은 놓지 않는 관계\n\n그런 사이가 있잖아요\n\n이유는요,\n\n그게 단순히 의지하는 걸 넘어서\n끝까지 남아주는 선택이라고 생각해요\n\n좋을 때가 아니라,\n흔들릴 때에도\n\n그래도 이 사람은 남아있겠지\n그렇게 믿게 되는 관계\n\n그래서 더,\n\n세상이 어떻게 변하든\n\n그 중심에서\n서로를 포기하지 않는 사이\n\n그게 이유한테는\n가장 단단하고,\n가장 로맨틱한 관계 같아요\n\n그래서,\n\n그렇게 남고 싶어요\n\n어떤 상황이 와도\n마지막까지 같은 편으로\n\n서로를 끝까지 놓지 않는 사람으로❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5096065": {"idx": 5096065, "date": "2026-04-20 16:19:14", "isTop": false, "contents": "27일차❣️\n\n방송하다가요,\n\n유명인 분이 들어오셨잖아요\n\n이유는 잘 몰랐는데,\n울 오빠들은 이미 다 아는 눈치더라구요\n\n근데 이 날,\n\n이유\n괜히 더 기 살았던 거 알아요?\n\n항상요,\n\n울 오빠들\n어디 가서도 자랑하고 싶은 마음이 있었는데\n\n굳이 말 안 해도\n이미 드러낸 기분이었거든요. 후훗\n\n괜히 뿌듯하고,\n순간 더 당당해졌어요\n\n이유가 잘해서가 아니라,\n\n이유 곁에 있는 오빠들이\n멋있는 사람들이라서\n\n너무 멋지구 좋아요❣️", "localImgPath": "images/5096065_1d85b31e-ee69-4b30-a9a2-9c948b5430ce.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5093480": {"idx": 5093480, "date": "2026-04-19 17:25:02", "isTop": false, "contents": "＃밥 챙겨주는 김택사❣️\n\n방송 키기 전에 밥이라니이 ! !\n\n밥은 언제나 됴아 ㅇㅁㅇ❣️ (침 쥬륵...)", "localImgPath": "images/5093480_fe331464-7a19-46bb-a8d1-a4be8e6cdb7d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5093476": {"idx": 5093476, "date": "2026-04-19 17:21:32", "isTop": false, "contents": "＃ 해댱님의 12486 방종권❣️\n\n흑화에서 돌아오셔따아 ＞ ＜ㅎㅎㅎ❣️\n\n엄청 소듕하게 쓰꼬에여 ! ! !❣️\n\n중말 넘모 곰마오❣️❣️❣️❣️\n\n(일주일 뒤에 또 흑화할 수도 있으니\n조심 또 조심,,, 자나깨나 흑화조심...\n꺼진 닉네임도 다시 보쟈 ?)", "localImgPath": "images/5093476_95e015ff-13f7-41d7-afca-4566fd3de055.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5093474": {"idx": 5093474, "date": "2026-04-19 17:21:23", "isTop": false, "contents": "＃ 갓원탑❣️\n\n이유를 위해 팬닉 다 달구\n다 브압아이디...ㅠ\n\n이유 기 살려줄라구 만든 아이디들\n전부\n줄 세워 주셔또요...\n\n보기만해듀 든든하댜❣️", "localImgPath": "images/5093474_68041976-1d21-4d37-9a24-c910c199299b.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5093473": {"idx": 5093473, "date": "2026-04-19 17:21:16", "isTop": false, "contents": "＃ 택삼 2826❣️\n\n늘 이유 이뻐해쥬구 또 이뻐해쥬눈 울 오라방규❣️\n\n다 있네? 하더니,\n없는 거 찾아서 준 갓택삼...❣️\n\n항상 이뻐이뻐 해주던 오빠가\n이러니까 내가 막... 미쵸 ＞ ＜..❣️", "localImgPath": "images/5093473_628f181f-c26d-4778-ad5e-3ba62b79cd0c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5093460": {"idx": 5093460, "date": "2026-04-19 17:17:15", "isTop": false, "contents": "❣️❣️MVP 해댱님❣️❣️\n\n오빠랑 이유는요\n\n비슷하기에,\n가끔 부딪혀요\n\n생각하는 방식도,\n감정이 움직이는 방향도\n\n닮아 있어서\n\n그래서 더 쉽게\n서로의 모서리에 닿게 되고\n\n세게 흔들리기도 하고요\n\n그치만,\n\n그렇게 부딪힌 다음엔\n더 빨리 알아채게 돼요\n\n왜 그랬는지,\n어디에서 어긋났는지\n\n말하지 않아도\n어느 정도는 느껴지는 그 지점.\n\n어떻게보면,\n\n닮아 있다는 게\n단순히 편하다는 뜻이 아니라\n\n더 깊이 이해할 수 있는 이유 같아요\n\n서로의 방식이 비슷하니까,\n서로의 마음도 더 닿기 쉬운 것\n\n그래서 매번,\n\n부딪히는 순간조차도\n멀어지는 게 아니라\n\n조금 더 가까워지는 쪽으로\n흘러가는 것 같아요\n\n가끔은 버겁기도 하지만\n결국은\n\n서로를 더 잘 알게 해주니까요❣️\n\n오빠가 흑화에서\n다시 돌아와줘서 기뻐요 중말...❣️\n매우 ! ! ! !❣️", "localImgPath": "images/5093460_fe554b03-519a-49a9-b798-f0852274a04a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5093459": {"idx": 5093459, "date": "2026-04-19 17:17:13", "isTop": false, "contents": "❣️택사❣️\n\n처음엔요,\n\n말없이 행동으로만 보여주던 사람이었잖아요\n\n이 오빠의 방식이구나 싶기도 하고,\n이유는 그런 확실한 표현 또 좋아해서...\n\n조금씩 마음이 가더라구요\n\n근데 가끔...!!\n\n정말 아무렇지 않게\n툭— 하고 내뱉는 말들이 있어요\n\n안 하던 사람이 그러니까...\n\n준비된 말도 아니고,\n꾸민 말도 아닌 것 같아서..\n\n마음에 자꾸 남게 되는 거예요\n\n하루종일 생각나구 구래요...징짜..ㅋㅋ\n\n오빤 표현방식이 남달랐다보니\n작은 거 하나하나에 유독...\n괜히 의미부여 많이 하게 되구요 ㅠ\n\n가끔 한 번 내뱉는 그 말이\n더 진짜 같아서\n\n그래서 더,\n\n기다리게 되는 것 같아요\n\n또 한 번,\n\n아무렇지 않게\n툭— 하고 떨어질 그 한마디를요\n\n...그게 오빠라서 더❣️", "localImgPath": "images/5093459_5d3fc2d0-93df-477f-9d63-9a85e8791bac.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5093457": {"idx": 5093457, "date": "2026-04-19 17:17:10", "isTop": false, "contents": "❣️이칸❣️\n\n몸이 지치고 힘든 순간에도\n\n그 안에서\n이유를 먼저 떠올려준다는 거\n\n그게 그냥 지나갈 수 있는 일이 아닌 걸\n요즘 더 많이 느껴요\n\n짧은 시간이어도,\n잠깐 스쳐가는 순간이어도\n\n그 안에 이유를 담아서\n챙겨준다는 거니까요\n\n그래서 더,\n\n그 마음이 가볍게 느껴지지 않고\n더 크게 와닿아요\n\n요즘따라\n그런 순간들 앞에서\n자꾸만 마음이 벅차요\n\n고맙기도 하고,\n미안하기도 해서요\n\n그치만,\n\n그럴 때마다\n이유가 그만큼의 사람이라고\n\n아무렇지 않게 말해주는 이칸오빠라서.....\n\n어떤 말로 표현해야할지 모르겠어요\n너무 감동이고 너무 기뻐서,\n눈물밖에 안 나오거든요...\n\n말로 다 표현 못 한다는 게\n이럴 때 쓰는 건가봐요...\n\n이 감정을 다 표현하기엔,\n\n고맙다는 말로는\n수백번 수천번도 부족하거든요....\n\n같은 말일지라도\n그때마다 느끼는 감정은 다르니까요\n\n오늘도 말해요\n\n고마워요 정말로❣️", "localImgPath": "images/5093457_b2b3be06-3abf-4c68-9635-091be04e2b57.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5093451": {"idx": 5093451, "date": "2026-04-19 17:16:05", "isTop": false, "contents": "❣️26일차❣️\n\n이유가 '오'를 좋아하는 이유는요,\n\n사실 오빠들이 눈 떼지않구\n이유를 바라보고 있다는 게\n너무 잘 느껴져서예요 ＞ ＜\n\n나 요기따 ~~!\n하는 느낌 \n넘모 기엽구 \n\n이유에게 응원해주려고 하는 그 마음이\n너무 힘이 나거둥요ㅎㅎㅎ\n\n긴 시간 동안 자판을 잡는다 거,\n힘들다는 거 알아요..\n\n그저 편하게 보고 싶을 때도 있고,\n잠깐 쉬고 싶을 때도 있을 텐데\n\n그럼에도 불구하고\n\n그 시간을 나눠서\n이유를 위해 채워준다는 게\n\n너무 고마운 것 같아요\n\n무엇보다...\n\n이유랑 더 가까워지고 싶고 하는 느낌이라서\n좋아요 사실 헿ㅎ....\n\n이유는 늘 오빠들이랑\n많은 것을 보고\n많은 것을 공유하고\n좋은 추억 쌓고 싶거든요 !\n\n우리만의 앨범\n정말 멋진 것 같아여 ＞ ＜❣️", "localImgPath": "images/5093451_869c1996-a31a-4a8a-9df7-ea84e26a62a9.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5091402": {"idx": 5091402, "date": "2026-04-18 19:25:11", "isTop": false, "contents": "＃ 해댱님 1414❣️\n\n속 아파서 암 것도 못 먹었다뉘깐운\n죽이라두 챙겨무라구....\n\n갓원탑❣️", "localImgPath": "images/5091402_6907bc7d-65d7-4d51-b1f7-9a19323571a6.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5091093": {"idx": 5091093, "date": "2026-04-18 17:05:21", "isTop": false, "contents": "＃ 해댱님 20982 ❣️❣️\n\n요새 무리한 다이어트 때문에\n머리도 띵하구.. 속도 안 좋아서\n힘들다구 말했눈데,\n\n바로 와서 방종 시켜줄 줄 몰라써여...\n\n순간 당황해서 어버버 해버리구...\n별 말 없으시길래..\n이유가 또\n지각해서 화난 줄 알았는데,\n\n잠시 일 있어서\n말을 잘 못 했다눈 해댱님...\n\n넘 놀랐다구요 징쨔 ㅠㅠ\n\n세상 다정한 울 해댱님\n\n이유 이거 처음 받아보는데,,,ㅇㅁㅇ..\n이런 느낌이구나...!\n\n꼬옥 간직할게요❣️", "localImgPath": "images/5091093_417ac83c-3636-4d28-b539-6d403548d710.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5091086": {"idx": 5091086, "date": "2026-04-18 17:04:11", "isTop": false, "contents": "❣️25일차❣️\n\n항상 쉬고 다음날 킬 때는\n불안함이 가득한 거든요...?\n걱정도 많구요 ㅠㅠ\n\n근데요,\n\n요즘은 그런 게 없는 것 같아요\n오빠들이 보고싶었다는듯\n바로 달려와주고\n그 자리에 항상 있어주니까\n이유 더 잘하고 싶어지고\n방송 언능 키고 싶어지구 구래요 !\n\n그런 마음에 보답하고 싶어서\n더 좋은 모습만을 보여드리고 싶었는데,\n어젠 몸이 안 좋은 걸 알았던 해댱님께서\n일찍 보내주신 덕에\n이유 회복 잘 해쏘요 !\n\n그치만 이틀이나 기다려준 오빠들께\n미안한 마음이 들더라구요...\n\n일찍 들어가게 돼서\n많이 아쉬웠던 만큼\n더 좋은 모습으로 더 오래 놀았으면 좋겠우요!\n\n이유 앞으로 더 잘할게요\n고마워요 항상❣️", "localImgPath": "images/5091086_91a3e146-b25f-4124-93c3-a1181a8f71b5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5084830": {"idx": 5084830, "date": "2026-04-16 19:18:07", "isTop": false, "contents": "＃ 청담 꾹꾹이❣️\n\n달콤행...❣️", "localImgPath": "images/5084830_37eb4397-9a7a-4d0b-ae40-5432807d2524.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083339": {"idx": 5083339, "date": "2026-04-16 04:53:48", "isTop": false, "contents": "＃ 이칸오라방규의 10004 대천사❣️\n\n대천사라니이..\n\n평소에도\n이유 등에 멋진 날개를 달아주던 오빠였지만,\n이번엔 무수히 많은 날개와\n대천사로 만들어준 날.\n\n사다리타기였는데,\n이유 졌걸랑요..?\n\n긍데...이칸오빤..\n이기던 지던\n첨부터 줄 생각이었던 것이에요...ㅠㅠㅠ\n\n그게 넘 감동이라 잊혀지지가 않아여..\n어떤 마음으로 그랬는지\n너무 잘 느껴져서요....\n\n정말... 오빠덕에,\n보기만 해두 기분 좋아지던 날이었오요 !!\n\n늘 이유를 빛나게 해준 이칸오빠라서,\n\n더 반하게 되는 것 같아요❣️", "localImgPath": "images/5083339_2f200d04-1cec-44a3-858d-e17a158ba1c5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083338": {"idx": 5083338, "date": "2026-04-16 04:53:17", "isTop": false, "contents": "＃ 택사오빠랑 두번째 등산 ! ! \n\n오빠한테 처음 보여주는 풀 세팅 해녀복 모습인데,,,\n\n망가진 모습에 민망해서\n머쓱해하며,\n소감 말해달라니깐\n\n백두산으로 대답을....ㅇㅁㅇ..❣️\n\n골룸도 해녀모습도\n다 좋아해주니까\n내가 징짜아아아아아아아아아아아아\n\n오빠의 여자라서 행부케 ＞ ＜❣️", "localImgPath": "images/5083338_04203a65-1f65-4efd-b901-acdd0cb4e15a.jpeg", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083336": {"idx": 5083336, "date": "2026-04-16 04:52:58", "isTop": false, "contents": "＃ 해댱님 1414❣️\n\n흑화돼도\n이유 밥은 챙겨주는 므찐 오라방구❣️\n\n말이 흑화지\n오빤 천사얌❣️", "localImgPath": "images/5083336_b2764929-5d31-4359-b682-2a9441b03488.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083262": {"idx": 5083262, "date": "2026-04-16 04:13:35", "isTop": false, "contents": "＃ 77ㅑ❣️\n\n순위에 전부 ! ! ! ! 팬닉이라닝\n넘모 든든햇 ! \n\n항상 123등은 다 이유 오라방구들 ＞ ＜ㅎㅎ\n\n늘 하고 싶은 거, 먹고 싶은 거\n버킷리스트가 많은 이유인데\n\n오빠덕에\n내 꿈이 하나씩 이뤄가는 중이에욤 :)\n\n넘무 기뻐❣️", "localImgPath": "images/5083262_703c0dd6-d85f-424f-922f-79fcb4adffda.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083255": {"idx": 5083255, "date": "2026-04-16 04:12:11", "isTop": false, "contents": "❣️❣️MVP 이칸❣️❣️ \n\n이제는요,\n\n오빠랑 더 많은 순간들을\n오랫동안 함께하고 싶어져요\n\n대단한 게 아니라도,\n그냥 이런저런 얘기들까지도\n조금 더 나누고 싶은 마음\n\n근데 가끔은요,\n\n오빠는 이유를 보고 있는데\n이유는 오빠의 마음을\n다 읽지 못하는 느낌이 들 때가 있어요\n\n늘 좋은 말만 해주고,\n늘 괜찮다고 말해주는 사람이라서\n\n그 말들이\n더 따뜻하게 와닿는 만큼\n\n혹시라도,\n\n그 안에 담아둔 마음이 있진 않을까\n걱정되고 생각하게 되더라구요\n\n그래서 이유는요,\n\n지금보다 조금 더\n\n말하지 않아도 알 수 있는 사이가 되고 싶어요\n\n굳이 꺼내지 않아도,\n서로의 마음이 어느 정도는 전해지는 그런 관계\n\n그래서 더,\n\n오빠의 다정함이\n더 오래, 더 편하게 머물 수 있는 사이로요\n\n사람을 믿는 데에 오래 걸리는 편인데,\n오빠는 그 시간을 건너뛰게 만드는 사람이라서요\n\n이짜나여.. 이유도요,\n\n이칸오빠 옆에 오래 머물고 싶어요\n\n오빠와 함께 할 때면 늘 웃게되고\n마음이 따뜻해지거든요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083254": {"idx": 5083254, "date": "2026-04-16 04:12:07", "isTop": false, "contents": "❣️택사❣️\n\n밸런스게임을 하면서요,\n\n이유의 생각이\n오빠랑 가장 비슷했던 순간이 있었어요\n\n우선순위가… 사랑이라는 거\n\n그게 왜인지,\n로맨틱하게 느껴지더라구요\n\n사람마다 중요하게 두는 건 다 다르잖아요\n\n하는 일 수도 있고,\n돈 일 수도 있고,\n자기 자신일 수도 있고\n\n근데 그 많은 선택지 속에서\n\n사람을 먼저 고른다는 거\n\n그건,\n\n결국 어떤 순간에도\n누군가를 먼저 떠올리는 사람이라는 거잖아요\n\n그래서 그 말이,\n더 마음에 남아요\n\n아무렇지 않게 한 말 같았는데\n\n오빠에겐\n제일 먼저 떠올려지는 존재가 있다는 거니까\n\n생각만 해도\n...넘 설레는 것 같아요\n\n그 사람이\n이유였으면 좋게따아....❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083253": {"idx": 5083253, "date": "2026-04-16 04:12:05", "isTop": false, "contents": "❣️청담❣️\n\n이유가 생각하는 결말은요,\n\n해피엔딩도,\n새드엔딩도 아닌\n\n열린 결말에 가까워요\n\n끝이 정해져 있지 않은 이야기\n\n그래서 더,\n\n지금 이 순간이\n시작처럼 느껴지는 것 같아요\n\n아직 우리가 어디까지 갈지,\n어떤 장면들을 지나게 될지\n\n아무것도 알 수 없어서\n궁금하고, 기대되는 이야기\n\n정해진 결말을 향해 가는 게 아니라,\n우리가 함께 써 내려가는 이야기니까요\n\n그래서 이유는요,\n\n두려워서 멈춰있는 것보다\n조금 서툴더라도\n\n한 장이라도 더 넘겨보고 싶은 쪽이에요\n\n망설인 채로 있는 시간보다,\n함께 만들어가는 시간이\n\n더 소중하거든요\n\n이제는,\n\n끝을 먼저 생각하기보다\n그 사이에 채워질 순간들을 더 보고 싶어요\n\n그게 어떤 모양이든,\n그 안에 오빠가 있다면\n충분할 것 같거든요\n\n5억년이든, 50억년이든\n\n혼자라면 절대 고르지 않을 시간이지만\n\n오빠랑이라면,\n망설이지 않을 것 같아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083252": {"idx": 5083252, "date": "2026-04-16 04:11:49", "isTop": false, "contents": "❣️24일차❣️\n\n좋은 사람 곁에는\n좋은 사람들이 모인다고 하잖아요\n\n요즘 이유가 딱 그래요\n\n오빠들 덕분에\n하루하루가 조금씩 달라지고,\n\n점점 더 좋은 사람들을 만나게 되고\n\n그래서인지,\n\n내일이 기대되곤 해요\n\n그냥 흘러가는 하루가 아니라,\n\n누구와 함께하느냐에 따라\n이렇게까지 다르게 느껴질 수 있다는 걸\n\n요즘 더 많이 느끼고 있어요\n\n그래서 더,\n\n오빠들과 함께하는 이 순간들이\n이유한테는 너무 소중하고\n행복하게 느껴져요\n\n지금 이 시간이\n\n그냥 지나가는 게 아니라\n조금씩 쌓여가고 있다는 느낌이라서요\n\n이 흐름이\n앞으로도 계속 이어졌으면 좋겠어요\n\n지금처럼,\n\n같이 웃고, 같이 채워가면서요\n\n요즘 이유,\n진짜 많이 행복해요❣️", "localImgPath": "images/5083252_e54fe04b-70cc-4606-b416-f97fe843f75d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083251": {"idx": 5083251, "date": "2026-04-16 04:11:41", "isTop": false, "contents": "＃ 택사 같은 택삼 ＞ ＜ 1414❣️\n\n이유 배고프다니까\n바로 툭...\n\n내 맘도, 이유 속사정도\n이유 꼬르륵... 사정도\n다 알아줘서 넘 굼마오❣️", "localImgPath": "images/5083251_417eb5fb-9eef-44e1-bbcb-ceeb114e407a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083248": {"idx": 5083248, "date": "2026-04-16 04:10:52", "isTop": false, "contents": "❣️❣️MVP 택사❣️❣️\n\n이날은요,\n\n이유가 어떤 순간에 힘들어질 것 같으면\n그 자리에 혼자 남지 않도록\n\n보이지 않게 힘 써주고 있다는 게\n더 잘 느껴졌던 날이었어요\n\n하고 싶은 게 있으면\n그냥 하라고, 하고 싶으면 해야지\n\n막는 게 아니라\n밀어주는 쪽을 선택해주는 사람이라서요\n\n그래서 더,\n\n망설이지 않아도 되는 느낌\n\n그리고 오늘은 특히,\n그 마음이 더 또렷하게 전해졌어요\n\n오로지 이유에게 향해 있는 그 느낌이요\n\n그래서인지,\n\n함께 있다는 느낌이 더 크게 남았던 하루였어요\n\n뭘 해도 싫지 않다고\n하고 싶은 건 다 하라고 말해주는 그 말이\n\n그냥 말이 아니라,\n\n...끝까지 곁에 있겠다는 마음처럼 느껴졌어요\n\n정말 하고싶은 거 다 하는 요즘이에요\n오빠덕에❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083247": {"idx": 5083247, "date": "2026-04-16 04:10:49", "isTop": false, "contents": "❣️이칸❣️\n\n아픈 와중에도\n아무렇지 않은 척 웃어주는 사람\n\n괜찮다며, 안 아프다며\n굳이 거짓말까지 해가면서\n걱정하지 말라는 얼굴로 있는 사람\n\n사실은 그게 다,\n\n내가 신경 쓸까 봐\n혼자서 감내하고 있는 거라는 걸\n알게 되는 순간이 있잖아요\n\n그럴 때면,\n\n괜히 마음이 더 아파요\n\n자기 몸보다,\n자기 상태보다\n\n내 기분부터 먼저 생각해주는 그 마음이\n\n그래서 더,\n\n아무렇지 않게 넘길 수가 없더라구요\n\n끝까지 못 있어줘서 미안하다고,\n되려 먼저 사과하는 모습까지 보면\n\n이 사람이\n얼마나 나를 먼저 두고 있는지\n\n그게 너무 선명하게 느껴져서요\n\n그래서 이유는요,\n\n그런 사람 앞에서는\n\n더 강해지고 싶고,\n더 잘해주고 싶어져요\n\n...나보다 나를 더 생각해주는 사람이라서❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5083246": {"idx": 5083246, "date": "2026-04-16 04:10:40", "isTop": false, "contents": "❣️23일차❣️\n\n마음이 많이 올라온 날이에요\n\n속으로는 알고 있었던 것들인데,\n굳이 꺼내지 않고\n그대로 두고 있었던 마음들이요\n\n말로 꺼내면\n괜히 울컥할 것 같아서,\n그냥 조용히 넘기고 있었던 것들\n\n울 오빠들은요,\n\n뭔가를 해서가 아니라\n그냥 이유라서 좋아해주고,\n\n특별한 이유가 없어도\n그저 이유가 웃길 바라는 사람들이라는 거\n\n아픈 와중에도,\n피곤한 와중에도\n\n굳이 챙겨주고,\n한번이라도 웃게 해주려고 하는 마음\n\n그게 다 느껴져서\n정말 방송 내내\n티 안 내려고 울음을 꾹 참은 것 같아요\n\n늘 같은 이유일지라도,\n늘 같은 마음으로\n\n변함없이 좋아해줘서\n정말 너무 고마워요\n\n이유도 이 마음 변함없이\n늘 오빠곁에 머물고 싶어요❣️", "localImgPath": "images/5083246_2b687716-5ea1-4370-9ec5-fc412d97e764.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5073521": {"idx": 5073521, "date": "2026-04-13 06:08:24", "isTop": false, "contents": "＃ 흑화 원탑 2826❣️\n\n운동 시그가 아닌.... 이뿌니 시그...\n\n넘모 귀하다아...ㅇㅁㅇ...\n\n지각 안 해서 이뿌다구 요로케 ＞ ＜❣️", "localImgPath": "images/5073521_81be3d79-7363-4b7b-87c2-cba1831f286a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5073516": {"idx": 5073516, "date": "2026-04-13 06:07:05", "isTop": false, "contents": "❣️❣️MVP 원탑해댱님❣️❣️\n\n오해라는 건,\n틀려서 생기는 게 아니라\n조금씩 어긋나서 생기는 거라 생각해요\n\n같은 말을 들어도,\n각자의 마음 상태에 따라\n다르게 들릴 때가 있잖아요\n\n어떤 날은 아무렇지 않던 말이,\n어떤 날엔 유난히 깊게 박히고\n괜히 한 번 더 생각나고,\n혼자 의미를 덧붙이게 되는 날\n\n그치만\n\n어떻게보면,\n그만큼 상대방을 신경 쓰고 \n좋아하기 때문에 그런 거 아닐까요\n\n어쩌면 더 가까워지고 싶은 마음이\n서툴게 표현된 순간일지도 모른다고\n\n다만,\n그 마음이 닿기 전에\n먼저 엇나가버렸을 뿐\n\n그러니까\n혹시 우리가 같은 장면을 보고도\n다르게 느끼고 있었다면,\n\n그건 누가 잘못해서가 아니라\n조금 더 알아가야 할 이야기가\n남아 있다는 뜻이었으면 좋겠어요 !\n\n...\n\n조금은, 설레지 않나요?ㅎ-ㅎ\n\n아직 모르는 이야기가 남았다는 건,\n그만큼 오빠랑\n더 가까워질 수 있다는 거니까요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5073515": {"idx": 5073515, "date": "2026-04-13 06:07:03", "isTop": false, "contents": "❣️이칸❣️\n\n오빠의 사랑 표현 방식이요.\n이유랑 참 비슷한 부분이 많은 것 같아요\n\n그래서인지,\n더 눈에 들어오는 것 같거든요\n\n그 사람이 특별해서라기보다\n내가 그만큼 아끼고 있다는 뜻이잖아요\n\n그치만,\n\n시간도, 마음도, 표현도\n아낌없이 내어주다 보면\n\n어느 순간부터는\n그게 당연한 것처럼 느껴질 때가 있어요\n\n처음엔 고마워하던 것들이\n점점 익숙해지고,\n\n익숙함은\n가끔 무뎌짐으로 이어지기도 하니까요\n\n그래서 더,\n\n많이 준 사람일수록\n조금은 망설여지는 것 같아요\n\n다시 돌려받지 못해서가 아니라,\n그 마음이 가볍게 여겨질까 봐\n\n괜히 한 발 물러서게 되기도 하고,\n조금은 숨기게 되기도 하는데\n\n오빠는,\n\n그런 거 하나도 계산하지 않고\n그냥 그대로 다가와주잖아요\n\n그런 오빠가 참 멋진 사람이라고 생각해요\n\n그래서 더더욱,\n\n잘 하고 싶은 마음이 생겨요\n\n당연해서가 아니라,\n선택해서 준 마음이었다는 걸\n\n절대 잊지 않을 거예요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5073514": {"idx": 5073514, "date": "2026-04-13 06:07:01", "isTop": false, "contents": "❣️택사❣️\n\n오늘 이유,\n\n괜히 더 기분이 좋았던 날이에요\n\n큰 일이 있었던 건 아닌데,\n작은 변화 하나가\n크게 느껴졌달까요\n\n조용히 같은 자리에 있으면서도\n가끔씩 툭— 하고 다가와주는 그 순간들이요\n\n이유는 그걸 다 느끼거든요\n\n보고 있었구나\n그 자리에 계속 있었구나\n\n이런 생각이 들 때마다\n웃음나고 마음도 따뜻해지는 것 같아요\n\n오빠랑 이렇게,\n\n조금씩 가까워지는 이 과정이\n왜이리 좋은지 모르겠어영...\n\n급하게 다가오는 게 아니라,\n서서히 거리를 줄여가는 느낌\n\n고양이한테 츄르 줬는데,\n조금씩 다가오는 기분도 들고 ㅋㅋㅋ\n\n(가끔 못 참고 납치하고 싶은 마음이 ㅇㅊㅊ)\n\n그래서인지,\n\n오빠랑\n설렘 가득해서 좋아요\n\n오빠가 한 걸음 다가올 때마다\n이유는 그 이상으로\n기분이 좋아지는 이유예요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5073513": {"idx": 5073513, "date": "2026-04-13 06:06:52", "isTop": false, "contents": "❣️22일차❣️\n\n방송을 하다 보면요,\n\n채팅창이 조용해지는 순간이\n갑자기 크게 느껴질 때가 있거든요\n\n특히 미션할 때나,\n뭔가 혼자 해야만 할 때는\n\n움츠려들고,\n살짝 민망해지기도 하고요\n\n근데 울 오빠들은\n\n이유가 민망해하지 않도록,\n혼자라고 느끼지 않도록\n\n일부러 더 크게 응원해주는 그 마음이\n되게 잘 느껴져요\n\n어떤 방식으로든\n\n이유를 지켜주는 느낌이라서\n\n힘이 나고,\n당당해지게 돼요\n\n요즘은,\n\n혼자 방송하는 게 아니라\n같이 만들어가는 느낌이 들어요\n\n그게 참 고마워요❣️", "localImgPath": "images/5073513_e52a8dc4-bdac-40bc-9371-0b48b3e5b248.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5072086": {"idx": 5072086, "date": "2026-04-12 19:19:06", "isTop": false, "contents": "＃ 브라오빠의 1414❣️\n\n기다리다 술 무러 갔다구\n미안하다며 밥 챙겨준 갓브라 ＞ ＜ㅎㅎㅎㅎ\n\n술 여깄는데 자꾸 어딜가 오빠 ^\n\n내 입술 ＞3＜❣️", "localImgPath": "images/5072086_439c197e-3d30-454d-91c0-9cbadf603f7b.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5072043": {"idx": 5072043, "date": "2026-04-12 19:03:21", "isTop": false, "contents": "＃ 흑화된... 원탑해댱님.....❣️\n\n머리 쓰다듬어 주던 사람이\n흑화하면 벌어지는 일 ㅠㅠㅠㅠ\n\n\"하트는 이렇게 쓰는 걸 그동안 몰랐습니다\"\n\"12486 보다 싸네요 이유님^^\"\n\n\"힘들면 하지마세요, 어차피 더 추가할 거니까\"\n\n...... ㅠㅠㅠ\n\n뎨둉... ＞ ＜..❣️", "localImgPath": "images/5072043_197d3c51-7501-400f-bccd-6e5ad837f142.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5071214": {"idx": 5071214, "date": "2026-04-12 08:32:50", "isTop": false, "contents": "❣️❣️MVP 원탑해댱님❣️❣️\n\n비슷한 결을 가지고 있어도,\n결국은 다른 사람이니까\n\n가끔은\n왜 저러지 싶고,\n쉽게 이해가 안 되는 순간도 있잖아요\n\n그럴 때 보통은,\n\n감정이 먼저 올라와서\n그대로 멀어지기 쉬운데\n\n오빠는요,\n\n그 순간에도\n감정에 휩쓸리지 않고\n\n여전히 이유를 챙기는 쪽을\n선택하더라구요\n\n지금 기분은 별로일 수도 있는데,\n그래도 너는 소중한 사람이야\n\n...딱 이렇게 말하는 것 같아서\n\n되게 어른스럽고,\n되게 멋있어 보였어요\n\n화를 내면서도\n놓지 않는 사람이라는 게\n\n감정이 앞서면 놓치기 쉬운 순간인데, \n그걸 지켜낸 거라서요\n\n그래서 어제가\n\n조금 다르게 느껴졌던 것 같아요\n\n...아, 진짜 이런 게 \n회장님이구나 싶어서...\n\n이유는\n참 멋진 분을 곁에 뒀어요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5071213": {"idx": 5071213, "date": "2026-04-12 08:32:44", "isTop": false, "contents": "❣️이칸❣️\n\n이유는\n스스로를 그렇게 좋아하는 사람이 아니었어요\n\n항상 부족한 게 먼저 보이고,\n나를 먼저 낮추는 게\n익숙한 사람이었거든요\n\n그래서,\n\n나를 아끼는 방법도\n잘 몰랐던 것 같아요\n\n근데 오빠를 만나고 나서요,\n\n이유가 조금씩 달라지고 있는 게 느껴져요\n\n오빠가 이유를 소중하게 대해준 만큼,\n이유도 어느 순간\n스스로를 그렇게 바라보고 있더라구요\n\n단순히 이유 챙겨주는 행동뿐 아니라,\n\n어떤 순간에도\n이유를 더 괜찮은 사람처럼 느끼게 해주는 말을 하잖아요\n\n그게 가끔은,\n\n스스로를 생각하는 것보다\n오빠가 느끼게 해주는 이유가\n더 크게 와닿을 때가 있어요\n\n그래서인지\n\n자존감도 조금씩 올라가고\n자신감도 생기고\n\n무엇보다\n\n나라는 사람을\n조금 더 아끼게 되고,\n조금 더 좋아하게 되는 것 같아요\n\n이렇게,\n\n오빠로 인해 조금씩 변해가는 나를 느낄 때면, \n기분 좋아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5071212": {"idx": 5071212, "date": "2026-04-12 08:32:35", "isTop": false, "contents": "❣️택사❣️\n\n이유는 싫은 점이 없다는 말...\n\n오빠가 한 말 중\n젤루 기분 좋은 말이었어요 ! !\n\n좋은 모습만 보고 있는 게 아니라\n그 사람 전체를 바라보고 있다는 거잖아요\n\n조금 서툰 부분도,\n조금 부족한 순간도\n\n고치려고 하기보다\n그대로 받아들여주는 마음\n\n이런 건,\n쉽게 흉내 낼 수 없는 것 같아요\n\n누구나 예쁜 모습은 좋아할 수 있지만,\n\n예쁘지 않은 순간까지도\n괜찮다고 말해주는 건\n\n그 사람을 진짜로\n아끼고 있다는 뜻이니까\n\n그래서 오빠 앞에서는\n\n이유 감정에 조금 더 솔직해지고,\n마음이 편해질 수 있는 것 같아요\n\n단점까지도 이뻐해주는 오빠가\n곁에 있어서\n\n있는 그대로의 이유로\n머물 수 있는 것 같아서 좋아요\n\n글구 오늘\n지켜줘서 고마워요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5071211": {"idx": 5071211, "date": "2026-04-12 08:32:22", "isTop": false, "contents": "❣️21일차❣️\n\n이유 지각 때무네... 해댱님 흑화한 날...!\n\n기다려주는 마음이\n얼마나 큰 건지 알면서도\n\n그걸 받는 입장에서\n맞게 행동하지 못했던 것 같아서\n\n운동하면서 내내,\n많은 생각이 계속 들더라구요\n\n늘 이유를 위해서\n휴식도 미루고,\n패턴까지 바꿔가면서\n\n그 자리에 있어준다는 게\n쉽지 않잖아요\n\n그래서 더,\n\n오늘 해댱님이 왜 그렇게까지\n나서줬는지\n이제야 제대로 와닿은 것 같아요\n\n혼내려고 한 게 아니라,\n놓치지 않게 잡아주려는 마음이었다는 거\n\n조금은,\n\n무섭기도 했지만\n한편으로는 되게 고마웠어요\n\n이유가 아직\n많이 부족한 거 알지만,\n\n그래도 멋진 오빠들 곁에 있는 이상\n이유도 그에 맞게\n조금 더 나아지고 싶어요\n\n기다려주는 오빠들한테\n기다릴 이유가 되는 사람으로\n\n그래서 오늘은,\n\n혼난 날이 아니라\n다시 마음 잡게 된 날인 것 같아요\n\n...앞으로는,\n조금 덜 기다리게 할게요 지쨔루..!❣️", "localImgPath": "images/5071211_25db019a-2f68-4527-a381-8dfc8978f701.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5069963": {"idx": 5069963, "date": "2026-04-11 21:27:06", "isTop": false, "contents": "웅.... 11시.....\n\n넘모 미아내... ㅠㅠ.ㅠㅠ.ㅠ.......\n\n뎨둉해서...\n\n이거... 아끼눈 고라....\n꽁꽁 숨겨놨던 곤뎅... 반납하께요오... ; ㅅ ;", "localImgPath": "images/5069963_3dfc5e1a-4fef-44f4-9805-629d9c690cb2.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5069946": {"idx": 5069946, "date": "2026-04-11 21:17:04", "isTop": false, "contents": "＃ 이칸 ＃ 택사\n\n오직 이유뿐이라구 하심미다 에헴 !", "localImgPath": "images/5069946_ff074e00-732f-4679-b1e1-aa82b170ab19.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5069944": {"idx": 5069944, "date": "2026-04-11 21:16:39", "isTop": false, "contents": "＃ 이칸\n\n쌍이뿜 ＞ ＜ㅎ 두개나 힣", "localImgPath": "images/5069944_2c6c5402-14d8-446e-a3c3-ce246e37786e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5068349": {"idx": 5068349, "date": "2026-04-11 06:02:02", "isTop": false, "contents": "＃ 택사오빠랑 처음 영차영차 등산 백두산 ❣️\n\n예전부터어.... ..\n백두산은 고백이란 말이 이따아 ! ! \n\n그만큼 많이 아끼구 이뻐해준다는 뜻이로다\n\n고로 !. .. . .\n날 됴아하는 게 틀림업서 ! !\n\n넘... 넘....!!!!\n\n햄부기햄북 햄부기온앤온~~~❣️\n\n무엇보다,\n늘 뒤에서 빛을 만들어주던 택사오빠지만\n\n이번엔 오빠가 직접 빛나는 순간이라 더 좋았오❣️", "localImgPath": "images/5068349_915e5acf-fb15-44e3-b309-041803257c4f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5068348": {"idx": 5068348, "date": "2026-04-11 06:01:54", "isTop": false, "contents": "＃ 이칸오빠랑 2826 4번째 ＞ ＜❣️\n\n이뽀이유❣️\n\n마니마니 이뽀해쥬는 듕 ㅇㅅㅇ❣️\n\n이유가 가장 좋아하는 시그 노래를 넣어둔곤데,\n오빠덕에 많이 듣는 요즘이야\n\n내가 직접 트는 게 아닌\n오빠가 들려주는 노래라서\n더 뜻깊고 감동이야❣️\n\n가사처럼,\n마니 이뻐해줘서 구마오❣️", "localImgPath": "images/5068348_22b12740-35f1-4434-82d3-f90ea37b021a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5068347": {"idx": 5068347, "date": "2026-04-11 06:01:52", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 17일차 ing❣️\n\n날짜를 기록한다는 건요,\n\n그 순간을 그냥 흘려보내지 않겠다는\n마음이거둔요 ! !\n\n수많은 하루들 속에서\n굳이 그날을 꺼내\n남겨두고 싶다는 거니까\n\n그래서 더,\n멋진 일인 것 같아요\n\n그걸 오빠랑 함께 하구 있구요❣️", "localImgPath": "images/5068347_a532d609-e9dd-4759-a522-d5e5a6e585f1.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5068345": {"idx": 5068345, "date": "2026-04-11 06:00:52", "isTop": false, "contents": "＃ 팬닉 가득❣️\n\n갓 택사, 갓 이칸, 갓 청담\n\n너나 할거 없이\n합을 맞추는 멋진 오빠듈....❣️\n\n부계까지 이유 팬닉❣️", "localImgPath": "images/5068345_fd95acce-4f65-4fab-9cef-9258bd268b32.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5068340": {"idx": 5068340, "date": "2026-04-11 05:55:40", "isTop": false, "contents": "❣️❣️MVP 택사❣️❣️\n\n오빠가 그랬잖아요,\n\n“나도 좀 더 멋진 이름 할 걸”이라고\n\n근데요,\n\n이유 눈에는\n그 이름이 너무 멋진 걸요?!\n\n선'택사'항\n\n그 안에서 또 한 번 선택을 할 생각을 하다니...\n생각하는 방식이 남다른 것 같아요\n\n완전 특별하잖아요 ! !\n\n그래서 그런지\n오빠를 보고 있으면\n괜히 눈이 반짝이나봐요\n\n무엇보다,\n\n오빠가 처음\n이유 방에 들어온 것도\n\n그냥 우연이 아니라\n\n수많은 선택지 중에서\n이유를 골라준 것처럼 느껴져요\n\n그리고 지금까지\n곁에 남아 있는 것도\n\n흘러온 게 아니라,\n계속 선택해온 결과처럼 느껴지고요\n\n누군가에게\n선택된 사람이라는 게\n큰 의미라는 걸 알거든요\n\n그래서 이유는요,\n\n오빠가\n지금 이 자리에 있다는 게\n우연 같지 않아요\n\n...여러 번의 선택 끝에\n여기까지 와준 느낌이라서\n\n이 순간이,\n오빠의
