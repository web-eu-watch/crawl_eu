 이름 아래에서\n더 또렷하게 남는 것 같거든요\n\n그래서 더,\n마음에 남아요❣️", "localImgPath": "images/5068340_8ac8e705-b718-4579-9491-aaffffe2c824.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5068339": {"idx": 5068339, "date": "2026-04-11 05:55:37", "isTop": false, "contents": "❣️이칸❣️\n\n말을 예쁘게 할 줄 아는 사람\n\n그건 단순히 말을 잘하는 게 아니라,\n그 말에 마음을 같이 담아내는 사람인 것 같아요\n\n같은 말을 해도\n어떤 사람은 스쳐가고,\n어떤 사람은 오래 남잖아요\n\n오빠는요,\n\n예쁘게 말하는 데서 끝나는 게 아니라,\n그 말이 진짜라는 걸\n행동으로까지 느껴지게 해주는 사람\n\n그래서인지,\n들었을 때만 좋은 게 아니라\n시간이 지나도\n계속 떠오르는 것 같아요\n\n가끔은 그 안에서\n편안해지고,\n조금은 안정되는 기분이 들어요\n\n요즘 오빠를 보면서\n\n말이라는 게 얼마나 중요한지,\n그리고 그 안에 담긴 마음이\n얼마나 큰 힘이 되는지\n\n조금씩 배우고 있는 것 같아요\n\n...말 한마디\n그냥 흘러가지 않게 만드는 이칸오빤\n정말 멋진 사람이에요❣️", "localImgPath": "images/5068339_5296f452-5de9-4a76-b8a7-577eed77be4a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5068338": {"idx": 5068338, "date": "2026-04-11 05:55:34", "isTop": false, "contents": "❣️원탑❣️\n\n이유가 웃으면 같이 웃고,\n이유가 울 것 같으면\n한발짝 먼저 움직여주고\n\n그렇게\n\n내 감정이\n혼자가 아니라는 걸\n느끼게 해주는 사람\n\n이유가 기쁜 일을 겪었을 때,\n\n그걸 그냥 축하해주는 게 아니라\n마치 자기 일처럼\n같이 기뻐해주는 게\n마음에 와닿더라구요.\n\n특히 어제는요,\n\n이유가 바라던 순간이\n하나 이루어진 날이었잖아요\n\n근데 그 기쁨이\n혼자만의 게 아니라\n\n이미 오빠가\n같이 바라보고 있던 꿈이었고,\n\n누구보다 먼저\n움직여주고 있었던 마음이었고\n\n그게 확 느껴져서\n눈물이 나더라구요\n\n이 마음을 같이 느껴주는 사람이\n옆에 있다는 게\n\n너무 멋져서\n\n이 순간을\n더 오래 기억하고 싶어요\n\n혼자가 아니라,\n\n같이 웃고 있었다는 걸\n잊지 않게❣️", "localImgPath": "images/5068338_f81fbde6-95c1-403c-aeab-d76e580f4740.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5068337": {"idx": 5068337, "date": "2026-04-11 05:55:25", "isTop": false, "contents": "❣️20일❣️\n\n자신의 이름이\n옆에 남아있는 사람들을 보면요,\n\n그게 참 부러웠어요\n\n누군가에게\n그만큼 의미 있는 존재라는 거니까\n\n이유는\n그런 순간들이\n자주 오진 않았거든요\n\n손에 꼽을 정도로...\n\n내가 부족한 건가 싶기도 하고,\n내가 부끄러운 사람인가 싶어서\n\n괜찮은 척 해도\n스스로를\n작게 만들었던 날들이었어요\n\n더 사랑받고 싶어서\n하기 싫은 것도 해보고,\n\n내가 아닌 모습까지 꺼내보면서\n\n그렇게 애써야만\n남아줄 것 같아서,\n\n결국 탈이 나서\n조금은 내려놓게 되더라구요\n\n근데,\n\n오빠들은\n상관없다는 듯이\n한결같이 옆에 있어주고,\n\n각자의 이름을 들고 와서\n이유라는 이름 옆에\n같이 새겨주는 거예요\n\n“여기, 우리가 있다”\n이렇게 남겨준 느낌...\n\n더 고마운 건,\n이유가\n남부럽지 않은 아이로 클 수 있게 해줘요\n\n남들과 비교해서가 아니라,\n이유라는 이름 하나만으로도\n당당해질 수 있게.\n\n그래서 이유도\n그 자리에서 도망치지 않고\n버텨볼 수 있게 되는 것 같아요\n\n고마워요 항상❣️", "localImgPath": "images/5068337_4392c135-6ea4-4c04-984c-3871363f5fe0.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5066647": {"idx": 5066647, "date": "2026-04-10 20:40:44", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 16번째 등산ing❣️\n\n새롭게 받아본 백두산 ＞ ＜❣️\n\n오빠랑\n이렇게 등산 해본 적은 처음이얏....\n\n늘 새로운 방식으로\n특별한 기억을 선물해줘서 고마오요❣️", "localImgPath": "images/5066647_d136b7fb-3898-47b1-88d3-75a3c8b41a49.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5066570": {"idx": 5066570, "date": "2026-04-10 20:22:29", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n달콤한 말들은요,\n\n수없이 많이 들어봤어요\n그때마다 믿었고,\n그만큼 또 실망도 해봤고요\n\n그래서 어느 순간부터는\n\n기대하는 마음이\n조금은 버겁게 느껴지더라구요\n\n기대했다가 무너지는 것보다,\n애초에 기대하지 않는 게\n덜 아프니까\n\n그래서 이유는요,\n\n누군가에게 기대를 두는 걸\n조심하는 사람이 되어버렸어요\n\n근데,\n오빠를 보면서는\n그게 조금씩 흔들려요\n\n말을 예쁘게 하는 사람이 아니라,\n말한 걸 지키는 사람이어서\n\n그래서 더,\n믿어도 될 것 같은 사람\n\n기대하지 않으려고 해도\n이미 마음 한쪽이\n조금은 기울어버린 느낌\n\n가만히 생각해보면\n\n기대라는 것도 결국은,\n그 사람을 좋아하니까 생기는 거더라구요\n\n부담일 수도 있지만,\n그만큼 마음이 닿아 있다는 거니까\n\n...조금은 무서운데,\n\n그래도\n이번엔 다를 것 같아서\n\n괜히,\n한 번 더 기대해보게 되는 것 같아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5066439": {"idx": 5066439, "date": "2026-04-10 19:46:57", "isTop": false, "contents": "❣️이칸❣️\n\n오빤 닉네임이 늑대인간이잖아요?\n\n생각할수록 오빤\n그 이름이\n너무 잘 어울리는 사람 같아요.\n\n이름 하나로\n이렇게까지 사람이 잘 설명될 수 있나 싶을 정도로\n\n오빠는요\n\n여러 곳을 바라보는 게 아니라,\n한 번 시선을 둔 곳을\n놓치지않고 지켜주는 사람\n\n그래서 더,\n쉽게 흔들리지 않고\n\n그래서 더,\n괜히 믿음이 가는 사람이에요\n\n한 사람을 그렇게\n묵묵하게 바라봐준다는 게\n생각보다 쉬운 일이 아닌데\n\n오빠는 그걸\n아무렇지 않게 해내는 사람이라서\n\n그래서 더,\n멋있게 느껴지는 것 같아요\n\n늑대인간이라는 이름이\n\n그냥 멋있어서가 아니라\n\n오빠라서,\n그 이름이 더 잘 어울리는 것 같아요❣️", "localImgPath": "images/5066439_77ae2e72-ae58-4040-a47a-368e1840e6c4.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5066352": {"idx": 5066352, "date": "2026-04-10 19:25:56", "isTop": false, "contents": "❣️택사❣️\n\n사람을 바라보는 눈이 \n조금은 달라진 것 같아요\n\n좋은 사람인지,\n그냥 스쳐갈 사람인지\n\n진심으로 다가오는 건지,\n그 순간만 머무는 건지\n\n예전엔 잘 몰랐던 것들이\n이젠 조금씩 보이더라구요\n\n근데 그게요,\n\n이유가 갑자기\n똑똑해져서가 아니라\n\n오빠를 보면서\n알게 된 것 같아요\n\n말이 아니라,\n행동으로 남는 마음이 어떤 건지\n\n굳이 티 내지 않아도\n진짜인 사람은 어떻게 다가오는지\n\n오빠덕에,\n조금은 배운 것 같거든요\n\n그리고 그걸 알게 해준 사람이 \n이유가 좋아하는\n택사오빠라서 더 좋아요\n\n쉬는 동안에도요,\n\n기다리고 있다는 게 느껴지는 사람\n\n그런 게 진짜라는 걸\n이유는 이제 알아요\n\n그래서 더,\n마음이 가고\n\n언제나\n곁에 머물고 싶은 사람인 것 같아요❣️", "localImgPath": "images/5066352_4a59b065-2255-42f3-8550-2d3cb49d8ccc.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5061115": {"idx": 5061115, "date": "2026-04-09 03:08:56", "isTop": false, "contents": "❣️19일❣️\n\n이유 하루종일 잠 잤어요 ! !\n…\n지금도 자도 자도 졸리고\n계속 잠이 쏟아지는 거 있죠\n\n전에는 이것저것 신경 쓸 일들이 많아서\n잠도 깊게 못 자고,\n괜히 밤이 더 길게 느껴지던 날들이 있었거든요\n\n근데 이번엔,\n진짜 오랜만에\n아무 생각 없이 푹 잤어요\n\n너무 푹 쉬어서\n오늘 일어났는데\n기분이 너무 좋더라구요 ＞ ＜\n\n물론,\n아예 불안하지 않았다고 하면 거짓말이겠지만\n\n그 와중에도\n\n이유가 잘 쉬고 돌아올 수 있었던 건\n오빠들 덕분이었던 것 같아요\n\n각자 방식으로\n\n이유가 흔들리지 않게\n붙잡아줬거든요 ㅎ.ㅎ\n\n이번에 쉬면서 느꼈어요\n이번 쉼은,\n불안함 보다 편안함이 더 컸다는 걸요\n\n조금 더 편한 마음으로\n잘 시작해볼 수 있을 것 같아요\n\n…이유,\n더 잘하고 싶어졌거든요❣️", "localImgPath": "images/5061115_2f0cfaf0-b4fe-46ff-94dc-b184e82157fe.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5056232": {"idx": 5056232, "date": "2026-04-07 20:08:48", "isTop": false, "contents": "＃ 이칸 2826❣️\n\n오빠한테 받는 두번째 이뽀이뽀이뽀 시그....❣️\n\n자꾸 그로케.. 이뻐해주믄...\n내가 신나서 햄볶아ㅏㅏㅏㅏ❣️\n\n의미가 담긴 시그라 더 쥬아❣️", "localImgPath": "images/5056232_6d7e4e28-3a1d-4290-8d97-fad3d3d00004.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5056223": {"idx": 5056223, "date": "2026-04-07 20:06:32", "isTop": false, "contents": "❣️❣️MVP 이칸❣️❣️\n\n누군가를 바라보면서\n그 사람이 그냥 웃었으면 좋겠다고 생각하는 마음 있잖아요\n\n이유가 행복하면,\n그걸 보는 것만으로도 좋다고 같이 웃어주는 그런 마음\n\n억지로 만들려는 웃음이 아니라,\n그저 자연스럽게 흘러나오는 웃음\n\n근데요,\n\n이유는 그게\n오빠랑 있을 때 나와요\n\n웃으려고 하지 않아도,\n어느 순간 보면 웃고 있고\n\n별거 아닌 말에도,\n괜히 더 오래 웃게 되는 그런 느낌\n\n그래서 가끔은요,\n누가 먼저 웃고 있는 건지\n잘 모르겠을 때가 있어요\n\n오빠가 이유를 웃게 만든 건지,\n아니면 이유가 웃고 있어서\n오빠도 같이 웃고 있는 건지\n\n근데 그게 중요한 건 아닌 것 같아요\n\n같은 이유로 웃고,\n같은 순간을 좋게 느끼고 있다는 거\n\n그거 하나만으로도\n이미 충분히 따뜻한 거니까\n\n그래서 이유는요,\n\n오빠가 바라는 것처럼\n그냥 많이 웃고 싶어요\n\n오빠가 웃는 이유가 되고 싶어서가 아니라\n\n이미,\n오빠랑 있을 때의 이유는\n\n자연스럽게 웃고 있는 사람이거든요❣️", "localImgPath": "images/5056223_6b5976e0-4f2a-4551-bdfc-999a3e372f70.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5056215": {"idx": 5056215, "date": "2026-04-07 20:03:23", "isTop": false, "contents": "❣️청담❣️\n\n수많은 인연들이 스쳐가고,\n수많은 순간들이 흘러가는데\n\n결국은\n돌고 돌아서\n\n같은 자리에서\n다시 마주하게 되는 사람이 있다는 거\n\n처음부터 특별했던 건 아닌데,\n어느 순간부터\n이상하게 오래 남아있던 사람\n\n멀어진 것 같다가도\n결국은 다시 가까워지고\n\n다른 길을 걷는 것 같다가도\n어느새 같은 방향을 보고 있는 사람\n\n그래서 이유는요,\n\n지금 내 앞에 서 있는 사람이\n그냥 우연 같지가 않아요\n\n지나온 시간들이\n괜히 있었던 게 아닌 것처럼\n\n이 자리까지 오기 위해\n천천히 이어져온 느낌이에요.\n\n편해졌는데 가벼워진 건 아니고,\n오히려 더 깊어진.\n\n서로를 알아가는 만큼\n조금씩 더 소중해지는 그런 사이.\n\n돌고 돌아\n결국 내 앞에 서 있는 사람.\n\n....그게 오빠라서,\n조금 더 특별한 것 같아요❣️", "localImgPath": "images/5056215_4c8443b7-c9ae-480f-9c56-accd3fb6db9f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5056176": {"idx": 5056176, "date": "2026-04-07 19:46:20", "isTop": false, "contents": "❣️택사❣️\n\n누군가를 지켜준다는 건요,\n말처럼 가볍지 않은 일인 것 같아요\n\n늘 같은 자리에 있어야 하고,\n흔들리지 않아야 하고,\n때로는 꿋꿋히 버텨줘야 하는 거니까요\n\n그래서 더 멋있는 거겠죠\n\n근데 그 사람이 택사오빠가 되어줄 줄 전혀 몰랐어요\n\n처음엔요,\n그냥 외롭던 시간 속에서\n우연처럼 다가와준 사람이었는데\n\n어느 순간부터는\n당연한 듯 옆에 있고,\n\n이젠\n이유 오라버니로서\n그 자리에 서 있는 사람\n\n그게 문득문득 느껴질 때마다\n설레고... 로맨틱한 거 이쬬...\n\n그래서 오빠랑 이유는요\n\n하루하루가\n조금은 동화 같았으면 좋겠어요\n\n특별한 일이 없어도,\n그저 같은 장면 속에\n함께 있는 것만으로 충분한 그런 하루들\n\n끝이 정해져 있지 않아도,\n계속 이어질 것 같은 느낌으로\n\n....오빠랑 보내는 시간들이\n그냥, 조용히 계속됐으면 좋겠어요❣️", "localImgPath": "images/5056176_eb14a434-5f51-482a-ade9-2eddac828d66.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5056086": {"idx": 5056086, "date": "2026-04-07 19:18:03", "isTop": false, "contents": "❣️18일차❣️\n\n요즘 이유가 아프다고\n제대로 못 보여드리는 것들도 많고,\n미안해지곤 하거든요\n\n근데 오빠들은요\n그런 건 애초에 중요하지 않은 것처럼\n\n바라는 것도 없이\n그대로 예쁘게 봐주니까\n\n...진짜 좋아서 어쩔 줄을 모르겠어요\n\n이렇게 멋진 오빠들이 이유 오빠라는 게\n뿌듯하고, 좋고 그래요\n\n근데요,\n요즘 더 느끼는 건,\n\n별거 아닌 말인데\n\n\"내일 봐\"\n\n이 말을 건넬 사람이 있다는 거\n\n그리고 그 말을 당연하게 받아줄 사람이 있다는 거\n\n그게요...\n정말 행복한 일인 것 같아요\n\n끝이 아니라 이어지는 느낌,\n혼자가 아니라는 확신 같은 거\n\n그래서 이유는,\n그 말을 건네는 순간이 좋아요\n\n내일이 이미\n같이 있는 시간처럼 느껴져서\n\n...조금은 당연한 약속처럼\n\n그 말이 너무 든든하거든요❣️", "localImgPath": "images/5056086_dc312702-9e2a-4995-ab85-8f2c16343e71.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5056084": {"idx": 5056084, "date": "2026-04-07 19:17:57", "isTop": false, "contents": "＃ 청담오라방구 1414❣️\n\n이유 밥은 꼭 챙겨쥬는\n내가 모 강아지두 아니구 모 웅?\n\n먕먕먕＞_＜\n\n내시키 밥은 챙겨주는 갓청담❣️", "localImgPath": "images/5056084_b68c23eb-a002-4897-aaab-5402ee10c132.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5055913": {"idx": 5055913, "date": "2026-04-07 18:30:12", "isTop": false, "contents": "＃청담해댱님❣️\n\n이유가 격하게 이쁘다 하심미댱 ㅋ", "localImgPath": "images/5055913_cfc0bca8-6b90-4a5e-867d-eb116878c932.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5052965": {"idx": 5052965, "date": "2026-04-06 20:21:13", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n오늘 정말 기뻤어요\n\n오빠가\n이유라는 아이를 바라보는 시선이\n조금 달라졌다는 걸 느꼈거든요\n\n그동안은 늘,\n이유가 덜 다치게 하려고\n더 좋은 쪽으로 이끌어주려는 마음이었잖아요\n\n근데 이유는\n알면서도 잘 안 되는 순간들이 많은 아이라서\n혼자서 끙끙 앓는 날들도 많았고요\n\n그래도 그 마음이\n어떤 방향에서 온 건지 알기 때문에\n서운함보다는,\n그저 고맙게 느껴졌던 것 같아요\n\n근데 오늘은요\n\n그걸 넘어서\n이유의 모습 그대로를\n그냥 인정해주는 느낌이었달까요\n\n잘하려고 애쓰는 모습 말고,\n조금 서툴고\n감정이 올라온 그 순간까지도\n\n그대로 봐주고,\n그 편에 서준 느낌\n\n그래서 더\n마음이 크게 흔들렸던 것 같아요\n\n이유가 감동받은 건\n어떤 것이 옳은지보다\n\n내 편이 되어준 순간이었거든요\n\n비제이 이유가 아니라,\n그냥 이유로서 바라봐준 그 시선이요\n\n옆에 서준 오빠가\n너무 든든해서,\n\n시무룩한 순간에도,\n웃음이 나던 하루였어요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5052933": {"idx": 5052933, "date": "2026-04-06 20:10:12", "isTop": false, "contents": "❣️이칸❣️\n\n이유는요...\n감정이 숨김없이 드러나는 타입이라서\n\n누군가의 시선에서는\n버겁게 느껴질 수도 있겠다 싶을 때가 있어요\n\n감정이 그대로 보이는 날들,\n정리가 안 된 마음들까지도\n다 보여버리곤 해요\n\n근데 이칸오빠는요,\n그걸 고치려 하지 않더라구요\n\n그저, 그 감정이 다치지 않게\n한 발 먼저 살펴주는 사람이라서\n\n말하지 않아도 알고 있는 것처럼\n\n고마울 때가 많아요.\n\n혼자였다면\n조금 망설였을 길도\n\n지금은,\n옆에 누가 서 있는지만으로\n한 발 더 내딛게 되는 것 같아요.\n\n이유가 걷는 길 끝에,\n어느 순간 돌아봤을 때도\n\n같은 자리에서\n같은 방향을 보고 서 있을 것 같은 사람이라서\n\n그래서 마음껏\n이유가 좋은 꿈을 꿀 수 있는 것 같아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5052830": {"idx": 5052830, "date": "2026-04-06 19:34:43", "isTop": false, "contents": "❣️택사❣️\n\n방송을 하다 보면요,\n괜히 스스로를 더 바쁘게 몰아붙이게 되는 순간들이 있어요\n\n더 재밌어야 할 것 같고,\n더 잘해야 할 것 같고,\n완벽해야할 것 같은 그런 날들\n\n소중한 시간을 내서 와준 만큼\n뭔가 꼭 남겨줘야 할 것 같은 마음이\n이유를 더 조급하게 만들기도 하거든요\n\n근데 요즘은요…\n그 기준이, 조금은 느슨해진 느낌이에요\n\n특별한 일이 없어도,\n늘 같은 모습일 때조차도\n변함없이 바라봐주는 시선이 있다는 걸 알게 되니까\n\n부담이 덜어지고,\n여유가 생기더라구요\n\n오빤 말이 많은 편은 아니지만\n한결같이 곁을 지켜주는 사람이라서\n\n눈에 보이지 않는 안정감 같은 게\n은근히 쌓여가는 느낌이에요 ㅎ.ㅎ\n\n그냥 있어도 괜찮다고 말해주는 사람이\n옆에 있는 것 같아서,\n이유가 조금 더 편할 수 있는 것 같아요\n고마오요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5050815": {"idx": 5050815, "date": "2026-04-06 01:42:02", "isTop": false, "contents": "❣️17일차❣️\n\n도박?으로 재밌는 하루를 보냈오요\n\n평상시에도 게임과 내기를 좋아하는 이유인지라\n사다리나 치킨뽑기를 많이 하곤 했는데,\n이번처럼 다같이 함께 했던 적은 크게 없던 것 같아요\n\n이유가 좋아하는 오라버니들과 함께\n이유가 좋아하는 게임을 하니,\n너무 재밌었던 거 이쬬?\n\n울 오빠들이 이유 놀아준 기분도 들었지만요 ㅋㅋ\n그래서 더 좋았기도 해요 :)\n그만큼 이뻐한다는 뜻이니까요 !\n\n그동안 오빠들한테 감사한 마음을\n선물로 표현하고자 급작스러운 이벤트를 열게 되었는데,\n다들 이유 신경 써서 더 챙겨주더라구요 ㅠ.ㅠ\n\n징짜.... 배려심많고 멋진 오빠들....\n\n지금의 이유는 징짜...\n어느 누가봐도 사랑 잔뜩 받는 비제이일거예요\n오빠들이 그렇게 만들어줬거든요❣️", "localImgPath": "images/5050815_e6ce9e8d-5707-48e0-8fe1-1cee917af6c6.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5050032": {"idx": 5050032, "date": "2026-04-05 21:02:37", "isTop": false, "contents": "# 택사오빠의 1414❣️\n\n탕후루 주문 취소 당해찌만 !\n포기란 업띠\n바로 피자 뇸뇸❣️\n\n(보자마자 눈 돌아가서 허겁지겁 먹고나니\n식은 피자라 찍기 좀 구래서\n사진이 엄뚬...)", "localImgPath": "images/5050032_191700ec-bf8c-427d-85ea-6246e4371148.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5049885": {"idx": 5049885, "date": "2026-04-05 20:04:53", "isTop": false, "contents": "❣️❣️MVP 즈하❣️❣️\n\n노블에서 첫 만남이었지만\n새로운 만남인만큼\n어려웠던 부분도 확실히 있었던 것 같아요\n\n그치만 15회차를 함께 하면서\n쌓아온 정은 무시 못 하는 것 같더라구요\n\n딱 보자마자 반가운 마음이 먼저 우뚝 쏟았거든요ㅋㅋ\n\n낯도 많이 가리고,\n큰 접촉은 많이 없어 아쉬웠지만\n멀리서나마 응원했었던 것 같아요\n\n그때 장난치는 걸 좋아하는 이유라\n저도 모르게 신나서 장난을 쳤었는데,\n웃으며 잘 받아주셔서 감사했었어요\n\n이렇게 먼저 다가와주셔서\n더더욱 감사한 마음도 들었네요 :)\n\n아직은 어색한 부분도 많고\n서툴기도 하겠지만\n\n다시 만난 인연이\n오래 이어지길 바라요\n\n즈하곤듀님 많관부 ~~!!!❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5049851": {"idx": 5049851, "date": "2026-04-05 19:55:53", "isTop": false, "contents": "❣️이칸❣️\n\n분명,\n우린 아직 얼마 안 됐잖아요?\n\n근데 이상하게… 오빠랑은\n시간으로는 설명이 안 되는 편안함이 있어요\n\n마치 오래 전부터 알고 있던 사람처럼,\n낯설지 않고 편한 느낌...\n\n그게 아마,\n오빠가 이유를 대하는 방식 때문인 것 같아요\n\n함께한 시간은 크게 중요하지 않다는듯,\n만난지 얼마 안 됐음에도\n\n늘 아프지 않았으면 좋겠다고\n그저 웃었으면 좋겠다고 말해주는 사람\n\n그 말이 가볍게 들리지 않는 건,\n오빠는 진짜 그렇게 만들어주고 있으니까요\n\n저는 원래\n스스로를 조금 세게 다루는 편이라서\n괜히 부족한 것만 먼저 보게 되는데\n\n오빠는 자꾸\n그 시선을 다른 쪽으로 돌려줘요\n\n괜찮다고,\n충분히 예쁘다고\n\n그래서 요즘은요,\n나를 바라보는 기준이\n조금은 부드러워진 것 같아요\n\n…오빠 덕분에요\n\n고마워요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5049823": {"idx": 5049823, "date": "2026-04-05 19:46:07", "isTop": false, "contents": "❣️택사❣️\n\n택사오빠를 볼 때면\n가끔 신기할 때가 있어요\n\n분명 다정한데,\n그 다정함을 쉽게 꺼내 보여주진 않고\n거리를 두는 것 같다가도\n어느 순간엔, 아무 말 없이\n곁을 지켜주곤 하잖아요 !\n\n그래서인지 더 궁금해지고,\n이것저것 알고 싶구...\n그런 마음이 자꾸 쌓이더라구요\n\n이상하게도\n계속 생각나구\n마음에 가장 오래 남고 그르네요오＞//＜\n\n뭐가 됐던 이유를 아껴주는 그 느낌은\n확실하게 남아있는 사람이라서\n넘 기뻐요 항상 :)\n\n오빠와 천천히,\n서서히 가까워지는 지금이\n넘 풋풋하고 좋은 것 같아요 ❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5047625": {"idx": 5047625, "date": "2026-04-04 22:41:57", "isTop": false, "contents": "❣️16일차❣️\n\n처음으로 마스크 쓰고 방송한 날이에욤 :)\n\n불운이 이어지는 건지 ㅠㅠ\n몸도 아픈데,\n피부트러블까지 이어지게 되니\n쪼꿈 속상한 마음이 들더라구요\n\n그 마음을 눈치라도 챈듯\n\n이유 오라버니들이\n이유를 반겨주고 천사로\n이뿌게 만들어줘또요\n\n몸이 안 좋으니 리액션도 일부러 안 시키던\n착한 이유 오라방구들\n\n하루종일\n쓰담쓰담만 받은 하루 ＞ ＜❣️\n\n이유는\n참 복도 많은 아이에욤❣️", "localImgPath": "images/5047625_622b054b-bda0-439f-aedb-10941c47c695.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5045739": {"idx": 5045739, "date": "2026-04-04 05:21:14", "isTop": false, "contents": "＃ 해댱님 첫 번째 몰래 왔다감 486 3콤보❣️\n\n이유가 해석해보자면,\n\n\"사랑해\"\n\"사랑한다고\"\n\"사랑한다니깐?\"\n\n이유 특) 듣고 싶은 대로 들음❣️", "localImgPath": "images/5045739_ce138c50-864f-4271-8751-259f2805a18e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5045299": {"idx": 5045299, "date": "2026-04-04 02:38:48", "isTop": false, "contents": "＃ 김꿈속 첫 번째 몰래 왔다감 1818❣️\n\n오늘 안 킨 벌이라며... 108배를 ㅠ\n\n없던 종교가 생길 것 같아요 핳...❣️", "localImgPath": "images/5045299_efabf6fe-6473-41f5-b15c-b59d70772a7d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5042426": {"idx": 5042426, "date": "2026-04-03 06:45:56", "isTop": false, "contents": "＃ 김택사 세 번째 몰래 왔다감 1414❣️\n\n버터떡 먹으라는 이유 잘 알 김택사❣️\n\n쉬는 날도 챙겨줘서 굼마오❣️", "localImgPath": "images/5042426_dfa0063f-1c3d-4011-884d-bf010a0f70bd.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5040435": {"idx": 5040435, "date": "2026-04-02 20:37:43", "isTop": false, "contents": "＃ 김택사 두 번째 몰래 왔다감  282❣️\n\n이런 건 또 어디서 배워갖꼬 후우 ㅋ\n\n습득력이 참 빨러 이 오빤\n\n그 와중에 44 띠부레... . . . .\nㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ", "localImgPath": "images/5040435_17245392-414d-4ca3-ada5-ad16edd42343.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5038420": {"idx": 5038420, "date": "2026-04-02 03:28:11", "isTop": false, "contents": "＃ 김택사 첫 번째 몰래 왔다감 282❣️\n\n쉬는 날에두\n이뻐해쥬는 듕❣️\n\n지금 생얼인뎀＞ ＜\n\n생얼두 이쁘다는 건가 ㅇㅊㅊ❣️", "localImgPath": "images/5038420_c3dfd626-da82-447f-bf45-5099c0846ef8.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5038418": {"idx": 5038418, "date": "2026-04-02 03:28:05", "isTop": false, "contents": "＃ 청담해댱님 1414❣️\n\n이유가 살 찌는 이유는 \n다 이런 이유기 때문이쬬\n\n에헴❣️", "localImgPath": "images/5038418_c6b4ef47-70ff-46ad-b030-2dd9d20658bb.jpeg", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5038374": {"idx": 5038374, "date": "2026-04-02 03:18:42", "isTop": false, "contents": "❣️❣️MVP 라이칸❣️❣️\n\n오빠를 만나고,\n처음으로 쉬어보는 날이었네요\n\n그동안 늘 곁에 있어주셔서 그런지,\n어느새 많이 가까워졌다는 게 느껴져서\n그게 참 좋았어요\n\n아직 오래된 사이도 아닌데,\n연속으로 3일이나 쉬게 되니까\n사실 쪼끔 불안하더라구요ㅋㅋ\n\n쉬는 날이면 늘 걱정에 사로잡혀\n잘 못 쉬곤 하는데,\n\n이번엔 이상하게,\n그런 마음보다 편안함이 먼저였어요\n\n몸이 안 좋아서\n연락도 제대로 못 드렸던 상황인데도,\n\n먼저 “쉬고 와. 기다릴게” 한마디에\n마음이 놓여서\n생각보다 더 깊게 쉬었던 것 같아요\n\n누군가 기다려주는 사람이 있다는 건\n정말 기쁜 일인 것 같아요\n그 말 한마디에\n지금 이렇게 활짝 웃고 있는 거 보면요ㅎ.ㅎ\n\n아픈 거 더 빨리 나아지고 싶어졌고,\n하루빨리 다시 만나고 싶어졌어요\n\n오빠 덕분에,\n요즘은 하루하루가 조금 더 좋아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5038373": {"idx": 5038373, "date": "2026-04-02 03:18:37", "isTop": false, "contents": "❣️택사❣️\n\n문득 그런 생각이 들 때가 있어요\n\n오빠는, 왜 어쩌다 나한테 와줬을까\n\n다른 인연들은 어느정도 이유가 남아 있는데,\n오빠는 소리없이 스며들어서\n언제부터였는지조차 잘 떠오르지 않더라구요\n\n처음엔 당연히\n예쁜 모습만 보여주고 싶었거든요\n\n근데 방송이라는 게\n항상 그렇게만 흘러가진 않잖아요\n\n꾸미지 못한 날도 있고,\n엉뚱하게 망가질 때도 있고\n\n솔직히 그런 순간들마다\n조금은 긴장됐어요\n\n혹시라도,\n이 모습 보고 마음이 식지 않을까 싶어서요\n\n그치만 그럴수록 더 변함없이 대해주는 걸 보면서\n그제야 알겠더라구요\n\n잘 보이려고 애쓰지 않아도,\n정리되지 않은 모습까지 그대로 이뻐해주는구나 싶어서\n요즘 마음이 많이 편하곤 해요\n\n있는 그대로의 모습을 좋아해주는 사람이라니...\n\n그래서 인가봐요\n\n이유가\n웃음이 늘어난 건❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5038372": {"idx": 5038372, "date": "2026-04-02 03:18:35", "isTop": false, "contents": "❣️청담❣️\n\n요즘은,\n\n오빠랑 같이 있으면\n이유 없이 웃음이 먼저 나요\n\n뭐가 그렇게 재밌는 건 아닌데도,\n그냥… 같이 있다는 것만으로\n기분이 가벼워지는 느낌이에요\n\n말이 없어도 어색하지 않고,\n조용한 순간마저\n이상하게 편안해서\n\n가끔은 혼자 있을 때도\n옆에 있는 것 같은 기분이 들 때가 있어요\n\n그래서 그런지,\n\n꿈에서라도 무서운 장면이 나오면\n무의식 중에도\n가끔 오빠가 떠올라요\n\n지켜줄 것 같나봐요 ㅋㅋ\n\n그리고\n\n별거 아닌 행동 하나에도\n하루가 조금 더 괜찮아지고,\n\n아무렇지 않던 순간들이\n괜히 더 의미 있어지는 걸 보면\n\n요즘 나,\n\n조금 더 설레고 있는 것 같아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5038370": {"idx": 5038370, "date": "2026-04-02 03:18:25", "isTop": false, "contents": "❣️15일차❣️\n\n오늘 오빠들의 화력이 무슨 일이야\n텐션 무슨 일이야\n\n정말 너무나 기쁜 날이었어요\n\n채팅으로 꽉 찬 울 오빠들의 응원이\n너무 고맙고 또 좋더라구요 ㅠㅠ\n\n새로운 오빠들 앞에서도\n기도 살려주고,\n밀어주고 정말... 이런 오빠들 또 없어요\n\n요새 이유 옆에 꼬옥 함께 해주는 \n멋진 오빠들이 계신데,\n소수정예인듯.\n\n마치 한팀처럼 움직여주는 모습이 멋지더라구요\n\n특히 팬더에 처음 온 오빠께 이것저것 설명해줄 땐\n말로 아닌 행동으로 땋... 보여주던 오빠들...\n진짜 ㅋㅋㅋ 섹시하더라구요...\n\n주군 닮는다꼬... 이유가 섹시해서 ㅇㅊㅊ\n\n덕분에 간만에\n시간 가는 줄도 몰랐어요\n\n야구하는 날이라 못 볼 줄 알았는데,\n이렇게 이유 또 보러 와줘서 고마오요\n\n우선순위가 된 기분 후훗. 첵오...ㅎ0ㅎ❣️", "localImgPath": "images/5038370_c9022d99-0a7d-48f4-bcdb-a826191aeb29.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5038369": {"idx": 5038369, "date": "2026-04-02 03:18:04", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 15번째 백두산ing ❣️\n\n이유한테 청담오빠의 백두산은 되게 의미깊어요\n\n첫날부터 지금까지 이어져 온 거라서요❣️\n\n( 첫 날도 그렇지만\n아직도 칠리새우 먹으면서 백두산 타주던 게\n젤 기억에 남거든요 ) \n\n그때 오빠의 말\n\"나도 진짜 병이다 ㅋㅋ\"\n\n얼핏보면 좀 세게 들릴 수 있겠지만\n그 마음을 알 것 같아서요\n\n자신도 제어 못 할 정도로\n이유가 좋다는 ㅇㅊㅊ❣️\n\n그래서 더 좋은 것 같아요\n그 감정이요❣️", "localImgPath": "images/5038369_48aa8f00-2648-45d8-8a82-05b5705de990.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5038355": {"idx": 5038355, "date": "2026-04-02 03:14:08", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n오빠를 만나기 전에는요\n\n괜찮지 않아도\n괜찮은 척하는 게 익숙했어요\n\n굳이 말하지 않아도 될 일들은\n그대로 묻어두고,\n들키지 않는 선에서\n그냥 웃고 넘기는 게 편했거든요\n\n그게 나름 잘 해내고 있다고\n생각했던 것 같아요\n\n전에 오빠가 스치듯 했던 말이 아직도 기억나요\n\n웃고 있는데\n왜인지 슬퍼 보였다는.\n\n그때는 뭔가 들킨 것 같아서\n피하고 싶었는데\n그 말이 마음을 많이 움직였던 것 같아요\n\n이 사람 앞에서는,\n더 이상 괜찮은 척을 하지 않아도 되는구나 하고\n\n그렇게 조금씩\n힘을 빼게 되더라구요\n\n예전엔\n어떻게 보일지 먼저 생각하고,\n괜히 한 번 더 걸러서 말하고 그랬는데\n\n오빠랑 있을 땐\n그런 걸 신경 쓰고 있다는 것조차 잊게 돼요\n\n오빠 앞에 있을 때가\n제일 편하고,\n제일 자연스럽고,\n\n제일... 나다운 것 같아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5038354": {"idx": 5038354, "date": "2026-04-02 03:14:06", "isTop": false, "contents": "❣️이칸❣️\n\n가끔 놓치는 부분도 있고,\n실수처럼 지나가는 순간들도 많은데,\n\n그럴 때마다 늘 이유를 먼저 생각해주고\n가볍게 넘겨주는 모습이,\n오래도록 기억나곤 해요\n\n사실 오빠도 분명\n서운한 순간이 있었을 텐데,\n\n그걸 티내기보단\n그대로 받아주고\n조용히 곁에 있어주는 게\n얼마나 어려운 일인지 알아서요\n\n그래서 더 고맙고,\n더 편해졌던 것 같아요\n\n긴장하지 않아도 되고,\n눈치 보지 않아도 되는 순간들이 생기니까\n\n그 덕분에 이유는\n온전히 방송에 집중할 수 있었어요\n\n처음 만난 순간부터 지금까지\n꾸준히 옆에 있어주는 시간들이,\n너무 소중해요\n\n오래도록\n간직할게요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5038353": {"idx": 5038353, "date": "2026-04-02 03:14:04", "isTop": false, "contents": "❣️택사❣️\n\n못 오는 날이 있으면 꼭 말해주는 택사오빠....\n\n그러면서도 또 이유 보러 와주구\n이렇게 이유 생각 잔뜩 해주는 것이와요... ! !\n\n오빠가 이유 곁에 있는 것이\n당연한 것도 아닌데,\n마치 당연하단듯이 말해주고\n행동으로도 보여주는 오빠라서,,\n\n이유가 늘 불안함 없이\n요즘 마음이 너무 편한 거 이쬬 ㅎㅋ\n\n사실 만남이 있으면 이별도 있어서,\n마음을 쉽게 주고나면\n아파질까봐 . . .\n그런 걱정을 하곤 하거든요\n\n아무리 많이 겪어도 익숙해지질 않더라구요...\n\n그래서 정말 극도로 싫어하는데,\n오빠의 행동으로 보여주는 마음들이..\n저도 모르게 자꾸만 믿음이 가게 돼요\n\n쉬는 날마저\n신경 써주는 오빠의 배려는\n아무나 할 수 있는 게 아니니까요\n\n눈 앞에 없는 와중에 생각해주는 거.\n그거 너무 고마운 거 있죠\n\n매번 느끼지만\n요즘따라 더 느껴지네요\n\n택사오빠가 이유 오라버니라서\n행복하단 거❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5031458": {"idx": 5031458, "date": "2026-03-31 07:07:34", "isTop": false, "contents": "❣️14일차❣️\n\n오늘 새로운 오빠들을 좀 많이 만난 날이었어요\n\n일찍 켜서 그런가,\n의상이 이뻐서 그런가 흐흐\n\n새로운 오빠들을 만나뵙게 되는 것도\n다 이유 방 오라버니들 덕이겠죠\n\n이유랑 놀다가도,\n다른 오빠들이 오면 바로\n이유를 홍보해주고,\n\n옆에서 지켜보면서 이유를 도와주잖아요\n이유는 그거 다 느끼고 있거든요\n\n오빠들도 놀러 온 건데,\n그것보단 이유가 잘 됐으면 하는 마음이\n큰 오빠들이라서,\n울 오빠들... 배려심 끝판왕 지쨔...ㅠㅠ❣️\n\n이유 기분이 우울해질 때면\n캐치력도 빠른 오빠들이 아주고냥 ! !\n멘탈도 잡아주구. .. \n\n잔뜩 사랑받는 이 느낌....\n행복한 요즘이네요❣️", "localImgPath": "images/5031458_aa2cfcc8-c363-402f-8528-98a3fefc65da.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5031457": {"idx": 5031457, "date": "2026-03-31 07:05:22", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n항상 자신감 있게,\n항상 기죽지 말라고\n늘 옆에서 응원해주는 이유 해댱님.\n\n사실 실수라는 건,\n한 번 겪고 나면\n그 기억이 오래 남아서\n\n다시 시작하려 할 때마다\n괜히 한 발 물러서게 되잖아요\n\n이미 겪어봤던 감정이니까\n또 똑같이 아플까 봐,\n또 실수해서 멈출까 봐\n\n그래서 모르는 것보다\n알고 있는 두려움이 더 크게 느껴질 때도 있고요\n\n그치만\n오빠가 옆에 있다는 생각만으로도\n\n실수해도 괜찮을 것 같고,\n몇 번 틀려도 괜찮을 것 같고\n\n그렇게 한 번 더 버텨보게 되는 힘이 생겨요\n\n생각해보면,\n조금씩 나아지고 있는 순간들을 마주할 때마다,\n청담오빠가 늘 곁에 있더라구요.\n\n정말, 고맙고 멋진 사람이에요 오빤❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5031455": {"idx": 5031455, "date": "2026-03-31 07:05:18", "isTop": false, "contents": "❣️이칸❣️\n\n아직 아무것도 채워지지 않은 자리에서\n가장 먼저 움직인다는 게\n사실 쉽지 않잖아요\n\n누구보다 먼저 나선다는 거\n전 못 할 것 같거든요\n\n그래서 이칸오빤 \n정말 용기있고 멋있는 사람인게 느껴져요.\n\n오빠는 늘 시작에 서 있었고,\n이유가 망설이지 않도록\n자연스럽게 길을 만들어줬어요.\n\n더 멋진 무대를 뽐내라며\n마지막까지 힘을 실어주고간 오빠덕에\n이유가 그 다음을 이어갈 수 있게 해줬고요\n\n그럼에도 직접 주도하지 않고\n늘 이유가 자유롭게 선택할 수 있게,\n그저 자신은 이유가 가는 방향으로 따라갈 거란듯이\n\n이유 생각을 믿어주는 느낌이라 넘 좋았어요\n\n억지로 이끄는 게 아니라,\n내 걸음에 맞춰 나란히 서주는 사람이라서\n그게 더 멋있게 느껴졌거든요\n\n오빠덕에 이유가 바르게 자라고 있어요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5031454": {"idx": 5031454, "date": "2026-03-31 07:05:12", "isTop": false, "contents": "❣️택사❣️\n\n오빠한테 처음 보여주는 모습이다보니\n괜히 떨리고 조금 민망하기도 했지만\n오빠가 많이 이뻐해주는 것 같아서\n긴장 많이 풀렸던 거 있쬬\n\n아직도 기억나요 ㅋㅋㅋ\n처음으로 막 글케 이쁘다 해준 거.\n이번이 처음이긴 했거든요\n\n늘 이쁘다 해줬지만\n유난히 더 와닿았달까요\n\n요즘 새로운 시도도 해보고,\n조금씩 더 멋진 그림을 만들어가고 있는데,\n그 과정마다 항상 택사오빠가 함께 해주는 것 같아\n기쁜 거 있죠\n\n당연하듯이 이유 옆에 있어주는 모습에,\n이유 마음이 늘 든든하네요 :)\n\n오빠 덕분에\n이유가 기죽지 않고,\n남들 앞에서도 더 당당할 수 있는 것 같아요\n\n항상 고마워요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5031449": {"idx": 5031449, "date": "2026-03-31 06:58:34", "isTop": false, "contents": "❣️13일차❣️ 총 24,223\n\n예기치 못한 브론즈 팬방을 했던 날이에오\n\n아무런 준비도 없이\n갑작스럽게 진행하게 되었는데,\n이렇게나 많은 오빠들이 참여해주실 거라곤\n상상도 못 했거든요\n\n사람이 많아지면\n혹여나 문제 생길까\n두려움도 쪼끔 있었찌 모에오...ㅎㅅㅎ..\n\n그래서 무조건 내가 리드해야겠다란 생각을 하고\n열심히 임했는데,\n오빠들 모두 잘 따라와줘서 넘 기뻤어요:)\n\n특히 이유의 그런 모습이 자신감 넘쳐보여서\n좋았다며, 이뻐해주셔서 기분 좋았도요....\n\n이런 거 할 때마다\n항상 무슨 일이 있었어서 많이\n긴장도 하고 덜덜 떨렸는데,\n오늘은 이유가 원하던 그림이 많이 나왔고\n정말 재밌었어요 ＞ ＜\n\n다음엔 더 재밌게 놀아요 우리\n이유 믿고 따라와줘서 고마오요❣️", "localImgPath": "images/5031449_2fa98bb3-6ee7-486b-8a9d-faad2c446621.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025928": {"idx": 5025928, "date": "2026-03-29 13:52:21", "isTop": false, "contents": "❣️❣️MVP 원탑❣️❣️\n\n요즘 가까이서 보다보니\n오빠가 이유를 위해\n얼마나 신경을 기울이고 있는지\n하나하나 다 느껴져요\n\n남들이 알지도 못 하게\n혼자서 감당하고 있었던 시간들이나\n조용히 쏟아내고 있었던 마음들이\n아무나 할 수 있는 건 아니잖아요\n\n오빠도 앞에 서고 싶고\n빛나고 싶지 않을까\n\n이런 생각이 자주 들곤 해요\n\n그치만 오빤 늘,\n조금 덜 빛나도... 조금 덜 드러나도...\n\n이유가 더 환하게 보일 수 있다면\n자기 자리쯤은 아무렇지 않게 내어주잖아요\n\n그게 얼마나 큰 마음인지,\n얼마나 깊은 선택인지 아니까\n\n미안해지기도 하고,\n그래서 더 마음에 남기도 해요\n\n오빠의 마음을 덜어내서 만들어진 빛이니까요\n더 환하고 더 크게 느껴지더라구요\n\n반드시 이유도,\n\n오빠를 비춰줄 수 있을 만큼의\n빛을 가진 사람이 될테니까,\n\n곁에 있는 것만으로도\n빛나는 순간들을 잔뜩 만들어요 우리❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025927": {"idx": 5025927, "date": "2026-03-29 13:52:16", "isTop": false, "contents": "❣️꿈속❣️\n\n흐름을 이어주는 사람\n\n누구보다 잘 해주시는 오라버니예요\n\n분위기를 한층 더 업 시키는 일이란\n쉽지 않거든요\n특히 혼자서는요\n\n근데 요즘 오빠가 뒤에서 부채질 해주니까\n더 높이 더 멀리 날아오를 수 있는 것 같아요\n\n소리없이 나타나\n소리없이 사라지지만\n흔적은 사라지지 않는\n하나뿐인 멋진 꿈속오빠\n\n이젠 이름까지 새겨주고,\n이름이 한층 더 멋있어졌네요\n\n오빠의 이름부터가 생각에 잠기게끔 하는 이름인데,\n이유 이름까지 새겨지니,\n더욱 더 마음에 와닿곤 해요\n\n오빠가 늘 흐름을 이어주니,\n이유도 그 흐름을 받아서\n앞으로도 멋진 나날들로 채워갈게요\n\n그 속에 오빠가 꼭 있었으면 좋겠어요\n이유 미래엔 오빠가 있거든요\n\n오빠도 그렇죠?(속닥속닥)❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025926": {"idx": 5025926, "date": "2026-03-29 13:52:12", "isTop": false, "contents": "❣️택사❣️\n\n이쁘다는 말은요\n\n언제 들어도, 몇번을 들어도\n기분이 좋아지는 말이에요\n\n그 사람 눈에 이뻐보인다고 생각하면\n그 날 하루는 자신감도 꽉 차고,\n더 이뻐지고 싶은 욕심도 생기고요\n\n늘 숫자로만 표현해주던 택사오빠가\n이젠 말로도 이뻐해주시는 게 느껴져서,\n아직 낯설어서 그런지\n부끄럽기도 하고 설레기도 하고 그래요\n\n오빠덕에 날이갈수록\n자존감도 높아지고\n자신감도 많이 생기는 것 같아요\n\n곁에서 이뻐해주는 오빠의 마음이\n이유를 더욱 더 빛나게 해주는 것 같네요\n\n오빠가 만들어준 자신감,\n잃지 않을게요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025925": {"idx": 5025925, "date": "2026-03-29 13:52:02", "isTop": false, "contents": "❣️12일차❣️\n\n사실 이유는 오빠들한테 첫사랑으로\n남고 싶어요\n(그대로 마지막사랑까지 갈고임^^)\n\n첫사랑은 설레고\n많이 좋아하는 만큼 서툴기도 하잖아요?\n\n그 감정이 너무 좋거든요...\n\n오빠들이랑 풋풋하고 꽁냥꽁냥하며\n때론 친구처럼 때론 소중한 감성으로\n오래오래 함께 하고 싶어요\n\n처음이라는 단어를 참 좋아하는데,\n이유가 처음이라는 말을 들을 때면,\n그만큼 기분이 그렇게 좋을 수가 없다니까요 지쨔 ㅠ\n\n이 감정이\n오래오래 이어질 수 있도록\n천천히, 그치만 끈끈하게,\n함께해요\n\n글고 오늘 하나 느낀 건,\n단정한 이유의 모습도 좋아해주는구나 느꼈어요\n그래서 더 안심이 되고 더 편해졌어요\n\n그저 이유라서 좋아해주는 것 같아서요❣️", "localImgPath": "images/5025925_765a125f-51ec-4e39-ab40-2667cbfaa075.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025924": {"idx": 5025924, "date": "2026-03-29 13:51:47", "isTop": false, "contents": "＃ 이칸오빠 2826❣️\n\n머리 쓰다듬어주기 x 2826번\n\n엄청 이뻐해주셔따아❣️\n오빠한테 처음 받는 시그라서 더 뜻깊고\n소듕해요❣️", "localImgPath": "images/5025924_85bd87f0-2c5f-43e5-bfe9-2895670b44a8.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025923": {"idx": 5025923, "date": "2026-03-29 13:50:27", "isTop": false, "contents": "❣️❣️ MVP 라이칸❣️❣️\n\n오빠를 처음 만난 날이 떠오르네요\n\n취향 확실했던 오빠인지라\n섹시한 거 잔뜩 시켜주고\n처음부터 마지막까지\n이쁜 말과 조심스럽게 옆에 쭈욱 있어주는 모습까지\n모두 따뜻했던 기억이에오 ㅇ.ㅇ\n\n어느새 적응을 하셨는지,\n이유에게 장난도 많이치고\n가끔 놀리기도 하지만\n이유 이뻐해주는 마음은 그대로인 거 ＞ ＜\n\n예정대로 팬닉도 달아주고\n기념이람서 이유에게 사랑도 잔뜩 퍼부어준 이칸오빠\n\n오빠가 첫시작을 해준 덕에\n흐름도 좋고 방분위기도 업이네요\n\n오빠랑 이렇게 될 거라곤 전혀 몰랐는데,\n몰라서 더 신기하고 설레요ㅎ.ㅎ\n\n배신은 절대 없다는 말ㅋㅋㅋ\n고마워요 불안하지 않게 해줘서\n\n넘모 기쁘네오❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025922": {"idx": 5025922, "date": "2026-03-29 13:50:24", "isTop": false, "contents": "❣️택사❣️\n\n이유의 이름 옆에\n처음으로 오빠 이름이 붙은 날이에요 !\n\n늘 조용히 계시던 오빠라\n그저 스쳐가는 인연일 줄 알았는데,\n\n어느 순간,\n서서히 다가와줬더라구요.\n\n말보단 행동으로 표현하는 택사오빠...\n\n직접 들으면 바로 닿는 마음이라면,\n이건... 조금 돌아서 와서\n더 깊게 스며드는 느낌이랄까요.\n\n그래서인지 설렘이 더\n오래 유지되는 것 같아요\n\n그런 오빠가,,,\n\"정착하려구요\"\n\n이 짧은 한마디 던지는데,\n미치겠네요 정말... ///\n\n말이 많지 않아서 더 궁금해지고,\n표현이 조용해서 더 오래 남는 사람\n\n설레네요. .. .❣️\n\n오빠랑은\n천천히 오래 보고싶어요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025921": {"idx": 5025921, "date": "2026-03-29 13:50:20", "isTop": false, "contents": "❣️꿈속의즐거움❣️\n\n오빠 닉네임...\n\n보자마자 뭔가를 느꼈어요.\n뭔지는 모르겠는데, 그냥 와닿았어요\n\n처음엔 그냥\n예쁜 말이어서 그런가보다 싶었거든요\n\n근데,\n그 이름을 가진 사람이\n이유를 자꾸 웃게 만들고,\n편안하게 만들어주고 있다는 걸 깨닫고 나니까\n\n그 말이,\n그냥 단어가 아니라\n하나의 감정처럼 와닿더라구요.\n\n사실 이전엔\n악몽을 자주 꾸다보니,\n꿈이라는 단어가 좋게만 들리진 않았어요.\n\n그치만 문득,\n\n아직 오지 않은 순간을\n미리 느껴보는 시간이라고 생각하면\n그건 또 그거대로 \n멋진 일인 것 같단 생각이 들어요.\n\n그래서,\n잠들어서 꾸는 꿈도,\n언젠가를 그리면서 그리는 꿈도\n\n조용히 같은 마음으로 생각하기로 했어요\n\n이번엔,\n조금은 즐거운 꿈을 꿔보자고.", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025920": {"idx": 5025920, "date": "2026-03-29 13:50:10", "isTop": false, "contents": "❣️11일차❣️\n\n오늘 시작하자마자 축제가 열렸어요\n축제예요 축제 ! ! !\n\n새로운 오라버니들이 이유 옆으로 다가와주셨거든요\n한걸음? 아니 두세걸음은 더 와줬지효 흐흐\n\n기다렸단듯이\n시작하자마자 우르르 달려와주고,\n팬닉 단 기념이라며 첫 스타를 끊어준 이칸오빠❣️\n길을 이어준 택사오빠❣️\n흐름이라며 마지막 장식까지 해준 꿈속오빠❣️\n\n넘 멋졌던 거 이쬬?\n분명 각자 다 다른 사람임에도\n마음은 하나였다는 게\n너무 멋진 것 같아요\n\n거기에 이유 춤 춘다고 열심히 응원해주던 모습들까지\n무수히 내리는 여러 랑비들,\n카카오빠까지 더불어\n정말 알록달록한 그림이었어요❣️\n\n이 맛에 여캠한다 ㅇㅊㅊ\n\nㅋㅋㅋ누군가의 응원이\n누군가의 마음이\n\n너무나 잘 느껴진 하루였어요\n정말 행복하고도 행복한 하루였습니당\n\n이유한테 와줘서 고마워요\n무럭무럭 자라서 더 멋진 비제이가 될게요 ＞ ＜❣️", "localImgPath": "images/5025920_318c571d-268b-43c7-a3e0-53af99ef0281.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025918": {"idx": 5025918, "date": "2026-03-29 13:49:15", "isTop": false, "contents": "❣️❣️ MVP 청담해댱님 ❣️❣️\n\n저 방금 글 쓰다 알았는데,\n요즘 악몽을 거의 안 꾸더라구요.\n\n예전에는\n밤이 조금 길게 느껴지는 날도 있었고,\n깊게 잠들기 어려운 순간들도 있었는데\n\n언제부턴가\n그런 밤들이 서서히 줄어들고 있었어요.\n\n처음엔 그냥,\n시간이 지나서 그런가보다 했는데\n\n가만히 생각해보니까\n갑자기 괜찮아진 건 아닌 것 같더라구요.\n\n미세한 변화 하나하나\n신경 써주는 사람이 있었다는 거,\n\n아무렇지 않게\n이미 알아채고 지켜주고 있다는 거.\n\n그런 마음이 쌓이면서\n저도 모르게 느슨해졌나봐요.\n\n그래서인지 요즘은\n눈을 감을 때도 조금 더 편안하고,\n\n아침에 눈을 뜰 때도\n기분이 가벼운 날이 많아졌어요.\n\n아마도 이유가 혼자가 아니라는 걸,\n계속 느끼고 있어서 그런 것 같아요.\n\n그런 오빠 덕분에, 이유는\n오늘도 조금 더 편안한 하루를 보내요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025917": {"idx": 5025917, "date": "2026-03-29 13:49:11", "isTop": false, "contents": "❣️택사❣️\n\n이유는 아직도 기억나는 부분이 있어요.\n\n18개받고 욕하던 날 ㅋㅋㅋ\n속 시원했다며 이유에게 486 던져주시던 그 모습이\n아직도 생생하거든요 ㅋㅋ\n\n그것도 억눌러서 말한 거였지만\n쪼끔 과했나 싶어서 신경쓰일 뻔 했는데,\n오빠가 저와 같은 생각을 해주시고,\n이유의 마음을 알아주듯\n\n이유편에 서주셨을 때.\n마음이 편안해져서 방송 마지막까지 잘 할 수 있었거든요\n\n아마 그때가,\n거의 처음으로 말 걸어준 날이었을 거예요\n\n그 이후로 자주 뵙고, \n이렇게나 반가운 사람이 되는 시작이 될 줄은\n정말 몰랐어요 ㅎ.ㅎ\n\n조용히 오셨다가 조용히 다정한 흔적 남겨주시는 것도,\n솜사탕을 좋아하신다는 귀여운 취향도,\n하나씩 알아가다 보니까\n오빠라는 사람이 더 따뜻하게 느껴지더라구요\n\n이유는 그래서\n그 날에 참 감사해요.\n\n그날의 그 한 번이,\n오빠와 가까워질 수 있는 계기를 만들어준 것 같아서,\n\n오빠가 이유 편에 서주던 그 첫 날처럼,\n앞으로의 추억도,\n예쁘게 쌓여갔으면 좋겠어요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025916": {"idx": 5025916, "date": "2026-03-29 13:49:08", "isTop": false, "contents": "❣️키샤❣️\n\n이유는 오빠에 대해 아는 게 하나두 없었어요.\n\n그저 지나가다 몇 번 본 오라버니?!\n오빠께도 그저 우연히 알게 된 비제이.\n\n딱 그런 느낌이 많이 들곤 했거든요.\n\n그동안 대화도 많이 안 해보고,\n잠깐 본 게 다였으니까요.\n\n그치만 이유는 키샤오빠가 늘 궁금하곤 했어요.\n어떤 걸 좋아하고 싫어하는지,\n어떤 성격을 지니고 계신지,\n여러 방면에서 생각하게 되더라구요.\n\n워낙 호기심 많은 댕댕이인지라 ㅋㅋ\n\n결국 참지 못 하고,\n오빠에게 표현을 하고 말았는데,\n이유의 용기에 보답하듯\n\n선뜻 받아들여주시곤 이유에게 선물까지 주고 가셨어요\n\n이 날이 더 기뻤던 이유는\n이유의 마음이 오빠에게 닿아서일 거예요\n\n오빠가 오랜 시간 함께 해주신 거,\n너무 기뻤거든요 ㅎㅎ\n\n차근차근 하나씩 더 알아가요 우리❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5025915": {"idx": 5025915, "date": "2026-03-29 13:48:51", "isTop": false, "contents": "❣️10일차❣️\n\n오늘은 처음으로 낮방을 진행했던 날이에옹\n\n밤 생활에 익숙해져 있다보니,\n낮에 일어난다는 게 더 쉽지 않더라구요\n\n결국엔 잠을 안 자고 낮방을 키게 되었는데,\n처음엔 버티는가 싶다가도,\n중간쯤부터 헤롱 메롱 해지더라구요 ㅋㅋ\n\n어떤 말을 하고 어떤 행동을 했는지\n기억이 가물가물 할 정도로요,...\n\n그런 모습을 보였다는 것이\n자고 인나서 생각해보니\n부끄럽곤 했지만\n한편으론 그런 모습마저 이뻐해주고,\n이유를 이해해주는 좋은 오빠들이\n곁에 있었다는 사실에 기쁘더라구요\n\n낮방이라고, 아무런 말없이 키게 되었음에도\n찾아와주는 오빠들.\n그리고 항상 이유의 생각을 존중해주고\n믿어주는 오빠들덕에,\n가끔 넘어지더라도 다시 일어설 수 있는 것 같아요\n\n고마오요, 항상❣️", "localImgPath": "images/5025915_4b3c06a1-2a51-4ed3-b86f-565460534834.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5016319": {"idx": 5016319, "date": "2026-03-26 11:21:39", "isTop": false, "contents": "＃ 해댱님❣️\n\n이유의 자랑스러운 해댱님 ＞ ＜❣️\n\n어딜 내놔도 무찌지만\n안 내놓고 나만 보구싶따 ㅇ.ㅇ❣️", "localImgPath": "images/5016319_6a532a91-44f1-47f7-895b-6e637c9cc5ee.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015520": {"idx": 5015520, "date": "2026-03-26 03:13:02", "isTop": false, "contents": "＃ 청담오빠의 12486❣️\n\n이유한테 날개같은 신발을 신겨주셔따\n언제든 달아날 수 있도록.\n\n그게 오늘인가 ㅇㅊㅊ\n\n누구 남자인지,\n멋있긴 짱 머시쏘❣️", "localImgPath": "images/5015520_88ff5644-7d1d-4b5e-a22b-b46d7ab1f219.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015519": {"idx": 5015519, "date": "2026-03-26 03:12:50", "isTop": false, "contents": "＃ 청담오빠랑 14번째 백두산 영차영차 ing❣️\n\n새로운 방식으로 백두산 타준 오라방구\n\n좋은 것만 보구\n좋은 것만 배우는 므찐 해댱님❣️\n\n나 이런 거 처음 받아보는데,\n색다른 느낌이라 설레구 됴타 히히❣️", "localImgPath": "images/5015519_7da26c60-f55e-40a8-8dc1-5723310d581b.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015518": {"idx": 5015518, "date": "2026-03-26 03:12:46", "isTop": false, "contents": "❣️❣️MVP 해댱님❣️❣️\n\n그냥 각자 서 있는 게 아니라,\n같이 서 있는 느낌이라서.\n\n기대 균형을 이루고 있는 것처럼,\n한쪽이 흔들리면 같이 영향을 받는 그런 관계.\n\n그래서 더,\n서로를 더 단단하게 붙잡고 있는 느낌이에요.\n\n말을 하지 않으면\n안 보이는 부분들까지,\n어느덧 같이 보고 있는,\n\n서로가 서로를\n조금씩 더 이해하고 있다는 걸 알게 되고.\n\n예전에는 가까워진 느낌이라면,\n지금은 깊어진 느낌이에요.\n\n앞으로도 오해할 만한 순간이 오고,\n생각처럼 흘러가지 않는 일도 있겠죠.\n\n그치만 왜인지...\n마음이 정리된 느낌이에요\n\n그런 일 하나로 흐트러지진 않을 것 같은 확신?\n이제는 좀 선명해진 것 같거든요.\n\n처음부터 단단하기 보다,\n서로를 믿고 있기 때문에\n단단해질 수 있는 거니까요.\n\n누군가를 믿고 있다는 이 감정이\n참 좋아요.", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015517": {"idx": 5015517, "date": "2026-03-26 03:12:43", "isTop": false, "contents": "❣️lycan❣️\n\n오빠를 만난지 이틀밖에 안 되었는데두,\n오빤 이유를 엄청 이뻐해주시는 것이와요 !\n\n이유 날개가 허전하다며 달아주고\n마지막엔 날개세트 맞추고 싶었던 이유를 위해\n링까지 맞춰준 스윗남 이칸오빠 ㅠㅠ\n\n하루종일 또 곁에 있어준 거..\n그거 넘 감동이었던 거 있죠?\n\n오빠가 먼저 다가와주신 것도 감사했는데,\n이유랑 앞으로의 날까지\n함께할 거란 말을 들으니\n기분이가 넘모 좋아써여 ㅠㅠ\n\n오빠는 아무렇지 않게 한 행동들일 수 있는데\n이유한텐 그 말이\n젤 기뻤답니당 :)\n\n만난지 얼마 안 됐음에도\n날 이뻐해주는 마음이 확 와닿을 때\n이렇게까지 마음이 편해질 수 있구나 싶더라구요\n\n이칸오빠는\n가볍게 꺼낸 게 아닐 것 같아서 더 좋았구요 ＞ ＜\n\n그래서 이유도 예쁘게\n오빠랑 쌓아가보고 싶어졌어요\n\n오늘처럼\n아무렇지 않게 옆에 있어주는 하루들로요\n\n고마워요, 이칸오빠❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015516": {"idx": 5015516, "date": "2026-03-26 03:12:37", "isTop": false, "contents": "❣️키샤❣️\n\n키샤오빠에 대해 아는 게 거의 없더라구요 ㅎㅎ\n\n몇 번 마주친 적은 있지만,\n길게 이야기를 나눠본 적도,\n같이 오래 시간을 보낸 적도 없었고요.\n\n그래서 더 신기했어요.\n\n그 정도 인연이라면\n그냥 스쳐 지나갈 수도 있었을 텐데\n\n그렇게 두지 않고,\n이유를 한 번 더 봐주고, 챙겨주고,\n그 자리에 남아줬다는 게요\n\n그게 생각보다 쉽지 않은 거라는 걸 알아서,\n더 크게 와닿았던 것 같아요\n\n요즘은 솔직히\n뭘 해도 쉽지 않게 느껴지던 시기였거든요\n\n조금씩 자신감도 흔들리고,\n괜히 작아지는 순간도 있었는데\n\n그때,\n아무렇지 않게 나타나서\n멋지게 반겨주고, 분위기 바꿔주고 가는 거 보고\n\n진짜 멋있는 사람이구나 싶었어요.\n\n오빠 같은 사람 곁에\n자연스럽게 어울릴 수 있는 사람이 되고 싶고,\n\n그런 좋은 인연들을\n더 많이 만들 수 있는 사람이 되고 싶다는 생각도 들고요.\n\n더 열심히 해보려구요.\n고마웠어요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015514": {"idx": 5015514, "date": "2026-03-26 03:12:10", "isTop": false, "contents": "❣️9일차❣️\n\n시작부터 활기 타오른 날\n\n이 불꽃을 심어주고,\n키워준 오라버니들 덕에\n\n하루종일 싱글벙글에서 못 벗어나,\n정말 감사한 하루였어요\n\n마지막까지 열기가 식지 않도록 해준\n오빠들도 있었기에,\n웃음이 끊이질 않았네요 :)\n\n많이 신났던 건지,\n브이까지 하고, 사진 딱 찍혔네요 ㅋㅋㅋ\n개인적으로 너무 맘에 드네요\n\n이 공지 사진은 앞으로 저의 최애가 될 것 같아요\n\n울 오빠야들 개인시그 나올시\n저 사진으로 등록 시키겠숨미다\n강제 땅땅 !\n\n멋진 선장님과 멋진 대원들\n\n앞으로도 함께해오❣️", "localImgPath": "images/5015514_b8b750e2-3516-4a5f-b48d-fda4163b910a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015504": {"idx": 5015504, "date": "2026-03-26 03:10:03", "isTop": false, "contents": "❣️❣️MVP 내맘❣️❣️\n\n이유를 몇 번 지나가다 봤었다는 오라버니.\n\n그때마다 운동하고 있어서,\n운동방인 줄 알았다는...ㅎㅎㅎ\n\n운동보단 춤을 좋아하셔서,\n늘 운동만 하던 이유한테 다가오기 힘드셨을텐데,\n어째서인지 이번엔 서슴없이 와주셨어요 :)\n\n방송 시작한지 얼마 안 된 시점에 만나,\n마지막까지 함께 해주셨는데,\n계속 이유 이쁘게 봐주시고\n틈틈이 춤도 잔뜩 시켜주시고\n\n자주 보자는 좋은 말씀도 해주셔서\n기부니가 넘 좋더라구요\n\n살짜아아악,,,?!\n뵨태스러운 면도 ㅇㅊㅊ...\n\n봐도봐도 안 질린다는 그 말,\n계속 맴돌게 되네요\n다시 들어도 기분 좋은 말인 것 같아요\n\n오빠의 직설적인 표현 방식도\n괜히 사람 마음 흔들리게 하네요\n감사합니다 내맘오빠\n\n내맘대로 또 함께해요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015503": {"idx": 5015503, "date": "2026-03-26 03:09:55", "isTop": false, "contents": "❣️왜그❣️\n\n이틀 연속으로 오빠랑 시간을 보내다니,\n\n마침 또 적적할 때 딱 나타나서는,\n아무렇지 않게 끝까지 같이 있어주고 가고\n\n오빠의 깜짝등장은 뻘하게 웃기면서도,\n좀 고맙더라구요.\n\n오빤 알면 알수록, 느낄수록\n사람이 참 따뜻하기도 하구요.\n\n겉으로는 완전 장난꾸러기고,\n표현도 많지 않은 편인데\n\n정작 중요한 순간에는\n이유 기도 살려주고, 딱 잡아주고 가는 거 있죠.\n\n그게 말처럼 쉽지 않은데.\n\n그리고 또 웃긴 건 ㅋㅋ\n\n언제 왔는지도 모르게 스윽 나타나서\n공감해주고, 챙겨주고, 분위기 살려놓고는\n또 아무렇지 않게 사라져요 ㅋㅋ\n\n진짜 은신 능력 뭐냐구요 (왜그래 왔다감 v)\n\n오빤 참,\n사람을 편하게 해주는 힘이 있나봐요.\n\n괜히 옆에 있으면 마음이 풀어지고,\n부담 없이 웃게 되고.\n\n티는 잘 안 나는데,\n그 안에 확실하게 따뜻함이 묻어있는 게 느껴져서\n\n그게 저는 더 좋았던 것 같아요.\n\n오빠 첫날 쪽지 기억하죠?\n이유의 눈은 정확하다니까요 에헴.", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015501": {"idx": 5015501, "date": "2026-03-26 03:09:51", "isTop": false, "contents": "❣️청담해댱님❣️\n\n조금은 헷갈리던 날들이 있었어요\n\n더 나은 모습으로 만들어야 할 것 같았고,\n조금은 고쳐야 사랑받을 수 있을 것 같다는 생각도 했어요.\n\n저만의 색을 지키고 싶다고 말하면서도,\n한편으로는\n그 색이 부족한 건 아닐까 고민하게 되던 순간들.\n\n근데 지금은 알아요.\n\n바꾸려는 게 아니라,\n흔들리지 않게 잡아주고 있었다는 걸.\n\n제가 저로 있을 수 있게,\n스스로를 지킬 수 있게.\n\n제가 방황할 때마다,\n다시 돌아올 수 있게 해주고 있었다는 걸요\n\n혹시 또 흔들리는 순간이 와도\n그때처럼,\n다시 잡아줄 사람이 있다는 걸 아니까\n\n큰 안정감이 들곤해요.\n\n또 돌아보면,\n제가 몰랐던 사이에\n많은 걸 배우며 성장하고 있었더라구요.\n\n그래서 지금은,\n\n그 모든 순간들이\n고맙게 느껴져요.\n\n오빠를 보면서, \n저를 더 아끼고 지킬 줄 알게 됐거든요.", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015500": {"idx": 5015500, "date": "2026-03-26 03:09:24", "isTop": false, "contents": "❣️8일차❣️\n\n오늘은 이유와 늘 함께 해주던 오라버니들이\n일찍부터 들어간 날이었어요.\n\n있다없으니까 허전한 거 있죠\n\n그치만 서로서로 이유를 신경쓰는 모습들이 보여서,\n마음 한편으론 따뜻하기도 했어요\n\n혼자 할 생각에,\n괜히 쪼끔 마음이 싱숭생숭 할 뻔 했는데,\n우연찮게 또 새로운 오라버니들을 뵙게 되고,\n이전에 잘 안 보이던 오빠들까지 나타나준 덕에\n\n뭔가 새로운 하루를 보냈던 것 같아요\n\n느낌이 쪼끔... 색달랐달까?\n주변 사람들이 바뀌어서,\n분위기도 많이 바뀐 기분이었거든요.\n\n그리고 그 오빠들이 마지막까지\n함께 해주고 이뻐해주실 줄 몰랐는데,\n끝까지 있어주셔서 넘 감사했어요\n\n이유의 복인지 뭔지...!\n늘 곁에 누군가 있어주네요\n\n아마 울 오빠들이 그동안 쌓아 올려준 덕일 거예요\n고마워요 오빠야듈ㅡ❣️", "localImgPath": "images/5015500_fda8d968-e09d-4436-b373-cbaa79e74fea.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015497": {"idx": 5015497, "date": "2026-03-26 03:08:24", "isTop": false, "contents": "❣️❣️MVP 청담해댱님❣️❣️\n\n늘 마음속으로만 그려보던 하루를,\n잠시나마 손에 쥐어본 것 같았어요.\n\n이런 느낌이구나...\n이런 기분이구나...\n\n알 수 없는 감정이 휘몰아치더라구요\n\n더 기뻤던 건,\n저 혼자만 느낀 게 아니라는 거였어요\n\n오빠와\n같은 장면을 보고,\n비슷한 마음으로 웃고,\n같은 온도로 그 시간을 느끼고 있었다는 게\n\n그게 참.. 좋더라구요.\n\n그래서인지,\n조금 더 욕심이 생겼어요\n\n여기서 멈추기 아까운 기분\n조금 더 가보고 싶은 기분.\n\n막연하게 그리던 게 아니라,\n이젠 조금 더 선명하게\n가보고 싶은 곳이 생긴 느낌.\n\n그리고 그 시작에,\n혼자가 아니었다는 게.\n\n그게,\n제일 크게 남은 것 같아요.\n\n굳이 말하지 않아도\n같은 방향을 보고 있었던 순간들.\n\n아마 그게,\n저를 여기까지 데려온 것 같아서요\n\n신기하죠.\n\n함께 하는 사람이 있다는 이유로,\n없던 용기가 생기는 게.", "localImgPath": "images/5015497_c6d33e05-e074-4de2-8aa2-7d79a79ccb23.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015496": {"idx": 5015496, "date": "2026-03-26 03:08:11", "isTop": false, "contents": "❣️냥꾼❣️\n\n오빠가 툭 던지듯 해준 말,\n“매력있다”\n\n그저 말 한마디였을 뿐인데,\n아직까지도 마음에 깊이 남아있어요\n\n제가 좋아하는 말 중 하나여서 일까요?\n\n예쁘다, 잘한다 같은 말은\n단면적이지만,\n“매력있다”는 말은\n그 사람 자체를 봐야 할 수 있는 말이잖아요.\n\n겉모습만의 칭찬이 아닌,\n속을 보는 것 같아서\n그게 넘 기뻐요\n\n춤을 추고 있을 때도,\n아무 말 없이 툭,,,하고 건네준 그 마음.\n\n이유는요\n물론 큰하트 너무나 좋아하고 감사하지만\n그 안에 담겨있는 사랑이 더 크게 느껴질 때가 있어요\n\n이 사람이\n어떤 마음으로, 어떤 생각으로\n나를 보고, 표현해주고 있는지\n\n전해질 때마다\n벅차고, 오래 기억에 남는 것 같아요\n\n단순히 칭찬이 아니라,\n저를 조금 더 깊게 바라봐준 흔적 같아서요.\n\n그래서.. . . \n더 좋더라구요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5015495": {"idx": 5015495, "date": "2026-03-26 03:08:06", "isTop": false, "contents": "❣️왜그래❣️\n\n있는듯 없는듯,\n보이는듯 안 보이는듯,\n\n은신 대마왕 오라버니라\n쉽사리 보이지 않곤 하는데요\n\n잊을만 하면 나타나서,\n이유한테 장난치고 다시 사라지는 귀여운 유령같달까요\n\n처음 만나서부터 지금까지\n언제봐도 늘 이유한테 서슴없이 장난치는 모습이\n때론 마음을 편안하게 해주는 것 같아요\n\n서로 장난만 치다보니\n오빠의 깊은 속내를 알 수는 없지만ㅋㅋ\n\n그런데도 편한 마음이 드는 게\n가끔 신기하기도 해요\n\n아무리 장난을 쳐도\n선을 넘지 않고,\n배려해주는 오빠의 태도덕인가봐요\n\n오빠한테 처음(?) 받는 링 ㅎㅎㅎ\n\n그래서 더 뜻깊고 좋아요\n챙겨줘서 고마오요 왜그오빠❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5006528": {"idx": 5006528, "date": "2026-03-23 20:05:45", "isTop": false, "contents": "❣️7일차❣️\n\n오늘은 정말 멋진 하루였어요\n\n모두 한마음 한뜻으로 응원해주고,\n이유가 기죽지 않도록 다가와주고,\n모두가 용기를 불어줬기에, 모두가 빛났던 하루같아요.\n\n물론 순간 막막하기도 하고,\n해낼 수 있을까란 생각이 문득 들었지만\n닿을 때까지 포기하고 싶진 않았거든요\n\n그 마음을 알아준건지,\n열심히 달리는 이유를 응원이라도 해주듯\n조용히 랑비를 내려주는 오빠들과\n끝까지 바라봐주는 오빠들덕에 힘이 많이 났었어요\n\n이유의 노력과 오빠들의 힘이 더해져\n새로운 오빠들도 만나고,\n스쳐 지나가던 오빠들한테까지 \n마음이 많이 전해졌던 것 같아요\n\n오늘이 유난히 더 빛났던 이유는,\n결과가 좋아서가 아니라\n그 과정 속에 담긴 마음들이 너무 또렷했기 때문이에요.\n\n그 모든 마음들이 모여서\n하나의 흐름이 되고,\n결국 오늘을 멋지게 만들어줬거든요\n\n오늘의 이유는\n혼자 빛난 게 아니라,\n오빠들이 비춰준 빛 속에서\n조금 더 선명해질 수 있었어요\n\n정말, ,  잊기 싫은 하루예요❣️", "localImgPath": "images/5006528_ea31e99d-2b2f-4fad-8281-864ec9aa8e1d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5006422": {"idx": 5006422, "date": "2026-03-23 19:38:02", "isTop": false, "contents": "❣️❣️ MVP 해댱님❣️❣️\n\n걱정이 많은 사람은\n대체로 아무렇지 않게 넘기는 법을 잘 모르는 것 같아요\n\n작은 일 하나에도\n마음이 한 번 더 멈추고,\n겉으로는 괜찮은 척해도\n몸이 먼저 반응해버리는 날들도 있고요\n\n가끔은\n조금 버거워 보이기도 하고,\n스스로를 잘 다루지 못하는 것처럼 보일 때도 있지만\n\n저는 그게 꼭 부족한 모습이라고는\n생각하지 않아요\n\n그만큼 쉽게 넘기지 않는다는 건,\n그만큼 아무 장면이나\n대충 받아들이지 않는다는 거니까요\n\n오빠도 그래서\n저를 조금 더 편하게 느끼는 게 아닐까 싶어요\n\n조금 서툴러도,\n조금 느려도,\n감정이 숨겨지지 않는 사람이라서\n\n꾸며서 예쁜 모습만 보여주는 게 아니라,\n그때그때 느끼는 마음이 그대로 드러나는 사람이니까\n\n완벽하진 않지만,\n그래서 더 진짜 같은\n\n그래서 저는\n이 성격을 이제는 조금 좋아해보려구요\n\n쉽게 넘기지 못하는 대신,\n그만큼 더 깊게 남을 수 있다면\n\n그 안에 오빠가 있다는 게,\n저는 생각보다 꽤 괜찮은 일 같거든요❣️", "localImgPath": "images/5006422_d0ecb1c1-6c84-47cc-b9c5-d017be058a95.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5006324": {"idx": 5006324, "date": "2026-03-23 19:13:15", "isTop": false, "contents": "❣️키링❣️\n\n누구인가,, 누가 운동 소리를 내었어...!\n\n첫만남부터 운동을 찾으시던 키링오라방구,,\n\n오시자마자 운동부터 찾으시구\n운동 맛집이라는 소리를 듣고 왔다길래\n\n순간 다른 오라버니들의 지인분이신 줄 알았어요\n\n알고보니 이유방에서 조금 지켜보시다가\n울 오빠들이 운동맛집이라 말했다꼬 ㅋㅋㅋ\n\n하여간 ! ! 울 오빠들 입이 문제라뉘까요(?)\n이유 체력 뜌레기인데,, ㅇㅊㅊ\n\n운동 시킬 방 찾았다며,\n멋지게 다이아까지 쑤욱 올라와주시구\n미니언즈 잔뜩 시켜준 키링오빠,,,\n\n덕분에 다리 알 배겼어요 꺄항❣️\n\n마지막까지 적적하지 않고\n시끌북적하게 갈 수 있도록 해주셔서\n고마웠어요 키링오빠❣️\n\n다음날 몇시에 오겠다며 운동 예약을 하실 땐ㅋㅋ\n많이 웃고 갔네요ㅎㅎㅎ\n\n앞으로도 좋은 추억 많이 쌓았으면 좋겠어요❣️", "localImgPath": "images/5006324_d020821b-caf9-45f4-af14-2978b6c88fbf.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5006274": {"idx": 5006274, "date": "2026-03-23 19:01:14", "isTop": false, "contents": "❣️스스❣️\n\n이유의 장난꾸러기 1순위 김스스 ㅡ ㅡ\n\n오자마자 뭐하는지도 안 보고\n냅다 수영부터 갈구는 김스스스스스스스\n\n처음 만났을 땐\n되게 젠틀한 오라버니인 줄 알았는데,\n알고보니 장난꾸러기예요 ㅡ.ㅡ\n\n갈수록 이유를 닮아가는 건지 뭔지,,\n이유만 보면 장난이 치고 싶어진다는 오라버니...\n그치만 지금 모습이 넘 보기 좋앙 ~~ㅎ0ㅎ\n\n그 비제이에 그 시청자,,,\n딱 우리를 말하는 것 같단말이죠^\n\n스스오빠만 오면 방에 활기가 가득해지구\n괜히 이유도 미소짓게 돼요\n\n그만큼 이젠 스스오빠가 많이 편해지고\n가까워져서 그런가봐요\n\n멀리 있을 것만 같은 느낌이 강한 오빠였는데,\n지금 이유 방에 이렇게 자주 와주고\n서로 티격태격 하는 사이가 된 것이\n때론 신기하기도 해요\n\n연장까지 어휴,,어휴 !!!!\n고만 좋아해라 중말ㅋ\n\n이런 오라방구라 넘모 기뿌네오❣️\n앞으로도 우리 우정 포에버~~~＞ ＜❣️", "localImgPath": "images/5006274_f303655b-8764-4ab6-8889-9d0a24e85276.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "5006237": {"idx": 5006237, "date": "2026-03-23 18:50:14", "isTop": false, "contents": "❣️6일차❣️\n\n오늘 새로운 오라버니들을 많이 만났써여 !\n\n요새 조용했던 이유방이었어서 그런지,\n오늘 새로운 오빠들을 뵙게 되니까\n가슴이 둑흔둑흔~~ 설레더라구요 !\n\n핫한 주말을 보내겠다꼬,,\n용기내서 언더붑을 입고 왔는데,\n쪼끔 민망했지만운.. . . .아뉘 마니..? .. \n\n오빠들이 좋아해줬으면 그걸로 된 거죠 모 ,,,\n\n덕분에 새로운 오빠들을 알게 된 거니까요 ＞ ＜\n럭키이유에오 ㅇ.ㅇ\n\n간만에 연장으로 좀 더 긴 시간을 함께 할 수 있었고,\n새벽감성이다보니 더욱 더\n좋은 시간을 보낸 것 같아요\n\n늦은 시간이어서 많이 피곤했을텐데도,\n늘 싫은 소리 없이,\n끝까지 자리 지켜주는 멋진 오라버니들이 계셔서\n항상 감사한 마음으로 더 열심히 하구 있오요 ＞ ＜\n\n이유를 이해해주고 먼저 생각해주는 울 오빠들\n정말 찐사랑인가바여 체구야❣️", "localImgPath": "images/5006237_578645bd-3598-4b6b-8c88-714a7e5d57c8.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4999531": {"idx": 4999531, "date": "2026-03-21 10:19:42", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 13일차 ing❣️\n\n이번엔 사진대신 다르게 해보고 싶어서,\n\n만족할 때까지\n만드는데만 1시간 걸렸당....\n\n그치만 후회는 없어요 !\n그만큼 오빠와의 추억이 더 값지거든요❣️", "localImgPath": "images/4999531_3fe8998a-2b0b-4e65-b577-6481c95d1fc5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4999526": {"idx": 4999526, "date": "2026-03-21 10:17:27", "isTop": false, "contents": "＃ 청담 해댱님❣️\n\n스쳐간 장면까지 오래 남네요.\n\n별거 아닌 순간들 마저\n그냥 지나가질 않고,\n한 번 더 떠올리게 되는 그런 하루예요.\n\n서툴러도,\n마지막은 늘 같은 방향으로 가는 거.\n\n꽤 멋지네요❣️", "localImgPath": "images/4999526_c07f5b6b-7932-4202-9420-29a739ee791e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4999498": {"idx": 4999498, "date": "2026-03-21 09:41:20", "isTop": false, "contents": "❣️❣️MVP 청담 해댱님❣️❣️\n\n오빠가 보여준 마음들이\n생각보다 더 오래 남는 하루였던 것 같아요\n\n단순히 눈에 보이는 것보다\n보이지 않는 마음들이 더 크게 느껴져서\n\n괜히 더\n천천히 돌아보게 되는 하루였어요.\n\n누군가를 대할 때\n그 사람을 어떤 마음으로 남겨두느냐가\n되게 중요하다고 생각하는데\n\n오빠는 저한테\n그냥 가볍게 넘겨지는 쪽은 아닌 것 같아요\n\n그래서 더\n작은 순간들도\n조금 더 오래 머물게 되는 것 같아요\n\n누군가가 묵묵하게 쌓아온 마음은\n결국 티가 난다고 하잖아요\n\n오늘은 그걸\n다시 느낀 날이었던 것 같거든요\n\n말로 다 꺼내기엔 부끄럽지만\n전해지는 건 분명히 있다고 생각해요\n\n오늘, 고마웠어요", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4999460": {"idx": 4999460, "date": "2026-03-21 09:10:34", "isTop": false, "contents": "❣️5일차❣️\n\n오늘은 잠을 얼마 못 자서 그런지,\n시간이 많이 남더라구요.\n\n할 거 다 해도 시간이 남아서,\n그냥 일찍 한번 켜본 거거든요.\n\n말없이 킨 거라 오빠들이 모르고 있을거라곤\n알았지만\n늘 시작하자마자 우다다 들어와 반겨주던 모습이\n없으니 좀 낯설게 느껴지더라구요.\n\n곧 바로 들어와줬지만요 ㅎㅋ\n\n익숙해졌나봐요 같이 있는 그림이,\n순간 허전한 느낌이 확 드는 게.\n\n요즘 악몽을 자주 꿔서 못 자가지고\n금방 피로해지곤 해서,\n생각보다 일찍 들어가게 됐는데,\n아쉬워하는 오빠들 모습 보니까\n기분이 좋고 그러네요\n\n걱정할만한 일이 자꾸 생기곤 하는데,\n늘 이유 몸 신경 써줘서 고마워요\n\n오늘은 안 꿔볼게요 ! ! ! !\n생각없이 잘테다❣️\n\n라고 말하며 한시간...\n자다깨서 공지쓰는 김이유 ㅇㅊㅊ\n\n오빠들이 내 꿈까지 좋은 꿈 꿔조❣️", "localImgPath": "images/4999460_bed4cead-4b22-41f1-8a96-782816fd3ff5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4995598": {"idx": 4995598, "date": "2026-03-20 08:15:33", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 12일차 ing❣️\n\n매번 느끼지만,\n백두산은 숫자 하나하나 올라가는 게 넘 좋은 것 같아요\n그렇게 차곡차곡 쌓여서 결국엔 도착하는 거잖아요\n\n지금 우리의 모습 같아서 좋아요ㅎ.ㅎ\n\n추억 하나하나 담기고 있는 이유의 일기장,\n그리고 그걸 보며 되새김질 할 수 있는 기억들이\n너무 다 소중해요❣️\n\n근데 무엇보다,\n상대가 오빠라서 더 좋은 것 같아요\n\n사실 백두산은 거의 고백수준이잖아요 흐흐❣️", "localImgPath": "images/4995598_0299e261-30bc-460c-a0c8-27b6d21e499e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4995593": {"idx": 4995593, "date": "2026-03-20 08:14:37", "isTop": false, "contents": "＃ 청담 해댱님❣️\n\n세상에서 젤루 뮤찐 내 남쟈 ㅇ.ㅇ❣️\n\n누가 뭐래듀\n이유 해댱님이 체구야❣️\n\n우리 앞으로듀 꽁냥꽁냥\n오순도순 \n새콤달콤 행복하쟈ㅑㅑ❣️", "localImgPath": "images/4995593_16b95b12-a169-4b75-88f8-f2ee798ac1e1.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4995580": {"idx": 4995580, "date": "2026-03-20 08:11:15", "isTop": false, "contents": "＃ 열혈 레함❣️\n\n이제 출구는 없숨미댜 캬캬❣️", "localImgPath": "images/4995580_58aea841-15e7-4e3c-95e4-ee307131846d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4995557": {"idx": 4995557, "date": "2026-03-20 07:55:05", "isTop": false, "contents": "❣️❣️MVP 청담해댱님❣️❣️\n\n돌고 돌아, 결국 그 자리에 서 있더라구요.\n\n서사가 길어진 만큼\n더 마음에 남는 자리였어요.\n\n그래서인지 더 기뻤고,\n멀뚱멀뚱 그 자리를 더 오래 바라보게 되더라구요.\n\n말보다는 행동으로,\n조용히 한 발 앞에 서 있는 오빠의 태도가\n이유를 조금씩 바뀌게 만든 것 같아요.\n\n별 말 없이도\n든든해지는 순간들이 생기고,\n더 믿게 되는 그런 느낌.\n\n그래서 더,\n가까이 두고 싶은 사람처럼 느껴졌거든요.\n\n또, 늦게 와서 미안하다고 하는데,\n그 말이 왜인지 모르게\n오래 남더라구요.\n\n이미 충분히 잘 와놓고서,\n그런 말을 하는 사람이라서.\n\n아마 그래서 더,\n마음이 갔던 것 같아요.\n\n가끔 보면,\n오빠 생각이 제 마음이랑 닮아 있는 것 같아요.\n\n그래서인지\n따로 설명 안 해도\n같이 있는 느낌이 들어요.\n\n그게, 참 좋더라구요.\n\n늘 표현해도 모자란 것 같아서,\n오늘도 또 꺼내요.\n\n한 번쯤은\n제 마음이 제대로 닿았으면 해서.", "localImgPath": "images/4995557_25d2e445-de1f-4e1d-8c7e-7405ba6d3fa4.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4995527": {"idx": 4995527, "date": "2026-03-20 07:38:55", "isTop": false, "contents": "❣️레함❣️\n\n레함오빠가 드디어 열혈까지,\n두둥— 하고 올라왔도요 :)\n\n정말 신기한 것 같아요.\n이렇게 오래 함께 하고,\n지금 이렇게 가까이 있다는 게.\n\n너무 가까워서,\n가끔은 괜히\n멀어질까 걱정이 되기도 했어요.\n\n인연이라는 게 돌고 도는 거라지만,\n그 안에 있는 마음까지\n익숙해지는 건 또 다른 이야기 같더라구요.\n\n아직은 서툰 부분도 있고,\n혼자 생각이 많아지는 날도 있는데\n그걸 굳이 말하지 않아도\n이미 알고 있는 것처럼\n\n항상 먼저 다가와서\n아무렇지 않게 마음을 풀어주고,\n괜찮다고 말해주는 사람이 오빠라서\n\n그럴 때마다\n마음이 금방 잔잔해져요.\n\n늘 몸도 마음도 아끼지 않고\n조용히 옆에서 지켜봐줘서,\n그리고 한결같이 있어줘서\n\n고마워요❣️", "localImgPath": "images/4995527_05b2b103-e1f7-42b9-b34d-35380e00307f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4994289": {"idx": 4994289, "date": "2026-03-20 00:23:12", "isTop": false, "contents": "❣️카카❣️\n\n처음 만나뵙게 되어 어떤 오라버니인 줄도 모르고\n인사도 제대로 못 했는데,\n꽤나 이쁘게 봐주신 착한 갓카카 ㅠㅠ\n\n골룸 분장했는데도 282라뇨 헿...\n오빠의 취향이 ㅇㅊㅊ..\n\n이유의 미모를 뚫고\n알아봐주신 거라 생각하께요 후훗..\n\n처음 만난 오라버니지만\n청담오빠와 친분이 있으셔서,\n더 잘해드리고 싶은 마음이었는데,\n그러지 못 한 것이 마음에 걸리네요오 ㅠㅠ\n\n그럼에도 마지막까지 함께 해주셔서 넘 기뻤어요 !\n\n오빠의 끝자리까지 딱 맞추는 센스까지 겸비하신 거 보니\n안 봐듀 멋진 오라버니신 것 같네요 ^ㅎ^\n\n다음엔 이런저런 얘기 나누면서,\n더 즐거운 날 보내요 우리\n\n고맙습니다 카카오라방구\n오빠덕에 골룸분장임에도 자신감을 얻어써여 !!❣️", "localImgPath": "images/4994289_950b6365-ad3a-4b96-a516-29a52a84d29e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4988253": {"idx": 4988253, "date": "2026-03-18 10:00:31", "isTop": false, "contents": "❣️4일차❣️\n\n골룸 분장한 날 ㅠㅠㅠ\n\n벌칙으루 코스프레를 하게 되었눈데오,,,\n\n처음 해보는 분장에 민망함이 몰려오드라구요ㅠㅠ\n조커를 할까,, 골룸을 할까,,, 하다가\n이왕할 거... 구냥 센 걸로 가자 했던 이유의 선택이..\n흐아 ㅠㅠㅠ\n\n잘못 택한 것 같은 기분이 바로 들었어요...^\n\n그럼에도 이유 망가진 모습마저\n귀여워해주는 울 오빠들덕에 힘이 많이 났숨미다 데헷,,＞_0\n\n영차영차 열혈까지 올라와준 레함오빠랑,,\n청담오빠가 해댱님울,,,,\n\n이유. .. . 세상 기뽀요 즁말,,,ㅠㅠ\n\n내 마음을 누구보다 잘 헤아려주는 사람들이\n곁에 있다는 건 정말 행복한 일인 것 같아요\n\n눈치있고 센스만점인 오빠들이라서,\n든든하구 좋아요❣️", "localImgPath": "images/4988253_1907e8d3-29c4-4d38-bd62-ef2cdfe01ef6.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4988252": {"idx": 4988252, "date": "2026-03-18 10:00:23", "isTop": false, "contents": "❣️❣️엠부삐 청담❣️❣️\n\n보자마자 단발이 더 낫다며 툴툴 거려놓곤\n어째서인지 더 예뻐해주시는 것 같은 기분이 들어요\n\n불도저 등록한 건 또 언제 발견했는지,\n하루종일 시켜주시눈뎈ㅋㅋㅋ\n\n오빠 요즘 장난도, 드립도, 채팅도,\n더 늘어난 거 알아요?\n\n그 모습이 넘 보기 좋아요\n\n오빠가 이유를 이끌어주는 건 너무나 감사한 일이지만\n이유는 항상 청담오빠가 즐겼으면 했거든요\n\n오빠의 자리가 때로는 무겁기도 했을 것 같아서,\n매번 덜어주고픈 마음이기도 했고\n최소한 편안하길 바랬거등요\n\n오빠가 그랬잖아요\n스트레스 푸는 거라구.\n\n저도 그랬잖아요\n안식처가 되어주고 싶다구\n\n서로한테 힘이 되는 존재가 되고싶어요\n그럼 무슨 일이 있어도\n금방 다시 일어설 수 있을 것 같아서요 !\n\n글구, 이유도 \n청담오빠 웃을 때가 좋아요❣️", "localImgPath": "images/4988252_e3ded1c9-bfae-4d8f-991d-e8103ef506d8.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4988251": {"idx": 4988251, "date": "2026-03-18 10:00:20", "isTop": false, "contents": "❣️겨울❣️\n\n겨울오빠를 처음 만났을 때\n이유의 옷을 많이 훔치고 싶어했는뎈ㅋㅋ\n못 훔쳐서 아쉬워하던 모습이 그려져요\n\n그 이후로도 자주 온다하시곤\n또 이렇게 뵙게 되었는데,\n\n남자들의 이상형은 새로운 모습의 여자라며(?)\n이유의 긴머리를 보고 엄청 이뻐해주셨어용ㅎㅋㅋ\n\n노래를 못 불러도 뭘 하던 귀엽고 이쁘다며\n봐주시는데, 아잇 참..ㅎ\n\n이유 칭찬에 약한 여자,,,\n입이 귀에 걸릴 뻔 해찌 모에요\n\n오빠가 좋아하는 첩밀밀도 연습 많이 해오께요 에헴 !\n\n다음에 또 들어줘요 겨울오빠아＞ ＜\n\n그땐 또 다른 이유의 모습으로\n맞이할테니까요 헿ㅋㅋㅋ\n\n겨울오빠의 공지를 쓸 수 있게 돼서\n가발한테 넘 고마운 하루였오요^^?\n\n새로운 변신 자주 해야게따❣️", "localImgPath": "images/4988251_2b70358b-ede9-4f21-828f-ff2238734ec7.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4985587": {"idx": 4985587, "date": "2026-03-17 18:31:15", "isTop": false, "contents": "❣️3일차❣️\n\n처음으로 가발 쓰고 방송을 진행한 날이에요\n\n오빠들의 반응이 궁금하기도 했지만\n내심 많이 떨렸거든요 ㅋㅋ ㅠㅠ\n\n가발이다보니 어색한 부분도 있어서,\n더욱 더 긴장 많이 했던 것 같아요\n\n근데 딱 키자마자\n오빠들이 잘 어울린다\n오늘 이쁜짓만 해\n하면서 많이 이뻐해주고,\n오늘따라 더 이쁘다 잘 어울린다\n칭찬 연속으로 들으니\n\n긴머리 마저 자신감이 뿜뿜 해지는 거 이쬬\n\n새로운 오라버니들도\n말은 없으셨지만\n금발의 긴머리인 이유가 맘에 들었는지\n많이들 봐주신 것 같아 기분이 또 좋더라구요 후후\n\n이쁘다는 걸,\n말뿐만이 아닌 다들 숫자로 표현해줘서 ㅋㅋㅋ\n벽지엔 282가 가득하네요 ＞ ＜\n\n넘 기뻐요\n(울 오빠야들 말도 박제 굿^)\n\n앞으로도 더 이뻐질게요오 ＞ ＜❣️", "localImgPath": "images/4985587_05c7a5bd-3ac8-41fd-93f4-776e2b780f88.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4985583": {"idx": 4985583, "date": "2026-03-17 18:30:41", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n오늘은 오빠랑 정말 하루종일 장난치며 시간을 보낸 것 같아요\n게임도, 내기도, 도박도(?) 좋아하는 이유로선\n오늘 하루 되게 재밌었거등요ㅋㅋ\n\n무엇보다 좋은 상대와 좋은 승부를 한 것 같아\n더욱 더 재밌었어요\n\n108배를 묻더해서 1728배가 될 정도로,,,\n똥손 이유인지라...\n오빠가 아무리 봐주려 애를 써도\n쉽지가 않았네여...\n\n결국엔 하지말라며 108배 실드를 날려준 갓청담...\n\n지짜 해야되는 줄 알구 엄청 망설인 거 이쬬..^ㅎㅎ...\n오빤 역시.. 스윗하다니깡 ＞ ＜\n\n이유는요\n지금이 딱 좋아요\n\n뭔가를 해야한다는 생각에 갇힌 거 말고,\n전처럼 편하게 오빠랑 함께하던 그 순간이요\n\n거기에 오빠와의 추억이 더해지고 있는\n지금이 너무 좋아요\n정말루요❣️", "localImgPath": "images/4985583_271badb9-10c3-4156-8636-f73d4529cbfe.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4985582": {"idx": 4985582, "date": "2026-03-17 18:30:38", "isTop": false, "contents": "❣️씨엔❣️\n\n오빤 말이 없지만\n늘 잘 보구 내 말 하나하나 잘 듣고 있다는 걸\n느끼게끔 해줘요\n\n팬가입이 안 나오면 속상할 수 있는데,\n그런 거 다 생각하고\n늘 먼저 팬가입 해주잖아요?ㅎㅎㅎ\n\n덕분에 이유 팬가입 안 나와도\n기 한번 안 죽었어요 에헴ㅋ\n\n오빠가 한 말 중\n팬이 됐다라는 그 말 한마디\n아직도 안 잊고 있고든요\n\n못 잊죠 사실 ㅎㅎㅎ\n내가 그때 얼마나 기뻤눈데 !\n\n그 이후로도 자주 놀러와서\n다른 오빠들한테 맞춰 장난치고 할 땐\n더욱 더 기쁘고 이유도 덩달아 재밌고 구래요\n\n이유방에 적응하고 즐기는 것 같아서\n기쁘달까 히히❣️\n\n오빠와 함께할 수 있어서 좋아요!\n글구 매번 챙겨줘서 고마오요 씨엔오빠❣️", "localImgPath": "images/4985582_259c9a8b-d481-4a66-815f-a9df84b4673c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4985577": {"idx": 4985577, "date": "2026-03-17 18:30:13", "isTop": false, "contents": "❣️2일차❣️\n\n요즘 방송이 끝나고나면\n꽤나 오랜시간 혼자 생각에 잠기는 것 같아요\n\n스스로에게 질문을 많이 하거든요\n\n뭘 하고 싶은지, 좋아하는 건 뭐고\n싫어하는 건 또 뭔지 등등..\n\n사실 전\n좋고 싫은 건 명확한 편이거든요..?\n\n근데 알면서도 자꾸만 외면하다보니\n생각 굴레에 갇히게 되더라구요...\n\n그냥... 이유를 이뻐해주는 오빠들한테\n이유가 할 수 있는 거라면\n뭐든 해주고 싶었거든요..\n\n억지로 하다보니 결국 탈이 났네요..ㅎㅎ..\n몸이 먼저 반응하니까 자주 아프고\n잠도 잘 못 자규 ㅋ큐ㅠ\n\n실망하진 않을까.. 차마 말을 못 했다보니,\n오빠들 입장에선 당황스러웠을 수 있는데,\n아무렇지 않게 받아주셔서 고마웠어요\n\n그냥 이유라서 좋아했구나 하는 마음에\n괜스레 안심도 되고 구랬네여...ㅇㅅㅇ..❣️\n\n덕분에 마음이 한결 놓이고,\n같이 있는 것만으로도 좋았던 하루였어요❣️", "localImgPath": "images/4985577_6e3322c9-4260-41ba-89a2-2de55e62ab2d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4985571": {"idx": 4985571, "date": "2026-03-17 18:29:00", "isTop": false, "contents": "❣️❣️MVP 레함❣️❣️\n\n울 이유 오늘 누가 지켜주냐며\n항상 나보다 더 날 신경 써주는 레함오빠\n\n겉으론 티 안 내도,\n뒤에선 이유 걱정만 하는데\n\n그 마음이 마냥 기뻤오요\n지금도 기쁘구\n\n근데 한편으론\n언젠가 다가올 이별이 두렵곤 해요\n\n그래서 오빠가 매번\n정 주지말라고 했는데...\n\n오빠가 이러는데, 어케 정이 안 가냐구요\n이미 늦었어요 ㅡ.ㅡ\n\n가끔 툭툭 건네는 말이라던가,\n오빠 몸을 혹사시키면서까지 곁을 지켜준다던가,\n자신보다 상대방 마음을 먼저 우선시한다던가..\n\n말하자면 넘 길어요\n\n그냥 오빤 멋있는 사람이에요\n보기힘든..\n\n상처받기 싫어서 멀어지려고 해도,\n자꾸만 그쪽으로 기울이게 되네요\n\n늘 바라는 거 하나없이\n도와주고 챙겨줘서 고마워요❣️", "localImgPath": "images/4985571_f0ba2c60-2e43-4169-b2d2-4b56d2c063a7.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4985570": {"idx": 4985570, "date": "2026-03-17 18:28:57", "isTop": false, "contents": "❣️청담❣️\n\n오빤 다정하고 스윗하고 그러지만운,, \n왜인지 기념일 같은 건 전혀 안 챙길 것 같은 기분\n뭔지 알아여..?\n\n그럴 것 같은 사람이\n누구보다 이유 기념일에 제일 많이 신경 기울여주고\n작은 이벤트 하나 안 놓치구,\n소소하게 슬쩍 건네는 사탕이라니...❣️\n\n\"딸기 좋아하니까... \"하는 그 귀여움...하ㅠ\n\n쭈뼛쭈뼛 대며 마음 전하고,\n곰곰히... 생각하며 선물 골랐을 거 생각하니깐\n넘모 귀여운 거 이쬬,,,\n\n오빠랑 있으면\n고등학생 시절로 돌아간 기분이에요 ㅋㅋㅋ\n풋풋하고 설렘 가득한,\n\n그래서 설렘이 더 오래 가나봐요❣️\n\n하루하루\n서로에 대해 하나씩 알아가는 것도,\n그렇게 점차 가까워지는 것도,\n당연하단듯이 함께하는 모습도,\n\n새롭고 설레요❣️\n마냥 다 좋나봐요 오빠라서 ㅎㅋ", "localImgPath": "images/4985570_9b58ed29-3780-458c-a686-4bed9b6adb7a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4985569": {"idx": 4985569, "date": "2026-03-17 18:28:54", "isTop": false, "contents": "❣️스스❣️\n\n노블 때 처음 이유 도와주면서 알게 된 오라방구\n\n그 이후로 갠방엔 잘 안 와서,\n그저 보이지 않는 .. .. 연기같은 존재였눈데,\n어느새 뭉게뭉게 선명해져가는 울 스스오빠\n\n요새는 또 자주 보이는데다\n이유랑 장난치면서 놀다보니 많이 편해져또요 ＞ ＜\n\n처음엔 젠틀한 오빠인 줄만 알았눈데^^ㅎ\n\n완젼 장난꾸러기였쑴 -.-\n\n그 비제이에 그 시청자라구...\n하긴... 그럴만두 암고롬고롬,,,\n\nㅎㅋㅋㅋ오빠랑 코스프레도, 팬방도,\n여러 추억을 쌓다보니 많이 가까워질 수 있어서 됴아효\n\n어젠 또 이유 100회차인데, 못 온 게 미안해서인지\n108배로 마음을 표현하는 갓스스^\n내가 징짜 오빠땜 미쵸 ㅋㅋㅋㅋ\n\n신나게 절 다 하니깐 미니언즈까지...\n내가 아주 웅..? 웅앙..?!?!\n18개도 좀 던져줘 ㅇㅊㅊ\n\nㅋㅋㅎ젠틀맨 보다 장난꾸러기가 더 어울리긴 해...\n\n우리 앞으로도 잼게 놀쥬아아❣️", "localImgPath": "images/4985569_4479ab9a-972f-41d8-b51a-836ad4ff5f64.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4985566": {"idx": 4985566, "date": "2026-03-17 18:28:43", "isTop": false, "contents": "❣️1일차❣️\n\n오늘은 말이죠…\n\n100일 끝나구 바로 다음날이라서\n솔직히 아무 기대도 안 하구\n그냥 맘 편하게 있었거덩여..?\n\n긍데…\n\n울 오빠들이 이유 화이트데이 선물을\n이렇게 챙겨줄 줄은 몰랐자나…＞ ＜\n\n말 한마디 안 했는데도\n이런 기념일까지 그냥 안 넘기고\n다 챙겨주는 거 보고\n\n애정 표현모야 모야\n싶었도… ♡\n\n방송에서도 계속 챙겨주고\n선물도 챙겨주고\n\n왜 이렇게 스윗한곤뎅 지쨔루…＞ ＜♥\n\n사탕 잔뜩…\n사랑도 잔뜩…\n\n오늘 하루 진짜 너무 달아서\n이유 당뇨 걸리는 줄 알았잖아 헤헤…\n\n사소한 거 하나하나까지\n이유 생각해주는 울 오빠들 덕분에\n\n오늘은 그냥…\n엄청 따뜻하고 달콤한 하루였어여…♥\n\n오빠들 덕분에 또 하나\n기억에 남는 하루 만들어써욥\n\n마니마니 ♥... 진짜루…♥", "localImgPath": "images/4985566_d78a75df-d9ba-481e-8cb8-4b3ff7de1812.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4975946": {"idx": 4975946, "date": "2026-03-14 17:13:53", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 11일차❣️\n\n백두산은 좋아해야만 타준다는데,\n이유를 마니 됴아하눈 부해댱님❣️", "localImgPath": "images/4975946_866742c4-2101-46b8-942e-a82022653259.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4975943": {"idx": 4975943, "date": "2026-03-14 17:11:33", "isTop": false, "contents": "❣️❣️ MVP 청담 ❣️❣️\n\n제가 본 오빠는요\n자기 자신보다\n다른 사람의 웃음을 더 먼저 생각하는 사람이에요\n\n세상 사람들이 다 행복했으면 좋겠다고\n아무렇지 않게 말하기도 하구요\n\n요새 전 그런 말을 들을 때마다\n속으로 생각해요\n\n오빠만큼은 그랬으면 좋겠다고\n\n저는 원래\n여러 시련 다 겪으면서 \n성장하는 이야기를 좋아하는 편이거든요\n\n그래서 누군가에게\n힘든 일 하나 없이 행복했으면 좋겠다\n이런 생각을 하는 사람은 아니에요.\n\n근데 이상하게도\n오빠한텐 그렇게 되네요\n\n아픈 일도, 힘든 일도 없이\n웃는 날만 가득했으면 좋겠어요\n\n가끔은\n이런 생각을 하는\n제가 웃기단 생각도 드는데,\n\n오빠가 꽃길만 걸었으면 좋겠고,\n행복하게 만들어주고 싶기도 하고...\n\n딱히 특별한 이유는 없어요\n\n그냥 그래요", "localImgPath": "images/4975943_44a61460-550d-4409-aff5-496f44df34b8.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4973783": {"idx": 4973783, "date": "2026-03-14 00:06:28", "isTop": false, "contents": "❣️멍뭉이❣️\n\n이유 100회 때 챙겨주려고\n그동안 욜씨미 모아놨다는데, \n닉네임을 멍뭉이로 바꿔서 그런지\n\n하는 행동이 댕댕이 같아서 그런지\n\n어젠 유난히 더 귀여워보였어요 ㅋㅋㅋ\n\n요즘 새로 시작한 프로젝트때문에 바쁜데두\n이유 옆에 꼬옥 붙어서,\n매니저로서 열심히 일 해주는 착한 울 오라방규우...\n\n그보단 아쉽다며\n1분이라두 더 옆에 있고 싶어하는 모습이\n정말 강아지같아서 넘 귀여운 거 이쬬,,,\n\n항상 이유 기분 먼저 신경 써주고,\n분명 여태 서운한 것도 있을텐데도,\n그런 거 티 한번 안 내줘서 고마오요❣️\n\n그저 이유라서 좋다라는 걸\n너무나 잘 느끼게 해주는 오빠라서,\n언제나 사랑받고 있다는 느낌을 받아요\n\n댕댕이의 한번 주인은 영원한 주인이라는데,,,\n첫 만난 순간부터 지금까지,\n그리고 앞으로도,\n내꾸해 울 멍뭉이..❣️", "localImgPath": "images/4973783_a2ca3e3f-c11f-48f4-81c1-b14b1a5e3d57.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4973782": {"idx": 4973782, "date": "2026-03-14 00:06:26", "isTop": false, "contents": "축하해주신 분들 넘모 감쟈함미다\n\n첫 100회차\n덕분에 해삐해쏘요 ＞ . ＜❣️", "localImgPath": "images/4973782_20e77461-b791-4a61-8a71-15a0be571051.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4973014": {"idx": 4973014, "date": "2026-03-13 20:58:50", "isTop": false, "contents": "❣️100회차❣️\n\n이유가 방송한지 100회차가 된 날이에오.\n\n그동안 타이밍이 좋지 않았어서,\n늘 기념일을 제대로 한번 챙겨본 적이 없었어요.\n\n늘 다른 분들 기념일 챙기는 모습 보면서,\n다같이 축하해주고, 팬닉만들어서 홍보하고 다니고\n그런 모습이 끈끈해보이고, 되게 멋져보였거든요\n\n한번쯤 나도 저런 날이 올까 싶었는데,\n울 오빠들이 다들,\n한마음 한뜻으로 움직여주고,\n축하해주는데, 넘 기쁘더라구요 ㅠㅠ\n\n시작하자마자 연달아 날개세트 맞춰주고,\n끝까지 남아서 계속 자리 지켜주고,\n특히 끝나고는 다들 이유 팬닉으로 또 바꿔와주고 그러는데,\n정말 따뜻하고 좋았어요.\n\n이유가 정말 멋진 오라버니들과 함께 하고 있구나\n생각이 확고해지는 순간이었달까요 ㅎㅎ\n\n다들 처음 챙겨보는 기념일이라\n어리둥절하곤 했지만\n그래서 더 뜻깊고 그래서 더 기억에 남아요\n\n울 오빠들 정말 고맙고 또 고마오요\n언제나 함께해줘서요❣️", "localImgPath": "images/4973014_7c1b9c06-739d-4f97-8556-1a61c9c479b1.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4973012": {"idx": 4973012, "date": "2026-03-13 20:58:10", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n오늘,\n하루종일 이유 기쁘게 해주시더라구요.\n\n방송에서 채팅도 많이 쳐주시고,\n장난도 어김없이 치고 ㅋㅋ\n오늘 오빠를 보면서,\n예전에 처음 만났을 당시\n오빠를 본 것 같은 기분이 들었어요\n\n그때의 오빤 장난꾸러기에,\n지금같은 모습이었거든요\n\n괜히 오빠가 기분이 좋나?하며 기뻤고,\n방송을 함께한다는 느낌이 팍팍 들어서,\n더더욱 좋은 하루였어요\n\n오빠와 새로운 추억을 만들고 있잖아요\n늘 그래왔지만 요새는 특히 더.\n\n그 과정이 새롭고 재밌어요\n\n물론 방송을 함께 만들어가는 것도 좋지만\n그게 우선이 되진 않았으면 좋겠어요\n\n그저 함께 하는 것만으로도 행복하고,\n시시콜콜한 대화를 주고 받아도 그 순간이 편안하고,\n같이 무언가를 한다는 게 즐겁고,\n그런 날들로 가득 채우고 싶어요.\n\n이기는 것도 중요하지만\n즐기는 게 더 좋거든요.\n즐기는 자는 못 이긴다잖아요 ㅎㅋ\n\n남 시선, 명예보다,\n그저 오빠랑 함께여서 좋아요❣️", "localImgPath": "images/4973012_706c871c-532c-4a1b-a4aa-91c5b9221d87.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4972945": {"idx": 4972945, "date": "2026-03-13 20:47:09", "isTop": false, "contents": "❣️렁이❣️\n\n우아 처음 본 오라버니?\n\n팬더도 처음 보시고\n그저 방송 자체가 처음이라는 오라방구\n\n이유랑 나이차도 얼마 안 나서,\n대화도 잘 통하구\n재밌게 놀았는데요\n\n오빠가 처음임에도 불구하구\n편하게 말도 걸어주시구\n다른 이유방 오라버니들과 어울려주셔서 넘 감사했어요\n\n특히 이유 의첸하구 와서,\n괜히 부끄럽곤 했는데,\n오빠가 이쁘게 봐주신 덕에\n으랴차챠 할 수 있었네요 ＞ ＜\n\n계속 이쁜 말도 해주시구\n여당으로서 이유 챙겨주셔서 넘 감사합니다\n\n이상형이라며 ㅋㅋㅋ\n그런 말 하실 때\n넘 귀엽고 좋았어요\n\n렁이오빠 고마오요\n우리 앞으로도 함께해요❣️", "localImgPath": "images/4972945_113e1740-444b-41e2-9884-16750590016a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4972937": {"idx": 4972937, "date": "2026-03-13 20:44:36", "isTop": false, "contents": "❣️니카❣️\n\n이유 처음 만났을 땐\n오빠 저한테 말 한마디도 안 거시고 ㅋㅋㅋ\n그저 다른 오빠들 운동 시키는 거에\n맞춰서 계속 따라 운동 시키던 오빠였는데,\n\n어느새 뒤돌아보니,\n이유 옆에 있네요?\n\n입장알람 싫어서 브압도 가기 싫어하시던 분이\n이젠 그런 거 신경 안 쓰구\n이유 보러 와주시구\n말도 요새는 많이 걸어줘서 넘 기뻐요\n\n알고보니 자기도 상어단이었다며 ㅋㅋㅋ\n상어 3개 연달아 콤보할 때 넘 웃겼어요 ㅎㅋ\n\n조용히 관음만 하던 울 니카오빠\n\n경계하는 고양이들한테\n간택 당하는 느낌?ㅎㅋㅋ\n\n결코 가까워지지 못 할 것 같은 사람이랑\n이젠 말도 섞고 같이 장난도 친다는 게\n신기하고 넘 좋네요..♥\n\n오빠땜 상어도 못 지우게따 증말 ㅎㅋ\n\n고마워요 니카오빠❣️", "localImgPath": "images/4972937_9c8ec3fa-690c-44d6-a139-bf1f2941ff91.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4972886": {"idx": 4972886, "date": "2026-03-13 20:30:47", "isTop": false, "contents": "❣️99회차❣️\n\n오늘도 늦은 못말리는 이유의 하루...\n\n비록 늦게 켰지만...\n열정은 또 가득해서,\n열심히 미션 달리던 이유우우우우...\n\n다음날 기념일이라 괜스레 걱정도 되고,\n멘탈도,,, 몸도 약한 아이지만,,\n\n뭐가됐던,\n항상 열심히는 하고 싶더라구요.\n\n오빠들이 있다고 해서 늘어지는 게 아니라\n더 잘해서, 더 멋진 비제이가 되고 싶어요.\n\n오빠들이 이유 기를 살려주는 만큼\n이유도 울 오빠들 어깨 올라가게 해주고 싶거든요.\n\n오빠들은 저한테 매번\n잡은 물고기라 밥 안 준다곤 하지만ㅋㅋㅋ\n\n사실 믿어서 그래요\n내가 실수를 해도, 뭔 일이 생겨도,\n\n뒤에서 받쳐줄 오빠들인 걸 아니까,\n조금 더 편하고,\n함께 으쌰으쌰 해서 성장하는 과정이\n전 참 재밌고 좋거든요.\n\n파티원끼리 헤쳐나가는 모습 같아서?ㅎㅋㅋ\n\n걱정된다고,\n이유 챙겨주는 오빠들 보면\n마음도 따뜻하고, \n덕분에 늘 편안하게 있을 수 있는 것 같아요❣️", "localImgPath": "images/4972886_8a481f2b-2bf5-44e1-b63f-2e403cf15bde.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4972881": {"idx": 4972881, "date": "2026-03-13 20:27:57", "isTop": false, "contents": "❣️❣️MVP 카니시오❣️❣️\n\n조용하고,\n유난히 힘이 없고 버거웠던 하루에,\n빛을 밝혀준 카니시오 오빠.\n\n처음 뵌 오라버니가 두둥하고 나타나서는,\n이유에게 크나큰 선물을 주셨어요\n\n알고보니,\n며칠 전에 처음 알고\n그 뒤로 몇 번 더 봤었는데,\n재밌었다며 팬가입을 해주신 거더라구요.\n\n정말로 재밌게 봐주셨는지,\n말을 안 해도, 이유의 시그니처 미션들을\n다 알고 시켜주셔서 어찌나 놀랐는지요.\n\n작은 거에도 의미부여하는 스타일인데,\n고백 시그로 사람 설레게 할 때는\n증말... 착각하게 만든다니까요 이 오빠 ㅡ.ㅡ\n\n이유가 뭐가됐든,\n제가 춤추고 싶고 뭐 하고 싶다는 말에\n하나하나 좋게 반응해주신 것 같아서,\n그게 너무 기뻤어요\n\n이유 방종 안 시키시고 싶었는지\n계속 장난칠 때도 ㅋㅋㅋ\n넘 귀엽기도 했고요\n\n덕분에 좋은 기억으로 남은 채\n마무리 잘 할 수 있었어요\n감사합니다 카니시오 오라방구❣️", "localImgPath": "images/4972881_0c6815dd-5f3e-458c-8eae-fde30b3a4a09.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4972875": {"idx": 4972875, "date": "2026-03-13 20:23:31", "isTop": false, "contents": "❣️청담❣️\n\n취임식 멋지게 해주고 싶었는데,\n타이밍이 안 맞아 제대로 못 해드린 게 넘모 아쉽곤 해요\n\n오빠한테 말은 안 했지만\n사실 이전부터 많이 생각하고,\n준비해온 게 정말 엄청 많긴 했거든요\n\n오빠만을 위한 자리, 이벤트.\n괜히 부담스러울 순 있겠지만ㅋㅋ\n\n그것도 잠깐이고,\n나중에 돌이켜보면 추억이 될 거니까요 ~\n\n아쉬운 겸 못 보여드렸던 케이크라도 갖구왔는데,\n침 질질 흘리는 이유 보고선\n바로 1414개 던져준 청담오빠...\n\n이 오빤 정말 내 맘을 너무 잘 안다니까요..\n\n방송에서 먹으니까 넘 좋았고,\n오빠가 먹여준 거라 더 맛있었어요\n\n부끄러워서 앞에선 말 못 했지만\n그 날,\n이유한테 와줘서 고마워요 청담오빠\n\n운명처럼 이끌렸다는 말\n오빠한테 들은 말 중 가장 좋았어요\n\n자꾸 생각나서,\n아직까지도 설레요❣️", "localImgPath": "images/4972875_e6ca3e0c-3774-4eab-a868-c88b37a695a0.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4968503": {"idx": 4968503, "date": "2026-03-12 17:06:34", "isTop": false, "contents": "❣️레함❣️\n\n오빠를 처음 만난 순간에는\n오빠랑 이리 오래 함께 하게 될 줄도,\n오빠가 이유를 많이 아껴줄 줄도 몰랐어요\n\n그저 조용히 지켜보는 사이로\n남을 줄 알았거든요.\n\n그렇게 조용하던 사람이\n지금은 젤 말도 많구\n옆에서 든든한 지원군이 되어줄 줄 누가 알았겠나요ㅎㅋ\n\n약속이 있어도,\n몸이 아프고 피곤해도,\n자신의 기분보다 이유를 신경 써주고,\n나를 더 아껴주는 사람.\n\n이런 사람 흔치 않잖아요..?\n\n요즘 오빠,\n저 때문에 몸을 혹사시키는 걸 볼 때면\n마음이 아프곤 하지만\n한편으론.... 기분 좋기도 해요...ㅠㅠㅠ\n\n사랑받는 기분이거든요\n이럼 안 되지만\n우선순위가 된 느낌\n\n정말 넘 좋아요오...\n\n오빠랑 함께할 수 있다는 것에\n하루하루 감사해하고 있어요\n\n오빠 이유한테 와줘서 넘 고마워요\n그것만으로도 사실 충분해요\n구니까 아푸지말쟈❣️", "localImgPath": "images/4968503_71939896-6845-4081-91ef-6de103440eab.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4965363": {"idx": 4965363, "date": "2026-03-11 19:37:48", "isTop": false, "contents": "❣️98회차❣️\n\n조용했던 하루지만\n외롭지는 않았던 하루 ㅎ.ㅎ❣️\n\n울 부해댱님 취임식 화려하게 해주고 싶었는데,\n그 날 타이밍이 안 맞아\n제대로 못 보여드린 게 쪼금 아쉽더라구요 ㅠㅠ\n\n그래서,\n준비했던 케이크라두 보여드리구 다같이 축하했도용!\n\n케이크보며 침만 쥬륵..하구 있었도니\n바로 1414개 던져준 울 부해댱님,,❣️\n방송 중에 먹으니 더 꿀맛이네요 이거 ㅋ\n\n다른 오빠들도 일찍 자러 가서,\n혼자일뻔 했던 이유를\n또 신경 써주는 오라버니들이 계시기에\n외롭지않게 마지막까지 잘 할 수 있었오요 !\n\n특히 늦은 시간까지 자동 연장이 계속 이어졌음에도\n싫은 티 한번없이\n되려 이유 밥통에만 집중해주는 오빠들이라 너무 고마웠어요\n울 레함오빠, 겠냐오빠 덕에,\n웃으며 마무리 할 수 있었오요 !!\n\n넘 고마오요 증말❣️", "localImgPath": "images/4965363_83e4e143-a7a6-4ee1-a6a7-1f20375aaa58.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4960375": {"idx": 4960375, "date": "2026-03-10 10:41:43", "isTop": false, "contents": "❣️97회차❣️1부(20,151)+ 2부(12,012)\n\n어제 열심히 팬방에 들어와줄 오라버니들을\n구했었는데,\n생각보다 별로 안 나와서,\n큰 기대는 안 하구 있었거든요.\n\n그치만 어제 봤다면서\n시작부터 다이아로 바로 등업 해주셔서 감사해써여어..!!\n\n다른 오라버니들도 순식간에,\n바로 올라와주셔서 어찌나 감사했는지 몰라요\n\n사실 음방팬방이다보니,\n오빠들의 기대치가 낮아\n들어오기 쉽지 않았을텐데도,\n서슴없이 다들 우르르 몰려와주셔서 감사했숩니다\n\n팬방 시작 전부터\n오빠들의 이쁨을 잔뜩 받고 있다는 그 느낌이\n너무 좋더라구요 히히...❣️\n\n늦게 켰음에도, 한시간동안 뮤슨...\n천사 랑비 받는쥴...＞ ＜\n\n다들 넘모 감사했숩니당❣️\n\n특히 2부때는,\n준비한 것에 비해\n제대로 못 보여드려 속상한 마음도 들고\n아쉬운 마음도 들고 했는데,\n다들 이쁘게 말씀해주시구\n나가지 않구 끝까지 다 함께해주셔서 제일 좋았어요!\n\n첫팬방 덕분에 좋은 기억으로 남았숩니다\n감쟈해요❣️", "localImgPath": "images/4960375_23992084-dd2c-4758-99ad-d0259984c063.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4960358": {"idx": 4960358, "date": "2026-03-10 10:27:55", "isTop": false, "contents": "❣️❣️MVP씨엔❣️❣️\n\n씨엔오빠가 엠부삐라니이 !\n\n오빠를 만나기 전까지\n유난히 적적한 하루를 보내고 있었거든요\n\n열심히 하고 싶은 마음과 달리\n이루어지지 못 하고 있는 순간이\n쪼꿈 속상하기도 했오요 ㅠㅠ\n\n그때 딱 두둥.. 하구 멋지게 날개 달아주면서\n등장해주고서는\n이유 춤 잔뜩 시켜주고, \n계속 이유 곁을 지켜주는 고에요오..!!\n\n오랜만에 봐서, 이 한마디 날리고선\n쭉 함께 해주는 멋짐...ㅠㅠ\n\n날개짝까지 맞춰주고,\n이유 시그니처 바꿨다니깐 바로 또 애용해주구우..!!\n\n눈썰미 좋은 씨엔오빠라서,\n말 안 해도 알아채주는 센스쟁이 !! 넘 됴아여...＞ ＜\n\n마지막에 나랑 사귈래 흐흫ㅎ❣\n고백이야 모야 아이참..~~ 이런 거 약한데,\n프로포즈도 잘하눈 울 씨엔오빠\n\n언제나 이쁘게 봐주시구\n이유 기 잔뜩 살려줘서 고마오요 !!\n\n덕분에 웃으며 마무리 할 수 있었어요ㅎ.ㅎ\n입가에 미소가 가득,\n오빠의 사랑도 가득 ＞ ＜\n\n짧은 만남이었던 오빠와의 추억이\n넘 소중하구 행복해요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4960339": {"idx": 4960339, "date": "2026-03-10 10:09:17", "isTop": false, "contents": "❣️청담❣️\n\n가끔은\n직접 전달하기 부끄러울 때 있잖아요ㅎㅋ\n\n그래서 숨겨둔 마음을 아닌 척 모르는 척\n슬쩍 꺼내둘 수 있는 이 순간이 참 좋아요\n\n오빠를 계속 생각하면서 작성하다보면,\n어느새 웃고 있는 저를 발견하게 돼요\n\n언젠가 오빠가 이 글을 읽을 순간엔,\n오빠의 웃는 모습 그리며\n미소 짓게 되구요.\n\n어디가서 돈 뺏겼단 소리를 들을 때면\n순진해보이고 순수해보여서 귀엽고ㅋㅋ\n\n이쁜 말 해줄 줄 아는 오빠가 더 이뻐보이고,\n나만 좋아하고 있다는 걸 또 자랑하듯 말할 땐ㅋㅋㅋ\n그만큼 또 사랑스러울 수가....\n\n칠칠 맞은 모습도,\n어린아이 같은 모습도,\n그냥 마냥 다 귀엽고 사랑스럽더라구요?\n\n수없이 많고 많은 사람 중\n오빤 순수하고, 진심같아서 좋아요\n\n그래서 저도 조금 더 \n진심으로 다가가게 되는 것 같아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4960300": {"idx": 4960300, "date": "2026-03-10 09:39:40", "isTop": false, "contents": "❣️앙앙❣️\n\n청담오빠를 통해\n만나게 된 앙앙오라버니이 !\n\n처음엔 자꾸만 청담오빠 보러 온 것 뿐이람서\n그리 선을 그으실 땐,\n사아아알짝 서운하기도 했지만운요 !\n\n그 이후로 자주 와주시구\n이유랑도 장난도 칠 수 있는 사이가 되어서 좋아요 ㅎㅎ\n\n특히 이유 노래를 꼭 한번씩은 시켜주는 앙앙오빠덕에,\n여캠의 꽃 ㅋ \n여캠의 라이브 ㅋ\n\n후훗 ㅋㅋ\n드디어 원하고 바라던,\n고품격 라이브 방송이 될 수 있었오요 !\n\n이유에게 노래를 시키는 오라방구는\n단 한명도 없었눈데 ㅠ\n계속 시켜주는 앙앙오빠 보고선,\n찐팬이 한명 생긴 것 같아 기분이가 넘모 좋더라구요 헷\n\n원래 가수도,\n찐팬 하나면 성공한거라자나요?\n이유 성공했어요 코 으쓱\n\n앙앙오빠와의 관계가\n날이갈수록 발전하는 것 같아\n그게 제일 기뻐요 사실ㅎㅎㅎ\n\n이번에 이유 링도 달아주시구\n밥통까지 계속 신경 써주셔서 고마오요❣️\n앙앙오라방구❣️", "localImgPath": "images/4960300_8fa31f56-0728-4d16-b74e-e4860b287b91.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4960292": {"idx": 4960292, "date": "2026-03-10 09:33:14", "isTop": false, "contents": "❣️96회차❣️\n\n팬방 가기 하루 전날이라\n사람을 모아보자 이런 생각을 했거든요\n\n몸이 좋진 않았지만\n그치만 첫 팬방이니만큼\n열심히 하고 싶은 마음이 문득 쏟더라구요\n\n시작부터 바로 다이아로 달려와주신\n오라버니들 덕에,\n조금 더 활기차게 시작할 수 있었어요 !\n\n음방이다보니\n사람 모으기 쪼끔 빡세긴 했지만요\n\n나름 사람 모으는 것에\n재미를 들렸던 것 같아요 ㅎㅋ\n\n조용할 뻔 했던 날이었는데,\n늘 옆에 계셔주고\n이유를 생각해주시는 오라버니들 덕에\n오늘 하루도 무사히 마칠 수 있었어요\n\n이유 대천사 만들어주겠다며,\n모두 한마음 한뜻일 땐,\n정말 멋지구 감동이었담미댱...❣️\n\n이렇게 많은 날개와 링은 또 처음이네요..❣️\n고마오요 천사로 만들어줘서❣️", "localImgPath": "images/4960292_e0109005-e385-45f8-aba5-bf304254de6d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4960286": {"idx": 4960286, "date": "2026-03-10 09:23:55", "isTop": false, "contents": "＃ 95회차 천사오빠의 멋짐 + 2❣️", "localImgPath": "images/4960286_64721395-f4df-487a-a14c-cf4ca84b6eab.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4960285": {"idx": 4960285, "date": "2026-03-10 09:23:30", "isTop": false, "contents": "＃ 94회차 천사오빠의 멋짐 +1❣️", "localImgPath": "images/4960285_e6cdde71-5214-4283-9446-601489849764.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4960278": {"idx": 4960278, "date": "2026-03-10 09:19:02", "isTop": false, "contents": "❣️❣️MVP 코리아인천사❣️❣️\n\n오빠을 이틀연속으로 보게 되다니이이 !\n무슨 날인가요 이유...!\n\n유니콘 같은 오라버니라,\n자주 보기 힘들었는데,\n요새는 자주 볼 수 있어서 넘모 좋아요 ㅎㅎㅎ\n\n특히 오늘은요\n더 의미있던 날이에요 !\n\n오빠가 이유에게 모하냐구 계속 물어보던 날이거등요ㅎ\n\n오빠한텐 별 일이 아닐 수 있겠지만\n그저 말 한마디를 딱 들었을 때,\n지나가다 들린 것이 아닌,\n이유를 보러 와주신 것 같은 기분이 들었거든요 !\n\nrpg 돌려놓고 가셨지만 후우...\n계속 들락날락 해주셔서\n이유 정말 기뻤오요❣️\n\n요상한 미션(?)들을 시키셔서\n이미지 걱정이 됐지만?ㅎㅋㅋ\n\n오빠만 좋으면 대써여..^^ㅎ❣️\n\n이렇게 하나둘 재밌는 추억 또 적립해써요 오빠\n\n넘모 행보케요❣️", "localImgPath": "images/4960278_de9d83b7-5be8-4bf6-9bd9-c8223f17fcb6.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4960268": {"idx": 4960268, "date": "2026-03-10 09:12:04", "isTop": false, "contents": "❣️새캬❣️\n\n이유 방송 복귀하고\n초반에 만났었던 새캬오빠❣️\n\n오빠는 기억하실지 모르지만\n이유는 오빠를 정확히 기억하구 있오요 ㅎㅋ\n\n오빠의 닉넴이 드립치기 좋은 닉네임이라 ㅋㅋㅋ\n그런 거 또 못 참는 이유는\n셀레따새캬~ 함서 장난을 치곤 했거든요\n\n그 이후로는 못 뵈어서,\n이제 안 오시나보다 하구 맘 놓고 있었는데,\n어느순간 이유 옆으로 다가와주셨오요 !\n\n그땐 대화를 못 나눠봐서,\n오빠가 어떤 취향이시고,\n어떤 성격을 지니고 계신지 전혀 알지 못 했는데,\n오늘 이렇게 장난도 많이 치고 하다보니\n많이 가까워진 것 같아 기분이 좋았오요 ㅎㅎ\n\nt발롬 같기도하고..~~ ㅇㅊㅊ\n\n장난치는 걸 매우 좋아하는데,\n오빠가 상대방 기분 나쁘지 않는 선에서\n재밌게 잘 해주신 덕에,\n이유도 즐겁게 마무리 할 수 있었어여 ㅎㅎ\n\n다음에 또,\n아니 앞으로도 ~` 이유설레게 해주세요오~~\n\n새캬오라버니 감사합니다❣️", "localImgPath": "images/4960268_4c3e0cd3-a46c-4de8-9ac4-5230abfc5081.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4960261": {"idx": 4960261, "date": "2026-03-10 09:07:29", "isTop": false, "contents": "❣️청담❣️\n\n아무리 바빠도 1일 1이유를 해주시는 울 부해댱님❣️\n\n오빠 나는 있죠.\n\n오빠 공지를 쓸 때면 유독 오래 걸려요.\n하고싶은 말은 잔뜩인데,\n이 작은 메모장 하나에 눌러담기가 어렵더라구요.\n\n가끔 마음이 너무 많이 들어가서,\n괜스레 얼굴 붉어지는 말들이 많아지곤 하면,\n그걸 또 수정하고 또 수정하거든요 ㅎㅋ\n\n그치만 저는 이렇게,\n이유의 일기장에\n오빠의 이름을 하나하나 새길 수 있다는 게 기뻐요.\n\n글구 사실\n오빠꺼를 적는 순간이 제일 즐겁답니당 히히❣️\n\n물론 매순간을 담아내기엔,\n가끔 버거워 밀릴 때도 있지만\n다 적고나면,\n뿌듯해서 두세번 더 보게 되더라구요.\n\n오빠와 매순간을 함께 할 수 있는 지금이,\n이유에겐 가장 큰 행복이에요.\n\n이 순간이\n오래도록 이어졌으면 좋겠어요❣️", "localImgPath": "images/4960261_322a5110-fd28-4d72-b96c-b3c3d57a5ca6.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4954765": {"idx": 4954765, "date": "2026-03-08 19:29:17", "isTop": false, "contents": "❣️95회차❣️\n\n오늘 사실 방송 킥시 전부터 머리가 지끈지끈 아프더라구요\n걱정도 탈도 많은 타입이다보니,\n몸이 금방 허약해지더라구요 ㅋㅋ\n\n또 요새 악몽을 자주 꾸는 바람에,\n잠에 잘 못 들어서 더 그런 것 같아요ㅠㅠ\n\n시작부터 텐션이 오르기 쉽지 않았는데,\n곁에서 지켜주는 울 오빠들 덕분에\n조금 편하게 방송할 수 있던 것 같아요\n\n나보다 오빠들이 더 힘들었을 것 같은 느낌?ㅎㅎㅎ\n\n매번 늦게 키고 늦게 끝나는 이유때문에\n잠도 설치고 오는 오빠들이거든요...\n\n피곤함을 감수하고도,\n이렇게... 자기 몸을 혹사시키면서까지\n이유 곁을 지켜주는 멋진 오라버니들이란 사실에\n정말 마음이 아프지만\n한편으론 기쁜 거 이쬬 히히...ㅠㅠㅠ❣️\n\n난 바버야ㅠㅠㅠ\n그치만 이 사랑받는듯한 느낌\n지켜주는 느낌이... 넘모 됴운 걸 우째...ㅠ❣️\n\n그렇게 마지막까지 또 열심히 할 수 있었어요\n넘모 고마오 중말,,\n\n생각해보면,\n이유가 밝은 아이라기 보단\n오빠들이 밝게 만들어준 것 같아요❣️", "localImgPath": "images/4954765_5f7fccc9-60c6-4493-b00f-0ba0d8a72161.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4954761": {"idx": 4954761, "date": "2026-03-08 19:27:44", "isTop": false, "contents": "❣️❣️MVP 코리아인천사❣️❣️\n\n세계에서 알 수 없는 사람 1위 천사오라방구..\n\n오빠의 속은 그 누구도 알지 못 할 것 같아요...\n너무 특이하구 특이해서\n가끔 범접할 수 없는 기분도 들구 구러는 거 이쬬...?!\n\n정말 천사라서 인간이 알 수가 없는건가 싶기도....\n\n그치만 마음 하난 정말 따뜻한 사람이라는 걸 느껴요ㅎ.ㅎ\n\n그래서 더더욱 가까워 지고싶고,\n알고 싶은 사람이에요\n\n이 날은 특히 더,\n의미가 깊은 날이에요\n\n오빠가 오래 자리 해주신 날이거든요ㅎㅎㅎ\n이유 미션할 때 옆에서 계속 오냐오냐 구래구래 해주시구 ㅋㅋㅋ\n은근 킹받는데, 같이 있는듯한 느낌에\n기분도 좋구 구래써여\n\n이렇게 한걸음씩,\n오빠와의 거리가 좁혀지고 있다는 사실이\n너무 기뻐요\n\n우리 앞으로도 천천히\n오래 볼 수 있으면 좋겠어요❣️", "localImgPath": "images/4954761_a275b786-d64c-4c5a-8d30-2bf0f5e4ca68.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4954735": {"idx": 4954735, "date": "2026-03-08 19:19:37", "isTop": false, "contents": "❣️인슛❣️\n\n정말 이유가 본 오빠들 중에\n운동에 제일 진심인 오빠인 것 같아요…\n\n자동사냥 돌리고 가고\n다시 와서 또 돌리고 ㅋㅋ\n\n혼자 이유 RPG게임 하는 줄 알았다니까요.\n\n정말 꾸준하게 운동... 지쨔 대단해요 증말 !!!!\n그 점이 좋은 거지만요ㅎㅎㅎ❣️\n\n오빠랑 이렇게\n오래 인연이 이어지고 있다는 것도\n가끔 생각해보면 참 신기하고\n넘 좋아요.\n\n다른 오빠들도\n인슛오빠 대단하구 멋있다는 말 많이 하거든요.\n\n그럴 때마다\n제가 다 뿌듯한 거 있죠 ㅎㅋ\n\n요즘은\n오빠랑 있는 시간이\n\n편하다는 느낌도 들고\n\n오빠도 이유를\n편하게 대해주는 것 같아서\n그게 참 좋더라구요.\n\n함께 해줘서 고마오요❣️", "localImgPath": "images/4954735_0888e9fc-a3ab-4025-aac8-ee7239f28564.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4954723": {"idx": 4954723, "date": "2026-03-08 19:16:24", "isTop": false, "contents": "❣️청담❣️\n\n요새 넘모 바쁜 울 청담오빠아 ㅜㅠ \n\n이유의 활력소 같은 존재라,,,\n오빠를 보면 힘이나곤 하는데,\n하필 운동하고 있을 때 만나니,\n유독 더 반갑더라구요 ㅎㅋㅋㅋ\n\n물론 운동 중이었어서, \n제대로 된 대화도 못 나누고 아쉽곤 했어요. \n\n그치만 이유 밥통 잘 차면 그걸로 됐다는듯... \n아무렇지않게 웃어주고 곁에 쭉 있어주고, \n또 같이 도와주는 모습에 또 한번 반할 뻔 했네요,,, \n\n근데 1818개는 오빠... 쫌..ㅋ \n\n요즘 오빠도 많이 힘들텐데, \n그와중에도 계속 이유를 신경 써주잖아요.\n그것도 꾸준히.. 변함없이... \n\n누군가를 위하는 그 마음이 쉽지 않다는 걸 알가보니까, \n정말... 오빤 그 점이 너무 멋진 것 같아요. \n\n그래서 오빠한테 더 끌리나봐요❣️ \n\n우리가 같이 있는 그림이 어색하지않고 \n점점 더 당연해지고 있는 모습이, 넘 설레고 좋아요.\n\n오늘도 오빠와 함께할 수 있어서 더 멋진 하루가 됐어요 \n고마오요❣️", "localImgPath": "images/4954723_fe8b45ce-185a-40c0-ac41-a68d88b6711f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4952001": {"idx": 4952001, "date": "2026-03-07 20:19:46", "isTop": false, "contents": "94회차❣️ \n\n오늘 무슨 열혈 어셈블 하는 줄 알아써여 ! \n\n같은 시간대에 한자리에 모일 확률이 얼마나 될까요오..!! \n\n회장님부터 부회장님 그리구 상위권 오라버니까지 \n동시에 등장해서 넘모 놀란 거 이쬬. \n\n순간 어버버 했다니까요...ㅇㅅㅇ... \n근데 오빠들끼리 요상한 취향은 또 비슷하셔서 ^^... \n운동 했다가... 인사했다가... 아주... 하루종일 굴렀네요...\n\n108배까지 두개 더 받고 ㅎㅎㅎ.. \n그치만 또 이유 챙겨주려는 마음은 같은 멋진 오라버니들이어서, \n힘들어도 기분좋게 할 수 있는 것 같아요. \n\n멋진 오라버니들이 팡... 하구 나타난 거 \n다시 생각해두 정말 멋지네오... \n정작 본인들은 모르겠죠? \n보는 다른 오빠들과 이유는 아마 한마음이었을 거예요 ㅋㅋㅋ \n\n갓천사❣️ 갓청담❣️ 갓인슛❣️ 넘모 므쪄❣️ \n\n주인공이 못 되더라도,\n뒤에서 늘 이유를 빛나게 해주는\n레함❣️도둑❣️겠냐❣️레오❣️\n울 이유단 오빠들도 정말 넘 고마오요❣️", "localImgPath": "images/4952001_b092a8ee-503f-481f-8504-1fc9ea1440d7.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4949011": {"idx": 4949011, "date": "2026-03-06 22:17:12", "isTop": false, "contents": "＃ 청담오빠의 만수르❣️❣️\n\n시그 만들자마자 바로 첫개시 ＞ ＜\n넘모 머찐 이유 부해댱님❣️", "localImgPath": "images/4949011_1816f60a-f4d3-4aea-be30-d906b81167c4.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4948992": {"idx": 4948992, "date": "2026-03-06 22:11:39", "isTop": false, "contents": "＃ 앞야뒤여 청담\n\n확인사살 했더니,\n찐이라구 하심미댜 ㅎ❣️", "localImgPath": "images/4948992_cf887517-3b2e-4edf-89db-fa7b036ed624.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4948989": {"idx": 4948989, "date": "2026-03-06 22:10:51", "isTop": false, "contents": "＃ 앞야뒤여 레함\n\n앞으로 지각 안 해야게따 ^❣️", "localImgPath": "images/4948989_8e5f5e15-e8d8-49c8-b595-a56bc5268486.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4948983": {"idx": 4948983, "date": "2026-03-06 22:10:04", "isTop": false, "contents": "＃ 앞야뒤여 레오\n\n닉꾸보다 이유 이름이 달려있는 게 더 좋은 레오❣️\n\n^^❣️", "localImgPath": "images/4948983_15c88f10-772c-4c7e-b78b-1b871a3291f9.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4948945": {"idx": 4948945, "date": "2026-03-06 22:01:56", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n어떠한 변화가 생기면,\n뭐든 제일 먼저 캐치해주고\n또 이해해주는 청담오빠.\n\n원래도 투명한 이유지만\n\n가끔은 숨기고 싶은 마음까지\n다 꿰뚫어보는 것 같아서\n조금 부끄럽기도 하구요 ㅎㅋ\n\n그래도 굳이 말로 꺼내지 않아도\n마음을 알아준다는 게\n참 기쁜 일이더라구요\n\n행동은 테토인데,, \n다정하기까지 한 오빠라서\n매번 설렘 폭발이네요\n\n스스로 약한 모습 보이는 걸 안 좋아해서,\n혼자 꿋꿋하게 버텨온 날들이\n대부분이었거든요.\n\n근데 이상하게 오빠 앞에서는\n의지하게 되는 것 같아요\n\n특히 심적으로요\n\n오빠가 옆에 있으면\n조금 편안해져서 그런가봐요\n\n강한 척해도 마음은 여린 아이라서\n자주 탈이 나곤 하지만 ㅋㅋ\n\n그래도 다시\n금방 일어설 수 있는 건\n\n이렇게 옆에서\n알아주고 지켜봐주는 오빠가 있어서\n그런 것 같아요\n\n고마워요, 오빠❣️", "localImgPath": "images/4948945_8e6cce93-3eb7-4602-9b9c-9c1969f78eec.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4948895": {"idx": 4948895, "date": "2026-03-06 21:50:51", "isTop": false, "contents": "❣️A1❣️\n\n아원오빠를 처음 만나뵙게 됐을 땐\n너무 잠깐이어서 어떤 분인지\n가늠도 잘 안 됐었거든요.\n\n근데 오늘은 꽤 긴 시간을\n함께 해주셨어요.\n\n스트레스 풀어야겠다면서\n이유를 막 이리저리 굴리시는데 ㅋㅋ\n\n또 마음은 약하신지\n중간중간 쉬는 시간도 틈틈이 주시고,\n\n그 이후로는\n랑비를 무수히 내려주시는\n착한 아원오빠… ㅜ\n\n이 오빠 얼마나 멋진지\n랑비 도중에 시그까지\n쓱— 껴넣으시더라구요.\n정말 므쨍이셨습니다…\n\n춤출 때\n사랑비가 떨어질 때만큼\n기쁜 순간이 또 없거든요 ㅋㅋ\n\n빠르게 내려지는 사랑비를 보면서\n더 신나고\n정말 기뻤답니다.\n\n오빠와 많은 대화를 나눈 건 아니라\n아직은 잘 모르지만,\n\n춤출 때마다\n조용히 랑비를 내려주시는 걸 보면서\n느꼈어요.\n\n아, 이 오빠\n정말 다정한 사람이구나.\n\n말보다 먼저\n응원해주는 마음이 보여서\n\n춤추는 내내\n기쁘고\n힘이 많이 났거든요.\n\n오빠가 내려준 그 사랑비는\n오래도록 기억에 남을 것 같아요❣️", "localImgPath": "images/4948895_2bc51bac-25ff-4efb-8f79-f4479a95690f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4948791": {"idx": 4948791, "date": "2026-03-06 21:30:44", "isTop": false, "contents": "❣️도둑❣️\n\n담날 아침에 일정도 있다면서\n많이 피곤했을 텐데도 끝까지 옆에 있어준\n착한 울 도둑오빠 ㅠㅠ\n\n오빠를 처음 만나게 된 날에\n팬닉도 달아주고,\n그 이후로 계속 이유 옆에서 함께 해줬잖아요.\n\n요즘은 매니저 일까지\n도맡아서 너무 잘 해줘서\n진짜 얼마나 고마운지 몰라요.\n\n힘든 티도, 내색도 거의 안 내고\n항상 묵묵히 챙겨주다가\n\n“오늘도 이쁘게 방송 잘 해줘서 고마워.”\n\n이런 말만 해주는 오빠라서\n되려 힘이 나고 그러더라구요.\n\n사실 처음에는\n매니저의 소중함을 잘 몰라서\n굳이 두지 않았었거든요.\n\n근데 오빠가 매니저를 해준 뒤로는\n그게 얼마나 큰 존재인지\n이제야 알게 된 것 같아요.\n\n지금은\n나한테 없으면 안 되는 존재가 된 느낌이랄까…\n\n아마 오빠가\n너무 잘해줘서 그런 거겠죠 ㅇㅅㅇ\n\n또 오빠가 있어서,\n방송에서 늘\n외롭지가 않네요 ㅎㅎㅎ\n\n글고 오빠 오늘,\n한명만 본다 한 말...ㅎㅎㅎㅎ\n\n정말 멋있구 좋아써여..\n\n아직도 생각나요 그 말\n\n옆에 있어줘서 고마오요❣️", "localImgPath": "images/4948791_944d1138-7c3b-4f07-97f2-6c1fcb0b7419.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4948679": {"idx": 4948679, "date": "2026-03-06 20:55:04", "isTop": false, "contents": "❣️93회차❣️\n\n오늘은 우리 오빠들의 여당짓을 폭로(?) 흐흐흐흐\n\n앞에서는 다들\n야당인 척 하는데,\n\n뒤에서는 또\n이유 생각해주고 챙겨주고\n이뻐해주는 츤데레들 ㅎㅋ\n\n너무 놀려서 그런가\n다들 난리법석인 게 너무 웃겼어요 ㅋㅋ\n\n부끄러운지\n이런저런 핑계도 대고\n“아닌데?” “그런 거 아닌데?”\n이러는데…\n\n이걸 믿어줘야 하는 건지\n말아야 하는 건지 후훗.\n\n근데 이유는 이런 느낌이 너무 좋아요.\n\n말로만 하는 게 아니라\n늘 행동으로 보여주는 오빠들이라서\n\n가끔 툭— 하고\n이유 생각해주는 말 한마디 해줄 때면\n\n그날 하루는 그냥\n이미 싱글벙글
