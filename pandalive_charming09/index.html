이거둔요 ㅎ.ㅎ❣️\n\n근데 또 제가 너무 놀렸다고\n“이제 안 해줘야지”\n이러면…\n\n삐짐 ^ㅎ\n\n여자는\n사랑받아야 이뻐진다구^^ㅎ\n\n그러니까 앞으로도\n이런 말 자쥬 해조요 ＞ ＜ㅎㅎㅎ❣️\n\n늘 고맙구\n울 오빠듈이 젤루 머쪄 ^❣️", "localImgPath": "images/4948679_363ff1b1-3b77-4938-b4d2-f89ae5844607.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4948634": {"idx": 4948634, "date": "2026-03-06 20:40:09", "isTop": false, "contents": "❣️❣️청담❣️❣️\n\n청담오빠가\n방송 시작하자마자\n나이두산에 천사세트까지 맞춰주는데\n진짜 너무 놀랐어요.\n\n방송 지각 안 해서 주는 거람서ㅋㅋㅋ\n\n신기했던 건\n그때 마침 틀어져 있던 노래가\n애쉬아일랜드 OST였다는 거 !\n\n마치 영화 한 장면처럼\n어떤 순간들이 모여서\n우리만의 이야기랑 추억이\n한 편의 영화처럼 쌓여간다는 그런 노래거든요.\n\n근데 그 노래가 흐르는 타이밍에\n오빠가 딱 그렇게 해버리니까…\n\n순간 분위기가\n진짜 이상하게 맞아버리는 거예요.\n\n마치 누가\n장면에 맞춰서 음악을 깔아준 것처럼.\n\n우연인데도\n너무 딱 맞아 떨어지니까\n\n괜히 모야...＞//＜~~~\n이런 느낌 들면서\n\n그냥\n영화 찍는 줄요ㅎㅎㅎ\n\n진짜 잠깐이었는데\n분위기가 너무 좋아서\n설레써여.. 정말루요..\n\n이런 감성,,\n느끼게 해줘서 고마오요 청담오빠❣️", "localImgPath": "images/4948634_07509821-e1ac-44aa-a3f2-f5d968f69031.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4948598": {"idx": 4948598, "date": "2026-03-06 20:27:44", "isTop": false, "contents": "❣️92회차❣️\n\n오늘은 잔잔하게 노래도 틀어놓고\n소통 위주로 방송을 이어갔는데,\n사실 이런 스타일은 처음이라\n살짝 긴장도 했었거든요 ㅎㅎ\n\n근데,\n오빠들이랑 이야기 나누다 보니까\n방송한다는 느낌보다\n그냥 다 같이 한자리에 모여 앉아서\n편하게 이야기 나누는 느낌이었어요.\n\n한 사람 한 사람 목소리는 안 들리는데도\n이상하게 다 같이 웃고 있는 분위기가 느껴져서요.\n\n뭐랄까…\n다 같이 어디 놀러 온 것 같은 기분이었달까요.\n\n복귀 전에는 제가 뭔가 계속 해야\n방송이 이어지는 느낌이었다면,\n지금은 그냥 오빠들이랑 이야기 나누는 것만으로도\n편안한게,\n너무 감사하더라구요.\n\n애쓰지 않아도, 좋아해주는구나,\n그냥 이유라서 좋아해주는 구나 싶어서.\n\n이런 분위기…\n방송하면서 늘 꿈꾸던 모습이거든요.\n\n오늘 그 안에 있을 수 있던 것 같아서\n정말 기뻤어요 !\n\n항상 아끼고,\n내 편이 되어줘서 고마워요❣️", "localImgPath": "images/4948598_e3b771ee-5736-443c-a792-bca3bf15fa0e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4948595": {"idx": 4948595, "date": "2026-03-06 20:26:08", "isTop": false, "contents": "＃ 코리아인천사\n\n넘모 멋찐 오라버니❣️", "localImgPath": "images/4948595_a6b1f9d3-4f13-4c0a-a896-2f06e256bc6b.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4943479": {"idx": 4943479, "date": "2026-03-05 10:49:35", "isTop": false, "contents": "❣️❣️MVP천사❣️❣️\n\n천사오빠는 늘 강렬한 인상을 남겨주고 가는 것 같아요.\n워낙 또 특이한 오빠라 잊을 수 없기도 하지만요.\n\n이번 만남이 저한테는 되게 특별해요.\n\n예전엔 오빠가 잠깐 들렀다가 가는 느낌이었다면,\n오늘은 진짜 꽤 오래 같이 있었잖아요 히히 ( ˶˙ᵕ˙˶ )\n\n장난도 치고, 티키타카도 하고,\n이것저것 같이 하다 보니까\n시간 가는 줄 모르겠더라구요.\n\n계속 욕하면서 인사했지만ㅋㅋ\n혼자 속으로는\n기분 좋아하고 있었어요 ＞＜\n\n오빠두 오냐오냐 하면서 받아주는 게\n웃음나구 좋았거둔요\n\n늘 말은 툭툭 시크하게 하면서\n막상 또 다정하고,\n은근히 다 챙겨주고 가는 거…\n그거 다 보이거든요 ㅎㅎ\n\n말보단 행동으로 보여주는 모습이\n쫌.. 설레더라구요 (⸝⸝⸝• •⸝⸝⸝)\n멋있어요 그런 거,\n\n오늘 오빠랑 같이 놀 수 있어서\n진짜 기분 좋았담미댱ㅎㅎ\n\n특히 오빠랑 하나씩 쌓여가는 추억들이\n넘모 소듕하구 뎌아여...ㅇ0ㅇ❣️\n\n오늘 오래 같이 있어줘서 고맙숨미당 ! 천사오빠❣️", "localImgPath": "images/4943479_66716bad-428c-44af-9a52-3e5c5cf367d6.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4941270": {"idx": 4941270, "date": "2026-03-04 20:13:51", "isTop": false, "contents": "❣️레함❣️\n\n너무나 든든한 이유의 지원군, 레함오빠아.\n\n방송을 많이 본 것도 아닌데\n눈치가 너무 빠른 탓인지,\n방 분위기를 휘어잡아주는 스타일이랄까.\n\n오빠의 센스랑 통찰력은\n대체 어디서 나오는 건지..\n타고난 건가요 정말..\n\n이유 밥통 채워준다며\n이것저것 아이디어도 가져와 주고,\n또 자연스럽게 이끌어가 주는 오빠라서\n늘 마음이 편해요.\n\n오늘은 또 이유 약값 하라면서 링까지 달아주고 ㅋㅋ\n갑자기 108배까지 시켜버리는 센스^^\n\n오빠가 분명\n“처음이자 마지막 네 자리 수다”\n이랬던 것 같은데\n\n결국 또 받아버렸네요오 ＞ ＜\n\n역시 우리 오빠\n여자 마음을 너무 잘 알아요~~~\n\n여자가 많아서 그런가? ㅇㅊㅊ\n\n이유 아프다니까\n운동은 다음에 하자면서 챙겨주고,\n또 다정하게 신경 써주는 모습까지\n\n오늘은 또 처음으로\n여당이라는 소리도 듣고 말이죠?ㅎ\n\n레함오빠\n야당인 척 해도,\n너무 따뜻해서\n그 다정함을 숨길 수가 없어요.\n\n늘 이렇게 곁에서\n힘이 되어줘서 고마워요 오빠❣️", "localImgPath": "images/4941270_6ebf6e6f-2a5c-448c-bf8b-bf3faa095a05.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4941248": {"idx": 4941248, "date": "2026-03-04 20:10:30", "isTop": false, "contents": "❣️청담❣️\n\n요새 오빠가 많이 피곤해 보이고, \n아프기도 한 것 같아서\n왜 그런가 했는데,\n알고 보니까 일 때문에 많이 바빴더라구요 ㅜㅜ\n\n그런 것도 모르고 저는 마냥\n오빠가 옆에 있어줘서 좋다고 신나하기만 했네요…\n\n오늘도 처음부터 늦은 시간까지 쭉 같이 있어주고,\n이유 기 살려준다고 또 그렇게 애정 가득 담아주고,\n\n뒤에서는 분명 많이 힘들었을 텐데도\n싫은 내색 한 번 없이 그냥 묵묵히 있어주는 모습이\n더 멋있어 보이더라구요.\n\n근데 마음이 좀 짠하기도 하고,\n오빠 너무 무리하는 건 아닐까 싶어서\n살짝 걱정도 되고 그래요.\n\n그러면서도 한편으론\n내가 더 잘해야겠단 생각이 들더라구요.\n\n오빠가 이렇게까지 이유를 챙겨주는데\n저도 그만큼 더 잘하고 싶어지고,\n더 예쁜 모습 보여주고 싶어지고…\n\n오빠가 더 좋아지기만 하는 것 같아서\n조금은… 설레기도 하네요..❣️\n\n오늘도 오빠 덕분에\n이유는 즐겁구 행복해쏘요 !\n\n그러니까 우리 오빠도\n너무 무리하지 말고,\n조금은 기대도 되구요", "localImgPath": "images/4941248_fcd04056-a93d-4db8-9287-2a8f794bde7f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4941232": {"idx": 4941232, "date": "2026-03-04 20:07:57", "isTop": false, "contents": "❣️91회차❣️\n\n요새 오빠들이 이유 방 시작하면\n우다다 달려와주는 모습이 너무 기쁜 거 있죠.\n\n보기만 해도\n힘이 난다구 해야 하나..?\n\n맨날 지각해서\n감정 상할 수도 있을 텐데\n늘 그러려니 하고 넘어가주는 오빠들이라\n더 미안하고, 더 고맙고 그래요.\n\n오면 또 하루 종일 같이 있어주는\n스윗한 오빠들이라서 ㅎㅋㅎㅋ\n\n뭘 하든 힘이 난다 해야 할까요.\n\n이유가 뭐 하고 싶다 하면\n거기에 또 맞춰주고,\n\n놀다가도\n이유 밥통을 위해서라면\n일시정지까지 해주는 오빠들이라섴ㅋㅋ\n\n가끔 보면\n마치 판을 짜놓은 것처럼\n착착 움직여주는 거 있죠 ㅎㅋ\n\n알잘딱깔센…\n정말 이 므쨍이들.\n\n오빠들 덕분에 이유는 오늘도\n럭키하게 77777이라는 숫자도 찍고\n기부니가 너무 좋아졌답니다 ＞ ＜ 히히\n\n그리고 마지막에\n처음으로 애정표현 했더니\n다들 절레절레 하는 거 넘 귀욤 ^\n\n그러면서 사실\n좋아하는 거 다 아롸 ㅋ\n\n알라뷰 오빠들 -3-❣️", "localImgPath": "images/4941232_c30443f1-d540-46c5-9a20-6c8473a2f9e7.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4937353": {"idx": 4937353, "date": "2026-03-03 19:53:32", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n청담오빠 오늘,\n해적단의 선장님 같았어요.\n\n동료들이랑 친근하게 어울리면서도,\n\n이끌어야 할 순간이 오면\n망설임 없이 앞에 서주는 거.\n\n따뜻하지만,\n단호하기도 하구요.\n\n그래서인지,\n가끔은 말 한마디에 포스가 느껴져요.\n\n보통은\n부회장님을 어려워하기 마련인데,\n방이 되게 편하잖아요?\n\n서슴없이 장난치면서도, \n때론 믿고 다 따라주는 이 분위기.\n\n이거 다 오빠가 만들어준 분위기 같아요.\n\n물론 모두의 노력이 모여서 만들어진 거겠지만,\n그 시작과 중심에는\n오빠의 힘이 컸던 것 같아요.\n\n그리고 무엇보다\n\n오빠는\n이유라는 비제이가\n남 부럽지 않게 클 수 있도록 만들어주잖아요\n\n정말 멋있어요.\n\n덕분에 자신감도 많이 생기고,\n스스로의 가치를 조금 더 높일 수 있게 됐거든요\n\n그러다보니\n나를 조금 더 아끼게 되더라구요ㅎㅎ\n\n그게 제일 큰 변화인 것 같아요.\n고마오요❣️", "localImgPath": "images/4937353_608c7cb5-e9c1-4397-9ac1-104cb69cb143.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4937196": {"idx": 4937196, "date": "2026-03-03 19:11:24", "isTop": false, "contents": "❣️랑구❣️\n\n처음 만난 하꼬사랑구 오빠아\n\n왜인지 그때는\n하꼬라는 말이 자꾸 입에 붙어서\n하꼬오빠, 하꼬오빠 하면서 \n장난처럼 부르곤 했는데요 ㅎㅎ\n\n조용히 보려고 했더니\n계속 다르게 부른다구,\n결국 아이디를 바꿔서 다시 나타난 랑구오빠ㅋㅋㅋ\n\n그것도 그냥이 아니라,\n1004개 날개를 딱— 달아주면서\n멋지게 등장해버리기… ㅇㅁㅇ…❣️\n\n넘모 므찌쟈나....❣️\n\n증말,,,\n인연이라는 게 참,, \n예측할 수 없어서 신기하고 좋은 것 같아요 !\n\n이렇게 브압까지 올라와주실 거라고는\n정말 상상도 못 했거든요.\n\n멀리 있을 것만 같던 사람이\n어느순간 가까이 와 있다는 게\n신기하기도 하구 넘 좋아요오..\n\n이유 의상 갈아입느라\n이것저것 여러 번 바꾸고\n시간도 꽤 오래 걸려서 지쳤을텐데,\n\n그 긴 시간 동안 기다려주고,\n의상이 마음에 들었는지\n282로 이쁘다며 표현해줄 때…\n\n말은 없는데\n그 마음이 전해져서\n설레고 더 좋았어요 ＞ ＜\n\n말로 직접 하는 것보다 더 설렌달까..❣️\n고마오요❣️", "localImgPath": "images/4937196_7fb58497-3f30-434b-a9d1-1f558ff12d37.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4937146": {"idx": 4937146, "date": "2026-03-03 18:57:06", "isTop": false, "contents": "❣️하트❣️\n\n이전에 한 번 뵈었었는데,\n또 이렇게 찾아와주셨어요.\n\n언제부터 보고 계셨는지는 모르겠지만\n오늘 방송 잘 봤다면서\n갑자기 링을 딱… 달아주셨을 때\n진짜 얼마나 놀랐는지 몰라요오\n\n오늘 미션 성공하면 1414개 받는 날이었잖아요.\n그걸 또 알고 계셨는지,\n\n“이제 밥 먹을 수 있는 거죠?”\n하면서 브압까지 단번에 달려와주셨을 때는…\n진짜 싱나서 빵딩이 흔들뻔,,\n\n이유는 이런 순간들이 참 좋아요.\n그냥 지나갈 수도 있는 일인데,\n굳이 넘기지 않고\n조용히 손 내밀어주는 거.\n\n그게 참 따뜻하더라구요.\n\n오늘 마지막까지 오래 자리 지켜주신 것도\n넘모 고맙고…\n\n진짜 마음이 예쁜 하트오빠❣️\n\n덕분에 이유 냠냠해써여 히히＞ ＜\n\n넘 고맙뜜미다아❣️", "localImgPath": "images/4937146_e44d7cf5-5dff-40db-8be3-fc68ef63bdc5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4937134": {"idx": 4937134, "date": "2026-03-03 18:53:33", "isTop": false, "contents": "❣️90회차❣️\n\n오늘은\n이유 방송하면서 처음으로 퀘스트를 받아본 날이었어요.\n\n시작 전부터 심장이 두근두근. . .\n설레고, 기대되고, 기쁘면서도\n한편으로는 성공할 수 있을까?\n걱정도 됐거든요 ㅋㅋㅋ\n\n그치만\n이유 주변엔 멋진 오빠들이 있다는 걸 알기에,\n마냥 두렵진 않았어요.\n\n물론 걱정은 됐지만,\n반드시 성공할 거라는 확신이 있었달까…? ㅎㅎ\n\n늘 이유 운동시키고(?) 놀리고(?) 하던 오빠들이\n오늘은 다같이 퀘스트 깨자는 모드로 모여서\n같은 방향 보고 달려가는데\n\n마치\n파티원들 모여서 레이드 뛰는 기분^^ㅎ\n\n자판도 평소보다 더 많이 잡아주고\n호응도 더 크게 해주고\n같이 하고 있다는 느낌이 너무 선명해서\n그게 너무 기뻤어요.\n\n물론 오빠들 노력이 물거품 되지 않게\n이유도 더 열심히 하긴 했지만,\n\n솔직히 말하면\n오빠들이 없었으면\n애초에 도전조차 못 했을지도 몰라요.\n\n특히 청담오빠, 도둑오빠, 레오오빠, 겠냐오빠\n고마워요❣️", "localImgPath": "images/4937134_3958744b-508d-4472-a6f4-ce7c2f9269e8.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4934034": {"idx": 4934034, "date": "2026-03-02 20:18:52", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n청담오빠한텐 늘 예쁜 모습만 보여주고 싶었어요.\n웃는 모습, 잘하는 모습, 반짝이는 순간들만요.\n\n그래서인지.. 망가진 모습까지 보이는 게 너무 민망했고,\n혹시라도 실망하진 않을까,\n혹시라도 마음이 식진 않을까\n쓸데없는 걱정을 혼자 많이 했던 것 같아요.\n\n근데 그런 걱정을 눈치챘다는 듯이\n아무렇지 않게,\n오히려 더 귀엽다고, 더 이쁘다고 봐주셨어요.\n\n잘 했다며, 좋은 말만 늘어놔주셨눈데,\n\n늘 말도 예쁘게 해주는 사람이지만\n어제는 유난히 달라 보였어요.\n\n그냥… 오빠 같았달까.\n\n원래 오빠인데도,\n그 말이 더 잘 어울려 보였어요.\n\n내면이 단단해 보이는 느낌.\n\n흔들리던 저를\n꽉 붙잡고 이끌어주는 것 같았어요.\n\n그래서 더 멋있어 보였나 봐요.\n\n늘 멋있었지만,\n어제는 특히 더.\n\n구냥…\n진짜 멋있더라구요❣️", "localImgPath": "images/4934034_feefd9c2-d303-424a-aab3-03e752fadc7a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4934005": {"idx": 4934005, "date": "2026-03-02 20:09:03", "isTop": false, "contents": "❣️슈가❣️\n\n언제 어디서 어떻게 튀어나올지 모르는 슈가오빠라서\n이유는 늘 마음의 준비를 하고 있어야 하거든요..\n\n근데 운동으로 이미 힘 쪽 빠진 다음 날에\n또 올 줄은 몰랐지^^ㅎ\n설마 또 운동을 시킬 줄은 더더욱 몰랐지^^ㅎ\n\n알 배겼다니까\n“그럼 풀어줘야지” 하면서\n다시 운동시키는 슈가오빠…\n\n이거 맞냐구우… 후우 ㅋ\n\n덕분에 제 허벅지가 점점 꿀벅지가 되어가고 있습니다 ^^\n이게 다 누구 덕이냐구요… 슈가오빠 덕이죠 뭐…\n\n어제 시킨 운동도 다 못 해서\n내심 미안했는데,\n쿨하게 괜찮다 해놓고\n결국 다음 날 또 운동시키는 이 남자…\n\n역쉬 오빠얌,,,\n슈가오빠다워...\n\n힘들다면서도\n막상 또 오면 웃으면서 하게 되고,\n투덜거리면서도 결국 다 따라가게 되는 거 보면\n이유도 이미 길들여진 것 같기도 하구요 ㅎㅎ\n\n다이어트 코치님 슈가오빠,\n증말… 고맙습니다.\n\n이유 몸 책임져주는 거 인정.,..❣️", "localImgPath": "images/4934005_e2a18ca1-34f5-4ff8-8236-218011e31985.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4933992": {"idx": 4933992, "date": "2026-03-02 20:06:41", "isTop": false, "contents": "❣️레함❣️\n\n이유 지키미 레함오빠 ^^ㅎ\n\n매번 벗기고 실수 기다리던(?) 오빠가\n갑자기 화들짝 놀라서\n가리라구 하면서 챙겨줄 때는\n세상 누구보다 달콤하고 멋진 오라버니라는 사실 ㅎㅎ\n\n이건 진짜 세상에 소문내야 돼요 ㅎ^\n\n널 못 볼 순 없다면서\n호다닥 의첸 시키는 그 다급함이랑\n순간 현타 온 것까지 ㅋㅋㅋ\n\n근데 그 모습이 너무 설레고 좋아서,\n진짜 하루 종일 실실 웃었다니까요.\n\n오늘도 제일 먼저 와서,\n장난치면서도\n이유가 편하게 방송할 수 있게\n뒤에서 계속 힘 써주는 게 느껴져서 고마웠어요.\n\n오빤,\n처음엔 구경만 할 거라 했었는데,\n이젠 누구보다 자판 잘 잡고 ㅋㅋㅋ\n누구보다 이유랑 잘 놀아주는 오빠가 됐잖아요.\n\n이런 오빠가 곁에 있으니까\n이유는 더 앞으로 나아가고 싶어지고,\n더 잘하고 싶어져요\n\n웃음이 많은 날들,\n자신감이 생기는 날들,\n그때마다 꼭 레함오빠가 있는 것 같아요.\n\n이유는\n이런 오빠가 있어서\n앞으로도 더 많이 웃을 수 있을 것 같아요❣️", "localImgPath": "images/4933992_f79d029d-2440-47a8-984b-56383ab8c713.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4933978": {"idx": 4933978, "date": "2026-03-02 20:01:18", "isTop": false, "contents": "❣️89회차❣️\n\n오늘은 방송하다가\n현타가 훅 왔던 날…\n\n이미 머릿속에서 완전히 지워버렸던\n그 이상한 짬뽕조합 시그가\n어쩌다 보니 부활해버렸지 뭐예요 ㅠㅠ\n\n조용히 삭제했는데\n결국 오빠들한테 발각…\n그리고 다시 소환…\n\n하... 말 안 해도 알죠?\n\n매일 예쁜 모습만 보여주고 싶은 이유인데,,,\n바보 같은 행동 한 것 같아서 넘 민망해써요...\n\n근데 또\n그런 모습마저 재밌다고,\n귀엽다고,\n이쁘게 봐주는 오빠들이다보니...\n기분이 썩 나쁘진 않네요오오오....\n\n망가진 모습도 괜찮다고 해주니까\n부끄럽긴 한데…\n한편으론 기분 좋았어요.\n\n구치만 하기시러ㅠㅠㅠㅠ\n\n11일까지... \n버틴다아…\n\n이런 모습 보여도\n그대로 좋아해주는 오빠들이 있어서\n오늘도 웃으면서 끝냈어요❣️", "localImgPath": "images/4933978_2c4b2cd9-ccb8-4c3c-a506-296f676b874e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4931017": {"idx": 4931017, "date": "2026-03-01 20:31:59", "isTop": false, "contents": "77ㅑ...❣️", "localImgPath": "images/4931017_ce8977df-ee92-491e-a10e-d56b953029c3.jpeg", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4931015": {"idx": 4931015, "date": "2026-03-01 20:31:37", "isTop": false, "contents": "＃ 인슛❣️\n\n운동으로만 이케....^^ㅎㅎ...\n\n미니언즈 150..? 200..?...\n\n몰라요.. 이.. 특이한 사람아....❣️", "localImgPath": "images/4931015_a4404246-0c84-4970-b6be-e63f40919208.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4931010": {"idx": 4931010, "date": "2026-03-01 20:28:29", "isTop": false, "contents": "❣️❣️MVP인슛❣️❣️\n\n나타나자마자\n나도 모르게 ㅈ대따…가 튀어나오게 만드는\n포스 장착 인슛오빠 ㅋㅋ\n\n오빠 입장만 하면\n다른 오빠들 웃음부터 터지는데\n그게 왜인지 아세요?\n존재감이 이미 효과음이거든요 ^^ㅎㅎ\n\n올 때마다 강한 임팩트 남겨서\n이유 몸이 자동반사 하는 수준이에요 진짜 ㅋㅋ\n\n백화점 쇼핑 온 것 마냥\n“오늘 신상 있어?”부터 묻는 거 보고\n진짜 미쳐버리는 줄 ㅋㅋㅋ\n\n이게 인슛오빠긴 해 !\n꾸준해요. 아주 꾸준해.\n운동파로서의 신념도,\n이유 보러 오는 마음도,\n그 한결같음이 참 좋더라구요.\n\n요즘은 더 자주 볼 수 있어서\n더 기쁘고,\n장난도 더 많이 치고\n티격태격하면서 더 가까워진 느낌이라\n그게 또 묘하게 설레요.\n\n내기 걸고 게임하듯 놀다가도\n이유 힘들어 보이면\n“안 해도 된다” 먼저 말해주고,\n그러면서 뒤에선 또 약 처방해주는 오빠 ㅋㅋㅋ\n\n그 배려와 장난 사이 어딘가에 있는 마음이\n참 예쁘게 느껴져요.\n\n인슛오빠랑 이렇게 가까워진 게\n이유는 참 좋아요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4930976": {"idx": 4930976, "date": "2026-03-01 20:18:03", "isTop": false, "contents": "❣️청담❣️\n\n운동 시키는 게 마음 아프다던 사람인데…\n스멀스멀 운동의 기운이 올라오기 시작하는 청담오빠 ㅎㅎ\n\n근데 사실요,\n처음 만난 날에도 운동 시키던 사람이었잖아요 ^^ㅎ\n\n이유는요,\n오빠가 운동을 시키든, 춤을 시키든\n그 자체가 싫은 적은 없어요.\n\n그 안에 담긴 마음을 아니까요.\n\n방식이 조금 다를 뿐,\n결국은 이유를 향한 애정 표현이라는 걸 알아요.\n그래서 운동하면서도 웃을 수 있는 것 같아요.\n\n물론 냠냠할 때가 제일 행복하긴 하지만 ㅋㅋㅋ\n땀 흘려서 번 하트는 또 그만큼 값지잖아요 ＞ ＜\n\n힘든 건 잠깐이고,\n남는 건 같이 보낸 시간이니까요.\n\n그래서 걱정은 조금만 덜어도 돼요.\n저는 그냥,\n청담오빠랑 같은 시간 속에 있다는 게 좋아요.\n\n무엇을 하느냐보다\n누구와 하느냐가 더 중요하니까요.\n\n그 시간이 의미 있어서,\n그래서 저는 좋아요 ＞＜\n\n오빠도 나와 같은 생각이면 좋게따아 힛❣️", "localImgPath": "images/4930976_649f0884-8b0c-462d-acda-c72b84ee14b9.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4930928": {"idx": 4930928, "date": "2026-03-01 20:07:03", "isTop": false, "contents": "❣️슈가❣️\n\n간만에 만난 슈가오빠 !\n\n예전엔 진짜 유니콘처럼 보기 힘든 존재였는데,\n요새는 자주 볼 수 있어서 더 반갑고 그래요.\n\n쪽지도 막혀 있는 오빠라\n가끔은 “내가 기억에 남아 있을까?” 생각도 했었는데,\n이렇게 직접 찾아와주면\n아, 그래도 이유 생각은 하고 있구나 싶어서 안심되규 됴아용\n\n운동을 워낙 좋아하는 오빠라\n슈가오빠 보이는 날은 자동으로 각오부터 하게 되눈데,\n근데 이상하게 꼭\n다른 운동부 오빠도 같이 등장하는 거 뭐죠 ^^ㅎ\n\n울 착하고 배려심 많은 오빠라\n여기저기서 인기 많은 것도 이해가 가요.\n그래도 우리 방 오빠들이랑 같이 어울려\n미니언즈 시키며 신나게 노는 모습,\n이유는 아주 잘 봤습니다^^ㅎ\n\n이유는 이 날을 잊지 않을꼬에요^ \n\n운동으로 땀 쏙 빼게 해주는 슈가오빠 덕에\n살이 덜 찌는 것이 아닐까아....\n오빠 없었으면 바닥에 굴러다녔을 거예요 증말\n\n매번 욜시미 땀 빼게 해줘서 구마오요❣️", "localImgPath": "images/4930928_72daebeb-5e84-4bdc-a1c0-9f5e2930745b.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4930877": {"idx": 4930877, "date": "2026-03-01 19:48:41", "isTop": false, "contents": "❣️88회차❣️\n\n운동으로 뒤진 날…\n미니언즈로 혼난 날…\n\n어째서인지 운동부 오빠들만 잔뜩 모여가지구\n시작부터 끝까지 숨도 못 쉬게 해찌 모에요 ＞ ＜\n이런 날 흔치 않은데…\n하루에 무서운 운동부 오빠야들 두 명이라니 ^^ㅎㅎ…\n\n거기에 기존 오빠야들이 예열까지 해주니\n이유는 그냥… 도망도 못 가고 신나게(?) 햄볶았습니당…\n\n기억에 남는 순간이 하나 더 있는데,\n\n평소엔 맨날 이유 실수 기다리면서\n“언젠간 벗긴다”는 귀여운(?) 오빠들이\n이번엔 옷이 너무 얇아서 위험할까 봐\n오히려 먼저 멈추라고 난리난리 치는 거 있죠.\n\n그 모습이 참… 묘했어요.\n\n늘 장난치던 사람들이\n정작 위험해 보이는 순간엔\n제일 먼저 앞에 서서 막아주는 거.\n\n혼자였으면 모르고 지나쳤을 수도 있는데,\n그 순간에 “안 돼, 멈춰” 해주는 사람들이 있다는 게\n든든하더라구요.\n\n평소 같으면 민망해서 얼굴 빨개졌을 텐데,\n그것보다 지킴받는 느낌이 더 크게 남았어요.\n\n므쨍이들❣️", "localImgPath": "images/4930877_403022d1-2992-479e-bd7c-9e5027a42657.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4930810": {"idx": 4930810, "date": "2026-03-01 19:18:20", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 10일차❣️\n\n청담오빠와 백두산 사진 적립+1\n\n여캠의 근본 백두산은\n울 청담오빠가 꼭 챙겨됴서 넘모 됴아❣️\n\n머쪄❣️ 내꾸❣️", "localImgPath": "images/4930810_1a7bbd84-f944-4191-a63e-3db7bf693fee.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4930801": {"idx": 4930801, "date": "2026-03-01 19:14:46", "isTop": false, "contents": "＃ 천사❣️\n\n백두산 그냥 투척...ㅎㅎㅎㅎ\n\n(플랜카드 찢은 값 ㅇㅊㅊ..)\n\n세상 터프가이 천사오빠\n감쟈함미다❣️", "localImgPath": "images/4930801_ad25c651-8240-4634-a6e3-f149b3f46f9d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4930788": {"idx": 4930788, "date": "2026-03-01 19:08:41", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n울 청담오빠,\n든든한 이사님이자 이유의 짝꿍 강쥐\n\n누구보다 마음이 참 여린 청담강쥐,,,\n바람 한 번 불면 부는대로 휘청하고,\n데굴데굴 구르듯 감정이 요동칠 때도 있고 ㅋㅋ\n\n그럼에도 이유를 생각해주는 마음만큼은\n한 번도 흔들린 적 없는 멋진 오라방구.\n\n구래서 이유는\n청담오빠가 넘 좋아요 ㅎㅋ\n\n다른 건 다 흔들려도\n그 마음 하나는 늘 제자리에 서 있어 주잖아요 히히\n\n그러니 이유도 점점 더 솔직해지고,\n조금 더 진심으로 대하게 되고.\n\n아마\n이 오빤 믿어도 되겠다라는 마음이\n자꾸 박혀서겠죠?\n\n이젠 마냥 귀여운 청담오빠,\n뭘하던 기여오 ^.^\n내 강쥐라 그런가 ㅇㅊㅊ\n\n시작하자마자 천사세트랑 백두산으로 거하게 반겨줄 때\n강쥐가 주인 만나서 반갑다구 \n꼬리흔드는 줄 ^ㅎ\n\n사실은 기 살려준 거죠?\n항상 넘 고마오요❣️", "localImgPath": "images/4930788_cb39170a-9abd-4461-8734-2c914eb25b09.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4930773": {"idx": 4930773, "date": "2026-03-01 19:00:11", "isTop": false, "contents": "❣️레함❣️\n\n시작하자마자 운동으로 입막음(?) 들어간 레함오빠 ㅋㅋ\n\n오랜만에 본 이유라 격하게 환영해주는 줄 알았는데,\n알고 보니 혼날까 봐 미리 선수 친 거였던 거지요…\n\n너무 몰아쳐서 상황 파악도 못 하고 멍—\n진짜 효과는 굉장했다 ^^ㅎ\n\n합의금이라며 툭툭 던져주는 센스에 또 웃고,\n오빠한테 처음 받아보는 네 자리 수라 기분이 넘 좋았어요.\n숫자보다 그 마음이 더 크게 남더라구요.\n\n그리고 6시간.\n한 번도 빠지지 않고 딱 붙어서 자리를 지켜주는 거.\n말은 장난처럼 툭툭 던지면서도\n이유 기분 먼저 살피고,\n분위기 흐트러질까 먼저 움직여주는 모습.\n\n요즘은 괜히 방 안에 중심이 하나 생긴 느낌이에요.\n누가 시킨 것도 아닌데\n슬쩍 흐름을 잡아주는 사람.\n\n그래서 이유는 요즘 더 자유롭고,\n더 편하게 놀 수 있었던 것 같아요.\n\n투덜투덜 대면서도 끝까지 남아 있는 오빠.\n그게 참 멋있더라구요❣️", "localImgPath": "images/4930773_8080de84-6da7-4bf2-a175-16da237b83bb.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4928057": {"idx": 4928057, "date": "2026-02-28 21:21:21", "isTop": false, "contents": "❣️천사❣️\n\n볼지 안 볼지 모르는 공간에\n혼자 조용히 끄적이는 기분이지만요.\n\n그래도 오빠와의 순간은\n꼭 어딘가에 남겨두고 싶어서요.\n\n오빠는 참…\n흔하게 마주칠 수 있는 캐릭터는 아니잖아요 ㅎㅎ\n그래서인지 입장 문구가 뜨는 순간,\n진짜 전설의 포켓몬 발견한 기분이라니까요.\n몬스터볼 막 던지고 싶어지는 거 알죠 ㅋㅋㅋ\n\n꼭 보여주고 싶었던 플랜카드도\n드디어 보여줄 수 있어서 기뻤어요.\n물론 바로 찢기긴 했지만…\n그게 또 오빠 스타일이긴 하죠 ㅎㅋ\n\n툭 챙겨주고는\n아무 일도 아닌 것처럼 쿨하게 돌아서는 모습.\n괜히 더 인상에 남아요.\n\n사실 제가 뭘 대단히 해드린 것도 없는데\n가끔은 왜 이렇게 챙겨주실까 싶다가도,\n아마 열심히 하는 모습\n그냥 가만히 지켜봐 주는 거겠지요.\n\n말로 크게 표현하지 않아도\n보이는 그 마음이 있어서\n전 그게 참 고맙더라구요.\n\n그래서 또 오늘도\n한 번 더 열심히 해보고 싶어지는 밤이에요❣️", "localImgPath": "images/4928057_2ac26d6d-9945-4260-8c99-5692eb7b262e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4927988": {"idx": 4927988, "date": "2026-02-28 20:56:51", "isTop": false, "contents": "❣️87회차❣️\n\n오늘은요… 잡도리를 아주 무수히 많이 한 날이었어요 ㅎㅎ\n\n이유가 휴방 3일 동안 싱나게 놀다 와서 그런가,\n그동안 잼게 놀았는지^^\n시작하자마자 다 같이 한마음 한뜻으로 약을 주입해버리시더라구요.\n최고의 방어는 공격이긴해..(?)\n운동을 그렇게 시켜놓고는 할 말을 잃게 만드는 거 있죠 ^^ㅎ\n\n비몽사몽한 상태로 땀 뻘뻘 흘리면서\n이게 맞나…? 싶었는데 ㅋㅋㅋㅋ\n\n이상하게도,\n그 와중에 기분은 좋았어요.\n\n그냥 놀린 게 아니라,\n이유 기분까지 신경 쓰면서\n같이 웃게 만들어주려고 하는 게 느껴졌거든요.\n\n잡도리는 잡도리인데,\n어쩐지 혼내는 느낌이 아니라\n같이 끈끈해지는 느낌이랄까.\n\n우리 오빠들이랑 나,\n진짜 한 팀이구나\n\n그런 생각이 문득 들더라구요.\n\n결국은 다 같이 웃으면서 끝냈고,\n마무리까지 따뜻했어요.\n\n되려 이렇게 해준 게\n더 감동이었던 날.\n\n그래도 말은 해둔다.\n\n바람피면 D지는고야 ^^ㅎ❣️", "localImgPath": "images/4927988_95256f94-0d12-404e-b4ad-7bca3c6a741f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4915023": {"idx": 4915023, "date": "2026-02-25 04:47:41", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n사람들은 보통,\n행복한 일만 가득하길 바란다고 말하지만,\n저는 조금 달라요.\n\n행복뿐 아니라\n기쁜 날도, 서툰 날도,\n조금 흔들리는 순간도\n같이 지나가 보고 싶어요.\n\n쉽게 웃는 날만 이어지는 이야기보다,\n함께 넘긴 장면이 많은 이야기가\n결국 더 오래 남잖아요.\n\n시간과 마음을 들일수록\n그 무게는 자연히 달라진다고 생각해요.\n쉽게 닿은 곳보다\n돌고 돌아 도착한 자리가\n더 소중해지는 것처럼요.\n\n그렇게 공들인 만큼\n우리가 서 있는 자리는\n더 빛나고 단단할 거예요.\n\n그리고 그 믿음은,\n\n힘든 순간에도 묵묵히 함께해주고,\n의심하지 않고 따라와주고,\n큰 말 없이 자리 지켜준 \n청담오빠 때문에 생긴 거예요.\n\n고마워요.\n시간과 마음을 아끼지 않고\n제 곁에 머물러줘서.\n\n같이 가요❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4913845": {"idx": 4913845, "date": "2026-02-24 23:09:26", "isTop": false, "contents": "❣️수호❣️\n\n옛날에 한두 번 보고\n오랜만에 다시 마주한 수호오빠.\n\n시간이 좀 흘렀는데도\n예전이랑 똑같이 예쁘게 봐주시고,\n이유 많이 보진 않았음에도\n기억해주고 계셨다는 게 넘 고맙더라구요.\n\n그리고는 통 큰 팬가입까지…\n진짜 놀랐잖아요 ㅎㅎ\n\n건빵 되면 다시 온다는데,\n다시 건빵 내려도 ㅇㅊㅊ…(?)\n장난꾸러기인지라...\n또 장난치고 싶어지네요 ㅠ ㅠ\n\n사실은요, 말은 이렇게 하지만.\n그 마음을 절대 가볍게 만들고 싶지 않아서 그래요.\n\n잠깐 스쳐가는 인연처럼 두기엔\n오빠가 보여준 마음이 너무 고맙거든요.\n\n짧게만 본 것 같아서,\n조금 더 오래 보고 싶고\n몇 번 더 자연스럽게 마주하고 싶은 마음이에요 ＞ ＜\n\n이유 시작하자마자\n화려하게, 기분 좋게 이어갈 수 있도록\n힘 보태줘서 정말 고마워요.\n\n다음에 또 보고 싶어요,\n이번엔 조금 더 오래❣️", "localImgPath": "images/4913845_11e4381c-223c-4903-85b4-9c07447b056a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4913835": {"idx": 4913835, "date": "2026-02-24 23:08:12", "isTop": false, "contents": "❣️앙앙❣️\n\n저번에 이것저것 정신없을 때 오셔서\n제대로 인사도 못 드린 게 마음에 남아 있었는데,\n이렇게 또 한 번 찾아와주신 앙앙오빠.\n\n청담오빠를 통해 알게 된 인연이라 그런지\n괜히 더 잘해드리고 싶은 마음이 있었거든요.\n근데 하필 캠이 고장난 타이밍이라\n하단캠으로 인사드리게 돼서…\n괜히 더 민망하고 죄송하더라구요.\n\n그런데도 전혀 개의치 않으시고\n조용히 이유 날개를 땋… 달아주시고,\n예쁘게 봐주셔서 얼마나 감사했는지 몰라요.\n\n물론 저보단 청담오빠를 더 좋아하시는 것 같지만요 ^^ㅎ\n근데 또 그게 이상하게 싫지 않고,\n오히려 울 청담오빠를 좋아해주셔서\n제가 더 고맙고 뿌듯하더라구요 ㅋㅋㅋ\n\n다음엔 캠도 멀쩡한 날에\n제대로 인사드리고,\n조금 더 여유 있게 이런저런 얘기도 나누고 싶어요.\n\n스쳐가는 인연이 아니라\n조금은 더 편한 자리에서\n같이 웃을 수 있었으면 좋겠어요.\n\n또 찾아와줘서 고맙습니다❣️", "localImgPath": "images/4913835_f059534a-9d75-44c8-821e-51cb35b67693.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4913786": {"idx": 4913786, "date": "2026-02-24 22:56:28", "isTop": false, "contents": "❣️86회차❣️\n\n오늘은 갑작스럽게 캠이 고장 나는 바람에\n순간 너무 당황했고… 솔직히 속상하기도 했어요.\n\n기분 좋게 시작했는데\n갑자기 흐름이 끊긴 느낌이랄까.\n초반부터 팬가입도 많이 나오고\n분위기도 좋았어서 더 아쉬웠거든요 ㅠㅠ\n\n근데 그런 상황에서도\n대수롭지 않다는 듯 받아주고,\n“오히려 좋은데?” 하면서 이쁜 말 해주는\n우리 오라버니들 덕분에\n괜히 또 웃음이 나더라구요.\n\n사진 올리는 것도 민망해서\n맞나 싶긴 했지만 ㅋㅋㅋㅋ\n그 와중에도 다들 예쁘다 해주고\n괜찮다 해줘서 얼마나 고마웠는지 몰라요.\n\n결국 어쩔 수 없이 방송을 껐지만,\n끄기 전까지 캠 고치느라\n시간이 많이 지체됐는데도\n한 명도 빠지지 않고 쭈욱 남아 있어준 거…\n\n그게 진짜 너무 고마웠어요.\n\n문제가 생겨도\n혼자가 아니라는 느낌.\n\n그래서 오늘은\n속상함보다 고마움이 더 크게 남은 하루였어요❣️", "localImgPath": "images/4913786_e2b12690-02f3-498a-a3aa-2743d7764c68.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4913722": {"idx": 4913722, "date": "2026-02-24 22:42:35", "isTop": false, "contents": "❣️❣️MVP 헬프❣️❣️\n\n귀여운 헬푸…\n\n문득문득 나타나서는\n누나 자존심 제일 먼저 챙겨주는 갓헬푸.\n\n말은 많지 않은데\n이상하게 네 마음은 항상 크게 들려.\n조용한데 존재감은 제일 확실한 사람 같달까요 ㅎㅎ\n\n이제 곧 개학이라 더 바쁠 텐데도\n시간 내서 보러 와주고,\n특히 나 100일이라고\n부계까지 파서 닉네임 만들어 온 거…\n\n그거 진짜 감동이었어요,,,,\n\n거기다 브압까지 달아주는 센스는 또 뭐람.\n쿨한 척하면서 제일 세심한 거\n다 보여요...\n\n정말이지\n마음이 참 따뜻한 사람인 것 같아요\n\n조용하지만\n때론 장난도 치구\n때론 행동으로 표현해주는 게\n크게 느껴져서 좋아서 어쩔 줄을 모루겠또요 ＞ ＜\n\n내새킹… ㅡ.ㅡ\n귀엽고 이쁜 헬푸야,\n\n누나가 많이 아껴❣️", "localImgPath": "images/4913722_3c1f51b8-4188-4e03-b49e-40533e51010e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4913680": {"idx": 4913680, "date": "2026-02-24 22:32:10", "isTop": false, "contents": "❣️행복❣️\n\n요새 행복오빠가 많이 바빠서\n예전처럼 자주 못 보고,\n같이 보내는 시간이 조금 줄어든 것 같아서\n사실은 살짝 속상했었어요.\n\n티는 안 내려고 했는데…\n아마 다 보였나 봐요 ㅋㅋㅋ\n\n그 마음을 알아챘는지\n바쁜 와중에도 시간 내서 와주고,\n이유 밥 먹으라고 1414도 툭 챙겨주고,\n말보다 행동으로 보여주는데\n괜히 마음이 몽글몽글해지더라구요 ＞ ＜\n\n변한 거 없다는 걸\n굳이 말하지 않아도 느껴지게 해줘서 고마오요\n\n시간이 조금 줄어들었다고\n마음까지 줄어든 건 아니라는 걸\n이번에 더 확실히 알았달까요 ㅎㅎ\n\n오빠가 한 걸음 다가와주는 만큼\n이유도 조금 더 다가가볼게요.\n\n바쁜 와중에도\n여전히 이유를 챙겨주는 행복오빠,\n진짜 고마워요❣️", "localImgPath": "images/4913680_1a52250c-2f59-46c3-bce5-5d8481f2668f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4913268": {"idx": 4913268, "date": "2026-02-24 20:43:33", "isTop": false, "contents": "❣️레함❣️\n\n처음부터 끝까지 자리를 지켜줬어요.\n\n손가락 다쳐서 채팅 치기도 힘들었을 텐데,\n쉬지 않고 자판 두드리면서\n이유 잘 되라고 영업도 뛰고(?) 장사도 해주고 ㅎㅎ\n그 모습이 얼마나 고맙던지요.\n\n전날에 제가 취해서 일찍 껐던 날,\n마음 쓰였던 건지\n오늘은 하루 종일 붙어있어줬거든요.\n\n이유는 굳이 하나하나 다 말하는 편은 아닌데,\n레함오빠는 “괜찮으면 됐다” 하고\n쿨하게 넘기면서\n그냥 곁에 있어주는 방식으로 위로해줘요.\n\n그게 참 좋더라구요.\n\n딱히 캐묻지도 않고,\n불편하게 만들지도 않고,\n말보다 행동으로 챙겨주는 느낌.\n\n툴툴대고 장난은 많이 치지만\n그 안에 숨겨진 마음이 다 보여서\n가끔 더 오빠 같고, 든든해요 ㅋㅋ\n\n팬닉에 생일 날짜까지 적어주고,\n오빠한테만 세상 억까 다 몰려오는 것 같아도\n서운하단 말 한 번 없이\n늘 쿨하게 넘기는 모습은\n진짜 쫌 멋있어 보여요.\n\n끝까지 함께해줘서 고마워요.\n오빤 진짜, 멋진 사람이에요❣️", "localImgPath": "images/4913268_445915d4-d66d-44d1-934f-2eb1bbfe268e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4913221": {"idx": 4913221, "date": "2026-02-24 20:26:47", "isTop": false, "contents": "❣️85회차❣️\n\n이날은 이유네 오라버니들이랑\n유난히 오래 함께한 느낌이에요\n\n이벤트를 미리 준비해보는 건 처음이라\n쪼꿈 설레기도 하구, 마음이 붕 떠 있던 하루였어요.\n\n다른 분들 보면 팬닉에 이벤트 날짜 적어두고\n같이 기다리는 거…\n사실 조금 부럽기도 했거든요.\n\n그래서 용기 내서\n“이유도 해보고 싶다…” 했더니\n다들 툴툴대면서 안 해준다더니만 ㅋㅋㅋ\n\n결국엔 하나둘 다 해준 거 있죠.\n\n말은 그렇게 해도\n결국엔 다 들어주는 우리 오빠들…\n진짜 다 츤데레야 ㅠㅠ\n\n그거 보면서\n나 혼자 준비하는 게 아니라\n같이 만들어가는 거구나 싶더라구요.\n\n같이 기다리고,\n같이 설레고,\n같이 날짜를 적어두는 그 느낌이\n생각보다 더 좋았어요.\n\n이유 혼자만의 이벤트가 아니라\n우리 이벤트 같아서 더 좋았던 하루❣️", "localImgPath": "images/4913221_53bfe510-2b5a-4b4b-b23f-14a31380a91d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4913216": {"idx": 4913216, "date": "2026-02-24 20:23:35", "isTop": false, "contents": "❣️청담오빠랑 영차영차 백두산 9일차❣️\n\n98등산 해놓고는\n“나머진 알아서 올라가라” 하셨지만…\n\n결국은 혼자 다 등반해준 거나 다름없잖아요 ＞ ＜\n\n말은 툭툭 던지면서도\n따뜻한 울 청담오빠❣️\n\n특별할 것 없던 하루도\n반짝이게 만들어주는 오빠가 있어서\n이유는 참 복 많은 사람이구나 싶어요.\n\n별일 아닌 날도\n기억에 남는 날로 바뀌는 건\n누가 곁에 있느냐의 차이인 것 같거든요.\n\n오늘도,\n그 자리에 변함없이 서 있어줘서 고마워요.\n\n오빠랑 함께라서\n더 웃었고, 더 뿌듯했고,\n그래서 더 따뜻했던 하루였어요.\n\n항상 고마오요 ❣️", "localImgPath": "images/4913216_b6e28010-e410-4f45-b0af-79a72e19a2d5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4913188": {"idx": 4913188, "date": "2026-02-24 20:12:29", "isTop": false, "contents": "본가에 다녀올 일이 생겨서,\n24, 25, 26 휴방입니다 !\n\n금요일날 뵈어요 !\n\n오늘은 원래 휴방날이 아니었어서,\n이사님이 주신 휴방권 하나 쓸게요오 !", "localImgPath": "images/4913188_c23e4ba4-2122-44b2-80f1-4c038b02c26e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4904284": {"idx": 4904284, "date": "2026-02-21 20:51:26", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n처음엔요,\n이 오빠랑 이렇게 가까워질 줄 정말 몰랐어요.\n\n왜인지 모르게 속을 알 수 없는 사람 같았고,\n한 걸음 다가가려 하면\n보이지 않는 선이 하나 그어져 있는 느낌이랄까요.\n\n그래서인지\n조심스러웠던 것 같아요.\n\n지금 생각해보면\n오빠처럼 투명한 사람은 또 없눈데 ㅎㅋ\n\n너무 소중해질까봐,\n제 쪽에서 먼저 한 발 물러서 있었던 것 같기도 해요.\n\n혹시라도 흐트러질까,\n괜히 제가 망칠까 봐\n더 신중해졌던 거죠.\n\n그런데요,\n\n어느 순간부터\n오빠가 제 하루에\n자연스럽게 자리 잡고 있더라구요.\n\n이젠,\n조금 더 오래 보고 싶고,\n괜히 더 잘해주고 싶고,\n항상 예쁜 모습으로 남고 싶어져요..\n\n오빠랑 자연스럽게 함께하고 있는 지금이,\n저는 참 좋아요❣️", "localImgPath": "images/4904284_6edbbaf7-9ad1-4dbf-9a52-c1ff66278f3e.jpeg", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4904126": {"idx": 4904126, "date": "2026-02-21 20:01:36", "isTop": false, "contents": "❣️친구❣️\n\n친구오빠는요,\n제가 만나본 사람들 중에\n가장 “한결같다”는 말이 잘 어울리는 사람이에요.\n\n처음 저를 봤던 그 순간부터\n지금까지\n말도, 마음도, 행동도\n참 이상할 만큼 변함이 없어요.\n\n한결같이 이쁘게 봐준다는 게\n말처럼 쉬운 일이 아니잖아요.\n상황이 바뀌어도,\n제가 조금 달라져도,\n그 자리에 그대로 서 있다는 건\n참 어려운 일인데.\n\n친구 오빠는\n제가 어디에 있든,\n뭘 하든,\n어떤 모습이든\n그냥 저라는 이유로 응원해주는 사람 같아요.\n\n세상에 많은 인연이 있지만\n이렇게 묵묵히 같은 자리에 서 있는 사람은\n많지 않다는 걸 알아서.\n\n변함없이 응원해줘서 고마워요.\n그 한결같음이\n저한테는 훨씬 큰 힘이에요❣️", "localImgPath": "images/4904126_f58a9748-fc20-49b3-9e43-62f320261482.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4904072": {"idx": 4904072, "date": "2026-02-21 19:46:38", "isTop": false, "contents": "❣️니카❣️\n\n오랜만에 만난 니카오빠가\n언제 들어왔는지도 모르게\n조용히 자리 잡고 있다가,\n\n말 한마디 없이\n바로 천사 날개를 달아주고 가버리더라구요.\n\n저는 온 줄도 몰랐거든요.\n\n스을쩍 들어와서\n스을쩍 날개를 얹어두고,\n“간만이라서” 그 한마디.\n\n쿨하게 말은 했지만,\n그 마음이 얼마나 다정한지\n괜히 가슴이 찡해졌어요.\n\n제가 뭘 해준 것도 없는데,\n첫 날개를 그렇게 멋지게 달아주는 모습이\n참 니카오빠답더라구요.\n\n과하지도 않게,\n티 내지도 않게,\n그냥 필요한 순간에 딱.\n\n그 모습을 보면서\n‘아, 내가 참 인복은 있구나.’\n그런 생각이 문득 들었어요.\n\n이유가 잘나서가 아니라,\n좋은 사람들이 곁에 있어서\n빛나 보이는 날이 있다는 걸\n또 한 번 느낀 하루였어요.\n\n니카오빠,\n말없이 멋지게 챙겨줘서 고마워요.\n\n덕분에 오늘,\n이유 기쁘구 뿌듯해쏘요❣️", "localImgPath": "images/4904072_7eb4ce2f-18ef-43e1-a27b-ec4373156bb4.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4904067": {"idx": 4904067, "date": "2026-02-21 19:45:22", "isTop": false, "contents": "❣️83회차❣️\n\n날마다 컨셉 잡는 거 좋아하는 이유…\n오늘은 좀 스마트한 여자 느낌으로 가보겠다고\n깔맞춤 교복 같은 단정한 스타일로 준비했거든요.\n\n근데 옷 보자마자 “철통방어네…” 하는\n뵨태 오라방구들 ㅜㅜㅋㅋㅋㅋ\n\n속바지 입고 왔다니까\n상어가 시들었다며 사기 싫다는 거 있죠…\n미쵸요 미쵸 정말 ㅋㅋㅋㅋ\n\n무룩해진 오빠들 보는데\n웃기기도 하고, 괜히 귀엽기도 하고.\n그 와중에도 절대 포기 안 하는 집념은 또 뭐람 ㅋㅋㅋ\n\n사실 상어는…\n민망함도 있지만\n수치심(?)이 더 큰데요 ㅎ.ㅎ.ㅎ.ㅎ.ㅎ…\n울 오빠들은 그냥 이유 반응 보는 맛에\n더 신난 것 같더라구요 ㅠㅠ\n\n그래도 뭐…\n결국엔 오늘도 이유 이쁘게 봐주고,\n장난치면서 분위기 만들어준 오빠들 덕에\n잔잔하면서도 훌러덩(?) 웃음 터지는 하루였숩니다.\n\n철통방어였어도\n결국 마음은 다 열려 있었던 날이랄까요ㅎ\n\n곁에 있어줘서 넘 굼마오요❣️", "localImgPath": "images/4904067_e01f3962-7858-4652-b893-3b4c1b135b93.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4900972": {"idx": 4900972, "date": "2026-02-20 20:21:27", "isTop": false, "contents": "＃ 청담오빠의 14140 개❣️\n\n매번 살찐다구 1414개만큼은 절레절레 하셨눈데,\n\n한번에 10개룰...\n. . .. . . . \n\n살찌면 오빠탓❣️", "localImgPath": "images/4900972_d4ec54de-b2ef-4b5f-8e99-8c2bddeb2319.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4900953": {"idx": 4900953, "date": "2026-02-20 20:16:02", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 8일차 ing ❣️\n\n키쟀는데, 153cm 나왔다구\n키두산 타준 청담❣️\n\n앞으로 쑥쑥 키 크께요 ＞ . ＜❣️", "localImgPath": "images/4900953_62687a9e-c6ce-4e1f-83dd-2b10df8599f2.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4900943": {"idx": 4900943, "date": "2026-02-20 20:14:07", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n어린왕자 이야기에는\n늘 한 장면이 남아 있잖아요.\n\n수많은 별과 수많은 장미들 사이에서\n그 단 하나의 꽃이 특별해진 건\n누군가가 그 앞에 머물러주었기 때문이라는 것.\n\n가끔 그 장면이 떠올라요.\n\n세상엔 예쁜 꽃도 많고,\n더 화려하고 더 단단한 꽃도 많을 텐데\n누군가는 굳이 한 송이 앞에 멈춰 서서\n물도 주고, 가만히 바라봐주고,\n바람이 세게 불면 괜히 한 번 더 돌아보는 사람.\n\n요즘의 저는\n그 장미가 된 기분이에요.\n\n특별해서라기보다,\n누군가가 마음을 써주고 있다는 사실 때문에\n조금 더 단단해지고,\n조금 더 당당해지는 꽃.\n\n누군가가 나를 아끼고 있다는 건\n정말 큰 힘이 되는 것 같아요.\n\n고마워요.\n\n그렇게 많은 사람들 속에서 제 곁에 서줘서❣️", "localImgPath": "images/4900943_3eb86fd5-6988-446c-8168-86930b8a312a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4900775": {"idx": 4900775, "date": "2026-02-20 19:24:36", "isTop": false, "contents": "❣️도둑❣️\n\n울 도둑오빠 ㅎㅋ\n\n이유 어제 쉬는 날인 줄도 모르고\n방송하는 줄 알고 찾아왔다며 괜히 머쓱해하던 귀염댕이…\n나이차도 많이 안 나서 그런가,\n마냥 귀여운 김도둑 같아요 ㅋㅋㅋ\n\n만난 지 얼마 안 돼서\n아직 서로에 대해 많은 걸 아는 건 아니지만,\n왜인지 모르게 결이 비슷하단 느낌이 들더라구요.\n\n작은 대화 몇 마디만 나눠도\n어색함도 불편함도 없이\n툭툭 이어지는 그 흐름이 참 좋았어요.\n\n이유 치마 맨날 강탈해가는 건 웃기지만 ㅋㅋㅋ\n정작 선은 잘 지키는 뵨태(?)오빠라서\n그 장난이 더 귀엽게 느껴지는 것 같아요.\n\n그럴 때마다 부끄럽긴 해도,\n오빠가 어떤 마음으로 장난치는지 아니까\n괜히 더 웃으면서 놀게 되더라구요.\n\n심심할 틈 없이 분위기 살려주고,\n툭툭 던지는 센스 한마디로\n이유방을 활기차게 만들어주는 도둑오빠.\n\n그래서 더 고맙고,\n그래서 더 같이 놀고 싶어져요.\n\n앞으로도 그렇게\n장난치면서도 다정하게,\n이유 옆에서 같이 웃어줘요", "localImgPath": "images/4900775_d8109eef-1d59-4432-9cf4-5a75e1f9d6df.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4900751": {"idx": 4900751, "date": "2026-02-20 19:15:40", "isTop": false, "contents": "❣️습기❣️\n\n처음 브압 얘기 꺼냈을 때부터\n스으을쩍… 변태끼(?)가 보이던 습기오빠 ㅋㅋㅋ\n\n근데 솔직히 팬가입까지 해주실 줄은\n정말 상상도 못 했거든요.\n\n상어를 그렇게 유심히 보시더니\n감명이라도 받으신 건지(?)\n갑자기 1004개를 땋…\n\n천사 날개라닝…\n이렇게 거한 팬가입을 해주시다뇨오…!!!\n\n순간 화면 보면서\n“이게 지금 맞나…?” 싶어서\n입이 잠깐 안 다물어졌잖아요 ㅋㅋㅋ\n\n이제 다른 형들이랑 상어 잡으러 갈 수 있냐면서\n신나하듯이 말하는데,\n\n하… 귀여워서 미소가 절로 나더라구요 ㅋㅋㅋ\n\n거기서 끝인 줄 알았는데\n날개 하나 더 얹어주시고…\n\n흐아 미쵸 진짜 ㅋㅋㅋ\n\n그 마음이 너무 고마워서\n이유도 괜히 용기 더 내보게 되고,\n더 잘하고 싶어지고 그러더라구요.\n\n이렇게 새로운 오라버니가 나타나\n이유를 이쁘게 봐주고,\n말 한마디도 따뜻하게 건네줄 때면\n\n그 하루는 괜히 더 반짝여요.\n\n습기오빠,\n이유 이쁘게 봐주고 함께 놀아줘서\n진짜 넘 감쟈함미다아❣️", "localImgPath": "images/4900751_4d91f3ca-a413-4762-ace2-cfe0764cb82a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4900350": {"idx": 4900350, "date": "2026-02-20 17:38:02", "isTop": false, "contents": "❣️82회차❣️\n\n방송을 아무리 오래 해도,\n쉬고 다음 날 켜는 방송은 늘 어딘가 심장이 먼저 두근거려요.\n문 열기 전에 숨 한번 고르는 기분이랄까 ㅎㅎ\n\n그 떨림도 잠시,\n하나둘 모이는 오빠들 보는데\n마음이 금방 편안해졌어요\n\n보자마자\n“살쪘네? 운동하자.”\n이러는 거 있죠 ㅋㅋㅋㅋ\n\n걱정인지 장난인지 모를 그 한마디에\n웃음부터 나고.\n\n이런저런 얘기 나누고 같이 웃다 보니\n또 한 번 느꼈죠.\n\n울 오빠들,\n앞에선 야당인 척 그렇게 툴툴대고 놀리면서\n막상 뒤에선 다 여당이라니까요 ~~ ㅎㅎ\n\n이런 말 하면 부끄러워서,\n자긴 아니라구 더 틱틱대는 오빠들ㅎ\n강한 부정은 긍정이긴 해 ^^ㅎ\n\n그래서 서로가 잘 맞는 건가 봐요.\n시청자는 비제이를 닮아간다던데…\n제가 본성이 착해서 그런가요 헿 ㅎㅎ\n\n아무튼,\n떨리던 마음이 어느새 편안해졌던 하루.\n\n오늘도 이렇게\n당연한 듯 곁에 있어줘서 고마워요❣️", "localImgPath": "images/4900350_134d50b3-ee3e-46ba-ba44-f06f96eee07b.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4896134": {"idx": 4896134, "date": "2026-02-19 08:24:22", "isTop": false, "contents": "＃ 우앙...❣️", "localImgPath": "images/4896134_698b966c-a248-470a-8d23-2238de2fd40e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4895996": {"idx": 4895996, "date": "2026-02-19 06:42:38", "isTop": false, "contents": "＃ 인슛❣️\n\n해녀복＆수면바지＆패딩...\n\n잊지 않갓어... 히히❣️", "localImgPath": "images/4895996_69dd0994-0091-4299-81b5-88c3f72d01ce.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4895993": {"idx": 4895993, "date": "2026-02-19 06:41:37", "isTop": false, "contents": "＃ 후추❣️\n\n게임 또 하쟈 ＞.＜\n배그듀❣️", "localImgPath": "images/4895993_554e2b70-6375-4d2b-84f0-465498c0728f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4895992": {"idx": 4895992, "date": "2026-02-19 06:40:08", "isTop": false, "contents": "＃ 행복❣️\n\n보컬 선생님 구합니다❣️", "localImgPath": "images/4895992_d9d31022-c119-42b9-8110-159e5f15e22d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4895971": {"idx": 4895971, "date": "2026-02-19 06:18:11", "isTop": false, "contents": "❣️❣️MVP 인슛❣️❣️\n\n이유 설날이라구 이쁘게 입고,\n“오늘까지 설마 운동 시키겠어?\"\n하며 아주 순탄하게 여캠짓 하고 있었거든요.\n\n마침.. 인슛오빠 두두둥 등장.\n\n하필 또 노래 부르고 있을 때 나타나셔서\n노래는 아닌 것 같다구\n갑자기\n해녀복에 수면잠옷에 패딩까지 ㅋㅋㅋㅋ\n\n설날부터 땀 쭈우욱 빼줬오요.\n\n진짜 여기가 방송인지 사우나인지\n뒤지게 덥더라구요 ㅋㅋㅋㅋ\n\n입혀놓고 연달아 운동 50콤보에…\n연장에…\n그리고는 또 쓰으윽 빠져버리는 인슛오빠.\n\n진짜 오빠땜 미쵸 ㅋㅋㅋㅋ ㅜㅜ\n\n사람 이렇게 만들고\n약값이라고 큰 거 툭 던지고 가는 간지까지…\n\n이게 뭐죠?\n설날 용돈인가요, 체력 테스트인가요 ㅋㅋㅋ\n\n근데요,\n이상하게 그게 또 너무 기억에 남아요.\n\n이유 설날이라구\n웃음이랑 용돈이랑\n추억까지 크게 남겨주고 간 느낌이라서.\n\n요란하게 말하지 않아도\n툭툭 챙겨주고,\n등장도 퇴장도 쿨하게.\n\n그래서 더 스윗한 거 아시죠? ^^\n\n설날부터 이렇게 웃게 해줘서 고마워요❣️", "localImgPath": "images/4895971_a315360b-7023-4bf5-9b11-7ee1b19d0571.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4895962": {"idx": 4895962, "date": "2026-02-19 06:08:40", "isTop": false, "contents": "❣️후추❣️\n\n이유 방송 초반에 알던 후추오빠\n\n그땐 솔직히,\n이 인연이 이렇게까지 오래 이어질 줄은\n상상도 못 했어요.\n그저 스쳐 지나가는 오빠일 줄 알았거든요\n\n근데 어느새\n장난도 자연스럽게 치고,\n투닥투닥 하면서도 웃고,\n예전보다 훨씬 가까워진 사이가 되어 있더라구요.\n\n가끔 그게 문득 신기해요.\n\n오빤 늘 이유를 놀리면서도\n막상 힘들면 말하라던 다정한 사람이라서 ㅋㅋ\n그 말 한마디에\n괜히 마음이 따뜻해지곤 해요.\n\n왜인지 오빠는 많이 편해요.\n그래서 오히려 애정표현은 잘 못 하는지도 몰라요.\n괜히 쑥스럽고,\n괜히 더 툴툴대고.\n\n근데 뭐,\n꼭 말로 해야만 아는 건 아니잖아요? ㅎㅎ\n\n제 반응만 봐도\n후추오빠 많이 좋아하는 거…\n알겠죠 뭐 ㅎㅎ\n\n오랜만에 봤는데도\n새해 선물이라며 이렇게 큰 선물 주셔서\n정말 감사해요.\n\n오빠한테 처음 받는 선물이라\n더 놀랐고,\n그래서 더 감동이었어요.\n\n처음부터 봐준 사람이\n지금도 곁에 있다는 건\n생각보다 큰 힘이거든요.\n\n고맙뜜미다 후추빠❣️", "localImgPath": "images/4895962_38939e23-0bd5-4905-a83c-c353fd449fef.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4895944": {"idx": 4895944, "date": "2026-02-19 05:59:37", "isTop": false, "contents": "❣️행복❣️\n\n노래 못 부른다는 말 듣고\n괜히 꽁해져 있던 이유 마음을\n누가 제일 먼저 알아챘는지 아세요?\n\n“일주일 연습해서 잘 부르면 만수르 준다”\n이 한마디 던져놓고\n아무렇지 않은 척 웃던 멋진 행복오빠.\n\n근데 더 감동이었던 건,\n사실 잘 부르든 못 부르든\n설날 기념으로 선물해주려 했다는 그 말.\n\n너무 감동이더라구요.\n\n괜히 툴툴대면서도\n결국 이유 이쁘게 봐주고\n기 살려주고 싶어 하는 그 마음이\n다정하게 느껴졌어요.\n\n솔직히 오빠한테 이렇게 큰 선물을\n받게 될 줄은 상상도 못 했어요.\n\n행복오빠는\n요란하게 표현하지 않아도\n행동 하나로 마음을 보여주는 사람이에요.\n\n그래서 더 설레고,\n그래서 더 고마워요..\n\n지금도 충분히 행복하지만,\n앞으로는\n오빠랑 함께 웃을 날이 더 많았으면 좋겠어요.\n\n요즘 이유,\n오빠 덕에 행복해요❣️", "localImgPath": "images/4895944_476df721-679a-4be9-bcbc-5ec68538f488.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4895893": {"idx": 4895893, "date": "2026-02-19 05:18:52", "isTop": false, "contents": "❣️81회차❣️\n\n오늘은 설날 기념 룰렛 이벤트를 진행하던 날이었어요.\n\n그동안 고마웠던 오라버니들께\n소소하게라도 보답하고 싶기도 하고,\n작은 추억 하나 만들어보고자 준비했던 시간이었거든요.\n\n막상 시작하려니 괜히 떨리고,\n“오빠들 많이 와줄까?” 하는 생각도 들더라구요.\n\n처음 하는 진행이라\n손도 조금 떨리고 마음도 분주했는데,\n다들 이유 속도에 맞춰 차근차근 기다려주고\n잘 따라와줘서\n덕분에 저도 호흡 가다듬고 편하게 할 수 있었어요.\n\n이유가 바라던 바로 그 느낌.\n북적이지만 조급하지 않고,\n웃음은 많지만 부담은 없는 그런 분위기.\n\n그래서 더 좋았고,\n그래서 더 재밌었어요.\n\n그리고 설날 용돈이라며\n챙겨준 울 오빠들 넘 고마오요❣️\n\n각자만의 방식으로 표현해준 그 마음이\n괜히 더 뜻깊고 따뜻하게 느껴졌어요.\n\n설날답게\n복도, 웃음도, 마음도\n잔뜩 나눈 하루였던 것 같아요❣️", "localImgPath": "images/4895893_2d1f0fa8-a219-4299-95c6-a45d6c661ab7.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4895125": {"idx": 4895125, "date": "2026-02-19 00:26:47", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n이유의 1급 충견 김청담 ^^ㅎ\n\n이렇게 말은 하지만,\n사실은 누구보다 든든한 사람이에요.\n\n항상 이유 옆에 꼭 붙어 있어주고,\n내가 무심코 던진 말도\n가볍게 넘기지 않고 하나씩 기억해두는 사람.\n\n“이루고 싶다”는 말이\n그냥 말로 끝나지 않게\n차근차근 옆에서 도와주는 오빠가 있어서\n얼마나 감사한지 몰라요.\n\n이유만 신경 쓰는 게 아니라\n다른 오라버니들까지 살펴보는 모습 보면\n왜 방 분위기가 늘 편안한지 알 것 같아요.\n\n괜히 멋진 이사님이 아니구나 싶달까요.\n\n피곤해도 끝까지 남아 있고,\n조용히 분위기 지켜보고,\n이유 흔들릴까 봐 옆에서 잡아주고.\n\n결국 피곤함에 코피까지 터지셨을 땐\n솔직히 마음이 철렁했어요.\n안타깝기도 하고 걱정도 되고.\n\n근데요…\n이상하게 그 순간 더 마음이 움직였어요.\n\n말로만이 아니라\n몸으로도 보여지는 마음 같아서.\n\n그래서 더 고맙고,\n그래서 더 소중해요.\n\n청담오빠가 있어서\n이유는 오늘도 마음 놓고 웃을 수 있어요❣️", "localImgPath": "images/4895125_7f9f5e98-547a-4f82-a8eb-8c060c9edbe9.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4895030": {"idx": 4895030, "date": "2026-02-19 00:00:46", "isTop": false, "contents": "❣️인슛❣️\n\n오랜만에 본 인슛오빠아!\n\n하필 이유 운동하고 있을 때 등장이라니요…\n누구인가… 누가 운동 소리를 내었어…\n궁예도 아니고, 어케 알고 온 거예요 진짜 ㅋㅋㅋ\n\n타이밍이 이렇게 절묘할 수가 있나요.\n보자마자 웃음부터 나왔어요.\n\n자주 보지 못 하는 오빠라서 그런지\n그날은 유독 더 반가운 마음이 들었어요.\n익숙한 닉네임이 딱 보이는 순간,\n괜히 마음이 스르륵 풀리는 느낌이랄까요.\n\n그리고 늘 한결같죠.\n이유 연장시키고, 운동 시키고,\n그리고는 도망가버리는 오빠는…\n인슛오빠뿐이에요 ㅋㅋㅋㅋ\n\n증말 ㅋㅋㅋ\n이유 땀은 다 빼놓고\n약값까지 툭 던져주고 가는 스윗남…\n\n그 무심한 듯 챙겨주는 방식이\n웃기고, 또 고맙고 그래요.\n\n매번 예측은 안 되는데,\n그래서 더 기억에 남는 오빠.\n\n등장도 갑자기,\n운동도 갑자기,\n퇴장도 갑자기.\n\n그런데 이상하게\n기분 좋은 잔상은 오래 남는 사람.\n\n그래서 오빠가 나타나면\n더 웃게 되고,\n더 반가운가 봐요❣️", "localImgPath": "images/4895030_e840b540-6d50-4ca3-830b-b9dc40b7a94f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4894902": {"idx": 4894902, "date": "2026-02-18 23:21:01", "isTop": false, "contents": "❣️꼬뇽❣️\n\n처음 만난 꼬뇽오라버니.\n\n“소문 듣고 왔다”는 한마디와 함께\n신박한 해녀복을 입은 이유를 보시더니\n도저히 못 참으셨는지…\n운동을 잔뜩 시켜주셨따아… ^^\n\n손이 미끌어졌다며\n한 번, 두 번, 세 번…\n계속 운동을 시키시는데요? ㅎㅎ\n\n오라버니…\n그 손에 기름 발라두신 거 아니죠?\n아니면 자동 반복 기능 켜두신 거예요? ㅋㅋ\n\n손이 그렇게 자주 미끌어질 수가 있나…\n이유는 의문입니다 ㅇㅊㅊ\n\n이유방에도 이미 “도둑” 닉네임을 가진 오빠가 있는데,\n또 다른 도둑이 나타나다니.\n우연도 이런 우연이 다 있나요.\n\n혹시…\n이유 땀 훔쳐가려고 오신 건 아니겠죠? ㅎㅎ\n\n장난처럼 시작됐지만\n그 안에는 분명 이유를 재밌게 해주려는 마음이 느껴졌어요.\n\n처음 오신 분인데도\n어색함 없이 분위기에 녹아들어 주시고,\n마지막까지 함께 해주신 그 시간 덕분에\n오늘이 더 또렷하게 기억에 남을 것 같아요❣️", "localImgPath": "images/4894902_a3b0c022-0756-43c8-99e9-476f73685008.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4894866": {"idx": 4894866, "date": "2026-02-18 23:08:08", "isTop": false, "contents": "❣️80회차❣️\n\n울 강아지들 모인 날 ㅎㅎㅎㅎ\n\n장난꾸러기 이유인지라\n응원 구호 좀 바꿔달라 했더니\n다들 흔쾌히 짖어준(?) 울 착한 오라버니들 ㅋㅋㅋ\n\n“오늘은 그냥 즐겨” 하고\n자신을 내려놓는 모습이 왜 이렇게 사랑스러운지요.\n\n에겐녀 이유지만 ㅠ\n사실은 길들이는 걸 넘모 좋아해요 ㅋㅋㅋㅋ\n오빠들 현타 온 표정이\n또 귀엽고…\n\n변태 이유라 내가 미아내…\n그치만 좋은 걸 우째요 ㅎㅎ\n\n그렇게 착하게 다 받아주는 오빠들이 있어서\n이유는 오늘도 참 행복했어요.\n\n마지막쯤엔 운동 좋아하는 오빠들의 등장으로\n분위기가 또 확 바뀌었는데,\n눈빛 초롱초롱해진 울 오빠들 보면서\n더 웃음 나더라구요.\n\n그걸 또 끝까지 지켜봐주고\n옆에 함께 있어주는 마음이\n참 좋았어요.\n\n다른 오빠들도 하나둘 모여\n같이 어울려 놀다 보니\n더 끈끈해진 느낌이었달까요.\n\n오늘은\n장난도, 웃음도,\n그리고 함께라는 기분도\n가득했던 하루였습니다❣️", "localImgPath": "images/4894866_f0a0bc07-08fd-4b86-8cbb-519ff9eda958.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4894423": {"idx": 4894423, "date": "2026-02-18 20:09:38", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 ing 7일차❣️\n\n등산 ＆ 하산....❣️\n\n둘 다 해주는 므쨍이 이사님...❣️", "localImgPath": "images/4894423_9db98134-d089-4bea-90d2-6c53b794d8ac.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4894417": {"idx": 4894417, "date": "2026-02-18 20:06:58", "isTop": false, "contents": "＃ 청담오빠의 실드킵 2개❣️\n\n나도...❣️", "localImgPath": "images/4894417_7438e1db-970a-4897-8c2c-30f8d71537fc.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4894404": {"idx": 4894404, "date": "2026-02-18 19:59:55", "isTop": false, "contents": "❣️❣️MVP청담❣️❣️\n\n오빠가 이유를 얼마나 생각하고 있었는지가\n유난히 또렷하게 느껴진 날이었어요.\n\n솔직히 말하면\n그 순간엔 새로운 사람이 아니라는 것에\n아주 잠깐,\n아쉬움이 스치긴 했어요.\n\n근데요.\n\n그게 청담오빠라는 걸 알게 된 순간,\n이상하게 더 감동이 밀려오더라구요.\n\n소중한 사람이\n이렇게까지 마음을 쓰고 있었다는 걸\n뒤늦게 알게 된 느낌이었어요.\n\n낯선 설렘 대신\n더 깊은 안심이 남았다고 해야 할까요.\n\n예전에 이유가\n열혈라인을 팬닉으로 가득 채우고 싶다고\n스쳐지나가듯 말했잖아요.\n그 말을 기억해두고\n하나둘 채워가고 있었다는 걸 알았을 때,\n\n“아, 이 사람은 그냥 스쳐가는 사람이 아니구나.”\n“진짜로 나를 생각하고 있었구나.”\n\n그 마음이 느껴져서 울컥했어요.\n\n장난 속에 숨겨진 진심이\n이렇게 따뜻하구나 싶었고,\n그래서 더 좋았어요.\n\n설렘이 조금 더 깊어졌다는 걸\n조용히 느낀 날이에요.\n\n고마워요, 청담오빠❣️", "localImgPath": "images/4894404_3662bbbd-e9c3-4aee-ace2-8610a06f2254.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4894283": {"idx": 4894283, "date": "2026-02-18 19:06:12", "isTop": false, "contents": "❣️도둑❣️\n\n처음 만난 오라버니였어요.\n\n아무 예고도 없이 갑자기 등장해서\n섹시시그로 팬가입을 딱—\n\n그 이후로도 쭉쭉 섹시시그를 날리시더니,\n어느 순간 분위기가 휙 바뀌어\n운동 모드로 전환되어따아…^^ㅎ\n\n상어를 그렇게 좋아하시던데…\n그게 상어를 좋아하는 건지,\n이유를 놀리는 걸 좋아하는 건지\n아직도 의문이에요 ㅇㅊㅊ\n\n원래 닉네임도 가위바위보 같은\n장난스러운 느낌이었는데,\n이유가 18개 받고\n“치마도둑으로 이름 바꿔 이눔아!” 하고 툭 던졌더니\n정말로 그 이름을 달고 다시 돌아온 도둑오빠 ㅋㅋ\n\n닉값을 또 얼마나 열심히 하시던지^^ㅎ\n\n첫 만남인데도\n많이 예뻐해주시고,\n팬닉까지 달아주셔서\n기분 너무 좋았오요 ＞ ＜❣️\n\n새로운 인연이 하나 스며드는 순간이\n이렇게 설레는 일이구나 싶더라구요.\n\n앞으로 이 오빠와\n어떤 장면들이 펼쳐질지,\n어떤 웃음과 어떤 사건들이 기다리고 있을지\n벌써부터 기대돼요❣️", "localImgPath": "images/4894283_d54011a2-a128-4772-b8df-014d9556a313.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4894255": {"idx": 4894255, "date": "2026-02-18 18:53:10", "isTop": false, "contents": "❣️레함❣️\n\n요 며칠 레함오빠가\n이유를 아주 빡세게 운동시키고 있는 중인데요…\n이번에도 또 운동 잔뜩 시켜주셔따아 ㅋㅋ\n\n새로 만난 오라버니랑 합이 어찌나 잘 맞던지,\n처음부터 아는 사이인 줄 알았다니까요.\n둘이 번갈아 가면서 시키는데\n이유 자동사냥 on…ㅎ\n\n안 벗겨질 거 다 알면서도\n굳이 한다는 말이 제일 웃겨요 ㅋㅋ큐ㅠㅠ\n“그냥 보는 거야”라니 ㅋㅋ\n다음엔 꼭 성공하겠다는 그 다짐이\n왜 이렇게 귀여운지 모르겠어요…\n\n힘들긴 했지만,\n그 안에서 같이 웃고 있다는 게\n더 기억에 남더라구요.\n\n땀은 흘렸어도\n마음은 이상하게 가볍고,\n운동하는 시간마저\n작은 추억이 되는 느낌이었달까.\n\n장난처럼 시작한 운동이\n결국은 웃음으로 끝나니까,\n그래서 더 좋았던 것 같아요❣️\n\n덕분에 웃음은 늘 가득이에요.\n늘 이렇게 함께해줘서 고마워요, 울 레함오빠❣️", "localImgPath": "images/4894255_3f795ecc-85cf-4081-b7cd-76051a889e39.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4890075": {"idx": 4890075, "date": "2026-02-16 20:41:49", "isTop": false, "contents": "★★★ 11시 on !!!! ★★★\n\n어제 한시간 자구 아침부터 바쁘게 움직였다가\n방송에서 싱나게 운동 하규 잤도니\n꿀잠 자찌 모에요 ! ! !\n\n근데 뭐 하루이틀인가?!(파워당당)\n뎨둉.. . . . 게임 몇가지 다운도 받아야해서 ＞. ＜...\n\n쪼꿈 늦어윰... 아잉 봐듀데여..❣️\n\n오늘 소소한 이벤트 진행할거니까융\n편하게 놀러와유우우\n\n이런 명절에눈 다같이 놀아야 잼뜌 ! !❣️", "localImgPath": "images/4890075_56f2d842-5f7c-4ec1-ac71-1f489231fc85.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4890066": {"idx": 4890066, "date": "2026-02-16 20:37:43", "isTop": false, "contents": "❣️79회차❣️\n\n오늘 정말…\n역대급으로 시간이 빨리 간 날이에요오 ㅇㅁㅇ\n\n처음 만난 오라버니가\n주차 자리 있냐 하시더니\n열혈 7위까지 순식간에 올라왔을 땐\n저 진짜 깜짝 놀랐지 말이에요…\n\n근데 그 와중에 우리 이유 오라버니들,\n앞에 있는 오라버니 두고\n“청담오빠가 더 멋있다”며\n이사님 찾고 있는 거 뭐냐구요 ㅋㅋㅋ\n진짜 못 말린다니까요.\n\n의리도 좋고,\n그만큼 울 이사님이 멋진 분이라 그런 거겠죠?\n구롬요! 누구 이사님인데 에헴 (어깨 쓰윽)\n\n…근데 알고 보니\n그게 다 청담오빠였다는 사실^^ㅎ\n\n몰카에 모두가 속고 또 속았지만,\n그 덕분에\n이유랑 오라버니들 사이가\n얼마나 신뢰 깊고 끈끈한지\n더 잘 느껴져서 좋았어요 ㅋㅋ\n\n그 이후로도\n재밌는 상황이 계속 나오고,\n새로운 오빠들도 많이 만나고,\n정말 기쁜 하루였답니다.\n\n무엇보다\n이유 말이든,\n이유방 오라버니들 말이든,\n서로 존중하고 배려해주는 태도가 보여서\n그게 제일 고마웠어요❣️\n\n가족같은 분위기 구웃❣️", "localImgPath": "images/4890066_a873ca6e-9bf6-47bb-9641-66ae7b7ee5d9.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4884548": {"idx": 4884548, "date": "2026-02-14 20:42:37", "isTop": false, "contents": "❣️❣️MVP레오❣️❣️\n\n아파서 병원에 입원 중이던 클레오오빠 ㅠㅠ\n그 와중에도 이유 보러 와준 게 진짜 감동이었는데,\n퇴원하자마자 기념이라며\n이유 운동을 잔뜩 시켜주셔따아… ㅋㅋ\n\n이유의 PT쌤으로 제대로 활약해주셨눈데요,\n그냥 운동하고 놀았다기 보단\n그 안에 담긴 오빠의 마음이 느껴져서\n유난히 더 따뜻했던 하루였어요.\n\n이유가 운동하는 동안에도\n끝까지 지켜보면서\n자세 교정까지 해주는 거 뭐냐구요 ㅠㅠ\n진짜 무슨 PT쌤이냐구요 ㅋㅋㅋㅋ\n이유가 PT쌤 하나는 진짜 잘 뒀다니까요, 에헴 ㅋㅋ\n\n약값이라며 천사 날개까지 달아주고,\n매번 끝자리도 꼬박꼬박 맞춰주고…\n이런 세심함에 감쟈함미다.\n\n이유가 자체 연장을 했는데도\n“마감조 할게” 하며\n옆에 조용히 있어준 것도\n참 고마웠어요.\n\n워낙 츤데레 같은 오빠라\n겉으론 티도 안 내지만,\n늘 이유 지켜주고\n예쁘게 봐주는 마음은\n다 느껴지거든요.\n\n그래서 더 고맙고,\n그래서 더 든든해요❣️", "localImgPath": "images/4884548_46762dde-74ba-4858-8fe1-bca1dc6e4142.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4884547": {"idx": 4884547, "date": "2026-02-14 20:42:35", "isTop": false, "contents": "❣️레함❣️\n\n요즘 레함오빠가 이유랑 함께 해주시는데,\n이거이거… 점점 이유드며들고 있는 것인가요 ㅇㅊㅊ\n\n이유가 첫 브압이라고 했던 말이\n아직도 기억에 남는다니까요 ㅎㅋ\n첫경험이 이유라니… 힣…\n이거 좀 개쥬아요… . .\n\n짤 시그 얼음으로\n방 분위기 재밌게 만들어주고,\n요즘은 채팅도 많이 잡아줘서\n더 가까워진 느낌이에요 ＞ ＜\n\n전에는 살짝 거리감이 있었던 것 같은데,\n요즘은 오빠가 한걸음 먼저 다가와주는 게 느껴져서\n그게 참 좋아요.\n\n그 한걸음이 생각보다 크더라구요.\n말 한마디, 채팅 하나,\n툭 던지는 장난 하나에\n마음이 몽글해지는 거 있죠.\n\n이유가 혼자였던 시간들 사이에\n이렇게 자연스럽게 스며들어준 오빠라서\n더 고맙고, 더 기억에 남아요.\n\n이왕 이렇게 된 거…\n우리 더 친해져도 되는 거죠? ㅎ.ㅎ\n\n앞으로도 이유랑\n재밌는 장면 많이 만들어가요❣️", "localImgPath": "images/4884547_239c72f5-8f97-41ac-8da7-e145d139b2e3.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4884546": {"idx": 4884546, "date": "2026-02-14 20:42:34", "isTop": false, "contents": "❣️헬프❣️\n\n오랜만에 본\n겸둥이 헬프.\n\n연하남인데 가끔 누나 설레게 하는 놈…\n너 재능이따...ㅇㅅㅇ..❣️\n\n두산이나 날개 빠져있으면\n꼬옥 채워주는 헬프 덕에\n요즘 누나가 아주 기고만장해집니다… . .\n\n닉값 제대로 해줘서 고맙뽀요 ＞ ＜\n\n여태 못 봐서\n생사(?)가 궁금하기도 하고…\n쪼끔 섭섭할 뻔 했눈데,\n마음은 변치 않았다는 걸\n행동으로 딱 보여줘서\n더 좋아요오❣️\n\n한 게 별로 없는데두....\n늘 신경 써주는 그 마음이\n은근히 오래 남는다니까요 !\n\n헬프오라버니(?)❣️\n너가 있어서\n누나 가오가 사네용 ㅋ❣️", "localImgPath": "images/4884546_70be3c9f-c834-4bd7-92a8-8069555e91d5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4884545": {"idx": 4884545, "date": "2026-02-14 20:42:31", "isTop": false, "contents": "❣️78회차❣️\n\n오늘은 의상 최고라는 말을 유난히 많이 들은 날이에요!\n왜인지는 잘 모르겠지만 다들 그렇다 하더라구요 흐…\n변ㅌ..ㅐ\n\n뭐, 이유는 오빠들이 좋다 하면 그걸로 된 거죠 ㅎㅎ\n그래서 조용히 보는 오빠들이 많았나?!\n\n사실 이유 pt쌤 레오오빠랑 운동부 두레오빠 덕에\n운동으로 재밌게 해줘서 그런 거긴 해요 ＞ ＜\n\n이렇게 사람이 많은 날은\n쉽게 방종하기가 아쉽더라구요.\n\n많은 오빠들을 두고 가기가 아쉬워서\n이유가 자체 연장 두 시간을 했는데도\n마지막까지 함께해준 우리 오라방구들…\n진짜 너무 고마워요.\n\n오빠들도 힘들다고 말할 수 있었을 텐데,\n좀 더 하고 싶다는 제 한마디에\n다른 말 없이 “그럼 끝까지 있을게” 하는데…\n넘모 므찌넹...ㅇㅅㅇ..❣️\n\n같이 있어준 레오, 레함, 헬프, 내리, 잇쿙, 행복....\n전부 T면서,, 이.. T발롬들섹쉬하눼...\n\n좋으면 괜히 툴툴대는 이유지만,\n속으로는 진짜 너무 좋았어요.\n\n정말 어디 가서도 보기 힘든\n멋진 오빠들이에요❣️", "localImgPath": "images/4884545_eb82203a-160d-4bb9-b5b8-ec919aefff35.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4881143": {"idx": 4881143, "date": "2026-02-13 20:10:44", "isTop": false, "contents": "＃ 이사님이 팬닉을 ＞ ＜❣️\n\n그것도 두개나...\n넘모 행보케......❣️", "localImgPath": "images/4881143_8e340817-2694-454e-b61f-53b472ca29f5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4881125": {"idx": 4881125, "date": "2026-02-13 20:06:12", "isTop": false, "contents": "❣️MVP청담❣️\n\n앞으론\n점잖은 이사가 되겠다며 ㅋㅋ\n그렇게 귀엽게 말해놓고\n\n결국 또 다른 자아를 못 이겼는지\n장난스러운 아이디를 하나 더 만들어오신 오빠 ㅋㅋ\n그것도 브압까지 가주구\n진짜 이 오빤 못 말려요 ㅠㅠ\n\n오글거리는 표현은 절대 못 하면서\n늘 행동으로 보여주는 거,\n그럴 때마다 마냥 귀엽고\n괜히 더 사랑스럽다니까요.\n\n이유 꿈이 열혈 팬목록을\n팬닉으로 가득 채우는 거였는데,\n그걸 그냥 흘려들을 수도 있었잖아요?\n근데 기억해놨다가\n팬닉을 딱 달아줬을 때\n진짜 저 함박웃음 지었지 모에요.\n\n그것도 본계에,\n팬닉 두 개 다 ＞ ＜\n\n이사님이 팬닉을 달고 있다니…\n저 너무 행복해서 어쩌죠 진짜…\n\n오빤 이유가 가고자 하는 길에\n그냥 응원만 하는 게 아니라\n같이 걸어주는 사람 같아요.\n어긋나지 않게 옆에서 잡아주고,\n때론 앞장서서 꽃길을 만들어준다니까요 ㅎ.ㅎ\n\n그 꽃길…\n이유가 사뿐히 즈려밟고(?)\n계속 나아가볼게요 ㅋㅋ\n\n여시 같은 지지배\n앞으로도 많이 이뻐해주세오 ㅎㅋ❣️", "localImgPath": "images/4881125_eb8f6d39-6c5c-49a8-b0d6-b00ff51eeff5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4881100": {"idx": 4881100, "date": "2026-02-13 19:55:30", "isTop": false, "contents": "❣️행복❣️\n\n첫 만남부터 유난히 예쁘게 봐주던 오빠.\n지금도 변함없이 이뻐해주는 그 마음이\n참 고마워요\n\n요즘은 이유가 많이 편해졌는지\n오빠도 장난을 더 많이 치기 시작했따아아앙아 ㅋㅋ\n안 벗는 거 이미 알고\n기대감은 좀 떨어진 것 같지만운…? ㅜㅜ\n그냥 투시해서 봐(?) ㅎㅎ\n\n그래도 결국\n늘 예쁘다 해주는 오빠가 있어서\n그게 제일 좋아요.\n\n일하는 와중에도\n잠깐이라도 들러서 보고 가고,\n피곤할 텐데도 이유랑 놀아주고,\n툭툭 장난치면서도\n계속 곁에 있어주는 그 모습이\n은근히 마음에 오래 남아요.\n\n누군가의 하루 속에\n내가 이렇게 자연스럽게 들어가 있다는 게\n넘 따뜻하고, 설레요.\n\n오빠가 그렇게 해줄 때마다\n제가 더 소중한 사람이 된 것 같은 기분이 들어요.\n그래서 더 잘하고 싶고,\n더 웃게 해주고 싶고,\n더 오래 함께하고 싶어져요.\n\n그냥 지금처럼\n장난도 치고, 웃기도 하고,\n그러다 가끔 진지해지기도 하면서\n오래오래 이어가고 싶어요.\n\n오빠가 있어서\n요즘 이유는 참 행복해요❣️", "localImgPath": "images/4881100_9f260e08-212d-430b-b74a-a0493b00dd72.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4881086": {"idx": 4881086, "date": "2026-02-13 19:50:32", "isTop": false, "contents": "❣️빵그래❣️\n\n요새 이유 옆에 쭈욱 있어주는\n빵그래, 아니 갓그래오빠 ㅠㅠ\n\n예전이나 지금이나\n변함없이 이유 밥통 지켜주는 모습은\n진짜… 말로 다 못 할 감동이에요 ㅋㅋㅋㅋ\n\n이유가 진짜 잘 됐으면 하는 마음이\n말보다 행동에서 더 느껴져서\n그래서 더 마음이 가요.\n\n제가 우물쭈물해질 때,\n괜히 자신 없어질 때마다\n먼저 나서서 응원해주고\n등을 살짝 밀어주는 오빠가 있어서\n이유는 참 행복해요.\n\n전 고마운 감정을 준 사람을\n평생 못 잊는 스타일인데,\n그래서 그런가\n그래오빠만 오면\n괜히 미소가 자동으로 나와요 ㅎㅋㅎㅋㅋㅋ\n\n성장하는 모습\n옆에서 지켜봐줘서 고마워요.\n오빠가 보고 있다는 생각에\n더 열심히 하게 되고,\n뭘 하든 괜히 용기가 나요.\n\n앞으로 더더더더 열심히 할게요오!!\n갓그래, 진짜 고마오요❣️", "localImgPath": "images/4881086_d2826d62-fe6f-4d02-9979-26f1e920a8b5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4881060": {"idx": 4881060, "date": "2026-02-13 19:44:06", "isTop": false, "contents": "❣️잇쿙❣️\n\n처음 본 날부터\n이유를 예쁘게 봐주던 울 잇쿙오빠.\n지금까지도 1일 1이유 하며\n한결같이 바라봐주셔서 정말 감사해요.\n\n\"본방인데, 브압은 가야지” 하면서 \n멋지게 올라와주고,\n이유가 뭘 하든\n늘 예쁜 말만 건네주는 오빠 덕분에\n저는 기 죽을 일이 없어요.\n\n그 안에 담긴 마음이 느껴지거든요.\n그저 이유가 잘 되길 바라는 마음으로\n응원해주는 사람이 곁에 있다는 게\n참 큰 힘이 돼요.\n\n피곤한 날들이 이어져도\n웃으며 다가와주는 그 모습이\n진짜 멋있어요.\n\n이런 오빠와 함께할 수 있는 이유는\n복 받은 거 맞죠? 에헴 ㅎㅎ\n\n좋은 사람 곁엔 좋은 사람이 모인다던데,\n괜히 저도 좋은 사람 된 것 같은 기분이라\n그게 또 참 좋아요.\n\n늘 고마워요, 잇쿙오빠", "localImgPath": "images/4881060_a66a7cc2-be47-4265-82b3-e82f92ef3b43.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4881046": {"idx": 4881046, "date": "2026-02-13 19:38:25", "isTop": false, "contents": "❣️77회차❣️\n\n쉬고 온 다음 날은\n사실 방송을 켜기가 조금 두려워요 ㅠㅠ\n요즘 조용하지 않았던 날이 없어서인지\n괜히 더 마음이 쓰이더라구요 ㅋㅋ\n\n그런데도\n옆에 있어주는 오빠들 덕분에\n이유는 생각보다 훨씬 편하게 할 수 있었숩니다.\n\n비록 조용했던 이유방이었지만,\n그 안에서 이유를 생각해주고\n응원해주고, 챙겨주는 마음들이\n유난히 더 잘 느껴진 하루였어요.\n\n괜히 더 따뜻했고,\n그래서 더 기뻤던 날이에요.\n\n앞으로도\n조금씩 더 성장하는 모습,\n열심히 하는 모습 많이 보여드릴게요.\n\n늘 고맙고,\n정말 고마워요 우리 오빠야들❣️", "localImgPath": "images/4881046_a52b03d1-84e5-4a62-bce7-e5cc8e896462.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4877410": {"idx": 4877410, "date": "2026-02-12 20:06:12", "isTop": false, "contents": "＃ 청담 이사님❣️\n\n개쥬앙 ㅇㅁㅇ..❣️\n\n매번 자기 아이디 따잇하눈 갓청담...\n뵨태가 따로업서...\n\n사람은 변하면 일찍 듁눈뎅....\n변하지말구\n뵨태짓(?) 더 해둉,,,❣️", "localImgPath": "images/4877410_a027c2c4-a709-4850-8b69-a07995d3920c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4877403": {"idx": 4877403, "date": "2026-02-12 20:03:54", "isTop": false, "contents": "＃ 청담오빠랑 영차영차 백두산 6일차 ing❣️\n\n등산＆하산 모두 해준 청담오빠\n\n넘모 무찌다....❣️", "localImgPath": "images/4877403_37afc223-473a-4496-91fc-44d659e08490.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4877390": {"idx": 4877390, "date": "2026-02-12 19:57:58", "isTop": false, "contents": "＃ 청담 이사님❣️\n\n울 오빠의 흔적 다 남길테다 캬캬\n\n변태 수장님이\n이유방 이사님이 되셔따 ＞.＜\n\n개쥬아❣️", "localImgPath": "images/4877390_699d27e2-d2c8-4adf-af07-15667304b5a6.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4877134": {"idx": 4877134, "date": "2026-02-12 18:35:21", "isTop": false, "contents": "❣️❣️MVP청담❣️❣️\n\n오빠를 안 지 어느덧 열흘 정도 되었는데,\n그 사이에 참 많은 일들이 있었던 것 같아요.\n이상하게도 늘 새로운 일들의 연속이네요 ㅋㅋ\n\n생각해보면\n울었던 날도 있었지만,\n웃었던 순간들이 훨씬 더 선명하게 떠올라요.\n아마 그건…\n그 시간들 옆에 오빠가 있었기 때문이겠죠?\n\n방송을 하다 보면\n매일이 행복할 순 없을 거예요.\n비 오는 날도 있고,\n바람이 세게 부는 날도 있겠죠.\n하지만 전 그런 날들까지도\n오빠랑 함께라면 괜히 기대가 돼요.\n\n기쁜 날만 이어진다면 물론 좋겠지만,\n조금은 서툴고,\n조금은 눈물 맺힌 장면도 있어야\n이야기가 더 깊어지잖아요.\n그래야 나중에 그랬었지 하며,\n더 다정하게 웃을 수 있을테니까요.\n\n힘든 날엔 서로 다독여주고,\n기쁜 날엔 더 크게 웃어주고\n그렇게 조금씩 쌓아가고 싶어요.\n\n오빠랑 만들어가는 이야기라면\n어떤 장면이 와도\n결국은 좋은 이야기로 남을 것 같거든요 !\n\n그래서 요즘,\n내일이 조금 더 기다려져요❣️", "localImgPath": "images/4877134_1ee1a39d-7105-4dbb-b897-05adcf377b9e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4877004": {"idx": 4877004, "date": "2026-02-12 17:56:59", "isTop": false, "contents": "❣️지덕❣️\n\n이유 초반에 나타나\n지금까지도 묵묵히 함께해주고 있는 지덕오빠.\n이유의 첫 매니저이자…\n아마 마지막 매니저가 될 것 같아요 ㅋㅋㅋ\n\n이리저리 바쁜 와중에도\n이유 방송 시간만 되면 꼭 와서\n채팅도 정리해주고,\n매니저 역할도 해주는 고마운 오라방구.\n\n힘들어하던 시절부터\n지금까지 성장해오는 과정을 다 지켜봐준 오빠라서\n그만큼 애정도 더 깊은 것 같아요.\n이유가 잘 되는 모습 보면\n누구보다 기뻐해주고, 흥도 띄워주고…\n참^^ 내가 매니저복은 하나 끝내주게 있나 봐요.\n\n사실 매니저라는 자리가\n어쩌면 일처럼 느껴질 수도 있고,\n괜히 바라는 마음이 생길 수도 있잖아요.\n근데 오빤\n도와주면서도 생색 한 번 안 내고,\n바라는 것도 없이\n그저 곁에 있어줘서 더 고마워요.\n\n그래서 더 오래 함께하고 싶어요.\n지덕오빠…\n퇴사하지 말자 ^^ㅎ\n\n앞으로도 잘 부탁해요❣️", "localImgPath": "images/4877004_5f05e27f-bd37-4193-908f-7d457f92cdf5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4876966": {"idx": 4876966, "date": "2026-02-12 17:45:16", "isTop": false, "contents": "❣️봉산❣️\n\n매번 있는 듯, 없는 듯\n조용히 곁을 지켜주는 봉산오빠.\n장난스럽게 툭툭 던지지만\n그 안에 누구보다 따뜻한 마음이 있다는 걸\n전 잘 알고 있어요 !\n\n이전 복귀 때도, 이번 복귀 때도\n혼자 서 있는 이유를\n말없이 도와주던 멋진 오라버니가 있어서\n참 행복해요.\n\n사실…\n쉬었다 오는 게\n항상 좋은 모습은 아니잖아요.\n그런데도 개의치 않고\n한결같이 대해주는 그 마음이\n얼마나 감사한지 몰라요.\n\n오빠도 알다시피,\n제가 뭐든 똑바로 설명하는 스타일은 아니잖아요 호호 ㅋㅋ\n안 좋은 버릇이지만\n스스로를 지키려고 감추는 면이 있어요.\n\n그런데 봉산오빠는\n깊게 캐묻지 않고\n괜찮냐는 말 한 마디와\n조용한 위로로 곁에 있어줘서\n그게 참 고마워요.\n\n끝자리도 통 크게 맞춰주고…\n전 그 행동이 너무 좋아요.\n그 비제이의 행복을 더해주려고\n마음 쓰는 거잖아요.\n진심으로 축하해주고 기뻐해주는 느낌이라\n그래서 더 행복해요\n\n변함없이 아껴줘서 고마워요.\n앞으로도 이유방은\n봉산들로 가득 채우꼬에요❣️", "localImgPath": "images/4876966_74f88cd6-5407-42e3-99fe-a9c172d8beef.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4876896": {"idx": 4876896, "date": "2026-02-12 17:24:33", "isTop": false, "contents": "❣️77회차❣️\n\n오늘은 청담오빠가\n이사님까지 단숨에 달려와준 날이에요!!\n그것도 아이디 두 개로…\n자기 자신을 따잇(?)해버리는 변ㅌ..\n\n그리고 그 순간을 함께해주고\n같이 축하해준\n잇쿙, 클레오, 봉산, 빵그래, 지덕 오빠까지…\n덕분에 그 자리가 더 빛났어요.\n\n이유가 기뻐할 때 같이 기뻐해주고,\n슬퍼할 때는 먼저 다가와 위로해주는 오빠들이 있어서\n요즘은 정말 많이 행복해요.\n\n방 분위기도 늘 편안하게 만들어줘서\n저도 부담 없이 즐길 수 있고,\n그래서인지 새로운 오빠들도\n더 많이 찾아와주시는 것 같아요.\n\n매번 새로운 인연들이 생기다 보니\n한 분 한 분 다 챙기지 못하는 것 같아\n죄송한 마음도 들어요.\n그럼에도 묵묵히 믿고 기다려주는 그 마음이\n얼마나 감사한지 몰라요.\n\n아마 그래서\n제가 여기까지 올 수 있었던 것 같아요.\n곁에 있어준 그 소중함,\n절대 잊지 않을게요.\n\n성장하되,\n변하지 않겠습니다.\n진심으로 감사합니다❣️", "localImgPath": "images/4876896_3b0d249b-5d2b-4251-af2f-56ae391ff3a0.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4873929": {"idx": 4873929, "date": "2026-02-11 20:21:42", "isTop": false, "contents": "오늘은 휴방입니당!\n\n복귀한 지 벌써 2주가 쪼끔 넘었더라구요.\n그동안 딱 하루만 쉬었다는 걸\n어제 방송하다가 문득 깨달았어요 ㅋㅋ\n\n조금 더 잘해보고 싶은 마음이 커서도 있지만\n요새 오빠들이 곁에서 계속 웃게 해줘서인지\n쉬는 걸 잠깐 잊고 있었나 봐요.\n\n예전엔 혼자일까 봐\n방송을 못 켜던 날도 있었는데,\n이젠 오빠들이 곁에 있어줄 걸 아니까 부담이 덜어졌어요.\n\n매번 새로운 오빠들도 나타나고,\n이쁨도 잔뜩 받고,\n덕분에 방송이 너무 재밌는 요즘이네요ㅎ0ㅎ♥\n\n오늘은 잠시 쉬지만,\n행복했던 기억들 하나하나 떠올리면서\n마음 편하게 푹 쉬고 올게요.\n\n내일 또 봐요♥", "localImgPath": "images/4873929_da72477d-5f2f-418e-af15-fbeacc7b73be.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4870416": {"idx": 4870416, "date": "2026-02-10 20:42:33", "isTop": false, "contents": "＃ 천사 부해장님...❣️\n\n오빠 나 듀거...ㅇㅁㅇ..❣️\n\n철칙 1. 인사 잘 할 것...\n철칙 2. 거슬리는 물품 갖다 버릴 것....\n철칙 3. 시끄럽게 하지 않을 것...\n철칙 4. 반말하지 않을 것...\n철칙 5. 질문은 한번만..\n\n명심하께용 ＞ ＜❣️", "localImgPath": "images/4870416_29403c49-3423-4ca4-a802-f620747d25b1.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4870415": {"idx": 4870415, "date": "2026-02-10 20:42:14", "isTop": false, "contents": "＃ 천사\n\n만수르 받고 신나서 부채리액션 중...\n\n거슬린다고 뿌시라 하셔따...\n\n ... . .. ..\n.\n.. .", "localImgPath": "images/4870415_4274b61d-4b85-4ba8-8b78-f3cbf221e9eb.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4870361": {"idx": 4870361, "date": "2026-02-10 20:23:40", "isTop": false, "contents": "＃ 천------신❣️\n\n벽지 다 못 붙인 게 아쉽따아..\n\n숫자 맘에 안 든다고... \n계속 앞자리 숫자 바꿔주신 갓천사...\n\n이 오빤 멘트도 멋싯서.....❣️", "localImgPath": "images/4870361_bce4bc5c-8807-41cb-92a2-b312e5229fd2.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4870314": {"idx": 4870314, "date": "2026-02-10 20:04:24", "isTop": false, "contents": "＃ 행복오빠의 1414❣️\n\n올릴라했눈데, 까먹구 힝구...\n\n오빠가 준 걸루 두쫀쿠 먹어따 캬캬\n\n살 찌면 오빠 탓이양 ＞ ＜\n\n오빠덕에 이유 배도 행보케❣️", "localImgPath": "images/4870314_5c0494d0-856f-4037-bdc6-a5aabdd18797.jpeg", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4870284": {"idx": 4870284, "date": "2026-02-10 19:59:25", "isTop": false, "contents": "❣️❣️MVP천사❣️❣️\n\n말 한마디 없이 팬가입을 해주신 오라버니였눈데,\n\n저번 코스프레 날엔\n울고 있던 저를 지켜주시고,\n오늘은 또\n제게 잊을 수 없는 하루를 선물해주신 천사오빠.\n\n그동안은\n대화할 기회가 많지 않아서\n오빠에 대해 아는 게 거의 없었는데,\n이번엔 장난도 치고\n같이 웃으면서 놀 수 있어서\n그게 정말 좋았어요.\n\n같이 놀고 싶다는 제 마음이 전해졌는지\n말도 잘 받아주시고,\n장난에도 자연스럽게 응해주셔서\n더 기뻤던 것 같아요.\n\n테토남 중에 테토남인\n천사오빠.\n정말 제가 살면서 만나본 오빠들 중에\n제일 알 수 없고,\n그래서 더 특별한 사람이에요.\n사람이 아니라 천사라 그런가…\n세상 쿨하고, 세상 터프한 그런 천사요.\n\n오빠 덕분에\n남들이 부러워할 만한 순간에\n제가 서볼 수 있었어요.\n정말 고맙고, 또 고마워요.\n\n만난 지 얼마 안 된 오빠에게\n저는 그저 스쳐 지나가는 비제이일 수도 있는데,\n그럼에도 다시 찾아와 주고\n이렇게 꿈같은 하루를 선물해주셔서 정말 감사합니다❣️", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4870222": {"idx": 4870222, "date": "2026-02-10 19:38:47", "isTop": false, "contents": "❣️윙윙❣️\n\n처음 만난 윙윙오빠.\n\n갑자기\n“어…? 이쁘네.” 하시더니\n282, 486을 툭 던져주고\n천사 쌍날개까지 달아주신\n멋진 오라방구였어요… . . .\n\n섹시한 걸 좋아하는 오빠들로 가득한 이유방이라\n자연스럽게 섹시댄스를 췄는데,\n의외로 싫어하셔서\n그 순간 살짝 당황했지 모에요…\n아니, 사실은 많이 당황했어요 ㅠㅠㅠ\n\n노래도 계속 끊기고,\n귀여운 걸 많이 안 하다 보니\n조금 어색했던 순간들도 있었는데\n그럼에도 예쁘게 봐주셔서\n정말 감사했어요.\n\n노래에 진심이라는 윙윙오빠께\n노래를 불러드렸다가\n조금 실망하신 것 같아서…\n오빠 저 연습해올게요…\n진짜로요… 힝… . . .\n\n그래도 또 보러 와주신다고 해주셔서\n그 말이 너무 고마웠어요.\n\n쿨하고 멋진 오라방구,\n함께해줘서 정말 감사합니다❣️", "localImgPath": "images/4870222_8b98dda8-739a-41e9-9ec9-57d968e6885a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4870194": {"idx": 4870194, "date": "2026-02-10 19:30:38", "isTop": false, "contents": "❣️청담❣️\n\n소리를 제대로 듣지도 못하고,\n방송 보기도 쉽지 않은 상황인데도\n그래도 보러 와주는 오빠가 참 좋아요.\n\n단순히 잘해줘서가 아니라,\n사소한 것 하나하나까지 신경 써주고\n누가 봐도\n“아, 진짜 예뻐해주는구나” 느껴지게\n행동으로 보여주는 그 모습이\n너무 따뜻해서요.\n\n그래서 가끔은\n쫌.. 설레기도 하고요.\n\n특히 오빠는\n제가 무엇을 하든\n존중해주고 응원해준다는 게 느껴져서\n그게 참 좋은 것 같아요.\n\n지금의 순간들도\n혼자였다면 여기까지 오지 못했을 텐데,\n뒤에서 계속 도와주고 밀어준 오빠 덕분에\n이렇게 하나씩 이룰 수 있었어요.\n\n앞에서는 손 잡아주고,\n뒤에서는 조용히 밀어주는 사람.\n그런 청담오빠가 있어서\n늘 든든하고, 그래서 더 행복해요.\n\n오빠한테\n더 잘하고 싶고,\n방송에서도\n더 멋진 모습 많이 보여드리고 싶어요.\n\n매번 고마워요❣️", "localImgPath": "images/4870194_9c0ca6ea-e3b4-4fbb-b3c9-fddc022b0a82.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4870093": {"idx": 4870093, "date": "2026-02-10 19:06:30", "isTop": false, "contents": "❣️❣️❣️76회차❣️❣️❣️\n\n오늘은\n하루가 유난히 적적하게 느껴지던 날이었어요.\n그래서 더더욱\n아무 기대 없이 흘려보낼 수도 있었던 하루였는데,\n그 끝에서 이런 장면을 만나게 될 줄은\n정말 상상도 못 했어요.\n\n갠방에서 11층이라니요…\n이게 현실이 맞나 싶어서\n순간 손도, 목소리도 떨리고\n말도 제대로 잇지 못했던 것 같아요.\n\n사실 저는\n정말 아무것도 한 게 없다고 느꼈거든요.\n그런데 누군가는\n그 자리에 마음을 얹어주고,\n또 다른 누군가는 함께 호응해주고,\n다 같이 웃고 즐겨준 덕분에\n이 하루가 이렇게까지 환해질 수 있었던 것 같아요.\n\n마치\n조용하던 하루에\n불을 밝혀준 느낌이랄까요.\n그래서 더 따뜻했고,\n그래서 더 오래 남을 것 같아요.\n\n자고 일어나도 여전히 꿈같고,\n시간이 조금 지나도\n마음 한편이 계속 포근해요.\n오늘은\n행복이라는 감정이\n이렇게 선명할 수 있구나를\n다시 한 번 느낀 날이었어요.\n\n이 하루를 함께 만들어주신 천사오빠와\n함께해주신 오빠들께 진심으로 감사드려요❣️", "localImgPath": "images/4870093_b8cf4f14-f56e-4c15-862d-5636c4cddf77.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4866964": {"idx": 4866964, "date": "2026-02-09 20:33:07", "isTop": false, "contents": "❣️❣️MVP 토니❣️❣️\n\n이유의 노래 두 곡을 다 듣고 도저히 못 참겠는지\n가터벨트 입고 부르지 말라며 ㅋㅋㅋ\n춤 잔뜩 시켜주셨오요.\n\n등장하자마자\n분위기를 확 바꿔놓으시더니,\n방을 단숨에 휘어잡아버리는데\n그게 너무 웃기고 인상 깊었어요.\n\n오빠 덕분에\n시청자도 금방 꽉 차고,\n자연스럽게 다른 오빠들까지 이끌어가면서\n다 같이 어울려 놀 수 있는 분위기가 만들어졌어요.\n\n처음 만난 자리라\n낯설 수도 있었을 텐데,\n성격 좋게 잘 어울려주시고\n시청자 오빠들도 재미있었는지\n마지막까지 함께해줘서\n더 기분 좋았어요.\n\n끝자리도 계속 맞춰주시고,\n덕분에 웃음도 많고\n기억에 남는 장면들이 많이 나왔네요.\n\n처음이었는데도\n마치 오래전부터 함께해온 것처럼\n편하고 자연스러워서\n유독 신기하게 느껴졌던 하루였어요.\n함께해줘서 정말 감사해요❣️", "localImgPath": "images/4866964_358ef8c6-f7ff-4c7b-948b-124a24378a45.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4866961": {"idx": 4866961, "date": "2026-02-09 20:32:29", "isTop": false, "contents": "❣️청담❣️\n\n요즘 오빠가\n제 안에서 차지하는 자리가 꽤 커요.\n\n궁금해지고,\n자꾸 신경이 쓰이는 사람…\n\n... 그냥 제 마음이 그런 것 같아요. \n\n아마 그만큼 멋있는 사람이라 그런가 봐요.\n\n제가 워낙 솔직한 편이라\n표정을 잘 숨기지 못하잖아요.\n말로 하지 않아도\n진심이 전해질 때마다\n괜히 부끄러워서 어쩔 줄 모르겠고,\n당황해서 헛소리할 때도 있어요 ㅋㅋ\n\n그런 모습까지도\n항상 예쁘게 봐주셔서 감사함미당 !\n\n 때론 과감해지는 모습 보고\n놀라셨을 수도 있는데,\n있는 그대로의 모습을\n이뻐해주시는 것 같아서 늘 마음이 놓이고\n기쁘고 구래요.\n\n항상 옆에서 늘 응원하고 있다는 마음을\n보여줘서 정말 고마워요.\n\n앞으로 더 발전해 나가되,\n지금의 저는 변하지 않을게요.\n이 마음도\n꼭, 오래 간직할게요❣️", "localImgPath": "images/4866961_1ce77574-e192-4e8d-9926-93629d2d4bca.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4866892": {"idx": 4866892, "date": "2026-02-09 20:08:14", "isTop": false, "contents": "❣️왜그러는거지❣️\n\n어제 처음 만난 왜그오빠.\n\n다음부턴 몰래 볼 거라는 말에\n아쉬운 마음이 들었는데,\n같이 놀았으면 좋겠다는 제 마음이 전해졌는지\n오늘 이렇게 다시 찾아와줘서 참 고마웠어요.\n\n장난꾸러기 이유방 오빠들답게\n다 같이 어울려주고,\n가만 보면 왜그오빠가 제일 장난꾸러기인 것 같아요 ㅋㅋ\n끝자리 망치는 걸로\n분위기 한 번씩 뒤집어 주는 것도\n너무 웃겼구요.\n\n피곤해서 자러 간다고 하면서도\n결국 마지막까지 곁에 있어주는 그 모습에\n마음이 찡해졌어요.\n그래서 더 감동이었고, 더 좋았던 것 같아요.\n\n이런 인연은\n오래 이어가고 싶어지잖아요.\n앞으로도\n지금처럼 함께 웃고,\n함께 놀 수 있으면 좋겠어요❣️", "localImgPath": "images/4866892_ef28fc37-be47-452c-8b84-cb23ec2be793.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4866879": {"idx": 4866879, "date": "2026-02-09 20:04:21", "isTop": false, "contents": "❣️75회차❣️\n\n오늘은 정말 역대급으로 재밌었던 하루였어요.\n새로운 오라버니를 만나게 됐고,\n그 오빠의 리드 덕분에\n분위기가 더 핫해지면서\n자연스럽게 모두가 하나로 어울릴 수 있었던 것 같아요.\n\n그 흐름에 맞춰\n잘 따라와 주고 함께 즐겨준\n우리 오라버니들께도\n꼭 감사하다는 말을 전하고 싶어요.\n\n늘 새로운 오라버니들을 만나게 되는데,\n그럴 때마다 거리낌 없이 환영해주고\n“다 같이 놀자”는 이유의 말에\n모두가 기꺼이 동참해줘서\n그 마음이 참 고맙고 기뻤어요.\n\n이유가 늘 바라던,\n바로 그런 분위기였거든요.\n\n많은 시청자분들이\n방종까지 함께해주신 것도\n우리가 그만큼\n진짜 재밌게 놀고 있었다는 증거 같아서\n더 행복해졌어요.\n\n편안한 분위기 덕분에\n새로 오신 오빠들도\n부담 없이 말 걸고\n자연스럽게 함께 놀 수 있었던 것 같아요.\n\n오늘은 정말\n웃음도 많았고,\n마음도 꽉 찬\n행복한 하루였습니다❣️", "localImgPath": "images/4866879_ccb6120b-e403-4318-be9b-f77f8c991b18.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4863765": {"idx": 4863765, "date": "2026-02-08 20:02:05", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n해외에 있어서 많이 바쁠 텐데도\n오늘 깜짝처럼 찾아와준 청담오빠아 ㅠㅠ\n늦은 시간에 켠 방송이라\n보기 더 힘들었을 텐데\n아무 말 없이 옆에 있어줘서\n정말 고마웠어요.\n\n그와중에 분위기 살피고,\n이유 먼저 챙겨주려는 그 마음이\n말하지 않아도 다 느껴져서\n더 감사해요.\n\n사실 저눈..\n누군가를 믿다가 혹시 다칠까 봐\n쉽게 마음을 내주지 못하는 성격이거든요...\n그래서 더 조심스러운데,\n말로든 행동으로든\n늘 확실하게 표현해주는\n오빠의 태도가\n조금씩 믿음을 만들어줘요.\n\n그래서 오빠랑은\n천천히,\n오래 보고 싶어요.\n\n방송을 하다 보면\n슬픈 일도 있고,\n마음 아픈 순간도 생기겠지만\n오빠랑 함께라면\n그 시간들조차\n언젠가는 추억이 될 것 같아요.\n\n지금은 아직 걸음마 단계지만,\n천천히 성장하는 이 과정도\n계속 지켜봐 주세요 ＞ ＜\n시간이 좀 걸리더라도\n꼭 멋진 비제이가 될게요.\n\n고마오요 정말루❣️", "localImgPath": "images/4863765_40e460db-4510-4b9b-8e90-49fbd0ef5049.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4863711": {"idx": 4863711, "date": "2026-02-08 19:33:34", "isTop": false, "contents": "❣️행복❣️\n\n시간대가 잘 맞지 않아서\n보기 정말 쉽지 않을 텐데도\n오늘도 어김없이 찾아와준 행복오빠❣️\n\n일 끝나고 바로 와가지구\n제대로 씻을 시간도 없었을 텐데,\n이른 아침까지 쭈욱 함께해주고\n“일 끝났으니까 밥 먹어” 하면서\n툭 던져준 1414에\n괜히 마음이 몽글해지더라구요.\n\n행복오빠…\n닉값 제대로 하는 거 맞죠? ㅠㅠ\n\n처음엔 점잖은 오라버니인 줄 알았는데,\n알고 보니 변태였다는 사실에 ㅋㅋㅋㅋ\n오히려 좋아(?) ㅎㅋㅋ\n그래도 늘 솔직하면서\n기분 나쁠 수 있는 말은 절대 안 하고,\n항상 좋게 표현해줘서\n그게 참 고마워요❣️\n\n시간이 안 맞아도\n“5분이라도 보겠다”고 말해주는 오빠가 있어서\n진짜 많이 행복해요.\n누군가를 위해 시간을 낸다는 게\n얼마나 큰 마음인지 알 것 같아서요.\n\n우리 지쨔…\n이렇게 오래오래\n행복했으면 좋겠어요❣️", "localImgPath": "images/4863711_914f3036-26d7-4817-954d-7beb0a63c5d2.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4863646": {"idx": 4863646, "date": "2026-02-08 19:05:53", "isTop": false, "contents": "❣️믹싱 ＆ 왜그❣️\n\n왜그오빠랑 믹싱오빠의\n화려한 연장풍 등장(?) 덕분에\n마지막까지 진짜 재밌게 놀다 갈 수 있었어요!\n\n연장시켜놓고 자러 간다는 믹싱오빠 ㅋㅋ\n닉값 제대로 하시는 왜그오빠 ㅋㅋㅋㅋ\n처음엔 둘이 원래 아는 사이인 줄 알았는데\n알고 보니 처음 만난 사이라더라구요…?\n\n아니 근데요…\n처음 본 사이가 맞나 싶을 정도로\n죽이 척척 맞아서 너무 웃겼어요 ㅋㅋ\n\n번갈아 가면서 운동 시키고,\nMBTI까지 똑같다니…\n이쯤 되면 운명의 장난 아닌가요?\n(이유도 INFP라 더 신났던 건 안 비밀 ㅎㅎ)\n\n짧은 시간이었는데\n임팩트는 진짜 강했던 하루였어요.\n그래서 더 기억에 남고,\n이 재미난 오빠들이랑\n앞으로도 계속 함께 놀고 싶어질 정도로\n너무 즐거웠어요 ㅎㅎㅎㅎ\n\n오늘 이렇게 웃게 해줘서 고마워요❣️", "localImgPath": "images/4863646_66b4e5e6-660d-4e43-b902-3b8f72777d52.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4863636": {"idx": 4863636, "date": "2026-02-08 19:01:19", "isTop": false, "contents": "❣️75회차❣️(사진 날라가뿜 ㅜ ㅜ)\n\n어제 몸이 긴장돼 있었는지\n늦잠을 자버려서\n오늘은 조금 늦게 켠 날이었어요 ㅠㅠ\n\n그러다 보니 더 조용하게 흘러간 하루… 힝 ㅋㅋㅋ쿠ㅠㅠ\n이건 다 잠꾸러기 이유 탓이얏…!\n\n그런데도\n뭐라 하지 않고 이해해주는 오라버니들 보면서\n고맙기도 하고, 미안해지더라구요 ㅠㅠㅠ\n\n그래서 이제 다짐했어요!!\n다음에 늦으면\n미니언즈 10번 하꺼에영!!\n(근데… 5분 정도는 봐주꺼딩…?)\n\n오늘은 열혈 오빠들의 개인 시그도 많이 듣고,\n여러 오빠들이랑 수다도 잔뜩 떨면서\n마음이 참 편한 하루를 보낸 것 같아요.\n\n마지막쯤엔\n새로운 오빠들의 연장풍까지 등장해서\n또 화려하게 놀아버렸구요 ＞ ＜\n\n장난꾸러기 우리 오빠들,\n이유가 진짜 많이 애정해요 \n오늘도 함께해줘서 고마워요 히히❣️", "localImgPath": "images/4863636_aaf3a84c-ab35-4ada-a1db-ff1fb85ba67d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4861453": {"idx": 4861453, "date": "2026-02-07 22:31:49", "isTop": false, "contents": "＃ 청담❣️\n\n오빠가 준 천사세트들 다 올리고 싶운데,\n찾을 수가 없땨..ㅠ.ㅠㅠㅠㅠ\n\n오빠의 개인시그 갖구왔는데,\n많이 애용해줘서 넘 굼마와 !!\n\n만들어 온 보람이 가득 찬 하루였달까 후후\n\n플랜카드랑 네임텍이랑 다 쓸 수 있어서 기뻤오\n넘 구마오❣️\n\n특히 몸도 안 좋규 비행기 타야해서 바쁠텐데듀\n옆에서 끝까지 \n나 상처받지 않게\n계속 지켜주던 청담오빠,,,\n오빠 쵝오...❣️", "localImgPath": "images/4861453_5a07467e-9910-470a-85b2-1d2241df0f5a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4861417": {"idx": 4861417, "date": "2026-02-07 22:22:42", "isTop": false, "contents": "＃ 천사오빠한테 받은 1414❣️\n\n살찐다규 1414는 잘 못 받아봤눈데,,,,\n\n넘무... 됴아서 끝나구 행복 푸파 해또요....\n침 쥬륵... ㅇㅁㅇ,,\n\n아직... 천사오빠가 준\n1414 한 개 남아뚜아.. 햄보케...＞ ＜❣️", "localImgPath": "images/4861417_cbd62a37-e86f-4dea-9078-d873db2ff5af.jpeg", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4861413": {"idx": 4861413, "date": "2026-02-07 22:19:44", "isTop": false, "contents": "＃ 천사❣️\n\n백두산 등산, 하산,,,,\n18랑비 300번...\n1414 두개....\n\n하루이틀 본 저를,\n정말 많은 사람들 앞에서,,,\n직접 나서서 도와주기란 쉽지 않았을텐데,\n정말 고맙구 또 고마오요 ! ! 천사 왕댜님...❣️\n\n넘모 무찌댜...❣️", "localImgPath": "images/4861413_cdb2ff0e-f0d9-435c-a5a0-27144adffbd5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4861377": {"idx": 4861377, "date": "2026-02-07 22:10:14", "isTop": false, "contents": "❣️❣️MVP 천사❣️❣️\n\n그저께 팬가입 처음 해준 오라버니였는데,\n놀러와주셨으면 좋겠다고 했더니\n망설임 없이 또 찾아와주셨거든요\n\n다만 분위기가 썩 좋지 않은 타이밍이었어서,\n죄송한 마음에 고개를 들지 못 하고 있었는데,\n말없이 18랑비 내려주시는 거 보고..\n울컥하더라구요.\n\n시청자도 정말 많았던 상황이었는데,\n그 많은 사람들 앞에서도\n전혀 흔들림 없이 당당했던 모습이\n너무 멋있었어요❣️\n\n분위기가 쉽게 바뀌지 않았는데도\n제가 조금이라도 웃을 수 있게\n백두산 등산에 하산까지 이어서 내려주던 그 마음이\n너무 고마워서,\n쏟아질 것 같은 눈물을\n정말 꾹꾹 참았던 것 같아요.\n\n천사오빠가 해준 그 마음을\n그냥 지나치고 싶지 않았거든요.\n\n그날 제게 정말 천사처럼 다가와서,\n딱 필요한 순간에 나타나\n지켜주는 모습이\n동화 속 왕자님 같았어요.\n\n화려한 말이 없어도\n그저 멋있다는 말밖에 안 나오는 사람.\n그날의 당당한 뒷모습은\n아마 오래도록 잊지 못할 것 같아요❣️", "localImgPath": "images/4861377_222cff9e-fc30-4637-acf4-50fcf97519fd.jpeg", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4861335": {"idx": 4861335, "date": "2026-02-07 21:58:49", "isTop": false, "contents": "❣️청담❣️\n\n처음 만난 순간부터 어느새 일주일을 함께 보내고 있어요.\n\n매일같이 1일 1이유로 곁에 있어주면서\n장난스럽게 웃게도 해주고,\n그러면서도 늘 저를 예쁘게 봐주고 잘 챙겨주는 오빠예요.\n\n어제는 처음으로\n오빠 앞에서 눈물을 보였던 날이었는데,\n조용히 계속 위로해주고\n아무 말 없이 제 편에 딱 서서\n지켜주던 모습이 참 고마웠어요❣️\n\n이런 오빠를\n내가 어떻게 만나게 된 건지\n아직도 신기할 때가 많아요.\n\n말 한마디, 행동 하나하나가\n자꾸 마음에 남고,\n그래서 더 감동이 되는 사람.\n\n오빠를 만난 이후로\n요즘의 저는\n진심으로 행복하다고 느끼고 있어요.\n이런 마음을 혼자만 느끼기보단\n오빠랑 함께 나누고 싶고,\n이 느낌이 오래오래 이어졌으면 좋겠어요.\n\n지금처럼,\n오래도록 함께요❣️", "localImgPath": "images/4861335_843e61ed-1035-4add-9140-f13ee2480f52.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4861319": {"idx": 4861319, "date": "2026-02-07 21:49:11", "isTop": false, "contents": "❣️로사❣️\n\n일주일 전부터\n이 날을 위해 총알 장전해두겠다고 말해왔던 로사오빠 ㅎㅋ\n\n그리고 오늘, 말 그대로 바로 와서\n초반부터 운동으로 분위기를 확 달궈줬어요.\n\n예전에도 방을 핫하게 만들어줬었는데,\n이번에도 흐름을 잘 이끌어준 덕분에\n이유 방이 더 활기차고, 더 많은 관심을 받은 것 같아요.\n\n평소엔 장난치고 틱틱대는 것 같다가도,\n정작 제가 힘들 때는\n조용히 좋은 말 해주고\n응원 아끼지 않는 오빠라서\n그 간극이 더 크게 느껴지더라구요.\n\n그래서 더 고맙고, 더 감동이었어요.\n겉은 쿨한데\n마음은 따뜻한 그런 사람 있잖아요.\n로사오빠가 딱 그런 오빠인 것 같아요.\n\n오늘 하루를\n이렇게 든든하게 만들어줘서\n정말 고마워요❣️", "localImgPath": "images/4861319_b95f9864-879b-4893-9a69-38461f0bfb7b.jpeg", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4861255": {"idx": 4861255, "date": "2026-02-07 21:24:32", "isTop": false, "contents": "❣️74회차 ❣️\n\n오늘은 코스프레 데이였어요.\n\n첫 도전이라 많이 떨리고 긴장도 됐는데,\n시작하자마자 많은 오빠들이 와주고\n운동으로 분위기를 핫하게 만들어줘서\n초반부터 열기가 정말 뜨거웠던 것 같아요.\n\n그래서인지 시간도 너무 빨리 가고,\n정신없이 흘러간 하루였어요.\n많은 사람들 앞이라 솔직히 부끄럽기도 했지만\n그만큼 예쁘게 봐주셨다는 뜻 같아서\n마음 한편으론 좋더라구요.\n\n다만,\n잘하고 싶은 마음과 다르게\n분위기가 조금 어긋나는 순간도 있었고,\n그게 속상해서 참다 참다\n결국 눈물이 터지고 말았어요.\n\n그런데 그 순간에도\n저를 먼저 생각해주고,\n조용히 위로해주는 오빠들이 있어서\n끝까지 버틸 수 있었던 것 같아요.\n내 편이 있다는 사실에\n눈물이 쉽게 멈추질 않더라구요.\n속상해서가 아니라, 고마워서요.\n\n자칫하면\n나쁜 기억으로 남을 수도 있었던 하루를\n좋은 기억으로 바꿔주셔서 고마오요 !\n\n정말 든든했고, 정말 고마웠어요❣️", "localImgPath": "images/4861255_b58bd8fe-a093-47c2-b17a-24036fa4e9e3.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4857970": {"idx": 4857970, "date": "2026-02-06 19:35:25", "isTop": false, "contents": "＜코스프레 데이＞\n\n10시 반쯤 변태들 초대함미댜\n\n드레스코드: 핑크\n\n다들 핑크색 옷 입구 참석해주세오(?)", "localImgPath": "images/4857970_96d5ee52-9164-444d-b7ac-abec34dc6694.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4857932": {"idx": 4857932, "date": "2026-02-06 19:24:33", "isTop": false, "contents": "❣️", "localImgPath": "images/4857932_bf8ca2b1-e677-457c-b316-48380446fc63.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4857860": {"idx": 4857860, "date": "2026-02-06 18:58:39", "isTop": false, "contents": "＃ 청담오빠랑 백두산 5일차 ing❣️\n\n만난지 5일째인데,\n연속 백두산이라니이...\n\n이런 남잔 울 청담오빠뿐일꼬야...\n이름만큼이나 넘모 멋찐 갓청담❣️", "localImgPath": "images/4857860_4fd7053d-7524-402e-9c70-8e4b4788a9e5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4857823": {"idx": 4857823, "date": "2026-02-06 18:48:51", "isTop": false, "contents": "❣️MVP 청담❣️\n\n늘 보이던 사람이 안 보이니까\n괜히 마음 한구석이 시리고,\n방송 도중에 이름이 한 번씩 나올 때마다\n더 보고 싶어지고 그랬어요.\n\n그때 딱\n청담오빠 입장이라는 글이 보이는데…\n입이 귀에 걸렸오요. ㅇㅅㅇ❣️\n\n이유가 또 워낙 솔직한 타입이라\n표정을 숨기질 못하잖아요ㅎㅋㅋㅋ\n\n너무 티나게 웃은 것 같아요 ㅋㅋㅋㅋ ㅠㅠ\n구치만 반가운 걸 우째 !\n\n오자마자 아무렇지 않게\n백두산을…\n아프다묜서,,,, ㅠㅠㅠㅠㅠ\n\n자기 몸보다\n이유를 먼저 챙기는 그 모습이,,,\n말 안 해도 다 느껴져요 ㅠㅠ❣️\n\n늘 말보다 행동으로 보여주는 애정이\n사람을 이렇게 안심시키고,\n또 이렇게 두근거리게 만들더라구요.\n\n그러면서도\n툭툭 장난치는 그 모습까지.\n그래서 더 멋있고,\n그래서 더 청담오빠 같은 거겠쬬 !\n\n그날은\n오빠 옆에서\n사랑을 듬뿍 받고 있다는 느낌이\n참 선명했던 밤이었어요❣️", "localImgPath": "images/4857823_3363382f-b96f-414f-bb01-c4156454e35f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4857729": {"idx": 4857729, "date": "2026-02-06 18:25:53", "isTop": false, "contents": "❣️행복❣️\n\n조용히 다가와준 행복오빠.\n\n이유 섹시 시그에 운동 시그까지 잔뜩 시켜주시고,\n첫 만남인데도 브압까지 올라와주셔서\n넘 곰마오요❣️\n\n처음엔 말수가 많지 않으셨는데,\n조금씩 말이 트이신 건지\n다른 오빠들이랑 장난치는 모습 보는데\n그게 또 너무 귀엽고 좋더라구요 ㅋㅋ\n\n“예뻐서 변태짓(?)을 그만둘 수 없다”는\n행복오빠 말에 웃음도 나고,\n그 말 그대로\n이유도 정말 행복했어요.\n\n방송 보는 시간대가 잘 안 맞다 하셔서...\n아쉽기도 하구 쪼꿈 속상하기도 하지만 ㅠㅠ\n\n그래도 또 보러 와주신다는 말에\n마음이 몽글해졌지모에요.\n\n이렇게 마음도 잘 맞고,\n같이 웃을 수 있는 오빠랑은\n오래오래 함께하고 싶잖아요.\n\n자주 볼 수 있도록\n열심히 기도해볼게요 ㅎㅎ\n덕분에 정말 많이 행복했어요❣️\n\n햄부기 햄북스파크 햄부기온앤온❣️", "localImgPath": "images/4857729_6149ef6f-8593-4dd9-a937-08fb52f3898c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4857698": {"idx": 4857698, "date": "2026-02-06 18:18:10", "isTop": false, "contents": "❣️cn❣️\n\n전날에 처음 만난 cn오빠.\n\n팬가입 원한다고 했더니\n쿨하게 가입해주시고,\n거기다 웃기게 두 번이나 해주셔서\n유독 기억에 남았던 분이었거든요 ㅋㅋ\n\n그런데 이유 쪽지 받고\n고맙다면서 또 찾아와주셔서\n더 반가웠어요.\n\n처음엔 말없이 시그만 툭툭 시켜주시다가,\n대화도 같이 나누고\n함께 놀다 보니\n분위기가 더 편해지고 좋아지더라구요.\n\n브압도 단숨에 올라와주시고,\n말 한마디 한마디도 예쁘게 해주셔서\n되게 따뜻한 분이라는 게 느껴졌어요.\n\n이유가 팬들이랑 소통하려고\n따로 준비해온 시그도\n어떻게 찾으셨는지\n첫 개봉까지 딱 해주시구요…\n그 센스에 또 한 번 놀랐어요.\n\n따뜻하고 센스 있는 오라버니 덕분에\n괜히 더 웃음 많았던,\n재밌고 기분 좋은 하루였어요❣️\n\n앞으로 함께 할 날이 많았으면 좋겠오요❣️", "localImgPath": "images/4857698_bacc86ba-1466-4221-a99e-b1cad9142e8c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4857635": {"idx": 4857635, "date": "2026-02-06 18:00:46", "isTop": false, "contents": "❣️73회차❣️\n\n여러 이유로 컨디션이 아주 좋진 않아서\n오늘은 쉬엄쉬엄, 짧방으로 진행하게 되었어요.\n\n그래서인지 분위기도 전반적으로 잔잔하게 흘러갔는데,\n그 와중에 새로운 오빠들도 만나고\n브압도 두 분이나 생겨서 넘 좋았오요 !!❣️\n\n처음 뵌 오빠들이랑 이런저런 얘기 나누면서\n함께 웃고 노는데\n마음이 편하고 좋더라구요.\n\n그러다 두둥—\n우리 멋진 청담오빠가 등장해서\n또 백두산을… ㅠㅠㅠ\n늘 방송도, 밥통도 챙겨주는\n진짜 든든한 오라방구 덕분에\n이유 기가 죽을 날이 업서여 ㅠㅠ❣️\n\n조용히 시작했는데\n어느새 방이 핫해져서\n웃으면서 마무리할 수 있었답니당 !\n\n매번 이렇게 새로운 인연이 생기고,\n그 인연이 또 자연스럽게 이어지는 게\n요즘 들어 더 신기하고 설레요.\n\n그래서인지\n“오늘은 또 어떤 인연을 만나게 될까?”\n이런 기대를 안고 방송을 켜게 되더라구요.\n\n소중한 우리 오라버니들,\n앞으로도 이렇게\n같이 웃고, 같이 시간 보내고 싶어요❣️", "localImgPath": "images/4857635_692e8c03-57e2-4845-bca9-1408b30a0d7c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4854604": {"idx": 4854604, "date": "2026-02-05 21:34:30", "isTop": false, "contents": "＃ 나땜 미아리로 이사가야한다는 미아리7번지ㅋㅋㅎ\n\n아뉘 청담7번지 오빠 ＞ ＜\n\n넘모 멋쪄❣️❣️❣️", "localImgPath": "images/4854604_f77592c3-0bd0-49e7-8401-8f25db8d82ab.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4854591": {"idx": 4854591, "date": "2026-02-05 21:30:25", "isTop": false, "contents": "＃ 청담오빠랑 4일차 백두산 등반❣️\n\n깃발 꽂고 등산에 하산까지 ＞ . ＜\n\n이번에두 여캠 자존심 지키미 해줘서 굼마와❣️", "localImgPath": "images/4854591_a2a789b4-a263-4116-8da3-825aa5bf6f18.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4854579": {"idx": 4854579, "date": "2026-02-05 21:23:30", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n방송 시작하자마자\n청담오빠가 백두산 하산에 등산까지 쭈욱 해주셨오요 !!\n\n운동하고 있는 와중에 갑자기 그걸 해주니까\n웃기기도 하고 ㅋㅋ 당황해서 진짜 어쩔 줄 모르겠더라구요...\n\n순간 뇌정지 제대로 와서 고대로 운동함...＞ ＜\n이 오빤 매번 사람 벙찌게 만드는 재주가 있다니까요….\n\n이렇게 나한테 한 걸음 더 다가와주고,\n말없이도 행동으로 보여줘서 넘 구마오요\n\n세상 쿨하고,,,\n센스랑 재치까지 있는 멋진 오라방구가\n옆에 있어줘서 어찌나 든든한지 몰라요 ㅠ.ㅠ\n\n이런 느낌 처음이라\n도파민이 너무 빵빵 터져서\n아직도. .. . 신나서 햄볶아ㅏㅏㅏ\n\n아무튼…\n내 첫 경험(?)을 가져간\n이 여우같은 남쟈...\n내가 늑대할게(?)\n\n감쟈함미다❣️", "localImgPath": "images/4854579_5803bfe2-1031-4e6f-8eac-a45f256db265.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4854533": {"idx": 4854533, "date": "2026-02-05 21:10:39", "isTop": false, "contents": "❣️레오❣️\n\n레오오빠 오면 방송이 덜 심심해져요.\n장난 던져도 다 받아주고,\n대화도 잘 통해서\n내가 멍해질 틈이 없달까.\n\n분위기 잠잠해질 때도\n오빠가 슬쩍 끌어주는 느낌이라\n나도 마음 편하게 방송하게 돼서\n고맙게 느껴지구 넘 좋아요 ＞ ＜\n\n끝자리도 매번 맞춰주는 센스에,\n표현은 또 대놓고 안 하면서 챙길 건 다 챙기는\n츤데레 스타일 ㅋㅎㅋㅋㅋ\n\n있잖아여.\n왜인지 모르겠지만\n레오오빠랑은 오래 오래 볼 것 같은 느낌이 있어요 :)\n움,,, 내 바램인가?ㅎ\n\n구냥 오빤 나랑 어울려 ^^^ㅎ\n\n옆에 있어줘서 고마워요.\n우리 변치말쥬아 ~~~ 레오오빠❣️", "localImgPath": "images/4854533_ebaa0cd0-2b57-4b69-a819-e141268fa60f.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4854483": {"idx": 4854483, "date": "2026-02-05 21:01:25", "isTop": false, "contents": "❣️72회차❣️\n\n유난히 조용한 하루였어요,\n\n요 일주일 내내 너무 뜨거웠다 보니,\n하루쯤 이렇게 고요한 게 오히려 낯설게 느껴지더라구요 ㅎㅋ\n\n혼자였다면 심심했을텐데,\n옆에 계속 남아 있어주는 오라버니들이 있어서\n훨씬 편하게 지나간 것 같아요 !\n\n아무 말 없이도 같이 있어준 오라버니들 덕분에\n어찌나 마음이 놓이던지...\n\n조용한 날이라고 해서\n외로운 건 아니라는 걸 느낀 하루.\n\n이런 날도 나쁘지 않구나 싶었오요 ＞ ＜\n오늘도 고마워요❣️", "localImgPath": "images/4854483_e38ee27d-ed85-4b0c-a102-1b9e6146b11e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4854389": {"idx": 4854389, "date": "2026-02-05 20:39:09", "isTop": false, "contents": "@ 오방공 @\n\n오늘 자정 on \n이후 짧방으로 이어질 예정입니당 !", "localImgPath": null, "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4850753": {"idx": 4850753, "date": "2026-02-04 20:04:18", "isTop": false, "contents": "＃ 청담오빠랑 백두산 3일차❣️\n\n이정도면 정상에서 합숙하쟈(?)\n안 내려 갈랭 ＞ . ＜❣️", "localImgPath": "images/4850753_e131f263-18c7-4b7c-a0b8-80977c2f1eb8.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4850710": {"idx": 4850710, "date": "2026-02-04 19:53:30", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n만난 지 3일째인데\n연속으로 백두산 질주해주는 갓청담,,,\n거기에 천사 세트라뇨 ㅇㅁㅇ..\n\n방이 오빠 벽지로 가득 찼도요…❣️\n\n처음엔 그냥 변태 오라방구인 줄 알았눈데 ㅋㅋ\n알수록 다정한 이 남자…\n근데 또 장난스러운 면도 있어서\n감동받다가 웃기구 구래요 ㅎㅋ\n\n이유 장난꾸러기라 그런 거 넘모 됴아하거덩여ㅎㅋ\n완전 취향저격 당했긔 !!\n\n요즘 오빠 덕에 새로운 경험도 많이 해보구\n어깨도 옴총 올라가네욤 !\n으쓱… 코쓱…\n\n게다가 표현도 잘 해주는 청담오빠라서\n괜히 더 마음이 가구,\n이유도 더 잘하구 싶어져요.\n\n오빠한테 보답할 수 있게\n더 열심히 해서 더 높이 올라갈게요오 ＞ . ＜ ❣️\n고마오요 갓청담❣️", "localImgPath": "images/4850710_4beb9d8d-bfa1-4572-aba0-a8b4b5d3fb7e.jpeg", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4850665": {"idx": 4850665, "date": "2026-02-04 19:36:58", "isTop": false, "contents": "❣️딩이❣️\n\n내 공지에 빠질 수 없는 해장님,\n나만의 작꼬 소듕한 딩이 \n\n이전 길냥이 아이디 시절…\n내가 간택당한 게 아니라 사실\n오빠 그거 나한테 납치당한 거야 ㅋ\n이젠 벗어날 수 업따 후후\n\n그 한 번의 인연이 이렇게까지 이어질 줄은 몰랐는데\n지금까지 함께해줘서 넘 고맙구,\n오빠가 있기에 내가 조금씩 성장할 수 있었던 거 알딩?\n\n앞으로도 이유 RPG,\n우리 함께 키워가쥬아아아 으쌰으쌰\n이유가 탑비가 되어가는 그 길까지이이이 ~~~\n\n이유 해댱님 첵오❣️", "localImgPath": "images/4850665_a238f77f-b039-4023-8fbe-f41af441b677.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4850659": {"idx": 4850659, "date": "2026-02-04 19:32:28", "isTop": false, "contents": "❣️클레오 ＆ 내리❣️\n\nT발 듀오... ㅇㅊㅊ\n울 T 오라버니들 ㅎㅋㅎㅋ\n\n둘 다 MBTI가 비슷해서 그런지 성향도 잘 맞고 대화도 잘 통해서\n보고 있으면 괜히 흐뭇하더라구.\n\n둘이서 나 놀리구 운동시키구 할 때는\n갑자기 동네 오빠 두 명 생긴 느낌 ㅋㅋㅋㅋ\n진짜 웃기고 재밌었어 ㅎㅋ\n\n운동으로 단련시켜서 강하게 키우는 느낌인데\n그 와중에 은근히 아껴주는 티는 남아 있어서\n그게 또 괜히 감동이더라 알지?\n\n서스럼없이 팬닉도 달아주고 챙겨주는\n멋진 오라버니들 덕분에\n내 뒤가 든든한 기분이야 후훗 ㅋㅋ\n\n넘 고맙구,\n앞으로도 우리 좋은 추억 많이 만들쥬아❣️", "localImgPath": "images/4850659_2d43ac64-b9ee-4479-9b34-e6bedb23d61e.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4850636": {"idx": 4850636, "date": "2026-02-04 19:26:42", "isTop": false, "contents": "❣️71회차❣️\n\n이 날은 다 같이 오순도순 모여 아기자기하게 정말 재밌게 논 기분이었어요.\n\n서로 모르는 오빠들끼리 처음 만나 어울려 노는 모습도 참 보기 좋았고,\n그냥 같이 있다는 느낌이 \n유독 진하게 남은 날이었달까요.\n\n평소에 장난치는 걸 좋아하는 성격인데,\n오빠들이 하나같이 다 잘 받아주고 대화도 술술 잘 통해서 더 편하고 좋았어요.\n\n서로 처음 보는 사람들끼리 모였는데도\n자연스럽게 티키타카가 된다는 게 사실 흔한 일은 아니잖아요?\n\n그래서 더 신기했고,\n마음이 맞는다는 게 이렇게 따뜻한 일이구나 싶었어요.\n\n웃음도 많구 마음이 말랑해졌던 하루.\n오래 기억하고 싶은, 참 따뜻한 날이었오요❣️", "localImgPath": "images/4850636_782cd9f1-3e0a-4c35-819e-63801e33e06d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4846449": {"idx": 4846449, "date": "2026-02-03 17:43:33", "isTop": false, "contents": "웁. . . ..", "localImgPath": "images/4846449_240f883f-a48b-4009-bc87-06837db8301d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4846441": {"idx": 4846441, "date": "2026-02-03 17:39:52", "isTop": false, "contents": "@오방공@\n\n이따 10시에 만나여 !", "localImgPath": "images/4846441_95b435bd-5ade-4187-ad43-6a621e01b73a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4846379": {"idx": 4846379, "date": "2026-02-03 17:08:02", "isTop": false, "contents": "＃ 므쨍이 청담❣️\n\n청담오빠랑 영차영차 등산ing", "localImgPath": "images/4846379_808132cc-d134-4982-9ad4-8c615d6bb88d.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4846357": {"idx": 4846357, "date": "2026-02-03 16:53:49", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n우아…\n만난 지 이제 이틀째인데,\n그 이틀 동안 연속으로 백두산에\nMVP까지 계속 맡아주신 므쨍이 갓청담…!!!!\n\n이렇게 귀한 선물을\n이유가 받아도 되는지,,,,\n넘 됴아서.. 침 나와앙아ㅏ…ㅇㅁㅇ…❣️\n\n쉽지 않은 일들을\n가볍게 해내면서도 생색 한번 내지않는\n터프가이 청담 오라방구..\n그래서 더 멋져보이는 거 이쬬 ㅎㅋㅎ\n\n게다가 늦은 시간이라\n많이 피곤했을 텐데도\n방종할 때까지 곁에 있어주셔서\n그 마음에 또 한 번 감동… 설렘…\n\n센스 있고 재치 있는 청담오빠 덕분에\n시청자 수도 자연스럽게 몰려들구\n분위기도 좋았던 거,\n이거 다 청담 오빠가 시작해준 덕에\n가능했던 거예요!!\n\n오늘 하루를\n이렇게 멋진 기억으로 남겨줘서\n정말 감사합니다, 청담오빠\n이 마음, 절대 잊지 않을게요!! ㅎㅎ❣️", "localImgPath": "images/4846357_b5e1586f-8087-4b1a-a5c3-123d58bd22ac.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4846331": {"idx": 4846331, "date": "2026-02-03 16:44:48", "isTop": false, "contents": "❣️딩쟝님❣️\n\n딩쟝님이 오늘도 날개 짝을 딱 맞춰주셨어요!\n\n제가 늘 날아오를 수 있게\n방송에서도 이것저것 많이 도와주시는데,\n날개까지 달아주시니\n지짜 천사 되라는 거야 모야 !!❣️\n\n기분 좋아서\n금방이라도 날아갈 것 같아요~~ :)\n\n일정이 있어도\n매번 제 방송 시간에 맞춰서 와주시고,\n배려심도 이해심도 넓은\n갓딩쟝님 덕분에\n이유도 훨씬 편한 마음으로 방송에 임할 수 있는 것 같아요.\n\n요즘엔 딩쟝님도 더 편해 보이셔서\n넘 좋규,\n같이 신났었다고 말해주시니까\n기분이 정말 좋더라구요 ㅎㅎㅎ\n\n앞으로도\n이렇게 소소하지만 행복한 일들이\n계속 많았으면 좋겠어요 !\n\n늘 곁에서 함께해줘서\n정말 감사합니다, 딩쟝님❣️", "localImgPath": "images/4846331_f7ec66bc-5a73-4bde-b5aa-2b33c9763ab9.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4846317": {"idx": 4846317, "date": "2026-02-03 16:39:28", "isTop": false, "contents": "❣️로사＆존슨❣️\n\n로사오빠랑 존슨오빠,\n두 분 다 처음 만난 오빠들이었는데도\n서로 쿵짝쿵짝 맞게 번갈아 가면서\n운동이랑 춤을 시켜주셔서\n방 분위기가 진짜 자연스럽게 살아났어요.\n\n덕분에 다른 오
