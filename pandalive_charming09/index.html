빠들도 더 재밌어하고,\n시청자도 계속 빵빵했고\n팬가입도 여러 개 받아서\n역대급으로 많은 오빠들이\n함께 어울려 놀 수 있었던 하루였던 것 같아요.\n\n이런 분위기 만들기 쉽지 않은데,\n오빠들이 중심을 딱 잡아줘서\n처음인데도 전혀 어색하지 않았어요 !!\n\n다리는 뿌러질 뻔 했지만(?) ㅋㅋㅋ\n그래서 더 웃기고\n재밌는 장면들이 많이 나왔던 것 같아요ㅎㅎㅎ\n\n새롭게 만난 인연인 만큼\n이 분위기, 이 느낌으로\n오래오래 함께 가면 좋겠어요.\n\n오빠들이랑 다 같이 놀던 그 시간이\n너무 좋았어서\n저도 괜히 더 신나고, 행복했어요 ＞ ＜\n정말 고마워요❣️", "localImgPath": "images/4846317_c3f03db6-0d9a-40ed-a9fb-fda7b70bf892.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4846278": {"idx": 4846278, "date": "2026-02-03 16:27:51", "isTop": false, "contents": "❣️70회차❣️\n\n이날은 유독 의상이 너무 마음에 들어서\n오빠들한테 자랑도 많이 했던 날이에요 !\n\n그랬더니 응큼한 오빠들 덕분에\n단추 두 개가 강제 퇴장당하긴 했지만요 ㅎㅋㅋㅋ\n\n팬가입도 많이 나오고,\n시청자도 빵빵해서\n괜히 혼자 1인 엑셀하는 기분도 들고,\n다 같이 어울려 노니까\n더 재미있게 느껴졌던 하루였던 것 같아요.\n\n이게 바로\n그 비제이에 그 시청자라고 해야 할까요.\n장난꾸러기인 이유의 오라버니들답게\n다들 장난끼가 넘쳐서\n방 분위기가 정말 좋았어요.\n\n아마\n오래오래 기억에 남을 것 같아요.\n\n시청자 채우는데 도움주신\n청담오빠❣️, 빵그래오빠❣️정말 감사드리고,\n내 옆에 늘 있어준 딩쟝님❣️,\n흐름 만들어준 로사오빠,❣️ 존슨오빠,❣️ue오빠,❣️ 스스오빠❣️\n\n그리고 새로 만난 오라버니들,\n함께 시청해주신 모든 오빠분들께도\n진심으로 감사드려요❣️", "localImgPath": "images/4846278_3925edf5-708d-47c5-b6d7-704b284f01c3.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4840396": {"idx": 4840396, "date": "2026-02-01 20:22:44", "isTop": false, "contents": "❣️❣️MVP 청담❣️❣️\n\n언젠가,\n그냥 지나쳤을지도 모를 하루가\n누군가의 말 한마디로\n조금 특별해지는 순간이 있잖아요.\n\n분명 처음 본 오빠였는데\n장난처럼 던진\n건빵 무시하지 말라는 말이\n웃기고 귀여워서ㅋㅋㅋ\n마음을 먼저 열어주더라구요.\n\n그래서인가 첫만남임에도 되게 편했던 것 같아요 :)\n\n그러다 쿨하게\n쌍 날개를 딱 달아주더니,\n마지막에는 백두산까지 타주셔서\n그 순간은 진짜 넋 놓고 보고 있었지 모에요....\n\n장난쳐도 웃으면서 잘 받아주고,\n말 많지 않아도\n쿨하게 뒤로 물러나는 그 뒷모습이\n괜히 더 멋있게 느껴지더라구요.\n\n웃음도 주고,\n행복한 기분까지 같이 안겨줘서\n오늘 하루가 더 의미있게 흘러갈 수 있던 것 같아요!\n\n처음이었는데도\n이렇게 좋은 기억으로 남겨줘서\n진심으로 고마오요❣️", "localImgPath": "images/4840396_b140a01d-d5b1-42df-8156-d1fc32355fda.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4840342": {"idx": 4840342, "date": "2026-02-01 20:06:53", "isTop": false, "contents": "❣️딩이❣️\n\n제가 해온 노력들이\n물거품이 되지 않게,\n그리고 만들어온 시간들이 의미 있게 느껴지게\n늘 옆에서 힘이 되어주는 딩쟝님\n\n개인 시그도 자주 이용해주고,\n벽지도 예쁘게 채워질 수 있게 도와주고,\n그 하나하나가\n뿌듯함을 느끼게 해줘서 기분이 좋더라구요ㅎㅋ\n\n거기에 링까지 딱 맞춰주신 덕분에\n천사 세트도 완성할 수 있어서\n그날은 정말 기분이 좋았답니당\n\n공지 속에서도, 방송 속에서도\n늘 존재감 뿜뿜인 딩쟝님 모시고요.\n매일같이 1일 1이유 해주는 울 딩쟝님 체구 ＞.＜\n\n이렇게 변함없이 함께해줘서\n진심으로 감사해요.\n이 마음, 오래오래 같이 가져가요❣️", "localImgPath": "images/4840342_3f23f8dd-91ec-4b59-b8ae-46a4b287c50b.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4840319": {"idx": 4840319, "date": "2026-02-01 20:00:43", "isTop": false, "contents": "❣️슈가❣️\n\n슈가오빠와 3일 연속으로 같은 시간을 함께 보냈다니,,,\n넘 좋구 신나서 햄볶아요 :)\n\n시작하자마자 땀에 젖도록 움직였고,\n몸은 분명 힘들었는데\n이상하게도 웃음은 멈추지 않았어요ㅋㅋ\n아마 슈가오빠의 진심 어린 마음이 느껴져서겠죠? ㅎ.ㅎ\n\n말보다 행동으로,\n티 나지 않게 보여주는 슈가오빠의 애정은\n간질간질 설레구 넘 됴아요.\n\n그래서 더 따뜻하게 느껴지나봐요♥\n\n늘 똑같은 이유지만\n변함없이 이뻐해주는 사람이 있다는\n그 사실 하나만으로도\n마음이 참 포근해졌어요.\n\n앞으로도\n자연스럽게 옆에서\n같은 시간을 걸어가고 싶어요.\n\n덕분에 행복한 하루였습니다❣️", "localImgPath": "images/4840319_f73b2245-e2d4-436b-8bae-07d34e7e2b26.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4840167": {"idx": 4840167, "date": "2026-02-01 19:14:37", "isTop": false, "contents": "❣️69회차❣️\n\n오늘은 운동이랑 댄스를 정말 많이 해서\n방송 내내 땀에 범벅이었던 하루였어요.\n\n시작부터 끝까지 계속 움직이다 보니\n힘들기도 했는데, 웃음은 더 많았던 날이었어요 !\n\n처음 뵌 변태트리오 오라방구들 덕분에\n부끄럽기도 하고 당황스럽기도 했지만,\n그 덕분에 평소엔 안 해봤을 새로운 시도도 해보고\n분위기가 더 자연스럽게 풀렸던 것 같아요.\n\n새로운 오빠들이었는데도 전혀 낯설지 않고,\n함께 있는 시간이 편하더라구요.\n\n거기에 예전부터 이유를 예쁘게 봐주던 오라버니들과\n같이 운동도 빡세게 하면서\n또 다른 재미를 느낄 수 있었어요 !\n\n오늘은 진짜\n여캠다운 여캠으로\n웃고, 뛰고, 땀 흘리고…\n아무 생각 없이 그냥 행복했오요❣️", "localImgPath": "images/4840167_e520cd1a-283e-4636-8b26-ab5dbc7e6c07.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4837343": {"idx": 4837343, "date": "2026-01-31 19:44:56", "isTop": false, "contents": "❣️❣️MVP 슈가❣️❣️\n\n이틀 연속으로 슈가오빠를 보게 될 줄은 몰랐눈데 !!\n\n어제에 이어 오늘도 다시 와줘서\n하루가 더 반갑게 시작된 느낌이었달까＞ ＜\n\n이뻐지는 루트인건지,\n골고루 운동 시켜서 미모 갱신 시켜주는(?) 슈가빠❣️\n\n자연스럽게 끌고 가는 그 모습이\n웃기기도 하고 귀엽기도 하고요 ㅋㅋ\n힘들어서 망가져도\n그마저도 좋다 해주니까\n괜히 더 웃게 되더라구요.\n\n이상하게 오빠 말 듣고 나면\n진짜 좀 더 이뻐진 것 같기도 하고…?\n아니면 그냥 기분 탓인강?! ㅎㅎ\n.... 오빠 눈에만 예쁘면 돼찌.. 암 고롬고롬 !!❣️\n\n의첸한다고\n날개짝까지 맞춰주면서\n또 한 번 통 크게 챙겨줘서 고마웠도요 !\n\n늘 자연스럽게 함께해줘서 고맙고,\n덕분에 기분 좋은 하루였숨미댜 히히❣️", "localImgPath": "images/4837343_850829d5-ef1f-4bd8-884b-a2bca2621db3.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4837330": {"idx": 4837330, "date": "2026-01-31 19:38:51", "isTop": false, "contents": "❣️검스❣️\n\n검스오빠는 처음 마주친 순간부터\n왜인지 모르게 자꾸 시선이 갔던 사람이에요.\n\n되게 신사적인데… 닉네임은 또 검스라서 ㅋㅋ\n그 앞뒤 안 맞는 느낌이 괜히 더 기억에 남았어요.\n\n스쳐 지나간 대화들 때문인지,\n그냥 분위기 때문인지\n자꾸 눈이 가긴 했거든요.\n\n오늘은 제대로 같이 얘기도 나누고\n같이 웃고 놀다 보니까\n아, 그래서였구나 싶더라구요 ㅋㅋ\n티키타카도 잘 맞고,\n조금 장난 섞인 얘기들에 괜히 더 웃게 되고\n부끄럽기도 한데… 그래서 더 재밌었던 날이에요\n\n의첸시켜준다면서\n날개랑 링까지 달아준 센스 덕분에\n하루가 더 기분 좋아졌어요 !!\n\n그래서 오늘부로,\n나의 귀여운 변태 1호는 검스오빠에요 !!ㅎ\n함께해줘서 고마웠고,\n앞으로도 이렇게 같이 웃고 놀아줘요❣️", "localImgPath": "images/4837330_1587922c-5506-4cba-bd9d-87cdeaadb850.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4837315": {"idx": 4837315, "date": "2026-01-31 19:32:42", "isTop": false, "contents": "❣️딩이❣️\n\n오빠와 함께하는 시간들이 하나둘 쌓이면서\n이제는 그 순간들이\n기다려지고, 편안해지고,\n당연한 하루의 일부가 되어가고 있어요\n\n조용히 뒤에서 지켜봐 주는 것도,\n내가 만든 것들을 기꺼이 아껴주는 것도,\n아무 말 없이 함께해 주는 그 태도 하나하나가\n어찌나 달달한지 몰라요 ㅎㅋ\n\n이유는요.\n오빠가 곁에 있어서 참 좋아요 !!\n이렇게 같이 웃고, 같은 공간에 있고,\n같은 시간을 보내고 있다는 게.\n\n예전이나 요즘이나 느끼고 있도요.\n오빠와 함께하는 순간이\n괜히 더 소중하고,\n놓치고 싶지 않은 순간들이라는 걸요＞＜\n\n오늘도 함께해 줘서 고마오요\n그리고… 앞으로도 긴 인연이었으면 좋게쏘요❣️", "localImgPath": "images/4837315_166b09b9-7fdd-4a3f-9ba9-9801dcd4b717.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4837276": {"idx": 4837276, "date": "2026-01-31 19:16:28", "isTop": false, "contents": "❣️68회차❣️\n\n오늘은 패션쇼(?) 하던 날이었어요\n하루 종일 의첸한 것 같긴 한데…\n저 나름 섹시하다고 생각한 옷들이었거든요 ㅋㅋㅋ\n\n근데 옷 갈아입고 나올 때마다\n오빠들 반응이 물음표? 인 것도 너무 웃겼고,\n그거 가지고 또 같이 티키타카 하다 보니까\n시간 가는 줄도 모르고 하루가 훅 지나가버렸네요.\n\n운동도 잔뜩 하고,\n오빠들이랑 수다도 실컷 떨고,\n괜히 더 편안하고\n진짜 같이 있는 것 같은 느낌이 확 와닿았던 하루였어요❣️\n\n게다가 울 열혈오빠들도 다 모여 있는 걸 정말 간만에 봐서,\n뭔가 이산가족 상봉한 날 같은 기분이라\n괜히 더 반갑고, 더 웃기고, 더 행복했어요ㅎㅎ\n\n이렇게 다 같이 모여서 웃고 떠들 수 있는 날이 있어서\n넘모 좋았쏘요 ㅎㅎㅎㅎ\n함께해줘서 고마오요 !!❣️", "localImgPath": "images/4837276_9b50bee5-b4a4-4859-ad59-d1c294055c82.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4834245": {"idx": 4834245, "date": "2026-01-30 20:13:34", "isTop": false, "contents": "-ㅁ-", "localImgPath": "images/4834245_128bdb33-ea3e-4625-9dcc-f5e43b2debb0.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4834173": {"idx": 4834173, "date": "2026-01-30 19:43:02", "isTop": false, "contents": "❣️❣️MVP 친구❣️❣️\n\n친구오빠는 나한테\n정말 말 그대로 소중한 사람이에요.\n\n내가 제일 힘들던 때부터\n아무 말 없이 옆에 있어줬고,\n그때의 나는 스스로도 감당하기 벅찼는데\n오빠는 묵묵히 많이 챙겨줬어요.\n\n내가 장난치면 밀어내는듯 하지만\n그 안에 담긴 마음은\n늘 변함없이 따뜻했어요.\n\n비제이가 쉰다는 게\n누군가에겐 안 좋게 보일 수도 있는 일인데,\n그런 말 한 번 없이\n“쉰다고 말해줬으면 그걸로 된 거지\" 하며\n마치 기다려주는 게 당연하단듯이 말해주던 순간이\n지금도 잊히질 않아요.\n\n그리고 복귀했다고\n또 아무렇지 않게 축하해주러 와주는 모습 보는데,\n사람이 왜이리 멋진 거야…\n지짜... 눈물이 나더라구요.\n\n길게 말하지 않아도,\n늘 내 편에서 응원해주고\n생각해주는 사람이 있다는 게\n얼마나 큰 힘이 되는지 알 것 같아요.\n\n나 정말,\n친구 하나는 너무 잘 둔 것 같아요\n사랑해 친구오빠 ㅠㅠㅠ❣️", "localImgPath": "images/4834173_6e871926-4912-4e3f-b0f1-fd83dcada7d6.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4834145": {"idx": 4834145, "date": "2026-01-30 19:33:52", "isTop": false, "contents": "❣️슈가❣️\n\n복귀 할 때마다\n꼭 이유한테 살 빼라고 하면서 운동을 시켜주는,\n되게 착한 슈가오빠 ＞ ＜\n\n이유가 복귀할 때마다\n어김없이 보러 와서 챙겨주는 게\n매번 우연치곤 너무 신기하더라구요 ㅋㅋ\n이 정도면 그냥\n축하해주려고 오는 거 아니냐고요 ~~~\n\n그렇게 말해도\n막상 보면 또\n축하한다면서 약값도 챙겨주고,\n운동도 잔뜩 시켜줘서\n괜히 더 기분 좋아져요.\n\n운동할 때가 제일 섹시하고 귀엽다며\n웃으면서 말해주는 슈가오빠 보면\n저도 모르게 웃음이 나더라구요.\n\n별일 없어도\n항상 따뜻하게 대해줘서,\n늘 고맙게 생각하고 있어요❣️", "localImgPath": "images/4834145_38d24b14-9261-464b-bf65-b8da2083961a.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4834133": {"idx": 4834133, "date": "2026-01-30 19:29:55", "isTop": false, "contents": "❣️순딩❣️\n\n“이번에 하나 비었네?” 하고 자연스럽게 나이두산을 타주던 순간부터,\n방송이 지루해질 틈 없게 계속 분위기를 살펴주고 있다는 게 느껴졌어요.\n\n다른 오빠들도 같이 어필할 수 있게 미션을 던져주고,\n말없이 시그로 마음을 전해주는 모습까지,\n괜히 더 귀엽고 사랑스럽게 느껴지더라구요.\n\n항상 제 편에서\n어떤 모습이든 변함없이 예뻐해주고 아껴주는 게 느껴져서\n마음이 많이 든든했어요.\n\n오늘도 제 하루에 있어줘서\n진심으로 고마워요❣️", "localImgPath": "images/4834133_10390fcd-1285-4d74-bf56-a07ec53599de.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4834128": {"idx": 4834128, "date": "2026-01-30 19:28:46", "isTop": false, "contents": "❣️67회차❣️\n\n오늘은 세뇨리따 같은 느낌 내고 싶어서\n빨간 의상을 입고 시작했는데,\n방송 시작하자마자 운동을 엄청 하게 될 줄은 몰랐어요 ㅋㅋ\n\n생각했던 흐름이랑은 전혀 달라서 더 웃겼고,\n예상 못 한 전개라 오히려 더 재밌었던 것 같아요.\n\n그러다 아는 오빠들이 하나둘 나타나다 보니\n시간도 진짜 금방 흘러가고,\n왜인지 모르게 마음도 편해지더라구요.\n\n괜히 웃음도 많아지고\n기분까지 좋아진,\n참 기쁜 하루였어요❣️", "localImgPath": "images/4834128_0891e0b2-2b66-45a3-84b6-abd74a45d2b9.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4830699": {"idx": 4830699, "date": "2026-01-29 20:33:17", "isTop": false, "contents": "❣️❣️MVP 순딩❣️❣️\n\n오늘도 어김없이\n방송 시작부터 함께해준 딩쟝님.\n\n날개 짝도 자연스럽게 맞춰주고,\n언제나처럼\n당연하다는 듯 제 옆에 있어주는 고마운 오빠예요.\n\n크게 말하지 않아도,\n눈에 띄게 앞에 나서지 않아도\n늘 같은 자리에서 같이 해주는 그 마음이\n얼마나 큰 건지 알 것 같더라구요.\n\n가끔은\n세상에 이런 오빠가 또 있을까\n싶을 정도로요.\n\n오늘도 함께해줘서,\n늘 변함없이 곁에 있어줘서\n진심으로 고마오요❣️", "localImgPath": "images/4830699_350ef9f8-078a-41e2-9419-4afeca5f974c.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4830681": {"idx": 4830681, "date": "2026-01-29 20:25:39", "isTop": false, "contents": "❣️벗겨주마❣️\n\n오자마자\n“흐흐흐흐” 하면서 계속 웃고 계셨던 주마오빠\n\n왜인지 모르게 그 웃음이 취향 저격이라\n저도 같이 웃으면서 장난치게 되더라구요 ㅋㅋ\n\n마음이 통했는지\n섹시댄스도 많이 시켜주시고,\n예쁜 말도 아낌없이 해주고…\n분위기를 계속 즐겁게 만들어줘서\n진짜 시간 가는 줄 모르고 놀았어요.\n\n그리고 마지막에,\n어떻게 알았는지 딱 맞춰서 링까지…\n덕분에 날개 세트가 완성됐거든요.\n\n진짜 너무 기쁘더라구요 ㅇㅁㅇ..❣️\n\n첫 만남인데도\n이렇게 예뻐해주고 마음 써주는 게\n쉽지 않은 일인 거 알기에\n더 감사하게 느껴졌어요.\n\n오늘 함께해줘서 고마오요❣️", "localImgPath": "images/4830681_2ec06687-c565-432b-b6bc-da04e9dd44f5.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4830676": {"idx": 4830676, "date": "2026-01-29 20:24:41", "isTop": false, "contents": "❣️help❣️\n\n어제 처음 만났는데,\n오늘은 방송 시작부터 방종까지\n옆에서 함께해준 헬프오빠\n\n사실 바로 와준 것만으로도 너무 고마웠는데,\n끝까지 함께해줄 줄은 정말 몰랐거든요.\n다른 오빠들이랑도 자연스럽게 어울려주고,\n분위기도 계속 살펴주는 모습이 참 좋더라구요.\n\n제가 방송에서\n“나 천사야~” 이러고 장난치고 있었는데,\n그 순간에 날개를 딱 던져주더라구요.\n\n와…\n그건 진짜 그냥 선물이 아니라\n저를 진짜 천사로 만들어준 느낌이었어요.\n\n센스에 한 번 놀라고,\n그 마음에 또 한 번 놀랐어요.\n괜히 멋있어 보인 게 아니라\n그래서 더 멋있었던 것 같아요.\n\n오늘 함께해줘서,\n그리고 편하게 곁에 있어줘서\n진심으로 고마오요❣️", "localImgPath": "images/4830676_159b5f6a-c825-417c-b91f-53c27e522761.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}, "4830586": {"idx": 4830586, "date": "2026-01-29 19:59:02", "isTop": false, "contents": "❣️67회차❣️\n\n아직은 조금 긴장된 상태이긴 하지만,\n어제보다는 훨씬 편해진 하루였어요.\n\n오빠들이 제가 빨리 적응할 수 있게\n계속 말도 걸어주고, 가만히 있지 않게 움직이게 해줘서\n그 덕분에 마음이 많이 풀린 것 같더라고요.\n\n그러다 보니\n제 장난꾸러기 같은 성격도 자연스럽게 나오고,\n스스로 즐기구 있다고 느껴지는 순간들도 있었어요.\n\n아직 완벽하진 않아도\n이렇게 하나씩 편해지면서\n지금처럼 쭉, 잘 해내가고 싶어요.\n\n오늘도 함께해줘서 고마오요❣️", "localImgPath": "images/4830586_3455fbe2-cd38-4a15-855e-eff33de65baf.png", "firstSeenAt": "2026-07-23 17:23:19", "lastUpdatedAt": "2026-07-23 17:23:19", "history": []}}
    </script>

    <script>
    let masterDict = {};
    try {
        const rawJson = document.getElementById('master-data-raw').textContent.trim();
        masterDict = JSON.parse(rawJson);
    } catch (e) {
        console.error("데이터 파싱 실패:", e);
    }

    const allData = Object.values(masterDict).sort((a, b) => {
        const aTop = Boolean(a.isTop && a.isTop !== "N" && a.isTop !== "false");
        const bTop = Boolean(b.isTop && b.isTop !== "N" && b.isTop !== "false");

        if (aTop && !bTop) return -1;
        if (!aTop && bTop) return 1;

        return Number(b.idx) - Number(a.idx);
    });

    let filteredData = [...allData];
    let currentPage = 1;
    const itemsPerPage = 10;

    const searchInput = document.getElementById('searchInput');
    const includeHistoryCheck = document.getElementById('includeHistoryCheck');
    const noticeContainer = document.getElementById('noticeContainer');
    const pagination = document.getElementById('pagination');
    const totalCountEl = document.getElementById('totalCount');
    const currentPageEl = document.getElementById('currentPage');
    const totalPagesEl = document.getElementById('totalPages');

    function cleanContents(text) {
        if (!text) return "";
        return text
            .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
            .replace(/<br\s*\/?>/gi, '\n')
            .replace(/<[^>]+>/g, '')
            .trim();
    }

    function filterData() {
        const query = searchInput.value.toLowerCase().trim();
        const includeHistory = includeHistoryCheck.checked;

        filteredData = allData.filter(item => {
            const cleanedMain = cleanContents(item.contents).toLowerCase();
            const contentsMatch = cleanedMain.includes(query);
            const dateMatch = (item.date || "").toLowerCase().includes(query);
            const idxMatch = String(item.idx).includes(query);

            let historyMatch = false;
            if (includeHistory && item.history && item.history.length > 0) {
                historyMatch = item.history.some(h => 
                    cleanContents(h.previousContents || "").toLowerCase().includes(query)
                );
            }

            return contentsMatch || dateMatch || idxMatch || historyMatch;
        });

        currentPage = 1;
        render();
    }

    function renderList() {
        noticeContainer.innerHTML = '';
        
        if (filteredData.length === 0) {
            noticeContainer.innerHTML = '<div class="no-result">검색 결과가 없습니다.</div>';
            return;
        }

        const startIdx = (currentPage - 1) * itemsPerPage;
        const pageItems = filteredData.slice(startIdx, startIdx + itemsPerPage);

        pageItems.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';

            const isTopNotice = Boolean(item.isTop && item.isTop !== "N" && item.isTop !== "false");
            const topBadge = isTopNotice ? '<span class="badge-top">📌 상단 고정</span>' : '';
            const mainText = cleanContents(item.contents);
            const formattedContents = escapeHtml(mainText).replace(/\n/g, '<br>');

            let imgHtml = '';
            if (item.localImgPath) {
                imgHtml = `
                    <div class="img-container thumb">
                        <img src="${item.localImgPath}" alt="공지 이미지" onclick="toggleImgSize(this)" title="클릭하여 확대/축소" onerror="this.parentElement.style.display='none'">
                        <a href="${item.localImgPath}" target="_blank" class="btn-view-original">🔍 원본 사진 보기</a>
                    </div>
                `;
            }

            /* 📜 수정 이력 렌더링 부분 */
            let historyHtml = '';
            if (item.history && item.history.length > 0) {
                const historyItems = item.history.map((h, i) => {
                    const hText = escapeHtml(cleanContents(h.previousContents)).replace(/\n/g, '<br>');
                    const hDate = h.savedAt ? `<span style="font-size:0.78rem; color:var(--text-muted); margin-left:6px;">(${h.savedAt})</span>` : '';
                    return `
                        <div class="history-item">
                            <strong>[수정 전 기록 ${i + 1}]</strong>${hDate}<br>
                            <div style="margin-top:4px;">${hText || '<i>(내용 없음)</i>'}</div>
                        </div>
                    `;
                }).join('');

                historyHtml = `
                    <div class="history-section">
                        <button type="button" class="history-btn" onclick="toggleHistory(this)">
                            📜 이전 수정 기록 보기 (${item.history.length}회)
                        </button>
                        <div class="history-list">
                            ${historyItems}
                        </div>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="card-header">
                    <div>${topBadge}<span class="idx-tag">#${item.idx}</span></div>
                    <div style="display: flex; align-items: center;">
                        <span class="date-tag">${item.date || ''}</span>
                        <button class="copy-btn" onclick="copyText('${item.idx}', this)">📋 복사</button>
                    </div>
                </div>
                <div class="card-content-wrapper">
                    <div class="card-body">${formattedContents}</div>
                    ${imgHtml}
                </div>
                ${historyHtml}
            `;
            noticeContainer.appendChild(card);
        });
    }

    /* 📜 수정 이력 열기/닫기 토글 함수 */
    function toggleHistory(btn) {
        const historyList = btn.nextElementSibling;
        if (historyList) {
            historyList.classList.toggle('open');
        }
    }

    function toggleImgSize(imgElement) {
        const container = imgElement.parentElement;
        container.classList.toggle('thumb');
        container.classList.toggle('expanded');
    }

    function copyText(idx, btnElement) {
        const targetItem = masterDict[idx];
        if (!targetItem) return;

        const textToCopy = cleanContents(targetItem.contents);
        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = btnElement.innerText;
            btnElement.innerText = '✓ 복사됨!';
            setTimeout(() => { btnElement.innerText = originalText; }, 1500);
        });
    }

    function renderPagination() {
        pagination.innerHTML = '';
        const totalPages = Math.ceil(filteredData.length / itemsPerPage) || 1;

        totalCountEl.textContent = filteredData.length;
        currentPageEl.textContent = currentPage;
        totalPagesEl.textContent = totalPages;

        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.className = 'page-btn';
        prevBtn.textContent = '◀ 이전';
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => { currentPage--; render(); window.scrollTo(0, 0); };
        pagination.appendChild(prevBtn);

        let startPage = Math.max(1, currentPage - 4);
        let endPage = Math.min(totalPages, startPage + 9);
        if (endPage - startPage < 9) {
            startPage = Math.max(1, endPage - 9);
        }

        for (let i = startPage; i <= endPage; i++) {
            const btn = document.createElement('button');
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.textContent = i;
            btn.onclick = () => { currentPage = i; render(); window.scrollTo(0, 0); };
            pagination.appendChild(btn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.className = 'page-btn';
        nextBtn.textContent = '다음 ▶';
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = () => { currentPage++; render(); window.scrollTo(0, 0); };
        pagination.appendChild(nextBtn);
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function render() {
        renderList();
        renderPagination();
    }

    searchInput.addEventListener('input', filterData);
    includeHistoryCheck.addEventListener('change', filterData);
    render();
    </script>
</body>
</html>
